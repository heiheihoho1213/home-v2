3-1\",{\"className\":\"text-xl font-bold mt-4 mb-2\",\"children\":\"为什么要自己写UI库\"}],\"\\n\",[\"$\",\"p\",\"p-1\",{\"className\":\"mb-4 text-lg leading-relaxed\",\"children\":\"        现在优秀的前端开源UI库已经很多了，比如antd. Material UI. element UI等等，这些UI库生态都比较完善，文档也写得很好，你在项目中直接用不就行了，可为什么还要自己写呢？借用一句老话，租不如买，买不如造，从这个角度也能知道老用别人的总觉得有点缺陷，这里作者个人认为坚持写自己的UI库主要有这么几个原因：\"}],\"\\n\",[\"$\",\"p\",\"p-2\",{\"className\":\"mb-4 text-lg leading-relaxed\",\"children\":[[\"$\",\"em\",\"em-0\",{\"className\":\"italic\",\"children\":\"1.\"}],\" \",[\"$\",\"em\",\"em-1\",{\"className\":\"italic\",\"children\":\"会受制于人。\"}]]}],\"\\n\",[\"$\",\"p\",\"p-3\",{\"className\":\"mb-4 text-lg leading-relaxed\",\"children\":\"        虽然是开源的库，但是遍观市面上大多数产品，都没有用这些组件库，相反的是企业内部的项目用的比较多。我想更多的原因是不想受制于人，如果哪一天UI库的作者想要收专利费了，你的项目要不要迁移到别的组件库？还是说乖乖交钱呢？另一方面，如果你公司所有的产品都用了antd，日积月累，你就会天然的依赖阿里的开发习惯，选择新产品的时候就会更倾向于阿里同系的，所以说，免费的代价是失去自主权。\"}],\"\\n\",[\"$\",\"p\",\"p-4\",{\"className\":\"mb-4 text-lg leading-relaxed\",\"children\":[[\"$\",\"em\",\"em-0\",{\"className\":\"italic\",\"children\":\"2.\"}],\" \",[\"$\",\"em\",\"em-1\",{\"className\":\"italic\",\"children\":\"升级产品需要看脸色。\"}]]}],\"\\n\",[\"$\",\"p\",\"p-5\",{\"className\":\"mb-4 text-lg leading-relaxed\",\"children\":\"        举个例子，你的产品所使用的框架，Vue要从2升3，Angular要从9升12，React要升级18了，而你所依赖的第三方UI组件库还不支持新版本框架，或者对新版本框架或其他的依赖部分兼容，这就会使得你的开发非常的难受。\"}],\"\\n\",[\"$\",\"p\",\"p-6\",{\"className\":\"mb-4 text-lg leading-relaxed\",\"children\":[[\"$\",\"em\",\"em-0\",{\"className\":\"italic\",\"children\":\"3.\"}],\" \",[\"$\",\"em\",\"em-1\",{\"className\":\"italic\",\"children\":\"不好维护。\"}]]}],\"\\n\",[\"$\",\"p\",\"p-7\",{\"className\":\"mb-4 text-lg leading-relaxed\",\"children\":\"        使用别人的组件库，如果出了Bug怎么修呢？难道要在Github上提Issue嘛😂，这样抱怨的是你的客户，受损的是你的产品。第三方进行的开源，是个双刃剑，免费给你用，但是出了问题人家也不负责。\"}],\"\\n\",[\"$\",\"p\",\"p-8\",{\"className\":\"mb-4 text-lg leading-relaxed\",\"children\":\"        有了这些原因，应该不会再质疑为什么要做自己的UI库了吧。拥有自己全套的产品体系，对于企业，是一个拿回自主权的重要一步，对于我们开发者，也是锤炼自己基本功的过程，何乐而不为？\"}],\"\\n\",\"$

 console.log(x))\n```\n\nconcatMap接受异步请求的数据，然后传给 button 的点击事件 Observable 对象，通过该事件 Observable 对象来输出结果。处理事件时， concatMap 第二个参数就派上用场了。\n\n#### $6. 定时器$\n\n```js\nimport { interval, timer } from 'rxjs';\n\nconst test_interval = interval(1000);\n\nconst test_timer = timer(1000, 5000);\n\nconst test_timer = timer(1000);\n\nexport {test_interval, test_timer}\n```\n\ninterval会不停的按照间隔时间累加数字，从0开始。timer是一个定时器，只有一个参数时，在指定时间（毫秒）后输出一个0，两个参数时，比如上面的例子，指的是从第1秒开始，每隔5秒出书一个累加的值，从0开始。\n\n#### $7. 异常处理 throwError$\n\n```js\nimport { throwError, interval, of } from 'rxjs';\nimport { mergeMap } from 'rxjs/operators';\n\ninterval(1000).pipe(\nmergeMap(x =\u003e x === 2\n    ? throwError('Twos are bad')\n    : of('a', 'b', 'c')\n    ),\n).subscribe(x =\u003e console.log(x), e =\u003e console.error(e));\n```\n\n上面的例子中，使用算子 throwError抛出错误，抛出后，订阅停止。\n\n#### $8. zipAll$\n\n下图中，zipAll 将 from 操作符解构出的流式数据又拼接回数组形式。\n\n![12.png](/img/posts/2022-6-19/2022-6-19-13.png)\n\n#### $9. group 与 reduce$\n\n类似 SQL 中的 groupBy，接受一个函数，返回要group的对象key值。\n\n![13.png](/img/posts/2022-6-19/2022-6-19-14.png)\n\n解开 tap的注释后，可以看到打印的输出：\n\n![image.png](/img/posts/2022-6-19/2022-6-19-15.png)\n\nreduce用来聚合Observable中的数值。\n\n#### $10. distinct$\n\n去重算子。\n\n使用RxJs来数组去重：\n\n![14.png](/img/posts/2022-6-19/2022-6-19-16.png)\n\n#### $11. takeUtill$\n\n直到提供的 observable 发出值，它便完成\n\n例1：\n\n![15.png](/img/posts/2022-6-19/2022-6-19-17.png)\n\n\u003e 思考：是不是可以用来 防抖节流 呢\n\n例2：直到用户点击后，开启定时器\n\n![16.png](/img/posts/2022-6-19/2022-6-19-18.png)\n\n#### $12. takeLast$\n\n取流数据的最后一个（同理，有 take(index: number)函数来正向指定下标获取）\n\n![17.png](/img/posts/2022-6-19/2022-6-19-19.png)\n\n#### $13. 专用的防抖节流$\n\n上面说可以用takeUtils模拟防抖节流，其实Rxjs有专用的防抖节流函数。\n\n```js\nimport { debounceTime, throttleTime } from 'rxjs';\n\nObservable.fromEvent(document.getElementById(\"debounceTime\"), \"click\")\n    .debounceTime(1000)\n    .subscribe(() =\u003e console.log(\"debounceTime\"));\n    \nObservable.fromEvent(document.getElementById(\"throttleTime\"), \"click\")\n    .throttleTime(1000)\n    .subscribe(() =\u003e console.log(\"throttleTime\"));\n```\n\n#### $14. Subject 对象$\n\nSubject继承自Observable类，同样具有数据流监听特性，其作为observable的一种载体，多用于组件之间传递。\n\n可以推送(next)和被订阅(subscribe)\n\n![18.png](/img/posts/2022-6-19/2022-6-19-20.png)\n\nBehaviorSubject：每个新的订阅可以拿到管道中最新的那次数据\n\n![19.png](/img/posts/2022-6-19/2022-6-19-21.png)\n\nAsyncSubject：complete时会输出最新的管道数据，其余时间不输出\n\n![20.png](/img/posts/2022-6-19/2022-6-19-22.png)\n\nReplaySubject：每次新订阅时，可指定获取管道中最新的N个数据\n\n![21.png](/img/posts/2022-6-19/2022-6-19-23.png)\n\n\u003e 引申阅读，数百个操作符： http\\://[reactivex.io/documentation/operators.html](http://reactivex.io/documentation/operators.html)\n\n## 5. 应用场景\n\n1.  多事件界面\n2.  更加复杂的交互场景，尤其是需要组件间多级传递的情况\n3.  需要源源不断的流出数据的场景\n\n## 6. 与 Promise 对比\n\n共同点：\n\n1.  处理异步\n\n例1：\n\n![22.png](/img/posts/2022-6-19/2022-6-19-24.png)\n\n例2：\n\n![23.png](/img/posts/2022-6-19/2022-6-19-25.png)\n\n不同：\n\n1.  设计理念不同（发布订阅、观察者+pipe）\n2.  中途取消\n\n在上面异步处理的例子中，可以选择取消定时器：即取消订阅\n\n![24.png](/img/posts/2022-6-19/2022-6-19-26.png)\n\n3.  完善的函数工具\n\n## 7. 与 React 结合\n\n示例：组件间传递消息\n\n父组件：声明一个 subject，通过 prop 传递给 子组件\n\n![25.png](/img/posts/2022-6-19/2022-6-19-27.png)\n\n![26.png](/img/posts/2022-6-19/2022-6-19-28.png)\n\n子组件：接受该 subject，然后往里边推送值。同理，父组件也可以推送，子组件来监听。如此达到 父子组件 全双工通信。\n\n![27.png](/img/posts/2022-6-19/2022-6-19-29.png)\n\n点击子组件的三个按钮，就会看到父组件的订阅触发了！\n\n![28.png](/img/posts/2022-6-19/2022-6-19-30.png)\n\n点击后会有相应输出，比如：\n\n```\n1\n2\n3\n3\n```\n\n推荐项目：`\u003chttps://github.com/LeetCode-OpenSource/rxjs-hooks\u003e`\n\n\u003chr /\u003e\n\n参考：\n\n*   [Rxjs Github](https://github.com/ReactiveX/rxjs)\n*   [ReactiveX 官网](https://reactivex.io/)"])</script><script>self.__next_f.push([1,"41:T732,"])</script><script>self.__next_f.push([1,"## 1. 伪元素模拟实现微软logo阴影\n\n\u003e  CSS 探究系列文章之伪shadow\n\n```html\n\u003cdiv style={{ width: '100%', height: '500px', background: 'linear-gradient(90deg, hsl(199, 98%, 50%), hsl(199, 98%, 38%))', overflow: 'hidden' }}\u003e\n  \u003cdiv className={`${style.box}`}\u003e\n    \u003cdiv\u003e\u003c/div\u003e\n    \u003cdiv\u003e\u003c/div\u003e\n    \u003cdiv\u003e\u003c/div\u003e\n    \u003cdiv\u003e\u003c/div\u003e\n  \u003c/div\u003e\n\u003c/div\u003e\n```\n\n\n```html {{ title: 'HTML' }}\n\u003cdiv class='box'\u003e\n  \u003cdiv\u003e\u003c/div\u003e\n  \u003cdiv\u003e\u003c/div\u003e\n  \u003cdiv\u003e\u003c/div\u003e\n  \u003cdiv\u003e\u003c/div\u003e\n\u003c/div\u003e\n```\n\n```css {{ title: 'CSS' }}\n/* 先使用 grid 布局实现四个方块的定位 */\n.box {\n  position: relative;\n  width: 20vmin;\n  height: 20vmin;\n  margin: 20vmin;\n  padding: 0;\n  z-index: 2;\n  display: grid;\n  grid-template-columns: repeat(2, 1fr);\n  grid-template-rows: repeat(2, 1fr);\n  grid-row-gap: 4%;\n  grid-column-gap: 4%;\n  grid-auto-flow: row;\n}\n\n/* 设置两个伪元素，分别表示两个边的阴影 */\n.box::before,\n.box::after {\n  content: \"\";\n  position: absolute;\n  top: 0;\n  left: 0;\n  right: 0;\n  bottom: 0;\n  z-index: 2;\n}\n\n.box::before {\n  /* transform-origin 是变形原点，也就是该元素围绕着那个点变形或旋转 */\n  /*比如：0 50% 表示 x 方向上在最左边，y 方向上在最左边那条边中间的位置 */\n  transform-origin: 0 0;\n  /* 跑到最右边的上边, scaleX 缩放一下范围，可以不要 */\n  transform: translate(100%, 0) skewY(45deg) scaleX(.6);\n  background: linear-gradient(90deg, rgba(0, 0, 0, .3), transparent);\n  animation: shadowMoveY 5s infinite linear alternate;\n}\n\n.box::after {\n  transform-origin: 0 0;\n  transform: translate(0%, 100%) skewX(45deg) scaleY(.6);\n  background: linear-gradient(180deg, rgba(0, 0, 0, .3), transparent);\n}\n\n@keyframes shadowMoveY {\n  to {\n    transform: translate(100%, 0) skewY(20deg) scaleX(.6);\n  }\n}\n```\n\n![microsoft-logo](/img/posts/css/microsoft-logo.jpg)"])</script><script>self.__next_f.push([1,"42:T6cf,"])</script><script>self.__next_f.push([1,"```html\n\u003cdiv className={style.container}\u003e\n  \u003cdiv className={style.shadow}\u003eHover\u003c/div\u003e\n\u003c/div\u003e\n```\n\n#### 设置初始颜色\n\n先设置四个角的颜色（设置宽高. 圆角. 0边框 的代码省略）：\n\n```html\n\u003cdiv class='shadow'\u003eHover\u003c/div\u003e\n```\n\n```css\n--color: #1e91e9;\n\n/* 用四个阴影模拟四个象限，这里只设置一个，其实初始效果是一样的 */\nbox-shadow: 0 0 0 2px var(--color), 0 0 0 2px var(--color),\n  0 0 0 2px var(--color), 0 0 0 2px var(--color);\n```\n\n#### 设置浮动动画\n\n```css\n\n.shadow:hover {\n  --color: #1e91e9;\n  animation: border .5s ease forwards;\n}\n\n@keyframes border {\n  /* 1/4 时，右上角：向右偏移为0，向上偏移125，不模糊，扩散2px，变为灰色 */\n  /* 左上角：向右偏移为0，向上偏移125，不模糊，扩散2px，变为灰色 */\n  25% {\n    box-shadow: 0 -125px 0 2px var(--color),\n                -60px -60px 0 2px var(--color),\n                -60px 60px 0 2px var(--color),\n                60px 60px 0 2px var(--color),\n                0 0 0 2px #ccc;\n  }\n\n  50% {\n    box-shadow: 0 -125px 0 2px var(--color),\n                -125px 0px 0 2px var(--color),\n                -60px 60px 0 2px var(--color),\n                60px 60px 0 2px var(--color),\n                0 0 0 2px #ccc;\n  }\n\n  75% {\n    box-shadow: 0 -125px 0 2px var(--color),\n                -125px 0px 0 2px var(--color),\n                0px 125px 0 2px var(--color),\n                60px 60px 0 2px var(--color),\n                0 0 0 2px #ccc;\n  }\n\n  100% {\n    box-shadow: 0 -125px 0 2px var(--color),\n                -125px 0px 0 2px var(--color),\n                0px 125px 0 2px var(--color),\n                120px 40px 0 2px var(--color),\n                0 0 0 2px #ccc;\n  }\n}\n```"])</script><script>self.__next_f.push([1,"43:T60a,```html\n\u003cdiv className={style.container}\u003e\n  \u003cdiv className='flex-start'\u003e\n    \u003cdiv className={style.left}\u003e左\u003c/div\u003e\n    \u003cp\u003ebox-shadow: -7px 0 5px -5px #ccc\u003c/p\u003e\n  \u003c/div\u003e\n  \u003cdiv className='flex-start'\u003e\n    \u003cdiv className={style.right}\u003e右\u003c/div\u003e\n    \u003cp\u003ebox-shadow: 7px 0 5px -5px #ccc\u003c/p\u003e\n  \u003c/div\u003e\n  \u003cdiv className='flex-start'\u003e\n    \u003cdiv className={style.top}\u003e上\u003c/div\u003e\n    \u003cp\u003ebox-shadow: 0 -7px 5px -5px #ccc\u003c/p\u003e\n  \u003c/div\u003e\n  \u003cdiv className='flex-start'\u003e\n    \u003cdiv className={style.bottom}\u003e下\u003c/div\u003e\n    \u003cp\u003ebox-shadow: 0 7px 5px -5px #ccc\u003c/p\u003e\n  \u003c/div\u003e\n\u003c/div\u003e\n```\n\n```html\n\u003cdiv\u003e\n  参数： x 方向偏移量（右+）， y 方向偏移量 （下+），模糊半径，扩张半径\n\n  扩张半径会根据指定的值去扩大或缩小投影尺寸，如果我们用一个负的扩张半径，而他的绝对值刚好等于模糊半径，那么投影的尺寸就会与投影所属的元素尺寸完全一致，除非使用偏移量来移动他，否则我们将看不到任何投影。\n\u003c/div\u003e\n```\n\n```html\n\u003cdiv className={style.container}\u003e\n  \u003cdiv className='flex-start'\u003e\n    \u003cdiv className={style.left2}\u003e左\u003c/div\u003e\n    \u003cp\u003ebox-shadow: -7px 0 5px 5px #ccc\u003c/p\u003e\n  \u003c/div\u003e\n  \u003cdiv className='flex-start'\u003e\n    \u003cdiv className={style.right2}\u003e右\u003c/div\u003e\n    \u003cp\u003ebox-shadow: 7px 0 5px 5px #ccc\u003c/p\u003e\n  \u003c/div\u003e\n  \u003cdiv className='flex-start'\u003e\n    \u003cdiv className={style.top2}\u003e上\u003c/div\u003e\n    \u003cp\u003ebox-shadow: 0 -7px 5px 5px #ccc\u003c/p\u003e\n  \u003c/div\u003e\n  \u003cdiv className='flex-start'\u003e\n    \u003cdiv className={style.bottom2}\u003e下\u003c/div\u003e\n    \u003cp\u003ebox-shadow: 0 7px 5px 5px #ccc\u003c/p\u003e\n  \u003c/div\u003e\n\u003c/div\u003e\n```44:Ta671,"])</script><script>self.__next_f.push([1,"## 0. 前言\n\n### 1、名称由来\n\n说起JavaScript相关的历史，还得追溯到计算机及其编程语言诞生之初的那段时间。\n\n在1959年，欧洲的计算机产业已经出现蓬勃发展的迹象了，现代意义的计算机也越来越多地开始在科研机构，政府等社会场所被使用，使用的人多了，计算机操作技术实现标准化就被推上了日程，例如编程，以及输入和输出代码规范等。\n\n行业标准对于行业发展的重要性不言而喻。为了协调标准制定工作，欧洲数据处理领域历史最悠久的公司（Compagnie des Machines Bull、IBM World Trade Europe Corporation 和 International Computers and Tabulators Limited）的负责人向所有已知的计算机发出了联名信。欧洲制造商邀请这些公司派代表参加会议。这次会议于 1960 年 4 月 27 日在布鲁塞尔举行；决定成立一个制造商协会，称为欧洲计算机制造商协会（`European Computer Manufacturers Association`）或简称 `ECMA`，并提名了一个委员会来准备该协会的成立并制定章程和规则。随后的 1961 年 5 月 17 日，协会正式成立。\n\n这便是`ECMA`这个名字的来源。\n\n`ECMA`走向全球后，在1994 年更名为：`Ecma International`。其商标“ECMA”由于历史原因被保留了下来，沿用至今。\n\n### 2、ECMA-262标准，梦开始的地方\n\n`EMCA`标准容纳了大量通信、计算机及其相关行业的标准规范。我们找一下本文的主角。\n\n在[官网](https://www.ecma-international.org/publications-and-standards/standards/)中扒一张图：\n\n![image.png](/img/posts/2022-6-15/2022-6-15-1.png)\n\n可以看到，第262号标准又叫`ECMAScript`，是ECMA定义的一套脚本语言编程规范。\n\n\u003e ECMAScript 通常缩写为 ES。\n\n正是因为有这个标准的出现，才有了 JavaScript 的蓬勃发展！感谢大佬赏饭吃！！\n\nECMA-262是一种规范（官网中可以查到各个版本的PDF提案），自然会有满足这种规范的具体的语言被创造出来。最著名的就是**JavaScript**\n（现在商标属于Oracle），在1995年由[Netscape](https://baike.baidu.com/item/Netscape/2778944)公司的Brendan Eich，在Netscape导航者浏览器上首次设计实现而成。因为Netscape与[Sun](https://baike.baidu.com/item/Sun/69463)合作，Netscape管理层希望它外观看起来像Java，因此取名为JavaScript。但实际上它的语法风格与Self及[Scheme](https://baike.baidu.com/item/Scheme/8379129)较为接近。其设计思路如下：\n\n1.  借鉴 C 语言的基本语法。\n2.  借鉴 Java 语言的数据类型和内存管理。\n3.  借鉴 Scheme 语言，将函数提升到“第一等公民”（first class）的地位。\n4.  借鉴 Self 语言，使用基于原型（prototype）的继承机制。\n\n\u003e JavaScript的是一门动态弱类型、基于原型的一种解释性计算机脚本语言。\n\n在没有 JavaScript 的年代，一些简单的表单验证（如常见的 密码复杂度验证）都是由服务端负责的，而且当时的网络速度是非常慢的，这种验证方式会导致网站的响应速度变得更慢，于是便有了这门语言的诞生。\n\n其次还有微软自研的一套语言，叫`JScript`，其声称完全遵循`ECMA-262`规范。下面列举一下二者的区别：\n\n| 特点    | JavaScript                                       | JScript          |\n| ----- | ------------------------------------------------ | ---------------- |\n| 运行平台  | 客户端,服务端                                          | 客户端,服务端          |\n| 解释环境  | Netscape Livewire、V8（Chrome + node）、TraceMonkey等 | WSH、ASP、.Net     |\n| 支持浏览器 | 所有主流浏览器                                          | 主要是IE3.0+        |\n| 出现时间  | 比较早，甚至早于ECMA-262                                 | VBScript竞争失败后的产物 |\n\n## 1. JavaScript 1.0 （96年）\n\n发布于1996年，适用于Netscape Navigator2.0浏览器，初步确定了完整的JavaScript的三个构成要素：\n\n1.  ECMAScript（姑且这么叫，1.3版本才正式完全兼容ECMA规范）。JavaScript 的核心部分，它规定了 JavaScript 的语法、类型、语句、 关键字、保留字、运算符和对象。\n\n2.  DOM（Document Object Model）。通过把整个页面映射成一个树结构的文档，提供 了一套可以访问 HTML 和 XML（eXtensible Markup Language）节点的 API（Application Programming Interface），开发者可以利用它轻松地删除、添加、替换或修改任何节点。\n\n3.  BOM（Browser Object Model）。提供了访问浏览器窗口的方法，开发者可以控制浏 览器窗口进行一些诸如移动窗口之类的操作。BOM 部分的有关定义，零散分布在各种标 准中，主要位于 HTML 标准。其他比如 WebRTC 标准等内也定义了一些接口。\n\n\u003e 1.0里有一些以后很少用的冷门特性。比如函数不但有call，apply方法，还有name和length，还有`arguments`， `caller`（在1.2版移除）；Arguments是个对象而不是数组；对象可以用数字下标访问属性；没有===的强类型判定；对不支持script标签的浏览器做特殊注释兼容等。\n\n## 2. JavaScript 1.1（96年）\n\n发布于1996年下半年，适配了Netscape Navigator3.0 和 IE3.0。完善数组对象和方法。\n\n## 3. JavaScript 1.2（97年）\n\n发布于1997年，适配了Netscape Navigator4.0，但不支持 IE 环境。增加了===的判断方式。\n\n## 4. JavaScript 1.3 与 ECMAScript 1/2（98年）\n\n发布于1998年。前边说JavaScript出现时间早于ECMA-262，指的就是这个版本的事情。这一年，ECMA标准化了JavaScript1.1的基本特性，同时JavaScript也升级到1.3，并添加了一些新特性（没有标准化switch语句和正则表达式）。至此，JavaScript才逐步遵循ECMA规范进行升级换代。\n\nECMAScript 2标准是对v1的一个维护版本，只添加了说明，也在同一年发布。\n\n## 5. JavaScript 1.4（99年）\n\n适用于Netscape server的专用版本。\n\n## 6. JavaScript 1.5 与 ECMAScript 3（00年）\n\n发布于2000年底，开始支持 Mozilla Firefox 和 Opera 浏览器，并标准化了switch语句、异常处理( try/catch)和正则表达式。\n\n## 7. JavaScript 1.6（05年）\n\n2005年发布。逐步增加了数组的扩展方法、增加了Array和String泛型、支持XML扩展（E4X）。开始支持Safari 3.0。同年，Ajax技术发布。\n\n新增的数组扩展如下（部分扩展在ES5中逐步规范化）：\n\n| 新增扩展          | 描述                                           |\n| ------------- | -------------------------------------------- |\n| indexOf()     | 返回指定项首次出现的index                              |\n| lastIndexOf() | 返回指定项最后一次出现的index                            |\n| every()       | 在数组中的每一个项运行一个函数。如方法可用遍历每一个项都返回的true，则返回true  |\n| filter()      | 在数组中的每一个项运行一个函数，并将这个函数返回true的项作为一个数组返回       |\n| forEach()     | 在数组中的每一个项运行一个函数                              |\n| map()         | 在数组中的每一个项运行一个函数，并将所有的结果作为数组返回                |\n| some()        | 在数组中的每一个项运行一个函数，如果这个方法访问的任何一个项返回true，则返回true |\n\n泛型（非TS的那种）使用：\n\n```js\nfunction isLetter(character) {  \n  return (character \u003e= \"a\" \u0026\u0026 character \u003c= \"z\");  \n}  \n\n// 在字符串中使用数组的方法\nif (Array.every(str, isLetter))  \n  alert(\"The string '\" + str + \"' contains only letters!\");\n```\n\n## 8. JavaScript 1.7（07年）\n\n2007年发布。新特性如下：\n\n*   学习了Python的语法，并引入了Pythonic generators（generator函数）、\n*   引入解构赋值\n*   Iterators（迭代器）\n*   let 声明\n\n\u003e 这仍然是ES3的内容，不要认为是ES6才有的。\n\n*   开始支持 Google Chrome1.0。\n\n## 9. ECMAScript 4\n\n2008年被废弃的标准。[死亡原因](https://www.136.la/jingpin/show-14541.html)\n\n## 10. JavaScript 1.8 （08-10年） 与 ECMAScript 5 （09年）\n\n包含很多patch版本。\n\n#### 2008年发布 1.8.0\n\n新特性：\n\n| 新特性    | 描述                                   |\n| ------ | ------------------------------------ |\n| 表达式闭包  | 见下面代码                                |\n| 生成器表达式 | 个新特性使你可以使用类似数组概念的语法来创建一个独立的生成器句柄，见代码 |\n\n表达式闭包：\n\n```js\n// JavaScript 1.7 以及更老的版本:\nfunction(x) { return x * x; }\n\n// JavaScript 1.8:\nfunction(x) x * x;\n```\n\n生成器表达式\n\n```js\n// 使用1\nlet it = (i + 3 for (i in someObj));\ntry {\n    while (true) {\n        document.write(it.next() + \"\u003cbr\u003e\\n\");\n    }\n} catch (err if err instanceof StopIteration) {\n\n    document.write(\"End of record.\u003cbr\u003e\\n\");\n}\n\n// 使用2\nfunction handleResults( results ) {\n    for ( let i in results )\n    ...\n}\nhandleResults( i for ( i in obj ) if ( i \u003e 3 ) );\n```\n\n#### 同年发布 1.8.1\n\n新特性：\n\n| 新特性                     | 描述                                                                                                                                                                                                                                                                                                                                                                                                                                                    |\n| ----------------------- | ----------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- |\n| Object.getPrototypeOf() | 返回指定对象的原型对象，见[`示例`](https://developer.mozilla.org/En/Core_JavaScript_1.5_Reference/Global_Objects/Object/GetPrototypeOf)                                                                                                                                                                                                                                                                                                                              |\n| Firefox 3.5 原生支持 JSON   | -                                                                                                                                                                                                                                                                                                                                                                                                                                                     |\n| String对象新增方法            | [`String` ](https://developer.mozilla.org/en/Core_JavaScript_1.5_Reference/Global_Objects/String)  增加  [`trim()` ](https://developer.mozilla.org/En/Core_JavaScript_1.5_Reference/Global_Objects/String/Trim),   [`trimLeft()` ](https://developer.mozilla.org/En/Core_JavaScript_1.5_Reference/Global_Objects/String/TrimLeft), 和   [`trimRight()` ](https://developer.mozilla.org/En/Core_JavaScript_1.5_Reference/Global_Objects/String/TrimRight) |\n| 其他一些次要更新                | -                                                                                                                                                                                                                                                                                                                                                                                                                                                     |\n\n#### 2009年发布 1.8.2\n\n一些次要更新。\n\n#### 2010年发布 1.8.5，并遵循ECMAScript 5 （2009年发布）规范\n\n一次大的更新，将之前JS各个版本的方法进行统一汇总整理，并新加入一批API，一起写入规范，使得ES和JS的贴合程度更深。\n\n| 新特性       | 描述           |\n| --------- | ------------ |\n| 添加了“严格模式” | use 'strict' |\n| 规范this关键字 | -            |\n| 对 JSON支持  | -            |\n| 字符串方法     | 见下列表         |\n| 数组方法      | 见下列表         |\n| 各种对象方法    | 见下列表         |\n\n*   **严格模式**\n\n1.  不允许省略var定义变量\n2.  不允许函数形参同名\n3.  不允许普通函数中的this代表window\n\n*   **this规范**\n\n1.  全局this、普通函数的this 、 自调用函数的this都代表window\n2.  事件函数中的this代表事件源\n3.  对象方法中的this代表当前对象\n4.  普通函数被谁调用，函数中this指向谁\n\n*   **ES5 新增数组方法/规范**（部分方法js1.6中已经有过实现，在ES5正式写入规范）\n\n1.  Array.isArray()\n2.  Array.forEach()\n3.  Array.map()\n4.  Array.filter()\n5.  Array.reduce()\n6.  Array.reduceRight()\n7.  Array.every()\n8.  Array.some()\n9.  Array.indexOf()\n10. Array.lastIndexOf()\n\n*   **ES5新增字符串规范**\n\n1.  String.trim()\n2.  charAt()\n3.  可对字符串进行属性访问\n4.  允许多行字符串，每一行使用反斜杠结尾\n5.  String.fromCharCode() 用于从 Unicode 码点返回对应字符\n\n*   **ES5 新增各种对象方法**\n\n1.  JSON.parse()\n2.  JSON.stringify()\n3.  Date.now()\n4.  属性 Getter 和 Setter\n5.  新的对象属性和方法规范，见下表\n\n| 新的对象属性和方法规范                                         | 描述                                     |\n| --------------------------------------------------- | -------------------------------------- |\n| Object.defineProperty(object, property, descriptor) | 添加或更改对象属性                              |\n| Object.defineProperties(object, descriptors)        | 添加或更改多个对象属性                            |\n| Object.getOwnPropertyDescriptor(object, property)   | 访问属性                                   |\n| Object.getOwnPropertyNames(object)                  | 将所有属性作为数组返回                            |\n| Object.keys(object)                                 | 将可枚举属性作为数组返回                           |\n| Object.hasOwnProperty(key)                          | 是否为对象自身属性                              |\n| Object.getPrototypeOf(object)                       | 获取对象原型                                 |\n| Object.preventExtensions(object)                    | 防止向对象添加新的属性                            |\n| Object.isExtensible(object)                         | 如果可以将属性添加到对象，则返回 true                  |\n| Object.seal(object)                                 | 防止更改对象属性（而不是值）对象不可以新增属性和删除 但是可以修改      |\n| Object.isSealed(object)                             | 如果对象被密封，则返回 true                       |\n| Object.freeze(object)                               | 防止对对象进行任何更改 不可以新增属性和删除也不可修改 完全锁死       |\n| Object.isFrozen(object)                             | 如果对象被冻结，则返回 true                       |\n| 允许保留字作为属性名称                                         | `var obj = {name: \"Bill\", new: \"yes\"}` |\n\n*   **ES5 语法更改**\n\n1.  对字符串的属性访问 \\[ ]\n2.  数组和对象字面量中的尾随逗号（JSON除外）\n3.  多行字符串字面量\n4.  作为属性名称的保留字\n\n*   **ES5 浏览器支持**\n\nChrome 23、IE 10 和 Safari 6 是第一批完全支持 ECMAScript 5 的浏览器：\n\n| Chrome23                                                                                                                                                                                | IE10/Edge                                                                                                                                                                           | Firefox21                                                                                                                                                                                | Safari6                                                                                                                                                                                 | Opera15                                                                                                                                                                                |\n| --------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- | ----------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- | ---------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- | --------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- | -------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- |\n| ![compatible\\_chrome.png](/img/posts/2022-6-15/chrome.png) | ![compatible\\_ie.png](/img/posts/2022-6-15/ie.png) | ![compatible\\_firefox.png](/img/posts/2022-6-15/firefox.png) | ![compatible\\_safari.png](/img/posts/2022-6-15/safari.png) | ![compatible\\_opera.png](/img/posts/2022-6-15/opera.png) |\n| 2012年9月                                                                                                                                                                                 | 2012年9月                                                                                                                                                                             | 2013年4月                                                                                                                                                                                  | 2012年7月                                                                                                                                                                                 | 2013年7月                                                                                                                                                                                |\n\n## 11. ECMAScript 6 （2015年）\n\n2015年发布ES6，又是一次重大更新：\n\n| 新的特性和扩展  | 描述                                                                                                                                                        |\n| -------- | --------------------------------------------------------------------------------------------------------------------------------------------------------- |\n| 变量声明     | **let**： js1.7中已经有过实现，这里重提，说明块级作用域的重要性；**const**：常量；**变量解构赋值**：`let \\[a, b, c] = \\[1, 2, 3]; let { foo, bar } = { foo: 'aaa', bar: 'bbb' }; `               |\n| 幂 (\\*\\*) | 指数运算符, Math.pow() ?                                                                                                                                       |\n| 默认参数值    | 函数声明时可以制定默认参数                                                                                                                                             |\n| 字符串扩展    | 见下面列表                                                                                                                                                     |\n| 正则扩展     | 见下面列表                                                                                                                                                     |\n| 数组扩展     | 见下面列表                                                                                                                                                     |\n| 对象扩展     | 见下面列表                                                                                                                                                     |\n| 新的数字属性   | ES6 将以下属性添加到 Number 对象： EPSILON、MIN\\_SAFE\\_INTEGER、MAX\\_SAFE\\_INTEGER                                                                                     |\n| 新的数字方法   | Number.isInteger() 、Number.isSafeInteger()， Math也新增了17个[静态方法](https://es6.ruanyifeng.com/#docs/number#Math-%E5%AF%B9%E8%B1%A1%E7%9A%84%E6%89%A9%E5%B1%95) |\n| 新的全局方法   | isFinite()、isNaN()                                                                                                                                        |\n| 函数扩展     | 1、引入箭头函数：没有自己的this、没有递归，事件绑定，解绑定、没有构造器、不可具名化、书写简单 2、引入rest参数 3、增加Function.prototype.toString()                                                            |\n| Symbol   | 新的原始数据类型, 表示独一无二的值                                                                                                                                        |\n| 新增数据结构   | Set和Map                                                                                                                                                   |\n| Proxy    | 对象代理，详见阮老师的[解释](https://es6.ruanyifeng.com/#docs/proxy)                                                                                                   |\n| Reflect  | 为了操作对象而提供的新 API                                                                                                                                           |\n| 前端异步策略   | Promise（通常与ES2017的async一起使用）                                                                                                                              |\n| 迭代器      | 将Iterator 、 for...of 循环 和 Generator函数写入规范                                                                                                                 |\n| Class声明  | 增加继承、接口等概念                                                                                                                                                |\n| ESModule | js原生支持模块化                                                                                                                                                 |\n| 新增提案     | 装饰器Decorator、do 表达式、throw 表达式、函数的部分执行、管道运算符、Math.signbit()、双冒号运算符、Realm API、#!命令、import.meta、JSON 模块                                                      |\n| 新增规格文件   | -                                                                                                                                                         |\n\n*   **字符串扩展**\n\n1.  字符串Unicode标识法，并允许直接输入字符\n2.  引入字符串遍历器\n3.  JSON.stringify改造\n4.  引入模板字符串、标签模板渲染\n5.  新增一些方法，见下表\n\n| 字符串方法                  | 描述                                         |\n| ---------------------- | ------------------------------------------ |\n| String.fromCodePoint() | 可以识别大于`0xFFFF`的字符                          |\n| String.raw()           | 返回一个斜杠都被转义（即斜杠前面再加一个斜杠）的字符串，往往用于模板字符串的处理方法 |\n| codePointAt            | 能够正确处理 4 个字节储存的字符，返回一个字符的码点。               |\n| normalize              | 将字符的不同表示方法统一为同样的形式，这称为 Unicode 正规化。        |\n| startsWith             | 返回布尔值，表示参数字符串是否在原字符串的头部。                   |\n| endsWith               | 返回布尔值，表示参数字符串是否在原字符串的尾部。                   |\n| repeat                 | 返回一个新字符串，表示将原字符串重复`n`次。                    |\n| at                     | 接受一个整数作为参数，返回参数指定位置的字符，支持负索引（即倒数的位置）。      |\n\n*   **正则扩展**\n\n1.  RegExp构造函数增加第二个参数\n2.  ES6 出现之前，字符串对象共有 4 个方法，可以使用正则表达式：`match()`、`replace()`、`search()`和`split()`。ES6中RegExp集成了这四个方法。\n3.  `u`修饰符\n4.  新增RegExp.prototype.unicode 属性\n5.  新增RegExp.prototype.sticky 属性\n6.  新增RegExp.prototype.flags 属性\n\n*   **数组扩展**\n\n1.  引入扩展运算符\n2.  Array.from()\n3.  Array.of()\n4.  实例方法：copyWithin()\n5.  实例方法：find() 和 findIndex()\n6.  实例方法：fill()\n7.  实例方法：entries()，keys() 和 values()\n8.  数组的空位定义\n9.  Array.prototype.sort() 的排序稳定性问题：常见的排序算法之中，插入排序、合并排序、冒泡排序等都是稳定的，堆排序、快速排序等是不稳定的。不稳定排序的主要缺点是，多重排序时可能会产生问题。在ES2019才解决。\n\n*   **对象扩展**\n\n1.  key和变量是同一个单词时，可简写\n2.  属性名表达式写法：`obj['a' + 'bc'] = 123;`\n3.  方法有name属性\n4.  Object.assign()\n5.  对象属性遍历方式：for...in、Object.keys(obj)、Object.getOwnPropertyNames(obj)、Object.getOwnPropertySymbols(obj)、Reflect.ownKeys(obj)\n6.  super关键字\n7.  对象扩展`...`\n8.  Object.is()：ES5 比较两个值是否相等，只有两个运算符：相等运算符（`==`）和严格相等运算符（`===`）。它们都有缺点，前者会自动转换数据类型，后者的`NaN`不等于自身，以及`+0`等于`-0`。JavaScript 缺乏一种运算，在所有环境中，只要两个值是一样的，它们就应该相等。\n\n*   **ES6 浏览器支持**\n\nSafari 10 和 Edge 14 是首先完全支持 ES6 的浏览器：\n\n| Chrome 58                                                                                                                                                                               | Edge 14                                                                                                                                                                             | Firefox 54                                                                                                                                                                               | Safari 10                                                                                                                                                                               | Opera 55                                                                                                                                                                               |\n| --------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- | ----------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- | ---------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- | --------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- | -------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- |\n| ![compatible\\_chrome.png](/img/posts/2022-6-15/chrome.png) | ![compatible\\_ie.png](/img/posts/2022-6-15/ie.png) | ![compatible\\_firefox.png](/img/posts/2022-6-15/firefox.png) | ![compatible\\_safari.png](/img/posts/2022-6-15/safari.png) | ![compatible\\_opera.png](/img/posts/2022-6-15/opera.png) |\n| Jan 2017                                                                                                                                                                                | Aug 2016                                                                                                                                                                            | Mar 2017                                                                                                                                                                                 | Jul 2016                                                                                                                                                                                | Aug 2018                                                                                                                                                                               |\n\n\u003e ES6之后没有小数字版本的ECMAScript了，取而代之的是以年份为代号的版本，因为每一年都会有一个版本。网传的ES7、ES8什么的，其实官方没有这种叫法。\n\n## 12. ECMAScript 2016\n\n2016年发布。\n\n| 新特性                      | 描述                                                |\n| ------------------------ | ------------------------------------------------- |\n| 求幂赋值                     | let x = 5; x \\*\\*= 2; // 结果是 25                   |\n| Array.prototype.includes | -                                                 |\n| 装饰器                      | [动态](https://github.com/tc39/proposal-decorators) |\n\n*   **ES2016 浏览器支持**\n\n所有现代浏览器都支持 Array.prototype.includes：\n\n| Chrome 47                                                                                                                                                                               | Edge 14                                                                                                                                                                             | Firefox 43                                                                                                                                                                               | Safari 9                                                                                                                                                                                | Opera 34                                                                                                                                                                               |\n| --------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- | ----------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- | ---------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- | --------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- | -------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- |\n| ![compatible\\_chrome.png](/img/posts/2022-6-15/chrome.png) | ![compatible\\_ie.png](/img/posts/2022-6-15/ie.png) | ![compatible\\_firefox.png](/img/posts/2022-6-15/firefox.png) | ![compatible\\_safari.png](/img/posts/2022-6-15/safari.png) | ![compatible\\_opera.png](/img/posts/2022-6-15/opera.png) |\n| 2015 年 12 月                                                                                                                                                                             | 2016 年 8 月                                                                                                                                                                          | 2015 年 12 月                                                                                                                                                                              | 2015 年 10 月                                                                                                                                                                             | 2015 年 12 月                                                                                                                                                                            |\n\n\u003chr /\u003e\n\n最近的版本快速浏览：\n\n## 13. ECMAScript 2017\n\n2017年发布。\n\n| 新特性     | 描述                                                              |\n| ------- | --------------------------------------------------------------- |\n| 异步声明    | async/await                                                     |\n| 对象支持尾逗号 | `{ a: 1, b: 2, } `                                                |\n| 字符串扩展   | String.padStart 和 String.padEnd，增加字符串前后缩进                       |\n| 对象扩展    | Object.values、Object.entries、Object.getOwnPropertyDescriptors() |\n\n## 14. ECMAScript 2018\n\n2018年发布。\n\n| 新特性                   | 描述                                                      |\n| --------------------- | ------------------------------------------------------- |\n| 异步迭代                  | ES2018引⼊异步迭代器，允许 for...of 循环可以和 await ⼀起使⽤，以串⾏的⽅式运⾏异步操作 |\n| Promise扩展             | Promise.finally()                                       |\n| Rest参数的Spread属性       | 展开运算符：Math.max(...values) // values = \\[1,2,3,4]        |\n| 正则表达式命名捕获组            | ES2018允许命名捕获组使⽤符号`?\u003cname\u003e`，在打开捕获括号(后⽴即命名                |\n| 正则表达式反向断言             | `?\u003c= 、?\\\u003c!  `                                             |\n| 正则表达式 s 修饰符：dotAll 模式 | [正则扩展](http://caibaojian.com/es6/regex.html)            |\n| 正则表达式Unicode转义        | [正则扩展](http://caibaojian.com/es6/regex.html)            |\n\n*   异步迭代示例：\n\n```js\n// 不起作用\nasync function process(array) {\n  for (let i of array) {\n    await doSomething(i);\n  }\n}\n\n// 起作用了\nasync function process(array) {\n  for await (let i of array) {\n    doSomething(i);\n  }\n}\n```\n\n## 15. ECMAScript 2019\n\n2019年发布。\n\n| 新特性                             | 描述                                                                                   |\n| ------------------------------- | ------------------------------------------------------------------------------------ |\n| 字符串扩展                           | `String.prototype.trimStart() , String.prototype.trimEnd()`，原来的trimLeft和trimRight被废弃 |\n| Object.fromEntries()            | Object.entries的逆运算                                                                   |\n| 数组拍平                            | `Array.prototype.flat() ， Array.prototype.flatMap()`                                 |\n| catch 的参数改为可选                   | 可以省略catch绑定的参数和括号                                                                    |\n| Symbol.description              | -                                                                                    |\n| JSON Superset 超集                | 即js兼容所有JSON支持的文本。原始的JSON 内容可以正常包含 U+2028行分隔符 与 U+2029段分隔符，而之前版本的ECMAScript 却不行       |\n| JSON.stringify() 转化特殊字符         | 修复了对于一些超出范围的 `Unicode`展示错误的问题                                                        |\n| Array.sort                      | 变为稳定算法                                                                               |\n| Function.prototype.toString()增强 | 可以返回注释和空格                                                                            |\n| String.prototype.matchAll       | 返回一个包含所有匹配正则表达式及分组捕获结果的迭代器                                                           |\n\n## 16. ECMAScript 2020\n\n2020年发布。\n\n| 新特性                | 描述                                                                                                                           |\n| ------------------ | ---------------------------------------------------------------------------------------------------------------------------- |\n| Promise.allSettled | 当所有promise都resolve或reject后，返回resolve或reject的结果集合数组                                                                           |\n| 链判断运算符             | `const firstName = message?.body?.user?.firstName \\|\\| 'default';`                                                           |\n| 空值合并运算符            | `var level = user.level ?? '暂⽆等级';`                                                                                          |\n| 动态引入               | import(`/test.js`).then((module) =\\\u003e {}                                                                                      |\n| globalThis对象       | `globalThis` 提供了一个标准的方式来获取不同环境下的全局 `this` 对象（也就是全局对象自身）。不像 `window` 或者 `self` 这些属性，`globalThis` 确保可以在有、无窗口的各种环境下正常工作         |\n| 引入bigint           | Number有取值范围 \\[Number.MIN\\_SAFE\\_INTEGER, Number.MAX\\_SAFE\\_INTEGER], 超过这个范围会精度丢失，这就需要大数类型：var bigIntNum = 9007199254740993n; |\n\n## 17. ECMAScript 2021\n\n2021年发布。\n\n| 新特性         | 描述                                                                                                                                 |\n| ----------- | ---------------------------------------------------------------------------------------------------------------------------------- |\n| Promise.any | 接收一个Promise数组，只要其中任意一个resolve，便通过，否则拒绝                                                                                             |\n| replaceAll  | 返回⼀个全新的字符串，所有符合匹配规则的字符都将被替换掉                                                                                                       |\n| WeakRefs    | 在一般情况下，对象的引用是强引用的，这意味着只要持有对象的引用，它就不会被垃圾回收。只有当该对象没有任何的强引用时，垃圾回收机制才会销毁该对象并且回收该对象所占的内存空间。而 `WeakRef` 允许保留对一个对象的弱引用，而不会阻止被弱引用的对象被垃圾回收。 |\n| 数字声明时可增加分隔符 | `const num = 1_000_000_000  //1000000000`                                                                                          |\n| 新的逻辑运算符和表达式 | 见下面代码                                                                                                                              |\n\n```js\na ||= b\n//等价于\na = a || (a = b)\na \u0026\u0026= b\n//等价于\na = a \u0026\u0026 (a = b)\na ??= b\n//等价于\na = a ?? (a = b)\n```\n\n## 18. ECMAScript 2022\n\n2022年发布。\n\n| 新特性                         | 描述                                                                                       |\n| --------------------------- | ---------------------------------------------------------------------------------------- |\n| class新特性                    | 1、增加private属性， `class A { #a = 1 }`; 2、增加class的static成员方法                                  |\n| top-level await             | 可以使用type='module'的script标签引入一个js文件，js里使用await获取异步数据                                      |\n| 数组实例方法at(index)             | `a = [1,2,3]; const value = a.at(1)`                                                     |\n| error处理新方式                  | `throw new Error('fail', { cause: 123 });` 在catch里获取：`catch(e) { console.log(e.cause) }` |\n| Object.hasOwn(obj, propKey) | 同hasOwnProperty，但支持所有对象类型的判断                                                             |\n\n## 19. ECMAScript 2023\n\n*   从头到尾搜索数组：`findLast()` 、`findLastIndex()`\n*   Hashbang 语法\n*   通过副本更改数组：`toReversed()`、`toSorted()`、`toSpliced()`、`with()`\n*   Symbol 作为 WeakMap 的键\n\n## 20. 后记\n\n随着ECMAScript版本的更新，文章会持续保持更新\\~\\~\n\n\u003chr /\u003e\n\n参考资料\n\n*   [ECMA-international 官网](https://www.ecma-international.org/)\n*   [Baidu百科 - JavaScript](https://baike.baidu.com/item/JavaScript/321142?fr=aladdin)\n*   [Javascript.com](https://www.javascript.com/)\n*   [W3C学院](https://www.w3school.com.cn/js/js_versions.asp)"])</script><script>self.__next_f.push([1,"45:T2710,"])</script><script>self.__next_f.push([1,"\u003e 专栏说明：对于react-router v6版本，有同事反应缺少相对完整的中文文档，查看不方便。为了便于使用，作者对[官网文档](https://reactrouter.com/docs/en/v6)进行针对性翻译，便于v6版本更广泛的被使用。\n\n## 1. \\\u003cLink\u003e\n\n类型定义：\n\n```ts\ndeclare function Link(props: LinkProps): React.ReactElement;\n\ninterface LinkProps\n  extends Omit\u003c\n    React.AnchorHTMLAttributes\u003cHTMLAnchorElement\u003e,\n    \"href\"\n  \u003e {\n  replace?: boolean;\n  state?: any;\n  to: To;\n  reloadDocument?: boolean;\n}\n\ntype To = Partial\u003cLocation\u003e | string;\n```\n内置元素 `\u003cLink\u003e` 是用于通过点击跳转页面的。 在 `react-router-dom`中，`\u003cLink\u003e` 会渲染一个`\u003ca\u003e` 标签， 标签的 `href` 为Link的 `to` 属性. 也就是说，右键点击一个 `\u003cLink\u003e`也是起作用的. 你也可以这么写：`\u003cLink reloadDocument\u003e` ， 以此来阻止浏览器默认事件。\n\n使用案例：\n\n```ts\nimport * as React from \"react\";\nimport { Link } from \"react-router-dom\";\n\nfunction UsersIndexPage({ users }) {\n  return (\n    \u003cdiv\u003e\n      \u003ch1\u003eUsers\u003c/h1\u003e\n      \u003cul\u003e\n        {users.map((user) =\u003e (\n          \u003cli key={user.id}\u003e\n            \u003cLink to={user.id}\u003e{user.name}\u003c/Link\u003e\n          \u003c/li\u003e\n        ))}\n      \u003c/ul\u003e\n    \u003c/div\u003e\n  );\n}\n```\n\n`\u003cLink to\u003e` 的 `to` 参数，如果不是以 `/` 开头的话，表示是一个相对路由。路径中可能会包含 `..`来检索上一级，类似目录指令的 `cd`。\n\n\n在 React Native 中使用：\n\n类型定义：\n```ts\ndeclare function Link(props: LinkProps): React.ReactElement;\n\ninterface LinkProps extends TouchableHighlightProps {\n  children?: React.ReactNode;\n  onPress?(event: GestureResponderEvent): void;\n  replace?: boolean;\n  state?: any;\n  to: To;\n}\n```\n\n`\u003cLink\u003e` 用于响应用户点击后跳转其他的 `View`, 渲染为一个 `\u003ca\u003e` 标签。 在 `react-router-native`, 中， `\u003cLink\u003e` 渲染一个 `TouchableHighlight`。可以使用[`TouchableHighlight`配置项](https://reactnative.dev/docs/touchablehighlight#props)来自定义样式和行为。\n\n```ts\nimport * as React from \"react\";\nimport { View, Text } from \"react-native\";\nimport { Link } from \"react-router-native\";\n\nfunction Home() {\n  return (\n    \u003cView\u003e\n      \u003cText\u003eWelcome!\u003c/Text\u003e\n      \u003cLink to=\"/profile\"\u003eVisit your profile\u003c/Link\u003e\n    \u003c/View\u003e\n  );\n}\n```\n\n## 2. \\\u003cNavLink\u003e\n\n类型定义：\n```ts\ndeclare function NavLink(\n  props: NavLinkProps\n): React.ReactElement;\n\ninterface NavLinkProps\n  extends Omit\u003c\n    LinkProps,\n    \"className\" | \"style\" | \"children\"\n  \u003e {\n  caseSensitive?: boolean;\n  children?:\n    | React.ReactNode\n    | ((props: { isActive: boolean }) =\u003e React.ReactNode);\n  className?:\n    | string\n    | ((props: {\n        isActive: boolean;\n      }) =\u003e string | undefined);\n  end?: boolean;\n  style?:\n    | React.CSSProperties\n    | ((props: {\n        isActive: boolean;\n      }) =\u003e React.CSSProperties);\n}\n```\n\n`\u003cNavLink\u003e` 是特殊类型的[`\u003cLink\u003e`](https://reactrouter.com/docs/en/v6/components/link)， 可以记录 \"active\" 状态。 可用于面包屑或者菜单的选中点亮。对于用户和读者来说也提供了上下文的导航说明。\n\n默认的, `\u003cNavLink\u003e`激活时，会加上类名`active`，v5中也是这么做的. 不同的是，新版本`v6.0.0-beta.3` 中属性移除了 `activeClassName` 和 `activeStyle`，取而代之的是 `style` 或者 `className` 属性，用于自定义行内样式或者自定义类名，当然也可以穿一个函数作为属性给 `\u003cNavLink\u003e` 组件来自定义行为。\n\n例子：\n\n```ts\nimport * as React from \"react\";\nimport { NavLink } from \"react-router-dom\";\n\nfunction NavList() {\n  // This styling will be applied to a \u003cNavLink\u003e when the\n  // route that it links to is currently selected.\n  let activeStyle = {\n    textDecoration: \"underline\",\n  };\n\n  let activeClassName = \"underline\";\n\n  return (\n    \u003cnav\u003e\n      \u003cul\u003e\n        \u003cli\u003e\n          \u003cNavLink\n            to=\"messages\"\n            style={({ isActive }) =\u003e\n              isActive ? activeStyle : undefined\n            }\n          \u003e\n            Messages\n          \u003c/NavLink\u003e\n        \u003c/li\u003e\n        \u003cli\u003e\n          \u003cNavLink\n            to=\"tasks\"\n            className={({ isActive }) =\u003e\n              isActive ? activeClassName : undefined\n            }\n          \u003e\n            Tasks\n          \u003c/NavLink\u003e\n        \u003c/li\u003e\n        \u003cli\u003e\n          \u003cNavLink to=\"tasks\"\u003e\n            {({ isActive }) =\u003e (\n              \u003cspan\n                className={\n                  isActive ? activeClassName : undefined\n                }\n              \u003e\n                Tasks\n              \u003c/span\u003e\n            )}\n          \u003c/NavLink\u003e\n        \u003c/li\u003e\n      \u003c/ul\u003e\n    \u003c/nav\u003e\n  );\n}\n```\n\n如果你很熟悉 v5 的 API，可以二次封装一下使用：\n```ts\nimport * as React from \"react\";\nimport { NavLink as BaseNavLink } from \"react-router-dom\";\n\nconst NavLink = React.forwardRef(\n  ({ activeClassName, activeStyle, ...props }, ref) =\u003e {\n    return (\n      \u003cBaseNavLink\n        ref={ref}\n        {...props}\n        className={({ isActive }) =\u003e\n          [\n            props.className,\n            isActive ? activeClassName : null,\n          ]\n            .filter(Boolean)\n            .join(\" \")\n        }\n        style={({ isActive }) =\u003e ({\n          ...props.style,\n          ...(isActive ? activeStyle : null),\n        })}\n      /\u003e\n    );\n  }\n);\n```\n\n`end` 属性用于控制不会级联点亮。如果想要只在完全匹配路由是active，而不是在该路由上几级路径都被active，可以使用这个属性。下面的例子，只会在路径为 `/` 时匹配 active，其他任何路径都不会点亮：\n\n```jsx\n\u003cNavLink to=\"/\" end\u003e\n  Home\n\u003c/NavLink\u003e\n```\n\n## 3. \\\u003cNavigate\u003e\n\n类型定义：\n\n```ts\ndeclare function Navigate(props: NavigateProps): null;\n\ninterface NavigateProps {\n  to: To;\n  replace?: boolean;\n  state?: any;\n}\n```\n\n`\u003cNavigate\u003e` 被渲染时，会立即改变当前的location. 和hooks [`useNavigate`](https://reactrouter.com/docs/en/v6/hooks/use-navigate) 可以达到一样的效果，传递的参数也一样。\n\u003e **提示:**\n\u003e\n\u003e `\u003cNavigate\u003e`可以在不能使用路由 hooks 的地方代替 useNavigate\n\n下面的例子中，会先拿到登录状态的user，若没有user，渲染登录表单；如果拿到了登录信息，则通过`\u003cNavigate\u003e`直接跳转到 dashboard 页面：\n\n```jsx\nimport * as React from \"react\";\nimport { Navigate } from \"react-router-dom\";\n\nclass LoginForm extends React.Component {\n  state = { user: null, error: null };\n\n  async handleSubmit(event) {\n    event.preventDefault();\n    try {\n      let user = await login(event.target);\n      this.setState({ user });\n    } catch (error) {\n      this.setState({ error });\n    }\n  }\n\n  render() {\n    let { user, error } = this.state;\n    return (\n      \u003cdiv\u003e\n        {error \u0026\u0026 \u003cp\u003e{error.message}\u003c/p\u003e}\n        {user \u0026\u0026 (\n          \u003cNavigate to=\"/dashboard\" replace={true} /\u003e\n        )}\n        \u003cform\n          onSubmit={(event) =\u003e this.handleSubmit(event)}\n        \u003e\n          \u003cinput type=\"text\" name=\"username\" /\u003e\n          \u003cinput type=\"password\" name=\"password\" /\u003e\n        \u003c/form\u003e\n      \u003c/div\u003e\n    );\n  }\n}\n```\n\n\n## 4. \\\u003cOutlet\u003e\n\n类型定义：\n\n```ts\ninterface OutletProps {\n  context?: unknown;\n}\ndeclare function Outlet(\n  props: OutletProps\n): React.ReactElement | null;\n```\n\n`\u003cOutlet\u003e` 可用于父路由中，用来渲染子路由组件. 这需要开发者合理安排嵌套 UI 的布局. 当直接访问父路由时，会自动渲染父路由中配置了 index 属性的子路由来替代 `Outlet`, 如果没有 index 路由，该位置不渲染。\n\n下面的例子中，访问 `/` 会渲染 Dashboard 组件， Outlet留白； 访问 `/tasks` 则会渲染 Dashboard，Outlet位置会渲染 DashboardTasks：\n\n```jsx\nfunction Dashboard() {\n  return (\n    \u003cdiv\u003e\n      \u003ch1\u003eDashboard\u003c/h1\u003e\n\n      \u003cOutlet /\u003e\n    \u003c/div\u003e\n  );\n}\n\nfunction App() {\n  return (\n    \u003cRoutes\u003e\n      \u003cRoute path=\"/\" element={\u003cDashboard /\u003e}\u003e\n        \u003cRoute\n          path=\"messages\"\n          element={\u003cDashboardMessages /\u003e}\n        /\u003e\n        \u003cRoute path=\"tasks\" element={\u003cDashboardTasks /\u003e} /\u003e\n      \u003c/Route\u003e\n    \u003c/Routes\u003e\n  );\n}\n```\n\n当然了，父子组件仍然可以传参，使用 context 和 useOutletContext 组合拳即可，详情可参考本专栏的 hook 专题。\n\n## 5. \\\u003cRoutes\u003e 与 \\\u003cRoute\u003e\n\n类型声明：\n\n```ts\ndeclare function Routes(\n  props: RoutesProps\n): React.ReactElement | null;\n\ninterface RoutesProps {\n  children?: React.ReactNode;\n  location?: Partial\u003cLocation\u003e | string;\n}\n\ndeclare function Route(\n  props: RouteProps\n): React.ReactElement | null;\n\ninterface RouteProps {\n  caseSensitive?: boolean;\n  children?: React.ReactNode;\n  element?: React.ReactNode | null;\n  index?: boolean;\n  path?: string;\n}\n```\n\n`\u003cRoutes\u003e` 和 `\u003cRoute\u003e` 是 React Router 中主要的配置类型。可以把 `\u003cRoute\u003e`看做是一个 `if` 判断：如果 `path` 匹配了当前 URL, 则会渲染他的 `element`！使用 `\u003cRoute caseSensitive\u003e`可以启用路由大小写匹配。\n\n当 location 变化时, `\u003cRoutes\u003e` 会遍历下属 `children` 的所有 `\u003cRoute\u003e` 以试图寻找最佳匹配的路由. `\u003cRoute\u003e` 所在路径跟嵌套 UI 的路径位置是一致的，所见即所得的渲染方式。\n\n例子：\n\n```jsx\n\u003cRoutes\u003e\n  \u003cRoute path=\"/\" element={\u003cDashboard /\u003e}\u003e\n    \u003cRoute\n      path=\"messages\"\n      element={\u003cDashboardMessages /\u003e}\n    /\u003e\n    \u003cRoute path=\"tasks\" element={\u003cDashboardTasks /\u003e} /\u003e\n  \u003c/Route\u003e\n  \u003cRoute path=\"about\" element={\u003cAboutPage /\u003e} /\u003e\n\u003c/Routes\u003e\n```\n\n\u003e **Note:**\n\u003e\n\u003e Routes 的 Javascript替代品见 [ `useRoutes` ](https://reactrouter.com/docs/en/v6/hooks/use-routes).\n\n`\u003cRoute element\u003e` 会默认往下渲染，并且拼接路径，所以不是每一个 Route 都需要配置一个 element 属性。\n\n比如说下面的例子， 路径 `/users/:id`依然可以匹配到 UserProfile 元素，而不用担心路径被截断：\n\n```jsx\n\u003cRoute path=\"users\"\u003e\n  \u003cRoute path=\":id\" element={\u003cUserProfile /\u003e} /\u003e\n\u003c/Route\u003e\n```\n\n\u003chr /\u003e\n\n『完』"])</script><script>self.__next_f.push([1,"46:T1d12,"])</script><script>self.__next_f.push([1,"\u003e 原文路径：https://reactrouter.com/docs/en/v6/routers/browser-router\n\n### BrowserRouter\n\n类型声明：\n```ts\ndeclare function BrowserRouter(\n  props: BrowserRouterProps\n): React.ReactElement;\n\ninterface BrowserRouterProps {\n  basename?: string;\n  children?: React.ReactNode;\n  window?: Window;\n}\n```\n\nBrowserRouter是React Router推荐使用的接口。BrowserRouter基于浏览器内置（H5 API）的history stack来存储当前浏览器地址栏的location信息。\n\n`\u003cBrowserRouter window\u003e`默认会使用当前[document的`defaultView`](https://developer.mozilla.org/en-US/docs/Web/API/Document/defaultView)，他在业务使用中还也可用来在另外一个浏览器window环境下（比如iframe中）追溯URL的变化。\n\n\n使用范例：\n```jsx\nimport * as React from \"react\";\nimport * as ReactDOM from \"react-dom\";\nimport { BrowserRouter } from \"react-router-dom\";\n\nReactDOM.render(\n  \u003cBrowserRouter\u003e\n    {/* The rest of your app goes here */}\n  \u003c/BrowserRouter\u003e,\n  root\n);\n```\n\n### HashRouter\n\n类型声明：\n```ts\ndeclare function HashRouter(\n  props: HashRouterProps\n): React.ReactElement;\n\ninterface HashRouterProps {\n  basename?: string;\n  children?: React.ReactNode;\n  window?: Window;\n}\n```\n\nHashRouter用在基于浏览器的web项目中，而且不需要通过后端服务来控制路由跳转。他的原理是基于浏览器的锚点，通过设置不同的锚点来达到跳转页面的效果。\n\n\n也可以有`\u003cHashRouter window\u003e`的写法，作用同`\u003cBrowserRouter window\u003e`。\n\n使用范例：\n```jsx\nimport * as React from \"react\";\nimport * as ReactDOM from \"react-dom\";\nimport { HashRouter } from \"react-router-dom\";\n\nReactDOM.render(\n  \u003cHashRouter\u003e\n    {/* The rest of your app goes here */}\n  \u003c/HashRouter\u003e,\n  root\n);\n```\n\n\u003e 官方优先推荐使用BrowserRouter，他是基于H5标准制定的，更加规范，有原生的API可以使用；同时，BrowserRouter还可以将当前路由信息发送给server，便于数据同步；此外在一些特殊场景下，会丢失hash信息，以至于HashRouter不能使用，比如将URL使用微信分享。\n\n### HistoryRouter\n\n类型声明：\n```jsx\ndeclare function HistoryRouter(\n  props: HistoryRouterProps\n): React.ReactElement;\n\ninterface HistoryRouterProps {\n  basename?: string;\n  children?: React.ReactNode;\n  history: History;\n}\n```\n\n`\u003cunstable_HistoryRouter\u003e`提供一个将history作为prop的实例对象。可以使用它在非React的上下文环境或全局变量中使用Router。\n\n范例：\n\n```jsx\nimport * as React from \"react\";\nimport * as ReactDOM from \"react-dom\";\nimport { unstable_HistoryRouter as HistoryRouter } from \"react-router-dom\";\nimport { createBrowserHistory } from \"history\";\n\nconst history = createBrowserHistory({ window });\n\nReactDOM.render(\n  \u003cHistoryRouter history={history}\u003e\n    {/* The rest of your app goes here */}\n  \u003c/HistoryRouter\u003e,\n  root\n);\n```\n\n\u003e 此API的前缀为“unstable_”，因为您可能会无意中将历史库的两个版本都添加到应用程序中。如果您使用的开发工具允许，建议不要将history添加为直接依赖项，而是依赖react-router包中的嵌套依赖项。一旦我们有了检测不匹配版本的机制，这个API将删除其“unstable_”的前缀。\n\n### MemoryRouter\n\n类型声明：\n```jsx\ndeclare function MemoryRouter(\n  props: MemoryRouterProps\n): React.ReactElement;\n\ninterface MemoryRouterProps {\n  basename?: string;\n  children?: React.ReactNode;\n  initialEntries?: InitialEntry[];\n  initialIndex?: number;\n}\n```\n\n`\u003cMemoryRouter\u003e`将location信息存在一个数组中. 不同于 `\u003cBrowserHistory\u003e` 和 `\u003cHashHistory\u003e`, 他不使用额外的资源（比如浏览器history stack）。它适用于你想要完全控制history stack的场景。比如单元测试。\n\n他有两个参数：\n-   `\u003cMemoryRouter initialEntries\u003e` 默认为 `[\"/\"]` (单一入口’/‘) 他是历史堆栈中的位置数组。这些对象可以是包含`{pathname, search, hash, state}`的完整位置对象，也可以是简单的字符串url\n-   `\u003cMemoryRouter initialIndex\u003e` 默认为 `initialEntries` 的最后一个索引，可传递任意的索引位置\n\n\u003e **Tip:**\n\u003e 大多数React Router的测试都是用了`\u003cMemoryRouter\u003e`作为路由入口, 这里有很多测试范例：[browsing through our tests](https://github.com/remix-run/react-router/tree/main/packages/react-router/__tests__).\n\n使用范例：\n```jsx\nimport * as React from \"react\";\nimport { create } from \"react-test-renderer\";\nimport {\n  MemoryRouter,\n  Routes,\n  Route,\n} from \"react-router-dom\";\n\ndescribe(\"My app\", () =\u003e {\n  it(\"renders correctly\", () =\u003e {\n    let renderer = create(\n      \u003cMemoryRouter initialEntries={[\"/users/mjackson\"]}\u003e\n        \u003cRoutes\u003e\n          \u003cRoute path=\"users\" element={\u003cUsers /\u003e}\u003e\n            \u003cRoute path=\":id\" element={\u003cUserProfile /\u003e} /\u003e\n          \u003c/Route\u003e\n        \u003c/Routes\u003e\n      \u003c/MemoryRouter\u003e\n    );\n\n    expect(renderer.toJSON()).toMatchSnapshot();\n  });\n});\n```\n\n### NaviteRouter\n\n类型声明：\n```jsx\ndeclare function NativeRouter(\n  props: NativeRouterProps\n): React.ReactElement;\n\ninterface NativeRouterProps extends MemoryRouterProps {}\n```\n\n`\u003cNativeRouter\u003e` 是React Router推荐的在[React Native](https://reactnative.dev/) App中使用的路由类型。\n\n他有两个可选参数：\n-   `\u003cNativeRouter initialEntries\u003e` 默认为 `[\"/\"]`\n-   `\u003cNativeRouter initialIndex\u003e`  默认为 `initialEntries` 的最后一个索引\n\n使用范例：\n```jsx\nimport * as React from \"react\";\nimport { NativeRouter } from \"react-router-native\";\n\nfunction App() {\n  return (\n    \u003cNativeRouter\u003e\n      {/* The rest of your app goes here */}\n    \u003c/NativeRouter\u003e\n  );\n}\n```\n\n### StaticRouter\n\n类型声明：\n```jsx\ndeclare function StaticRouter(\n  props: StaticRouterProps\n): React.ReactElement;\n\ninterface StaticRouterProps {\n  basename?: string;\n  children?: React.ReactNode;\n  location?: Path | LocationPieces;\n}\n```\n\n`\u003cStaticRouter\u003e`用于在 [node](https://nodejs.org/) 中渲染React Router。其通过 `location` prop 来提供路由信息。\n\n有一个可选参数：\n-   `\u003cStaticRouter location\u003e` 默认是 `\"/\"`\n\n使用范例：\n```jsx\nimport * as React from \"react\";\nimport * as ReactDOMServer from \"react-dom/server\";\nimport { StaticRouter } from \"react-router-dom/server\";\nimport http from \"http\";\n\nfunction requestHandler(req, res) {\n  let html = ReactDOMServer.renderToString(\n    \u003cStaticRouter location={req.url}\u003e\n      {/* The rest of your app goes here */}\n    \u003c/StaticRouter\u003e\n  );\n\n  res.write(html);\n  res.end();\n}\n\nhttp.createServer(requestHandler).listen(3000);\n```\n\n### ~~Router （不推荐）~~\n\n类型声明：\n```jsx\ndeclare function Router(\n  props: RouterProps\n): React.ReactElement | null;\n\ninterface RouterProps {\n  basename?: string;\n  children?: React.ReactNode;\n  location: Partial\u003cLocation\u003e | string;\n  navigationType?: NavigationType;\n  navigator: Navigator;\n  static?: boolean;\n}\n```\n\n`\u003cRouter\u003e`接口是上述其他类型Router所共享的核心组件，为其他高级Router提供理由信息上下文（[context provider](https://reactjs.org/docs/context.html#contextprovider)），使用优先级最低。\n\n开发者几乎不需要直接使用这个API，推荐使用上边更高阶的路由。\n\n他有一个参数：\n- `\u003cRouter basename\u003e` 使用basename共享一个根路由。在大型项目或者多入口工程化文件中使用有奇效。\n\n\u003chr /\u003e\n\n\nThat's All. 下期讲内置组件的使用。"])</script><script>self.__next_f.push([1,"47:T6f41,"])</script><script>self.__next_f.push([1,"## 1. 主要概念\n\n\u003e 原文路径：https://reactrouter.com/docs/en/v6/getting-started/concepts\n\n你可能会好奇，React Router是怎么运行起来的，他又是怎么辅助构建App的？换句话说，路由router到底是什么？\n\n如果你曾经想过上述问题，或者你想要更深入的了解路由机制，那么本篇文章可以帮助到你。本文包含React Router所有核心概念的详细解释。\n\n同时也请不要因为这篇文章而钻牛角尖，React Router的基本使用还是很简单的，业务使用的话，也不需要挖掘这么深入。\n\nReact Router可不仅仅是一个url的映射函数，他是一套关于构建完整的用户界面的URL映射机制，所以会有更多的概念和规范。我们将会在以下三点来讨论：\n\n1. 订阅和使用 [history stack](https://reactrouter.com/docs/en/v6/getting-started/concepts#history-stack)\n\n2. 在路由中映射[URL](https://reactrouter.com/docs/en/v6/getting-started/concepts#url)\n\n3. 通过映射来渲染层级嵌套UI\n\n\n### 定义 \n\n首先先抛出一些定义。不同于前后端框架的设计思路，有时候React Router中的一个词，在不同的上下文语义中会有不同的意思。下面列举一些常用的词汇，在之后也会详细的描述：\n\n- **URL** - 很多人认为URL和route可互换，然而React Router中却不是这样。\n- **Location** - 是React Router独有的，基于window.location的一个对象，表示当前用户所在地。他通常用来表示URL，但是会附带额外的路由信息。\n- **Location State** - 一个未被编码的URL路由位置状态。类似于路由hash或者路由parmas，不同的是state是存储在浏览器缓存中。\n- **History Stack** - 当用户使用路由跳转时，浏览器维护一个路由栈，对于栈中的每一个路由进行追溯。如果你长按浏览器中的向后按钮，你会看到浏览器的路由跳转历史。\n- **Client Side Routing (CSR)** - 扁平化HTML文档跳转时，浏览器会自动维护一个history stack，用户侧的路由可以让开发者在不访问后端服务的前提下操作路由堆栈。\n- **History** React Router内置对象，用户可以用它获取路由订阅信息，同时也提供了一些API来然用户操作history stack。\n- **History Action** - history stack的操作，有Pop. Push和Replace。可使用Push来新添加一个路由入口，使用Replace也可以达到类似的效果，只是会在堆栈中替换掉当前的路由，使用Pop来获取上一个历史路由，用以浏览器返回。\n- **Segment** - 介于'/'之间的URL片段。比如，’/users/123‘就有两个片段。\n- **Path Pattern** - 带参URL。比如动态片段'/users/:userId'和星号片段'/docs/\\*'。是一种React Router路由的匹配模式。\n- **Dynamic Segment** - 动态片段，见上边描述。'users/:userId'可以精确匹配'users/123'.\n- **URL Params** - 动态路由片段解析出来的路由参数。\n- **Router** - 有状态路由组件。层级嵌套使用。\n- **Route Config** - 路由树。通过匹配机制来构建路由分支。\n- **Route** - 路由元素的基础组件。有path和element两个参数。path是匹配模式，当path匹配成功后，element中的元素才会被渲染。\n- **Nested Routes** - 嵌套路由。路由可以有自己的孩子，每一个路由都定义了URL片段，单个URL可以同时匹配路由树中的多个路由。这使得可以使用outlet. 相对路由等来布局嵌套dom结构。\n- **Relative links** - 相对路由。不使用'/'开头的路由。他会继承父级路由作为前缀来进行匹配。这使得深层次的URL渲染变得容易，因为你不用再考虑如何获得完整的上下文路由了。\n- **Match** - 当路由与URL匹配时用于保存信息的对象。比如，匹配的URL参数和路径名。\n- **Matches** - 匹配当前位置的路由数组。用于嵌套路由中。\n- **Parent Route** - 父路由。\n- **Outlet** - 父路由中匹配子路由的渲染插槽。\n- **Index Route** - outlet中默认渲染的组件。\n- **Layout Route** - 没有path的父路由。用于把子路由分组到一个布局单元中。\n\n### History和Location\n\n在使用React Router之前，需要先订阅浏览器路由堆栈的变更。浏览器会独立维护该堆栈的变化，所以浏览器自带的前进和后退才能够使用。传统web开发中，用户每点击前进或后退. 每发起一个路由跳转都会向后端发起请求。举个例子，我们有如下的操作流程：\n\n1.  点击链接跳转到 `/dashboard`\n2.  点击链接跳转到 `/accounts`\n3.  点击链接跳转到 `/customers/123`\n4.  点击后退按钮\n5.  点击链接跳转到 `/dashboard`\n\n那么路由堆栈将会有如下的变化：\n1. \\[**`/dashboard`**\\]\n2.  \\[`/dashboard`,  **`/accounts`**\\]\n3.  \\[`/dashboard`, `/accounts`,  **`/customers/123`**\\]\n4.  \\[`/dashboard`,  **`/accounts`**, `/customers/123`\\]\n5.  \\[`/dashboard`, `/accounts`,  **`/dashboard`**\\]\n\n\u003e 译者注解，这里第四到第五步，/customers/123被替换掉了，类似于操作了replace，可能是浏览器判断第4步是back操作回来的，第五步中强制使用了replace。\n\n#### History Object\n\n在用户端路由使用的过程中，开发者可以通过代码显式的操作浏览器路由。比如说，可以如下写：\n\n```js\n\u003ca\n  href=\"/contact\"\n  onClick={(event) =\u003e {\n    // stop the browser from changing the URL and requesting the new document\n    event.preventDefault();\n    // push an entry into the browser history stack and change the URL\n    window.history.pushState({}, undefined, \"/contact\");\n  }}\n/\u003e\n```\n上述代码改变了URL，但是并没有对UI进行任何的修改。我们也可以通过代码来改变路由状态，从而影响UI的变化。但问题是，浏览器没有提供非常好的监听URL变化的方法。\n\n我们可以换种监听方式：\n\n\n```js\nwindow.addEventListener(\"popstate\", () =\u003e {\n  // URL changed!\n});\n```\n\n上述方法看起来不错，但是他只在用户点击后退或者前进时生效。在程序调用`window.history.pushState`或`window.history.replaceState`时却没有任何监听事件可以使用。\n\n在React Router中，history可以帮助你实现监听。他提供对push. pop. replace事件的监听：\n\n```js\nlet history = createBrowserHistory();\nhistory.listen(({ location, action }) =\u003e {\n  // this is called whenever new locations come in\n  // the action is POP, PUSH, or REPLACE\n});\n```\nApp不需要再额外创建他们自己的history对象，通过简单的监听函数，可以完成正确的重新渲染。\n\n#### Location\n\n浏览器的window自带有location对象，他提供URL的相关信息：\n\n```js\nwindow.location.pathname; // /getting-started/concepts/\nwindow.location.hash; // #location\nwindow.location.reload(); // force a refresh w/ the server\n```\n\n在React Router中的使用类似，但是会更简单，其结构如下：\n\n\n```js\n{\n  pathname: \"/bbq/pig-pickins\",\n  search: \"?campaign=instagram\",\n  hash: \"#menu\",\n  state: null,\n  key: \"aefz24ie\"\n}\n```\n前三个参数`{ pathname, search, hash }`类似于window.location，后两个参数是React Router独有的。\n\n##### Location Pathname\n\nLocation Pathname是URL的一部分，比如对于URL：`https://example.com/teams/hotspurs`, 他的pathname就是`/teams/hotspurs`。这部分才是用于路由匹配的。\n\n##### Location Search\n\nURL有很多不同的使用选项：\n\n- location search\n- search params\n- URL search params\n- query string\n\n在React Router中，我们便可以使用location search，它是一种序列化的`URLSearchParams`，所以有时候也可以叫他`URL search params`：\n\n```js\n// given a location like this:\nlet location = {\n  pathname: \"/bbq/pig-pickins\",\n  search: \"?campaign=instagram\u0026popular=true\",\n  hash: \"\",\n  state: null,\n  key: \"aefz24ie\",\n};\n\n// we can turn the location.search into URLSearchParams\nlet params = new URLSearchParams(location.search);\nparams.get(\"campaign\"); // \"instagram\"\nparams.get(\"popular\"); // \"true\"\nparams.toString(); // \"campaign=instagram\u0026popular=true\",\n```\n解析前的序列化字符串叫`search`，精准解析后便是`search params`了。译者认为这里描述的意思就是说可以将URL字符串翻译为一个结构化的参数对象。当不需要考虑精确度时，这两个概念是可以互换的。\n\n##### Location Hash\n\nURL中的哈希（锚点）表示当前页面滚动的位置。在window.history.pushState被引入之前，web开发者只能通过改变URL锚点来控制浏览器路由的变化，这也是在不访问后端服务的前提下改变路由的唯一方式。现在我们仍然可以这样使用他。\n\n##### Location State\n\n你可能会好奇H5的API`window.history.pushState()`为什么会叫做push state，我们刚刚改变了URL，理论上不是应该叫做`history.push`更贴切？哈，我们也不是浏览器标准的制定者，这些问题我们暂且不考虑，就这个API本身而言，确实是一个不错的浏览器新特性。（作者随性翻译，大意基本是这样）。\n\n浏览器提供的这个state，可以让我们轻松地传递路由状态。当我们点击浏览器后退按钮时，通过`pushState`便可以引起`history.state`的变化：\n\n\u003e 译者提醒：这种状态在刷新浏览器后会丢失，需要慎用\n\n```js\nwindow.history.pushState(\"look ma!\", undefined, \"/contact\");\nwindow.history.state; // \"look ma!\"\n// user clicks back\nwindow.history.state; // undefined\n// user clicks forward\nwindow.history.state; // \"look ma!\"\n```\n\nReact Router利用了浏览器自带的功能，对其进行了一些抽象封装，并将值显示在location中，而不是history里。\n\n你可以试着使用location.state，比如`location.hash`或者`location.search`，而不是直接将路由参数放在URL里，这样你的URL会比较整洁，传递会相对安全。\n\n一组比较好的使用案例：\n\n- 告诉下个页面你跳转自哪里，以此来动态布局UI。用的最多的例子是用户点击一个item，然后打开一个弹窗显示详细记录的使用场景。如果你想直接显示到URL的话，（译者认为是详情页面可以弹窗显示又可以页面显示的意思），那么就可以自定义布局组件来显示。\n- 传递页面记录信息的一部分给要跳转的页面，那么下个页面会直接将这一部分渲染出来，进而可以借助已有信息渲染剩余部分。\n\n代码实现上，可以使用`\u003cLink\u003e`或者`navigate`来实现改变state：\n\n```jsx\n\u003cLink to=\"/pins/123\" state={{ fromDashboard: true }} /\u003e;\n\nlet navigate = useNavigate();\nnavigate(\"/users/123\", { state: partialUser });\n```\n\n在跳转后的页面中使用`useLocation`获取路由信息：\n\n```js\nlet location = useLocation();\nlocation.state;\n```\n\n\u003e location.state是一个序列化的值，使用new Date()传递时间时，会被转化为字符串\n\n##### Location Key\n\n每一个location又有自己唯一的key。这对于锚点滚动式路由跳转. 客户端数据缓存等是很有帮助的。每一个location获取唯一key后，你都可以使用扁平化数组. new Map()，甚至是locationStorage来将对应信息抽象出来。\n\n举个🌰，在一个单一的客户端，不请求后端数据，在用户点击后退按钮时，可以通过如下设置来存储路由缓存：\n\n```js\nlet cache = new Map();\n\nfunction useFakeFetch(URL) {\n  let location = useLocation();\n  let cacheKey = location.key + URL;\n  let cached = cache.get(cacheKey);\n\n  let [data, setData] = useState(() =\u003e {\n    // initialize from the cache\n    return cached || null;\n  });\n\n  let [state, setState] = useState(() =\u003e {\n    // avoid the fetch if cached\n    return cached ? \"done\" : \"loading\";\n  });\n\n  useEffect(() =\u003e {\n    if (state === \"loading\") {\n      let controller = new AbortController();\n      fetch(URL, { signal: controller.signal })\n        .then((res) =\u003e res.json())\n        .then((data) =\u003e {\n          if (controller.signal.aborted) return;\n          // set the cache\n          cache.set(cacheKey, data);\n          setData(data);\n        });\n      return () =\u003e controller.abort();\n    }\n  }, [state, cacheKey]);\n\n  useEffect(() =\u003e {\n    setState(\"loading\");\n  }, [URL]);\n\n  return data;\n}\n```\n\n### Matching\n\n在页面初始化渲染和history stack变化时，React Router会针对路由配置项来匹配出一套渲染结构。\n\n#### Defining Routes\n\n路由配置类似一个层级树，就像下面的例子：\n\n\n```jsx\n\u003cRoutes\u003e\n  \u003cRoute path=\"/\" element={\u003cApp /\u003e}\u003e\n    \u003cRoute index element={\u003cHome /\u003e} /\u003e\n    \u003cRoute path=\"teams\" element={\u003cTeams /\u003e}\u003e\n      \u003cRoute path=\":teamId\" element={\u003cTeam /\u003e} /\u003e\n      \u003cRoute path=\":teamId/edit\" element={\u003cEditTeam /\u003e} /\u003e\n      \u003cRoute path=\"new\" element={\u003cNewTeamForm /\u003e} /\u003e\n      \u003cRoute index element={\u003cLeagueStandings /\u003e} /\u003e\n    \u003c/Route\u003e\n  \u003c/Route\u003e\n  \u003cRoute element={\u003cPageLayout /\u003e}\u003e\n    \u003cRoute path=\"/privacy\" element={\u003cPrivacy /\u003e} /\u003e\n    \u003cRoute path=\"/tos\" element={\u003cTos /\u003e} /\u003e\n  \u003c/Route\u003e\n  \u003cRoute path=\"contact-us\" element={\u003cContact /\u003e} /\u003e\n\u003c/Routes\u003e\n```\n\n`\u003cRoutes\u003e`递归地渲染匹配到的`props.children`，提取他们的props并生成如下的结构：\n\n\n```jsx\nlet routes = [\n  {\n    element: \u003cApp /\u003e,\n    path: \"/\",\n    children: [\n      {\n        index: true,\n        element: \u003cHome /\u003e,\n      },\n      {\n        path: \"teams\",\n        element: \u003cTeams /\u003e,\n        children: [\n          {\n            index: true,\n            element: \u003cLeagueStandings /\u003e,\n          },\n          {\n            path: \":teamId\",\n            element: \u003cTeam /\u003e,\n          },\n          {\n            path: \":teamId/edit\",\n            element: \u003cEditTeam /\u003e,\n          },\n          {\n            path: \"new\",\n            element: \u003cNewTeamForm /\u003e,\n          },\n        ],\n      },\n    ],\n  },\n  {\n    element: \u003cPageLayout /\u003e,\n    children: [\n      {\n        element: \u003cPrivacy /\u003e,\n        path: \"/privacy\",\n      },\n      {\n        element: \u003cTos /\u003e,\n        path: \"/tos\",\n      },\n    ],\n  },\n  {\n    element: \u003cContact /\u003e,\n    path: \"/contact-us\",\n  },\n];\n```\n\n事实上，你可以不使用`\u003cRoutes\u003e`，使用hook `useRoutes(routesGoHere)`依然可以完成上述任务。如你所见，路由定义中，可以声明多重路由片段，比如`:itemId/edit`，也可以声明单个片段，比如`:itemId`。所有的片段会被组合在一个来构建最后的路径模式（路由树）。\n\n#### Match Params\n\n以`/items/:itemId`这种动态路由片段为例，他可不是静态匹配URL的，任何的值似乎都可以当做`:itemId`来使用，比如`/items/123`和`/items/小肚肚肚肚肚哦`。解析出来的值就是`URL params`。在渲染一节（Rendering）会讲述怎么用这个参数。\n\n#### Ranking Routes\n\n当我们设置完路由配置后，我们最终会得到诸如如下的匹配模式：\n\n\n```js\n[\n  \"/\",\n  \"/teams\",\n  \"/teams/:teamId\",\n  \"/teams/:teamId/edit\",\n  \"/teams/new\",\n  \"/privacy\",\n  \"/tos\",\n  \"/contact-us\",\n];\n```\n\n事情变得突然范特西起来，以请求path `\"/teams/new\"`为例，上述列表中哪一个匹配模式能够被翻牌子？我猜有两个：\n\n\n```\n/teams/new\n/teams/:teamId\n```\n\n此时，React Router就需要做出最终决定，到底翻哪一个的牌子，大多数路由都会按照他们定义的先后顺序进行匹配，先到先得。但是使用这种算法，我们连`/`都能匹配到了。所以，我们应该更加完美的排序这些匹配模式，进而达到我们想要的匹配结果。这也是v6比较智能的一个体现。\n\n这个例子中，我们直观的感觉`/teams/new`应该是最终的结果。我们所做的就是教会了React Router去完成这个任务。在匹配的过程中，React Router会按照片段序号进行排序（包括静态的. 动态的和星号片段等），挑选最适合的匹配模式，而对于开发者，再也不用考虑路由配置的先后放置顺序了。\n\n#### Pathless Routes\n\n还有一些不带path的路由：\n\n```html\n\u003cRoute index element={\u003cHome /\u003e} /\u003e\n\u003cRoute index element={\u003cLeagueStandings /\u003e} /\u003e\n\u003cRoute element={\u003cPageLayout /\u003e} /\u003e\n```\n\n对于这种我们怎么匹配呢？React Router的匹配时相当宽松的，`\u003cLeagueStandings /\u003e`和`\u003cHome /\u003e`组件是index路由，`\u003cPageLayout /\u003e`是布局路由，我们在渲染（Rendering）这一节来讨论他是怎么工作的，这两者都与匹配本身没有多大关系。\n\n\n#### Route Matches\n\n当路由去匹配URL时，内部都会转化一个匹配对象，以`\u003cRoute path=\":teamId\" element={\u003cTeam/\u003e}/\u003e`为例：\n \n```jsx\n{\n  pathname: \"/teams/firebirds\",\n  params: {\n    teamId: \"firebirds\"\n  },\n  route: {\n    element: \u003cTeam /\u003e,\n    path: \":teamId\"\n  }\n}\n```\n\npathname是URL部分，代表的是全量路径；params是通过URL解析来的暂态路由参数，`:teamId`即为`params.teamId`。\n\n因为路由表是一棵树，单个URL可能会匹配书上的多个分支，以`/teams/firebirds`为例：\n\n\n```diff \n\u003cRoutes\u003e\n+   \u003cRoute path=\"/\" element={\u003cApp /\u003e}\u003e\n    \u003cRoute index element={\u003cHome /\u003e} /\u003e\n+   \u003cRoute path=\"teams\" element={\u003cTeams /\u003e}\u003e\n+     \u003cRoute path=\":teamId\" element={\u003cTeam /\u003e} /\u003e\n      \u003cRoute path=\":teamId/edit\" element={\u003cEditTeam /\u003e} /\u003e\n      \u003cRoute path=\"new\" element={\u003cNewTeamForm /\u003e} /\u003e\n      \u003cRoute index element={\u003cLeagueStandings /\u003e} /\u003e\n    \u003c/Route\u003e\n  \u003c/Route\u003e\n  \u003cRoute element={\u003cPageLayout /\u003e}\u003e\n    \u003cRoute path=\"/privacy\" element={\u003cPrivacy /\u003e} /\u003e\n    \u003cRoute path=\"/tos\" element={\u003cTos /\u003e} /\u003e\n  \u003c/Route\u003e\n  \u003cRoute path=\"contact-us\" element={\u003cContact /\u003e} /\u003e\n\u003c/Routes\u003e\n```\n高亮部分是他的匹配路径。React Router会创建一个匹配数组来存放嵌套的匹配路由，所以会生成一个嵌套的UI结构：\n\n```jsx\n[\n  {\n    pathname: \"/\",\n    params: null,\n    route: {\n      element: \u003cApp /\u003e,\n      path: \"/\",\n    },\n  },\n  {\n    pathname: \"/teams\",\n    params: null,\n    route: {\n      element: \u003cTeams /\u003e,\n      path: \"teams\",\n    },\n  },\n  {\n    pathname: \"/teams/firebirds\",\n    params: {\n      teamId: \"firebirds\",\n    },\n    route: {\n      element: \u003cTeam /\u003e,\n      path: \":teamId\",\n    },\n  },\n];\n```\n\n### Rendering\n\n最后的重头戏，在拿到匹配数后，要如何进行渲染呢？考虑如下的结构：\n\n\n```jsx\n// react 18+\nconst root = ReactDOM.createRoot(\n  document.getElementById(\"root\")\n);\nroot.render(\n  \u003cBrowserRouter\u003e\n    \u003cRoutes\u003e\n      \u003cRoute path=\"/\" element={\u003cApp /\u003e}\u003e\n        \u003cRoute index element={\u003cHome /\u003e} /\u003e\n        \u003cRoute path=\"teams\" element={\u003cTeams /\u003e}\u003e\n          \u003cRoute path=\":teamId\" element={\u003cTeam /\u003e} /\u003e\n          \u003cRoute path=\":teamId/edit\" element={\u003cEditTeam /\u003e} /\u003e\n          \u003cRoute path=\"new\" element={\u003cNewTeamForm /\u003e} /\u003e\n          \u003cRoute index element={\u003cLeagueStandings /\u003e} /\u003e\n        \u003c/Route\u003e\n      \u003c/Route\u003e\n      \u003cRoute element={\u003cPageLayout /\u003e}\u003e\n        \u003cRoute path=\"/privacy\" element={\u003cPrivacy /\u003e} /\u003e\n        \u003cRoute path=\"/tos\" element={\u003cTos /\u003e} /\u003e\n      \u003c/Route\u003e\n      \u003cRoute path=\"contact-us\" element={\u003cContact /\u003e} /\u003e\n    \u003c/Routes\u003e\n  \u003c/BrowserRouter\u003e\n);\n```\n\n我们使用访问路径`/teams/firebirds`作为例子来解释如何渲染路由。`\u003cRoutes\u003e`会识别配置项，通过精准匹配后在页面上构建如下结构：\n\n```jsx\n\u003cApp\u003e\n  \u003cTeams\u003e\n    \u003cTeam /\u003e\n  \u003c/Teams\u003e\n\u003c/App\u003e\n```\n\n每一级匹配项都放置在其父路由元素中，最终渲染的结构与路由配置文件完全一样。大多数的网站和app都有这样的特性：套娃式放置元素，每一级元素都会有自己的导航来更改自己的子页面内容。\n\n#### Outlets\n\n嵌套元素树不会自动渲染，需要用outlet来告诉父元素渲染子元素的地方。`\u003cRoutes\u003e`会首先渲染元素树的顶层元素（比如`\u003cApp /\u003e`），接下来匹配元素`\u003cTeams\u003e`：\n\n```jsx\nfunction App() {\n  return (\n    \u003cdiv\u003e\n      \u003cGlobalNav /\u003e\n      \u003cOutlet /\u003e\n      \u003cGlobalFooter /\u003e\n    \u003c/div\u003e\n  );\n}\n```\n\nOutlet组件会渲染下一个match的元素。同理，`\u003cTeams\u003e`中也需要一个outlet来渲染`\u003cTeam /\u003e`。\n\n如果URL是`/contact-us`，那么元素树就会是如下结构：\n```\n\u003cContact /\u003e\n```\n他没有在App组件之下，所以会单独按照路由层级结构渲染。\n\n如果URL是`/teams/firebirds/edit`，元素树会变成：\n\n```jsx\n\u003cApp\u003e\n  \u003cTeams\u003e\n    \u003cEditTeam /\u003e\n  \u003c/Teams\u003e\n\u003c/App\u003e\n```\n\nOutlet是一个占位符，被匹配到后会替换为匹配的子元素，而父级元素不会变化。\n\n\n#### Index Routes\n\n对于如下的路由配置：\n\n```jsx\n\u003cRoute path=\"teams\" element={\u003cTeams /\u003e}\u003e\n  \u003cRoute path=\":teamId\" element={\u003cTeam /\u003e} /\u003e\n  \u003cRoute path=\"new\" element={\u003cNewTeamForm /\u003e} /\u003e\n  \u003cRoute index element={\u003cLeagueStandings /\u003e} /\u003e\n\u003c/Route\u003e\n```\n如果访问路径`/teams/firebirds`，那么元素树就会是如下结构：\n\n```jsx\n\u003cApp\u003e\n  \u003cTeams\u003e\n    \u003cTeam /\u003e\n  \u003c/Teams\u003e\n\u003c/App\u003e\n```\n但是，如果访问路径是`/teams`，那么元素树就会是：\n```jsx\n\u003cApp\u003e\n  \u003cTeams\u003e\n    \u003cLeagueStandings /\u003e\n  \u003c/Teams\u003e\n\u003c/App\u003e\n```\n这里的优先级是怎么处理的？为什么声明了index就能够优先被pop出来？他甚至都没有path！很显然，不是通过path的匹配逻辑来的。这里使用了特殊的index routes，同样是渲染在父组件下的outlet的位置。这里如果不设置index路由的话，仅仅访问`/teams`，渲染的元素树会是下面这样：\n```jsx\n\u003cApp\u003e\n  \u003cTeams /\u003e\n\u003c/App\u003e\n```\n\n如果teams路由被显示在左侧的目录树下时，name页面右侧就会是空白页了！需要默认的页面组件来填充。换句话说，index路由就是在所有child没有匹配的时候给出的默认渲染方案。\n\n\n根据业务需求的不同，可能会需要不同的路由结构。不管父路由下的子路由如何排序，总是无法避免用户会直接访问父路由的路径，如果父路由中用了outlet的话就会产生空白页，index就是用来填充空白的（**译者**：作者的描述有一些繁琐，其实就是一句话：默认路由作为空白填充物）。\n\n\u003e 我发现React Router的官网自己本身就没有做的很好，Index是不是忘了\n\n![image.png](/img/posts/2022-6-7/2022-6-7-1.png)\n\n#### Layout Routes\n\n考虑如下高亮部分的路径：\n\n```diff\n\u003cRoutes\u003e\n+ \u003cRoute path=\"/\" element={\u003cApp /\u003e}\u003e\n    \u003cRoute index element={\u003cHome /\u003e} /\u003e\n    \u003cRoute path=\"teams\" element={\u003cTeams /\u003e}\u003e\n      \u003cRoute path=\":teamId\" element={\u003cTeam /\u003e} /\u003e\n      \u003cRoute path=\":teamId/edit\" element={\u003cEditTeam /\u003e} /\u003e\n      \u003cRoute path=\"new\" element={\u003cNewTeamForm /\u003e} /\u003e\n      \u003cRoute index element={\u003cLeagueStandings /\u003e} /\u003e\n    \u003c/Route\u003e\n  \u003c/Route\u003e\n+ \u003cRoute element={\u003cPageLayout /\u003e}\u003e\n+   \u003cRoute path=\"/privacy\" element={\u003cPrivacy /\u003e} /\u003e\n    \u003cRoute path=\"/tos\" element={\u003cTos /\u003e} /\u003e\n  \u003c/Route\u003e\n  \u003cRoute path=\"contact-us\" element={\u003cContact /\u003e} /\u003e\n\u003c/Routes\u003e\n```\n\n他的渲染元素树是：\n```jsx\n\u003cApp\u003e\n  \u003cPageLayout\u003e\n    \u003cPrivacy /\u003e\n  \u003c/PageLayout\u003e\n\u003c/App\u003e\n```\n可以看到，两个并列的`\u003cRoute\u003e`竟然渲染出了包含关系。这种情况的出现只是为了简化在同一个布局中多重子路由\n嵌套的关系。不过禁用这种合并，又不想无限制嵌套下去的话，就得需要比较繁琐的配置了，可能会出现大量重复的组件：\n\n\u003e 不建议这样写哦\n\n```jsx\n\u003cRoutes\u003e\n  \u003cRoute path=\"/\" element={\u003cApp /\u003e}\u003e\n    \u003cRoute index element={\u003cHome /\u003e} /\u003e\n    \u003cRoute path=\"teams\" element={\u003cTeams /\u003e}\u003e\n      \u003cRoute path=\":teamId\" element={\u003cTeam /\u003e} /\u003e\n      \u003cRoute path=\":teamId/edit\" element={\u003cEditTeam /\u003e} /\u003e\n      \u003cRoute path=\"new\" element={\u003cNewTeamForm /\u003e} /\u003e\n      \u003cRoute index element={\u003cLeagueStandings /\u003e} /\u003e\n    \u003c/Route\u003e\n  \u003c/Route\u003e\n  \u003cRoute\n    path=\"/privacy\"\n    element={\n      \u003cPageLayout\u003e\n        \u003cPrivacy /\u003e\n      \u003c/PageLayout\u003e\n    }\n  /\u003e\n  \u003cRoute\n    path=\"/tos\"\n    element={\n      \u003cPageLayout\u003e\n        \u003cTos /\u003e\n      \u003c/PageLayout\u003e\n    }\n  /\u003e\n  \u003cRoute path=\"contact-us\" element={\u003cContact /\u003e} /\u003e\n\u003c/Routes\u003e\n```\n所以，叫他布局路由有点问题，因为他并不会去参与匹配URL，他只是为了方便用户使用而做的一种路由合并而已。\n\n\u003e 插一句，无限制嵌套可以这么写，不过路径会长一些：/layout/privacy\n\n\n```jsx\n\u003cRoutes\u003e\n  \u003cRoute path=\"/\" element={\u003cApp /\u003e}\u003e\n    \u003cRoute index element={\u003cHome /\u003e} /\u003e\n    \u003cRoute path=\"teams\" element={\u003cTeams /\u003e}\u003e\n      \u003cRoute path=\":teamId\" element={\u003cTeam /\u003e} /\u003e\n      \u003cRoute path=\":teamId/edit\" element={\u003cEditTeam /\u003e} /\u003e\n      \u003cRoute path=\"new\" element={\u003cNewTeamForm /\u003e} /\u003e\n      \u003cRoute index element={\u003cLeagueStandings /\u003e} /\u003e\n    \u003c/Route\u003e\n    \n    // 嵌套配置\n    \u003cRoute path=\"layout\" element={\u003cPageLayout /\u003e}\u003e\n      \u003cRoute path=\"privacy\" element={\u003cPrivacy /\u003e} /\u003e\n      \u003cRoute path=\"tos\" element={\u003cTos /\u003e} /\u003e\n    \u003c/Route\u003e\n  \u003c/Route\u003e

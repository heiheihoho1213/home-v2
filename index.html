\n\u003c/Routes\u003e\n```\n\n### Navigating\n\nURL变化的这个动作叫做导航（navigation），在React Router中有两种方法：\n\n- `\u003cLink\u003e`\n- `navigate`\n\n#### Link\n\n路由导航的主要方式。当用户点击改标签时便会触发操作。React Router会阻止浏览器默认的事件行为，并且向history堆栈中push一个新的状态。继而触发location的变化和路由匹配元素的渲染。\n\n然而，link有局限性：\n\n- 仍然是渲染一个a标签（因此键盘操作. 可聚焦和SEO可以使用）\n- 没有阻止浏览器的默认行为，比如右键点击或者按住ctrl后新建一个tab页签。\n\n嵌套路由不仅仅是渲染布局，他也能处理相对路由。还拿之前的例子：\n\n```jsx\n\u003cRoute path=\"teams\" element={\u003cTeams /\u003e}\u003e\n  \u003cRoute path=\":teamId\" element={\u003cTeam /\u003e} /\u003e\n\u003c/Route\u003e\n```\n\n在`\u003cTeams\u003e`中可以这样写：\n```jsx\n\u003cLink to=\"psg\" /\u003e\n\u003cLink to=\"new\" /\u003e\n```\n他们的路径全程是`/teams/psg` 和 `/teams/new`，可以看到他们继承了父路由作为前缀，因此路由组件不需要真的知道剩余的路由信息。因此路由配置会非常灵活，对于越来越复杂的app，需求和设计都在不停的变化时，这会大大减少开发者的痛苦。\n\n#### Navigate Function\n\n另一种方式，必须在函数式组件（RFC）中使用，使用`useNavigate`钩子获取navigate函数：\n```jsx\nlet navigate = useNavigate();\nuseEffect(() =\u003e {\n  setTimeout(() =\u003e {\n    navigate(\"/logout\");\n  }, 30000);\n}, []);\n```\n\n在form的提交事件中也可以使用：\n\n```jsx\n\u003cform onSubmit={event =\u003e {\n  event.preventDefault();\n  let data = new FormData(event.target)\n  let urlEncoded = new URLSearchParams(data)\n  navigate(\"/create\", { state: urlEncoded })\n}} /\u003e\n```\n\n他和link中的to使用方式是类似的。你可以用它替代link标签：\n\n```jsx\n\u003cli onClick={() =\u003e navigate(\"/somewhere\")} /\u003e\n```\n\n但是一般情况下，除了链接和表单以外，很少有交互会改变URL（**译者说**：放屁！跳不跳转还不是老板一句话？图片，audio，span等等，只要是能想到的元素皆可跳转🐶 ），因为他会增加可访问性和用户交互的复杂度。\n\n### Data Access\n\n路由的数据无非就是参数的获取，参数的修改，如下使用即可：\n```jsx\nlet location = useLocation();\nlet urlParams = useParams();\nlet [urlSearchParams, setUrlSearchParams] = useSearchParams();\n```\n\n### Review\n\n总结！\n\n1. 写一下你的App：\n\n```jsx\nconst root = ReactDOM.createRoot(\n  document.getElementById(\"root\")\n);\nroot.render(\n  \u003cBrowserRouter\u003e\n    \u003cRoutes\u003e\n      \u003cRoute path=\"/\" element={\u003cApp /\u003e}\u003e\n        \u003cRoute index element={\u003cHome /\u003e} /\u003e\n        \u003cRoute path=\"teams\" element={\u003cTeams /\u003e}\u003e\n          \u003cRoute path=\":teamId\" element={\u003cTeam /\u003e} /\u003e\n          \u003cRoute path=\"new\" element={\u003cNewTeamForm /\u003e} /\u003e\n          \u003cRoute index element={\u003cLeagueStandings /\u003e} /\u003e\n        \u003c/Route\u003e\n      \u003c/Route\u003e\n      \u003cRoute element={\u003cPageLayout /\u003e}\u003e\n        \u003cRoute path=\"/privacy\" element={\u003cPrivacy /\u003e} /\u003e\n        \u003cRoute path=\"/tos\" element={\u003cTos /\u003e} /\u003e\n      \u003c/Route\u003e\n      \u003cRoute path=\"contact-us\" element={\u003cContact /\u003e} /\u003e\n    \u003c/Routes\u003e\n  \u003c/BrowserRouter\u003e\n);\n```\n\n2. `\u003cBrowserRouter\u003e`创建history模式的路由（原地刷新页面需要后端处理跳转，或者配置Nginx来判断是否需要请求后端），push状态值，并且订阅URL变化。\n\n3. `\u003cRoutes\u003e`容纳子路由，并且创建路由配置对象，通过当前路径来匹配具体的路由并创建匹配的元素树，最后渲染最优的匹配。\n\n4. 每个父路由中应该有一个`\u003cOutlet /\u003e`\n\n5. outlet会渲染父路由中匹配到的下一个子路由元素。\n\n6. 用户点击Link进行跳转。\n\n7. 也可使用navigate()进行跳转。\n\n8. history修改URL后会通知`\u003cBrowserRouter\u003e`。\n\n9. `\u003cBrowserRouter\u003e`收到通知，触发匹配和渲染，重新从第2步开始。\n\nThat's all !\n\n\u003chr /\u003e\n\n文章较长，翻译不易，都看到这里了，要不点个赞再走呗🐶 ~~"])</script><script>self.__next_f.push([1,"48:T24e7,"])</script><script>self.__next_f.push([1,"## 1. 前言\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;经过前几篇文章的讲述，我们的组件库已经初具规模：[源码](https://github.com/heiheihoho1213/dux-ui)。现在我们讲述一下如何发布到npm上，并且配置一下gitee pages.\n\n本文最终部署主页效果：[UI库主页](https://heiheihoho1213.github.io/dux-ui/)。\n\n## 2. 使用Webpack打包静态文件\n\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;首先看一下我们项目的目录结构：\n\n![image.png](/img/posts/2022-5-22/2022-5-22-3.png)\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;可以看到，本组件的静态文件比较少，仅仅在static中放置了Icon的字体样式文件，我们想把静态文件跟源码文件分开放置，方便以后迁移，同时也方便样式的按需引入。所以我们就先来打包static。\n\n### webpack.config.js\n\n1. 设置入口\n\n\n```js\nentry: {\n    // webpack只负责icon/css打包\n    icon: path.resolve(__dirname, './static/style/icon.css'),\n},\n```\n\n2. 配置静态资源出口的路径\n\n```js\n output: {\n    // 与icon相关的js放在scripts\n    filename: 'scripts/[name].[contenthash].min.js',\n    // 静态资源（字体样式文件）放在assets\n    assetModuleFilename: 'assets/[contenthash][ext]',\n    // 发布的包名\n    library: 'dux-ui',\n    // 使用umd模式，提高兼容性\n    libraryTarget: 'umd',\n    // 每次build时清空output目录\n    clean: true,\n },\n```\n\n3. 配置插件 - 压缩css\n\n```js\nconst cssPlugin = new MiniCssExtractPlugin({\n  // css放在styles文件夹下\n  filename: 'styles/[name].min.css',\n});\n\n...\nplugins: [cssPlugin],\n```\n\n4. 配置loader兼容css和字体文件（重要）\n\n```js\nmodule: {\n    rules: [\n      {\n        test: /static\\/style\\/icon\\.css$/,\n        use: [\n          // 1. webpack5中, 使用MiniCssExtractPlugin.loader代替style-loader\n          {\n            loader: MiniCssExtractPlugin.loader,\n          },\n          'css-loader',\n        ],\n      },\n      {\n        // 2. webpack5 配置 - 识别字体文件\n        test: /.(svg|eot|ttf|woff)$/,\n        type: 'asset/resource',\n      },\n    ],\n  },\n```\n\n5. 配置打包的文件夹根路径为dist。新建一个 webpack.dist.config.js：\n\n\n```js\nconst path = require('path');\n\nconst config = require('./webpack.config');\n\nconfig.output.path = path.resolve(__dirname, 'dist');\n```\n\n运行脚本：\n\n`NODE_ENV=production npm run build:webpack -- --config webpack.dist.config.js`\n\n查看项目路径上多出的文件：\n\n![image.png](/img/posts/2022-5-22/2022-5-22-4.png)\n\n打包成功！\n\n\n## 4. 使用Babel打包源文件\n\n### .babelrc.json\n\n\n```json\n{\n  // import/export 匹配为 script , 其他匹配为 module\n  \"sourceType\": \"unambiguous\",\n  \"presets\": [\n    [\n      // 预设，从后往前识别\n      \"@babel/preset-env\",\n      {\n        \"targets\": {\n          \"ie\": \"11\",\n          \"firefox\": \"29\",\n          \"chrome\": \"30\",\n          \"safari\": \"7\"\n        },\n        \"spec\": true,\n        \"loose\": true\n      }\n    ],\n    [\"@babel/preset-react\"],\n    // 识别ts\n    [\"@babel/preset-typescript\", { \"allowDeclareFields\": true }]\n  ],\n  \"plugins\": [\n    [\n      // 自动移除语法转换后内联的辅助函数 \n      \"@babel/plugin-transform-runtime\",\n      {\n        \"regenerator\": false\n      }\n    ],\n    [\"@babel/plugin-transform-typescript\", { \"allowDeclareFields\": true }],\n    // 支持装饰器语法\n    [\"@babel/plugin-proposal-decorators\", { \"legacy\": true }],\n    // 编译类式组件，使用直接赋值方式\n    [\"@babel/plugin-proposal-class-properties\", { \"loose\": true }],\n    // 识别私有变量\n    [\"@babel/plugin-proposal-private-methods\", { \"loose\": true }],\n    \"emotion\",\n    \"lodash\",\n    [\"babel-plugin-webpack-alias\", { \"config\": \"./webpack.config.js\", \"noOutputExtension\": true }],\n    // 从TypeScript生成React interface 或 别名\n    [\"babel-plugin-typescript-to-proptypes\"]\n  ]\n}\n\n```\n\n### package.json\n\n配置包入口和文件：\n```json\n\"main\": \"lib/index.js\",\n\n...\n\"files\": [\n    \"README.md\",\n    \"index.d.ts\",\n    \"dist/\",\n    \"lib/\"\n],\n```\n\n运行脚本，打包所有src下的指定文件：\n`babel src/ --extensions '.js,.jsx,.ts,.tsx' -d lib/ --ignore '**/.umi/*','**/__tests__/*'`\n\n查看打包目录lib，已经有了结果：\n\n![image.png](/img/posts/2022-5-22/2022-5-22-5.png)\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;可以看到index是有问题的。他自动把`src/index.ts`打包进去了，这个`index.ts`是`dumi`文档自动生成的入口。而往往文档展示的组件与组件库实际拥有的组件数量是不一致的，有一些开发中的项目是不展示在文档中的；同时，如果调整了文档展示的组件，则会造成打包的组件有缺失的风险。所以还是决定单独在生成一次lib下的index.js。\n\n### build-index.js\n\n写一个脚本生成index.js：\n```js\nconst fs = require('fs');\nconst path = require('path');\nconst child_process = require('child_process');\n\nlet js = '';\n\n// 1. 读取所有想要从导出的组件（这里默认全部）\nconst result = fs\n  .readdirSync('./src/components/', {\n    withFileTypes: true,\n  })\n  .filter((dir) =\u003e /^[A-Z]+[a-zA-Z]*$/.test(typeof dir === 'string' ? dir : dir.name));\n\n/** 2. 输出js格式\n  * import * as InputAll from './components/Input/';\n  *  const Input = Object.assign(InputAll.default, InputAll);\n  *  export { Input };\n */\nresult.forEach((dir) =\u003e {\n  if (typeof dir !== 'string') dir = dir.name;\n  js += `\n    import * as ${dir}All from './components/${dir}/';\n    const ${dir} = Object.assign(${dir}All.default, ${dir}All);\n    export { ${dir} };\n    `;\n});\n\n// 3. 写入文件\nfs.writeFileSync(path.join(__dirname, 'lib/__index.js'), js);\n\n// 4. 使用babel再次打一下包\nchild_process.execSync('npx babel lib/__index.js --out-file lib/index.js');\n\n```\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;执行脚本 `node build-index`即可。这样生成的lib文件夹下会多一个`__index.js`文件，但是无伤大雅，如果觉得不够清爽，可以加入以下删除代码：\n\n```js\nfs.unlink('lib/__index.js', () =\u003e {});\n```\n\n如此，再次执行脚本：\n\n```js\nbabel src/ --extensions '.js,.jsx,.ts,.tsx' -d lib/ --ignore '**/.umi/*','**/__tests__/*' \u0026\u0026 node build-index.js\n```\nlib文件生成完毕~\n\n\n## 5. npm发布\n\n1. [NPM](https://www.npmjs.com/)的使用，需要先注册账号，然后在项目根目录下执行`npm login`:\n\n![image.png](/img/posts/2022-5-22/2022-5-22-6.png)\n\n按照图示输入顺序登录，就会看到Logged in字样，说明登入成功！\n\n2. 生成变更记录\n\n- 项目中安装standard-version / cz-conventional-changelog：\n`yarn add --dev standard-version cz-conventional-changelog`\n\n- 配置package.json中的脚本：`\"commit\": \"cz\"`\n\n\n- commit你的所有提交。\n\n- 然后打版本（有patch/minor/major三种版本类型）：\n`standard-version --release-as patch`\n\n- 最后发布\n`npm publish`\n\n看到最新的版本号生成就表示发布成功了：\n\n![image.png](/img/posts/2022-5-22/2022-5-22-7.png)\n\n最后检查npm个人仓库主页是否有新的版本生成：\n\n![image.png](/img/posts/2022-5-22/2022-5-22-8.png)\n\n## 6. vite项目使用\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;我们可以在vite项目中测试一下我们发布的包能否使用。使用如下配置的依赖环境：\n\n```json\n  \"scripts\": {\n    \"start\": \"vite\",\n    \"build\": \"vite build\",\n    \"preview\": \"vite preview\"\n  },\n  \"dependencies\": {\n    \"dux-ui\": \"^1.3.4\",\n    \"react\": \"^18.0.0\",\n    \"react-dom\": \"^18.0.0\"\n  },\n  \"devDependencies\": {\n    \"@types/react\": \"^18.0.0\",\n    \"@types/react-dom\": \"^18.0.0\",\n    \"@vitejs/plugin-react\": \"^1.3.0\",\n    \"vite\": \"^2.9.9\"\n  }\n```\n\n执行`yarn`安装依赖。\n\n在`vite.config.js`中配置引用路径：\n\n\n```js\nimport { defineConfig } from 'vite'\nimport react from '@vitejs/plugin-react'\n\nexport default defineConfig({\n  plugins: [react()],\n  alias: [\n    { find: 'dux-ui/dist/styles/icon.min.css', replacement: '/node_modules/dux-ui/dist/styles/icon.min.css' },\n    { find: 'dux-ui', replacement: '/node_modules/dux-ui/lib/index.js' },\n  ],\n})\n```\n\n在App.jsx中测试组件：\n\n```jsx\n...\n\u003c\u003e\n    \u003cIcon type=\"loading\" spin\u003e\u003c/Icon\u003e\n    {StyleTypes.map((type) =\u003e (\n        \u003cButton styleType={type} key={type} onClick={() =\u003e console.log('clicked')}\u003e\n          Button\n        \u003c/Button\u003e\n    ))}\n\u003c/\u003e\n```\n启动项目后可以看到效果：\n\n![image.png](/img/posts/2022-5-22/2022-5-22-9.png)\n\n## 7. Dumi项目Gitee Pages配置\n\n- 首先安装依赖：`yarn add --dev gh-pages`\n\n- 执行脚本`dumi build`\n\n- 然后输出到想要导出的文件夹（以docs-dist为例）：`gh-pages -d docs-dist`\n\n运行成功后，会看到git仓库多一个分支：\n\n![image.png](/img/posts/2022-5-22/2022-5-22-10.png)\n\n- 在gitee仓库页面，选择对应的服务：\n\n![image.png](/img/posts/2022-5-22/2022-5-22-11.png)\n\n- 选择对应的分支，并且部署即可：\n\n![image.png](/img/posts/2022-5-22/2022-5-22-12.png)\n\n打开生成的链接即可看到部署的主页。如果打开后提示静态资源404，则需要进行如下配置：\n\n`.umirc.ts`\n\n```js\n  base: '/dux-ui-react/',\n  publicPath: '/dux-ui-react/',\n```\n再次从第二步开始执行即可！\n\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;至此，基于React的UI库的搭建. 部署. 基础组件的封装已经结束。后续我会逐步完善组件库，添加更多常用的组件，敬请期待~~"])</script><script>self.__next_f.push([1,"49:T31d5,"])</script><script>self.__next_f.push([1,"## 1. 前言\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;由于疫情原因，被封闭在家中比较烦躁，拖了好久才开始续写UI篇的文章，抱歉。本篇是React组件库的第5篇文章，我们来实现一下Form表单的功能。本文的代码展示的是主要的核心代码，全部代码见仓库：[Gitee仓库](https://gitee.com/dh1992/dux-ui-react/)。另，我已部署了本组件库的文档地址，还请批评指正：https://dh1992.gitee.io/dux-ui-react\n\n\n## 2. Input\n   \u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;Input作为最基本的HTML表单组件，肯定是组件库中必不可少的一个组件，同时也是实现起来相对简单的，H5本身就自带了`input`标签，我们只需要在其基础上自定义自己的样式，并且实现一些事件监听即可。\n   \n   \u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;我们先确定Input要接受的props有哪些。首先输入框肯定要有值，还要能禁用和清除，同时变化还要有检测事件，主要的参数我罗列一下：\n   \n| 属性 | 描述 |\n| --- | --- |\n| value | 受控值 |\n| prefix | 前缀 |\n| suffix | 后缀 |\n| clearable | 是否可清空 |\n| size | 尺寸 |\n| disabled | 是否禁用 |\n| onClear | 清除事件 |\n| onFocus | 聚焦事件 |\n| onBlur | 失焦事件 |\n| onChange | 变化事件 |\n\n\n   我们在`components`文件夹下，新建`Input`文件夹，并在其下新建`index.tsx`文件：\n   \n   \n```tsx\n...\nconst Input = ({size, focused, disabled, customStyle, clearable, value}) =\u003e {\n      \n      return \u003cSWrap\n        {...{ size, focused, disabled, customStyle }}\n        empty={!value}\n      \u003e\n        \u003cspan className={inputWrapCls}\u003e\n          {renderPrefix}\n          \u003cinput\n            {...rest}\n            value={value}\n            onChange={onChange}\n            ref={inputRef}\n            onFocus={handleFocus}\n            onBlur={handleBlur}\n            disabled={disabled}\n          /\u003e\n          {renderClear}\n          {renderSuffix}\n        \u003c/span\u003e\n      \u003c/SWrap\u003e\n    );\n}\n```\n\n \u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;我用一个`SWrap`组件包裹了原生的inpu标签，接受用户传入的props属性。看一下SWrap是怎么实现的，仍然是返回一个styleWrap函数，具体的css实现可以看我的源码，这里不多赘述：\n \n```tsx\nimport styled from '@emotion/styled';\nimport { css } from '@emotion/core';\n\n...\nexport const SWrap = styleWrap({})(\n  styled.span((props) =\u003e {\n    const {\n      theme: { designTokens: DT },\n      disabled,\n      size,\n      focused,\n      clearable,\n      customStyle,\n    } = props;\n\n    return css`\n        /** css实现 */\n        ...\n    `\n  })\n);\n```\n\n我们来看一下每一个属性都是怎么实现其价值的：\n\n### 2.1 value/disabled/onChange\n通过props属性传入以后直接赋值给input标签：`value={value}`\n\n### 2.2 prefix/suffix\n前后缀我们通过`renderPrefix/renderSuffix`组件实现，分别放在input的前后：\n\n\n```tsx\n// 如果用户传入了prefix，就返回一个span，加上classname，并给一个onMouseDown的事件，如果不需要这里也可以不要事件。后缀也同前缀一样。\nconst renderPrefix = useMemo(() =\u003e {\n  return (\n    prefix \u0026\u0026 (\n      \u003cspan className={inputPrefixCls} onMouseDown={onMouseDown}\u003e\n        {prefix}\n      \u003c/span\u003e\n    )\n  );\n}, [onMouseDown, prefix]);\n```\n\n### 2.3 clearable\nclearable是组件自定义的属性，原生input没有自带的清除操作。我们通过后缀组件前边的`renderClear`组件实现:\n\n\n```tsx\n// 其实与前后缀实现方式一样，不同的是content是固定的一个Icon，并强制赋予handleClear事件\nconst renderClear = useMemo(() =\u003e {\n  if (clearable) {\n    return (\n      \u003cspan className={clearCls} onClick={handleClear} onMouseDown={onMouseDown}\u003e\n        \u003cIcon type=\"remove_sign\" /\u003e\n      \u003c/span\u003e\n    );\n  }\n}, [clearable, handleClear, onMouseDown]);\n\n// 清除value事件\nconst handleClear = useCallback(\n  (e) =\u003e {\n    if (disabled) return;\n    onClear();\n    const input = inputRef.current;\n    if (!input) return;\n    e.target = input;\n    e.currentTarget = input;\n    const cacheV = input.value;\n    input.value = '';\n    onChange(e);\n    input.value = cacheV;\n  },\n  [disabled, onChange, onClear],\n);\n```\n \u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;我们设定的清除事件执行顺序是先执行用户传入的`onClear`，之后缓存value，然后拿到Input标签的ref，设置其value是空字符串，并将当前点击事件的target给Input，调用`onChange`返给用户。**注意最后一行**，要重新把input的value赋值回缓存的原值，因为这里并没有任何setState的操作，不应该改变原来的值。用一个onChange事件间隔一下，value值在一个渲染周期内不会渲染两次，所以就造成了被清空的假象。至于清空数据的真实操作，应该放在onChange中。\n \n  \u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;至此，Input组件的功能实现已经介绍完毕。以此类推，数字输入框`NumberInput`，只需要在左右两侧个加一个Button来控制增减，在`onBlur`事件中需要通过正则校验是否为合法的数字即可；文本域`Textarea`完全可以参照Input，将原生标签换成textarea即可。\n  \n## 3. Radio\n  \u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;H5的input标签虽然有radio属性，但是一般组件库就不太会直接使用了，一方面是原生的方法往往不能满足组件库的需求，另一方面，不想原始的Input输入框，原生标签不能做到组件库需要的样式定制和主题定制。比如我们自定义的radio组件，可以有原生样式，也可以有card模式，而且radio往往都不是一个单独存在，至少得有两个才能满足要求。我们先来定义一下`props`：\n  \n  | 属性 | 描述 |\n| --- | --- |\n| checked        | 是否选中                                                        | \n| defaultChecked | 默认是否选中                                                      | \n| disabled       | 是否禁用                                                        | \n| onChange       | 点选时的回调                                                      | \n| value          | radio的值                                                     | \n| styleType      | 样式风格, 可选 'default', 'button', 'tag', 'card', 'text', 'list' | \n| size           | 尺寸，可选'sm', 'md', 'lg'，styleType 为 card. list 时无效             | \n| title          | 标题，styleType 为 card 时使用                                     | \n\n \u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;接下来在`src/components`下新建文件夹`Radio`，并在其中新建`index.tsx`：\n \n \n```tsx\n...\nrenderRadioList(props: any) {\n    /* eslint-disable no-unused-vars */\n    const {\n      children,\n      checked,\n      onChange,\n      onClick,\n      disabled,\n      ...rest\n    } = props;\n    /* eslint-enable no-unused-vars */\n\n    return (\n      \u003cRadioListWrap\n        checked={checked}\n        disabled={disabled}\n        {...rest}\n        onClick={(...args: any) =\u003e this.onClick(props, { ...args })}\n      \u003e\n        \u003cRadioIcon checked={checked} disabled={disabled} /\u003e\n        {children != null \u0026\u0026 \u003cspan className={contentCls}\u003e{children}\u003c/span\u003e}\n      \u003c/RadioListWrap\u003e\n    );\n}\n```\n \u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;`RadioListWrap`仍然是用`styleWrap`包裹的包含样式的div，内容物我们放一个图标`RadioIcon`接收最重要的属性`checked`，后边用一个span包裹传入的children，使用时可以这样写：\n \n ```tsx\n \u003cRadio checked\u003echecked\u003c/Radio\u003e\n ```\n 组件`RadioIcon`内部放一个实心圆形的Icon，`SIconWrap`仍然是一个div：\n \n \n```tsx\nconst RadioIcon = (props: { checked?: boolean; disabled?: boolean }) =\u003e {\n  return (\n    \u003cSIconWrap {...props}\u003e\n      \u003cIcon className={iconCls} type=\"whitecircle\" /\u003e\n    \u003c/SIconWrap\u003e\n  );\n};\n```\n\n在`SIconWrap`样式定义里，通过判断是否checked来控制样式高亮：\n\n\n```tsx\n${checked \u0026\u0026\n  css`\n    // checked时，SIconWrap加一个主题色的边框\n    \u0026.${iconWrapCls} {\n      color: ${DT.T_COLOR_LINE_PRIMARY_DEFAULT};\n      border-color: ${DT.T_COLOR_LINE_PRIMARY_DEFAULT};\n    }\n    // checked时，Icon字体加上主题色\n    .${iconCls} {\n      visibility: visible;\n      opacity: 1;\n      fill: ${DT.T_COLOR_TEXT_PRIMARY_DEFAULT};\n    }\n`}\n```\n\n基本结构讲解完了，我们来看加上样式美化后的效果：\n\n![image.png](/img/posts/2022-5-22/2022-5-22-1.png)\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;可以看到，除了模拟原生样式外，还可以模拟按钮. 标签和列表样式，实现方式同上，只需要将`RadioWrap`内的Icon替换成其他的组件即可。\n\n\u003e  表单组件比较多，这里只是讲述了基本的几个实现，为写表单组件提供一个思路，更多组件可以参见[组件库主页](https://dh1992.gitee.io/dux-ui-react/)\n\n\n## 4. Form\n  \u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;讲完基础表单组件，我们实现一下表单组件的布局，就叫`Form`。H5原生的组件是有form的，我们这里需要用到其submit方法，所以就使用原生的form，并对其进行样式封装。\n  \n  \u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;表单容器，必须有一个根组件Form，内部有至少一个formitem，每一个formitem内包含一个基础表单输入组件，定义不同的name。在`src/components`下新建`Form`文件夹，并在其下新建`Form.tsx`,`Item.tsx`。先看`Form.tsx`：\n  \n  \n```tsx\nconst Form = ({ onSubmit, ...rest }: any) =\u003e {\n  const { preventFormDefaultAction } = useContext(ConfigContext);\n  const handleSubmit = React.useCallback(\n    (e) =\u003e {\n      if (e) {\n        e.preventDefault();\n        e.stopPropagation();\n      }\n      onSubmit \u0026\u0026 onSubmit(e);\n    },\n    [onSubmit],\n  );\n  return (\n      \u003cFormWrap onSubmit={preventFormDefaultAction ? handleSubmit : onSubmit} {...rest} /\u003e\n  );\n};\n```\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;表单容器，必须有一个根组件Form用于容纳所有的输入元素，触发原生的submit事件；内部children有至少一个formitem，每一个formitem内包含一个基础表单输入组件，定义不同的name，formitem应该遵循左右布局格式，使用float或者flex都可以实现。我们看传入的参数`onSubmit`，在组件`FormWrap`的回调onSubmit中调用。我们来看一下`FormWrap`，他返回的就是一个加了样式的原生form标签：\n  \n  \n```tsx\nexport const FormWrap = styleWrap\u003c{ size: string }\u003e({\n  className: prefixCls,\n})(\n  styled('form')((props) =\u003e {\n\n    return css`\n      font-size: 12px;\n\n      // 给下属的每一个item加样式\n      .${itemCls} {\n        margin-bottom: 16px;\n        \u0026:last-child {\n          margin-bottom: 0;\n        }\n      }\n    `;\n  }),\n);\n\n```\n\n  \u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;我们再来看内容物`Item.tsx`的实现：\n  \n  \n```tsx\n...\nreturn (\n    \u003cItemWrap\u003e\n      \u003cLabelWrap {...labelCol}\u003e\n        {label}\n        {required \u0026\u0026 \u003cRequiredLabel\u003e*\u003c/RequiredLabel\u003e}\n        {help \u0026\u0026 \u003cCommentWrap\u003e{help}\u003c/CommentWrap\u003e}\n      \u003c/LabelWrap\u003e\n      \u003cControllerWrap {...controllerCol}\u003e\n        {children}\n        \u003cRenderTip tip={tip} status={status} /\u003e\n      \u003c/ControllerWrap\u003e\n    \u003c/ItemWrap\u003e\n);\n```\n  \n \u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;`ItemWrap`，`LabelWrap`，`ControllerWrap`，用于表单条目左右布局的实现：\n  \n  ```tsx\n// ItemWrap 使用12栅格布局\nexport const ItemWrap = styleWrap\u003c{ size: string }\u003e({\n  className: prefixCls,\n})(\n    styled('form')((props) =\u003e {\n\n    return css`\n      font-size: 12px;\n      display: flex;\n\n      // 给下属的每一个label加样式，样式类名从LabelWrap获取\n     .${prefixCls} \u003e .${itemLabelCls} {\n        flex: ${props.labelCol.span || 6}\n      }\n      \n      // 给下属的每一个controller受控区域加样式，样式类名从ControllerWrap获取\n     .${prefixCls} \u003e .${itemControllerCls} {\n        flex: ${props.controllerCol.span || 6}\n      }\n    `;\n  }),\n);\n\n```\n  \n   \u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;我们来看看放组件后的效果（主页demo）：\n   \n![image.png](/img/posts/2022-5-22/2022-5-22-2.png)\n\n\n\n   \u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;总结一下，表单组件需要放在原生form标签内，使用栅格布局，左侧放置label，右侧放置具体的输入组件；本文章介绍了Input和Radio如何来封装，其他组件也都是大同小异，由于篇幅限制，读者可以去主页查看效果或者自己去npm安装一下实施效果（相关配置可查看源码README）：\n\n```sh\nnpm install --save dux-ui\n```"])</script><script>self.__next_f.push([1,"4a:T2c69,"])</script><script>self.__next_f.push([1,"前后端分离的项目中，API接口的质量会直接影响前端页面渲染的逻辑。作者经过多年的与后端开发同学. 产品的“磨合”中总结了一套相对来说比较完整的，对于前端比较友好的接口规范。其实说是怼后端，但换个角度讲，也是在帮助后端进步嘛！\n\n\n## 0. 设计规范原则\n\n```\n1.   前端应只关注渲染逻辑，而不应该关注数据的处理逻辑。接口返回的数据应该是能够直接展示在界面上的。\n2.   一个功能应避免多个接口嵌套调用获取数据，后台应该处理好一次性返回。\n3.   响应格式应该是JSON，而且应避免多级JSON的出现；\n4.   后端如果需要界面实时刷新数据，不应该要求前端定时器轮询，而要提供类似webSocket之类的功能。\n```\n根据这个原则，后端返回的数据应该是所见即所得的数据，而不应该是一层包一层的复杂的JSON，需要前端额外来处理很复杂的去重，排序. 深浅拷贝，变形等处理。前端在渲染每一个div，每一个table的cell时，不用担心数据结构会频繁更改从而导致页面崩溃。\n\n## 1. 接口制定的全流程\n\n前端请求一般是`HTTP`协议，这里以HTTP为例。\n\n### HTTP请求的协议类型\n\n应使用下面罗列的HTTP方法（使用的SQL关键字）:\n\n- `GET`（SELECT）：从服务器取出资源，一项或多项。\n- `POST`（CREATE）：在服务器新建一个资源。\n- `PUT`（UPDATE）：在服务器更新资源（客户端提供改变后的完整资源）。\n- `PATCH`（UPDATE）：在服务器更新资源（客户端提供改变的属性），使用比较少\n- `DELETE`（DELETE）：从服务器删除资源。\n\n下面是一些例子:\n\n- `GET` /schools：列出所有的学校列表\n- `POST` /school：新建一个学校\n- `GET` /school/`{id}`：获取某个指定学校的信息\n- `PUT` /school/`{id}`：更新某个指定学校的信息（提供该学校的全部信息，而不是让前端再通过别的接口获取）\n- `PATCH` /school/`{id}`：更新某个指定学校的信息（提供该学校的部分信息）\n- `DELETE` /school/`{id}`：删除某个学校\n\n### HTTP请求的参数定义\n\n不同`HTTP`方法对应不同的参数传递方式，如下：\n\n\u003e query指路径传参，body指requestBody请求体\n\n- `GET`：path \u0026 query\n- `POST`：path \u0026 body\n- `PUT`：path \u0026 query \u0026 body\n- `PATCH`：path \u0026 query \u0026 body\n- `DELETE`：path \u0026 query\n\n注意：\n\n```\n1. 未出现在上表中的位置不可放置参数，如GET方法不可在body中放置参数。\n2. 参数命名均遵循小驼峰命名法。\n3. path和query中传递的参数需确保长度可控，超过2000字符（因浏览器而异）的参数可导致请求失败。当请求无法保证参数长度可控，则不能将参数放在path或query中，必须使用支持body参数的HTTP方法，如POST。\n4. path和query中传递的参数需是基本类型，亦不可传递序列化之后的JSON对象！不然前端就要try/catch一下来parse了。\n5. body中的参数需是合法JSON对象或者formData，即使参数仅包含单字段或单数组，也需包含在对象中，如：\n{\n  name: string;\n}\n```\n\n\n### HTTP响应结果定义\n\n针对不同操作，服务器向用户返回的结果应该符合以下规范。\n\n\u003cRow\u003e\n  \u003cCol\u003e\n    - `GET` /collections：返回资源对象的列表（数组）\n  \u003c/Col\u003e\n  \u003cCol sticky\u003e\n    ```js {{ title: 'Response' }}\n    {\n        RetCode: 0,\n        Message: 'ok',\n        Action: 'collections',\n        Data: [\n            {\n                Id: 1,\n                name: 'collection1',\n                ...\n            },\n            ...\n        ]\n    }\n    ```\n  \u003c/Col\u003e\n\u003c/Row\u003e\n---\n\u003cRow\u003e\n  \u003cCol\u003e\n    - `GET` /collection/resource：返回单个资源对象\n  \u003c/Col\u003e\n  \u003cCol sticky\u003e\n    ```js {{ title: 'Response' }}\n    {\n        RetCode: 0,\n        Message: 'ok',\n        Action: 'collectionResource',\n        Data: {\n            Id: 1,\n            name: 'collection1',\n            ...\n        }\n    }\n    ```\n  \u003c/Col\u003e\n\u003c/Row\u003e\n---\n\u003cRow\u003e\n  \u003cCol\u003e\n    - `POST` /collection：返回新生成的资源对象\n  \u003c/Col\u003e\n  \u003cCol sticky\u003e\n    ```js {{ title: 'Response' }}\n      {\n          RetCode: 0,\n          Message: 'ok',\n          Action: 'collection',\n          Data: {\n              Id: 1,\n              name: 'collection1',\n              ...\n          }\n      }\n    ```\n  \u003c/Col\u003e\n\u003c/Row\u003e\n\n- `PUT` /collection/resource：返回完整的资源对象， 返回结果同上。\n- `PATCH` /collection/resource：返回完整的资源对象，返回结果同上。\n\n\u003cRow\u003e\n  \u003cCol\u003e\n    - `DELETE` /collection/resource：返回一个空文档\n  \u003c/Col\u003e\n  \u003cCol sticky\u003e\n    ```js {{ title: 'Response' }}\n      {\n          RetCode: 0,\n          Message: 'ok',\n          Action: 'collectionResource',\n          Data: {}\n      }\n    ```\n  \u003c/Col\u003e\n\u003c/Row\u003e\n\n注意：\n\n\n1. 所有返回数据需是合法JSON，尽量返回object或者array (二进制文件下载除外)。如果数据中包含类型为array的属性，当数据为空时，尽量返回空数组[]，避免返回null。\n2. 返回数据避免使用map的`\u003c'key', 'value'\u003e`形式！如有相关格式的返回数据，请转换为array。\n3. 如果没有数据需要返回，或系统报错时，可统一返回固定字段：\n\n```ts\n{\n  RetCode: number, // 后端状态码\n  Message: string, // 请求返回消息\n  Action: string, // 请求的响应关键字\n  Data: Object | Array // 响应数据\n}\n```\n\n4. 返回值中应尽量避免包含无用信息，或者额外的数据结构，仅包含必要数据即可。必要数据指前端需要渲染的数据。\n5. 后端异常报错均以'500'状态码的形式返回，也可适当添加额外信息，非特殊情况无需在返回的数据体中返回HTTP code。\n\n\n### URL规范\n\n可参照下面的范例：\n`GET [http | https]://host:port/studio/api/组件名/v1/模块名/菜单名/接口名/:param`\n\n注意：\n```\n1. 不用大写字母，建议用中杠 - 不用下杠 _. 比如邀请码写成invitation-code而不是invitation_code\n2. 使用名词表示资源集合，使用复数形式（为确保所有API URIs保持一致），不能使用动词；\n3. 每个资源都至少有一个标识它的URI，同时应该遵循一个可预测的层次结构来提高可理解性，从而提高可用性；\n4. 宾语必须是名词。网址中不能有动词，只能有名词，API中的名词也应该使用复数，宾语就是API的URL，是HTTP动词作用的对象。它应该是名词，不能是动词\n```\n正🌰 ：\n\n- `GET` /classes：列出所有班级\n- `POST` /classes：新建一个班级\n- `GET` /classes/`{classId}`：获取某个指定班级的信息\n- `PUT` /classes/`{classId}`：更新某个指定班级的信息（一般倾向整体更新）\n- `PATCH` /classes/`{classId}`：更新某个指定班级的信息（一般倾向部分更新）\n- `DELETE` /classes/`{classId}`：删除某个班级\n- `GET` /classes/`{classId}`/teachers：列出某个指定班级的所有老师的信息\n- `GET` /classes/`{classId}`/students：列出某个指定班级的所有学生的信息\n- `DELETE` classes/`{classId}`/teachers/`{teacherId}`：删除某个指定班级下的指定的老师的信息\n\n反例：\n- /getAllclasses\n- /createNewclass\n- /deleteAllActiveclasses\n\n\u003e **复数还是单数URL问题**： 既然 URL 是名词，那么应该使用复数，还是单数？这没有统一的规定，但是常见的操作是读取一个集合，比如GET /articles（读取所有文章），这里明显应该是复数，而获取单个可以用GET /article/2。 当然，你可以为了统一起见，都使用复数URL，比如GET /articles/2。\n\n多级URL的处理：当查询资源信息较多时，往往会有多级参数出现在URL中，此处要分三种情况讨论：\n\n1. 查询信息指代当层唯一id，将查询信息放在path中，构建唯一的查询路径，如：\n`\u003e GET /authors/12/categories/2`\n\n2. 查询信息属于对当层信息的状态过滤，将查询信息放在query中，如：\n`\u003e GET /articles?published=true`\n\n3. 查询信息既包含当层id，也包含过滤信息，分别将id和过滤信息放在path和query中，如：\n`\u003e GET /authors/12/categories/2?published=true`\n\n\n### HTTP状态码约束\n\n客户端的每一次请求，服务器都必须给出回应。回应包括 HTTP 状态码和数据两部分。HTTP 状态码就是一个三位数，分成五个类别。\n\n```\n- 1xx：相关信息\n- 2xx：操作成功\n- 3xx：重定向\n- 4xx：客户端错误\n- 5xx：服务器错误\n```\n状态码规范见[W3C关于HTTP状态码定义](https://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html)\n\n### 分页与搜索接口约束\n\n分页接口广泛出现在数据量较大场景下的表格型交互。即使是渲染简单的列表元素，超过500项有可能导致前端卡顿，超过5000项以上（不同浏览器. 电脑配置会影响这个数字）有可能导致前端崩溃。凡无法保证能限制接口返回数量在一个较小数量级（100以下）的接口都需要考虑支持后端分页；如果返回结果数量是不受控制的（如包含用户生成数据），则`必须支持`后端分页。\n\u003cbr /\u003e\n\n这里给出请求范例：\n\nGET 接口\n\n`?page={page}\u0026size={size}`\n\nPOST 接口\n\n```js\n// 格式1\n{\n    page: number;\n    size: number;\n    total: number; // 数据总量\n}\n\n// 格式2\n{\n    Limit: number;\n    Offset: number\n    Total: number; // 数据总量\n}\n\n// 其中page为当前请求页，为从0开始的正整数；\n// size为当前页大小，常用的值有10. 20等，理论上需支持任意正整数。特殊的，若为-1，可以约定为查询全部\n// Limit同size\n// Offset为相对偏移量，为从0开始的正整数\n```\n\n\n需要注意的是，如果交互中出现过滤. 排序功能，则相关功能必要时都需要后端支持。如果参数能保证不超过一定长度，则参数放在query里也是可以接受的。数组型参数可以以相关字段用逗号连接的形式传递，如：\n\n```\n?status=RUNNING,COMPLETE,ERROR\n```\n\n\u003e 特殊类型处理\n\u003e 1. 关于Boolean类型，JSON数据传输中使用true/false字段进行传递。\n\u003e 2. 关于日期类型，JSON数据传输中一律使用长整形时间戳（Unix time）进行传递，具体日期显示格式由前端处理。\n\n\n\n## 2. 注意事项\n\n任何形式的接口变更都会对前端产生影响，比如字段名称的修改，字段的增减，字段类型的修改，请求参数类型的变动等。原则上当接口对接完成后不应有任何形式的修改，如果一定要变更接口，需及时通知相应前端开发人员并重新对接。\n\n表示同一含义的字段在同一套功能接口集合（增删改查）中应尽量保证相同。在接口设计中，对同一实体进行操作的接口应尽量保证在参数和返回值中，该实体的数据结构保持一致，尽量避免前端做数据对象转换的动作。\n\n\n## 3. 参考\n\n[阮一峰 RESTful API 设计指南](https://www.ruanyifeng.com/blog/2014/05/restful_api.html)\n\n[Representational state transfer](https://en.wikipedia.org/wiki/Representational_state_transfer)\n\n[Hypertext Transfer Protocol](https://en.wikipedia.org/wiki/Hypertext_Transfer_Protocol#Request_methods)\n\n```\n灵感来源 - Transwarp通用技术组前端团队jira文档 - 前后端接口规范\n```"])</script><script>self.__next_f.push([1,"4b:T2d3f,"])</script><script>self.__next_f.push([1,"\u003e 专栏说明：对于react-router v6版本，有同事反应缺少相对完整的中文文档，查看不方便。为了便于使用，作者对[官网文档](https://reactrouter.com/docs/en/v6)进行针对性翻译，便于v6版本更广泛的被使用。\n\n上一篇：[# React Router v6 官方文档翻译 （一） ---- Installation \u0026\u0026 Quick Start](https://juejin.cn/post/7100479939694034952)\n\n## 1. 问答环节\n\n\u003e 原文路径：https://reactrouter.com/docs/en/v6/getting-started/faq#faqs\n\n下面是大家在使用`React Router v6`时经常问到的问题。\n\n### 1. 当我用的是类式组件，又必须使用Router时，我应该怎么做？\n\nReact Router v6版本不再支持`withRouter`。当使用类式React组件时，不能够使用hooks，然而在React Router v6中都是用hooks函数来共享路由状态，但这并不意味着类式组件不能使用React Router v6。此时你需要写一个自己的`withRouter`封装函数（React16.8+）：\n\n```tsx\nimport {\n  useLocation,\n  useNavigate,\n  useParams,\n} from \"react-router-dom\";\n\nfunction withRouter(Component) {\n  function ComponentWithRouterProp(props) {\n    let location = useLocation();\n    let navigate = useNavigate();\n    let params = useParams();\n    return (\n      \u003cComponent\n        {...props}\n        router={{ location, navigate, params }}\n      /\u003e\n    );\n  }\n\n  return ComponentWithRouterProp;\n}\n```\n\n### 2. 为什么`\u003cRoute\u003e`标签用`element`属性替代`render`和`component`？\n\n在React Router v6中，我们把v5中`\u003cRoute component\u003e`和`\u003cRoute render\u003e`两个API用`\u003cRoute element\u003e`替换，主要原因有如下几点：\n\n1. 对于初学者，肯定会经常使用组件懒加载`\u003cSuspense fallback={\u003cSpinner /\u003e}\u003e`，这个API里，fallback就是一个`React element`，我们之所以这么设计，就是为了让初学者能够更容易. 更平滑的使用渲染函数。\n\n2. （官网说的比较复杂，我总结一下）v5版本中，`\u003cRoute component\u003e`不能传递props，想要传递组件参数，就需要使用`\u003cRoute render\u003e`，这就导致了v4/v5的渲染API体量会更大一些，下面是例子：\n\n```jsx\n// 哦吼，看起来是个不错的写法！\n\u003cRoute path=\":userId\" component={Profile} /\u003e\n\n// 但是呢，我怎么给 \u003cProfile\u003e 传递 props 呢??\n// Hmm, 我还得用另外一种方式：render\n\u003cRoute\n  path=\":userId\"\n  render={routeProps =\u003e (\n    \u003cProfile routeProps={routeProps} animate={true} /\u003e\n  )}\n/\u003e\n\n// 所以，在v5版本中有两种路由组件渲染方式 :/\n\n// 但是还有一种情况，关于所有URL都不能匹配的404情况呢？\n// 或许还可以使用children方法\n\u003cRoute\n  path=\":userId\"\n  children={({ match }) =\u003e (\n    match ? (\n      \u003cProfile match={match} animate={true} /\u003e\n    ) : (\n      \u003cNotFound /\u003e\n    )\n  )}\n/\u003e\n\n// 如果想要拿到路由的匹配 或者 想在嵌套路由比较深层的地方来一个路由跳转呢？\nfunction DeepComponent(routeStuff) {\n  // 啊，复杂的实现~\n}\nexport default withRouter(DeepComponent);\n\n// 以上是列举的作者能想到的使用情况。\n```\n\nReact本身不提供任何获取`\u003cRoute\u003e`信息的方式， 所以我们必须发明一种既能获取Route信息，又能获取自定义props的方式。庆幸的是，hooks的出现，可以替代之前的`component`. `render`和高阶组件。再看看针对以上情况，v6是怎么实现的：\n\n```jsx\n// 就像React原生的 \u003cSuspense\u003e 那样使用路由组件!\n// 不需要额外增加学习任务.\n\u003cRoute path=\":userId\" element={\u003cProfile /\u003e} /\u003e\n\n// 我们来传递自己的props\n\u003cRoute path=\":userId\" element={\u003cProfile animate={true} /\u003e} /\u003e\n\n// 获取路由参数和路由定位信息\nfunction Profile({ animate }) {\n  let params = useParams();\n  let location = useLocation();\n}\n\n// 路由嵌套深层的组件进行跳转\nfunction DeepComponent() {\n  // 一个hooks搞定！\n  let navigate = useNavigate();\n}\n```\n\n另外说一下，v6中不使用`children`，还有个原因，v6在嵌套路由中已经将children作为内部保留关键字了，这里就不能再用了：[嵌套路由](https://reactrouter.com/docs/en/v6/getting-started/overview#nested-routes)\n\n### 3. v6如何定义404页面\n\n在v4中，来我们需要定义一个路由之外的path，v5中可以使用`path=\"*\"`，v6中沿用v5的用法，不过更简洁：\n\n```jsx\n\u003cRoute path=\"*\" element={\u003cNoMatch /\u003e} /\u003e\n```\n\n### 4. 为什么我的`\u003cRoute\u003e`不渲染？好气！\n\n在v5中，`\u003cRoute\u003e`组件就是一个普通的React组件，URL没有匹配到的时候，就会像是if语句没有覆盖到一样，不会渲染；在v6中，`\u003cRoute\u003e`元素并没有真正的渲染出来，他只是一个配置。我们来举例对比一下：\n\nv5中，`\u003cRoute\u003e`就是一个组件，当匹配到路径`/my-route`时，`MyRoute`组件就会被渲染出来：\n```jsx\nlet App = () =\u003e (\n  \u003cdiv\u003e\n    \u003cMyRoute /\u003e\n  \u003c/div\u003e\n);\n\nlet MyRoute = ({ element, ...rest }) =\u003e {\n  return (\n    \u003cRoute path=\"/my-route\" children={\u003cp\u003eHello!\u003c/p\u003e} /\u003e\n  );\n};\n```\n\nv6中，你要再这样写就渲染不出来了：\n```jsx\n// ERROR !!!\nlet App = () =\u003e (\n  \u003cRoutes\u003e\n    \u003cMyRoute /\u003e\n  \u003c/Routes\u003e\n);\n\nlet MyRoute = () =\u003e {\n  // \u003cRoutes\u003e可看不到你这里边配置的path\n  return (\n    \u003cRoute path=\"/my-route\" children={\u003cp\u003eHello!\u003c/p\u003e} /\u003e\n  );\n};\n```\nv6的正确写法应该遵循两个原则：\n\n1. 在`\u003cRoutes\u003e`中只放置`\u003cRoute\u003e`\n\n2. 把需要渲染的都放到`element`中\n\n示例：\n\n```jsx\nlet App = () =\u003e (\n  \u003cdiv\u003e\n    \u003cRoutes\u003e\n      \u003cRoute path=\"/my-route\" element={\u003cMyRoute /\u003e} /\u003e\n    \u003c/Routes\u003e\n  \u003c/div\u003e\n);\n\nlet MyRoute = () =\u003e {\n  return \u003cp\u003eHello!\u003c/p\u003e;\n};\n```\n\n使用`\u003cRoutes\u003e`来静态地配置全局路由，能够发挥出v6更多的特性。我们也鼓励开发者将所有`\u003cRoute\u003e`都放到一个`\u003cRoutes\u003e`来配置路由。如果你真的想要个性化的匹配独立URL的组件，你可以像下面这样书写：\n\n```jsx\nfunction MatchPath({ path, Comp }) {\n  let match = useMatch(path);\n  return match ? \u003cComp {...match} /\u003e : null;\n}\n\n// 匹配任何地方的组件，不一定有 \u003cRoutes\u003e 包裹\n\u003cMatchPath path=\"/accounts/:id\" Comp={Account} /\u003e;\n```\n\n### 5. 路由树构建的迁移工作\n\n在v5版本中，你可以使用`\u003cRoute\u003e`和`\u003cSwitch\u003e`标签来处理路由嵌套问题：\n\n```jsx\n// 路由树顶部\n\u003cSwitch\u003e\n  \u003cRoute path=\"/users\" component={Users} /\u003e\n\u003c/Switch\u003e;\n\n// 路由树中某个地方\nfunction Users() {\n  return (\n    \u003cdiv\u003e\n      \u003ch1\u003eUsers\u003c/h1\u003e\n      \u003cSwitch\u003e\n        \u003cRoute path=\"/users/account\" component={Account} /\u003e\n      \u003c/Switch\u003e\n    \u003c/div\u003e\n  );\n}\n```\n\nv6中的使用基本类似，将`Switch`换成`Routes`。不过需要注意以下两点：\n\n1. 在父路由的path配置中，需要加入`/*`来匹配element中配置的子路由\n\n2. 嵌套路由中不需要获取完整的路径，v6支持相对路径\n\n示例：\n```jsx\n// 顶层路由\n\u003cRoutes\u003e\n  \u003cRoute path=\"/users/*\" element={\u003cUsers /\u003e} /\u003e\n\u003c/Routes\u003e;\n\n// 路由树中某个地方\nfunction Users() {\n  return (\n    \u003cdiv\u003e\n      \u003ch1\u003eUsers\u003c/h1\u003e\n      \u003cRoutes\u003e\n        \u003cRoute path=\"account\" element={\u003cAccount /\u003e} /\u003e\n      \u003c/Routes\u003e\n    \u003c/div\u003e\n  );\n}\n```\n\n另，在v5中如果有游离的`\u003cRoute\u003e`，在迁移时需要用`\u003cRoutes\u003e`包裹：\n```jsx\n// v5\n\u003cRoute path=\"/contact\" component={Contact} /\u003e\n\n// v6\n\u003cRoutes\u003e\n  \u003cRoute path=\"contact\" element={\u003cContact /\u003e} /\u003e\n\u003c/Routes\u003e\n```\n\n### 6. v6还能使用正则匹配吗？\n\nv6中已经移除了正则匹配~~ 有以下两个原因：\n\n1. 正则路由在使用中造成了很多优先级匹配的问题，因为正则是没有优先级这个概念的\n\n2. 正则匹配的依赖包太大了，如果再放回来，v6的体积会增加1/2（即正则占用1/3）\n\n在调研过大量的用例后，我们发现，完全可以规避掉直接使用正则来匹配路由。所以，再三权衡之下，我们做了这个重要的删减，来缩小React Router的体积和规避已知的优先级问题。\n\n一般来说，正则路由仅仅是用来匹配一个URL字符串片段，实现如下功能：\n\n1. 匹配多个静态值\n举例（v5）：\n```jsx\n// v5-lang-route.js\nfunction App() {\n  return (\n    \u003cSwitch\u003e\n      \u003cRoute path={/(en|es|fr)/} component={Lang} /\u003e\n    \u003c/Switch\u003e\n  );\n}\n\nfunction Lang({ params }) {\n  let lang = params[0];\n  let translations = I81n[lang];\n  // ...\n}\n```\n这些字符串都是静态写入的路径，在v6中，完全可以用三个`Route`代替，如果有很多要匹配的，放在数组里来个遍历就行：\n```jsx\n// v6-lang-route.js\nfunction App() {\n  return (\n    \u003cRoutes\u003e\n      \u003cRoute path=\"en\" element={\u003cLang lang=\"en\" /\u003e} /\u003e\n      \u003cRoute path=\"es\" element={\u003cLang lang=\"es\" /\u003e} /\u003e\n      \u003cRoute path=\"fr\" element={\u003cLang lang=\"fr\" /\u003e} /\u003e\n    \u003c/Routes\u003e\n  );\n}\n\nfunction Lang({ lang }) {\n  let translations = I81n[lang];\n  // ...\n}\n```\n\n2. 校验参数（比如是不是number类型）\n\n举例（v5）：\n```jsx\n// v5-userId-route.js\nfunction App() {\n  return (\n    \u003cSwitch\u003e\n      \u003cRoute path={/users/(\\d+)/} component={User} /\u003e\n    \u003c/Switch\u003e\n  );\n}\n\nfunction User({ params }) {\n  let id = params[0];\n  // ...\n}\n```\n在v6中需要做一点微量的工作来实现这种校验：\n```jsx\n// v6-userId-route.js\nfunction App() {\n  return (\n    \u003cRoutes\u003e\n      \u003cRoute path=\"/users/:id\" element={\u003cValidateUser /\u003e} /\u003e\n      \u003cRoute path=\"/users/*\" element={\u003cNotFound /\u003e} /\u003e\n    \u003c/Routes\u003e\n  );\n}\n\nfunction ValidateUser() {\n  let params = useParams();\n  let userId = params.id.match(/\\d+/);\n  if (!userId) {\n    return \u003cNotFound /\u003e;\n  }\n  return \u003cUser id={params.userId} /\u003e;\n}\n\nfunction User(props) {\n  let id = props.id;\n  // ...\n}\n```\n\n在v5中，如果正则路由不能匹配任何一个URL时，`\u003cSwitch\u003e`会尝试匹配接下来的路由：\n```jsx\n// v5-switch.js\nfunction App() {\n  return (\n    \u003cSwitch\u003e\n      \u003cRoute path={/users/(\\d+)/} component={User} /\u003e\n      \u003cRoute path=\"/users/new\" exact component={NewUser} /\u003e\n      \u003cRoute\n        path=\"/users/inactive\"\n        exact\n        component={InactiveUsers}\n      /\u003e\n      // 'users/abc' 会匹配到这里\n      \u003cRoute path=\"/users/*\" component={NotFound} /\u003e\n    \u003c/Switch\u003e\n  );\n}\n```\n\n在v6中就不用担心这种问题，在下边的例子中，由于v6的精确匹配机制，`:userId`会优先被匹配掉，校验的工作是在匹配到之后在子组件内进行的，而不是通过校验来匹配。\n```jsx\n// v6-ranked.js\nfunction App() {\n  return (\n    \u003cRoutes\u003e\n      // '/users/123', '/users/abc' 都会匹配到\n      \u003cRoute path=\"/users/:id\" element={\u003cValidateUser /\u003e} /\u003e\n      // '/users/new' 才能匹配到\n      \u003cRoute path=\"/users/new\" element={\u003cNewUser /\u003e} /\u003e\n      \u003cRoute\n        path=\"/users/inactive\"\n        element={\u003cInactiveUsers /\u003e}\n      /\u003e\n    \u003c/Routes\u003e\n  );\n}\n```\n\n事实上， 如果使用者没有按照正确的顺序布局自己的路由时，v5中确实会存在路由优先级错乱的问题。v6引入了精准匹配解决了这个问题。\n\n\u003chr /\u003e\n\n如果你是用的是`Remix`，在路由没有匹配到时，你可以返回带`40x`状态码的Loader，由于Loader运行在服务端，所以这将会减少前端代码打包的体积：\n```jsx\n// remix-useLoaderData.js\nimport { useLoaderData } from \"remix\";\n\nexport async function loader({ params }) {\n  if (!params.id.match(/\\d+/)) {\n    throw new Response(\"\", { status: 400 });\n  }\n\n  let user = await fakeDb.user.find({\n    where: { id: params.id },\n  });\n  if (!user) {\n    throw new Response(\"\", { status: 404 });\n  }\n\n  return user;\n}\n\nfunction User() {\n  let user = useLoaderData();\n  // ...\n}\n```\n\n不同于直接渲染组件，remix会渲染最近的[catch boundary](https://remix.run/docs/en/v1/api/conventions#catchboundary)。\n\n\u003chr /\u003e\n\nFAQs finished !"])</script><script>self.__next_f.push([1,"4c:T36b8,"])</script><script>self.__next_f.push([1,"\u003e 专栏说明：对于react-router v6版本，有同事反应缺少相对完整的中文文档，查看不方便。为了便于使用，作者对[官网文档](https://reactrouter.com/docs/en/v6)进行针对性翻译，便于v6版本更广泛的被使用。\n\n## 1. 安装\n\n\n本文档介绍使用基于React框架的不同构建工具来配置React Router的一般方案。\n\n### 基础安装\n\n\u003e 原文路径 https://reactrouter.com/docs/en/v6/getting-started/installation#basic-installation\n\n大多数React工程项目都使用包管理器[npm](https://www.npmjs.com/) 或者 [Yarn](https://yarnpkg.com/)进行依赖管理。使用React Router前的第一件事情，就是基于你的包管理工具进行React Router的安装。\n\n1. npm\n\n```sh\n$ npm install react-router-dom@6\n```\n2. yarn\n\n```sh\n$ yarn add react-router-dom@6\n```\n3. pnpm\n\n```sh\n$ pnpm add react-router-dom@6\n```\n\n### 基于Create-react-app项目的安装\n\n\u003e 原文路径 https://reactrouter.com/docs/en/v6/getting-started/installation#create-react-app\n\n当你在cra项目中安装好依赖后，打开文件`src/index.js`， 从 `react-router-dom` 引入 `BrowserRouter`， 并使用标签`\u003cBrowserRouter\u003e`包裹文件:\n\n\n```jsx\nimport * as React from \"react\";\nimport ReactDOM from \"react-dom/client\";\nimport { BrowserRouter } from \"react-router-dom\";\nimport \"./index.css\";\nimport App from \"./App\";\nimport reportWebVitals from \"./reportWebVitals\";\n\nconst root = ReactDOM.createRoot(\n  document.getElementById(\"root\")\n);\nroot.render(\n  \u003cReact.StrictMode\u003e\n    \u003cBrowserRouter\u003e\n      \u003cApp /\u003e\n    \u003c/BrowserRouter\u003e\n  \u003c/React.StrictMode\u003e\n);\n```\n\n接下来你就可以在app中任意地方使用路由了：\n\n```jsx\nimport * as React from \"react\";\nimport { Routes, Route, Link } from \"react-router-dom\";\nimport \"./App.css\";\n\nfunction App() {\n  return (\n    \u003cdiv className=\"App\"\u003e\n      \u003ch1\u003eWelcome to React Router!\u003c/h1\u003e\n      \u003cRoutes\u003e\n        \u003cRoute path=\"/\" element={\u003cHome /\u003e} /\u003e\n        \u003cRoute path=\"about\" element={\u003cAbout /\u003e} /\u003e\n      \u003c/Routes\u003e\n    \u003c/div\u003e\n  );\n}\n```\n上述文件中，Home和About是自定义的路由组件，通过import引入。\n\n### 基于Parcel项目的安装\n\n在package.json中添加脚本：\n\n```json\n\"scripts\": {\n  \"start\": \"parcel index.html\"\n}\n```\n\n安装完依赖后，在根目录下新建文件`.babelrc`:\n```js\n{\n  \"presets\": [\"@babel/preset-react\"]\n}\n```\n\n然后在根目录的`index.js`文件中即可使用：\n```jsx\nimport * as React from \"react\";\nimport ReactDOM from \"react-dom/client\";\nimport { BrowserRouter } from \"react-router-dom\";\nimport App from \"./App.js\";\n\nconst root = ReactDOM.createRoot(\n  document.getElementById(\"root\")\n);\nroot.render(\n  \u003cReact.StrictMode\u003e\n    \u003cBrowserRouter\u003e\n      \u003cApp /\u003e\n    \u003c/BrowserRouter\u003e\n  \u003c/React.StrictMode\u003e\n);\n```\n写入文件`index.html`：\n```html\n\u003cbody\u003e\n  \u003cnoscript\n    \u003eYou need to enable JavaScript to run this\n    app.\n  \u003c/noscript\u003e\n  \u003cdiv id=\"root\"\u003e\u003c/div\u003e\n  \u003cscript src=\"./index.js\"\u003e\u003c/script\u003e\n\u003c/body\u003e\n```\n接下来就可以在App组价中使用router了，使用方式同cra项目。\n\n### 基于Webpack项目的安装\n\n\u003e 原文路径 https://reactrouter.com/docs/en/v6/getting-started/installation#webpack\n\nwebpack是一种更细粒度的构建工具，您可以进行更加细微的配置。安装完必要的依赖后，便可以引入路由了：\n```jsx\nimport {\n  BrowserRouter,\n  Routes,\n  Route,\n} from \"react-router-dom\";\n\nfunction App() {\n  return (\n    \u003cBrowserRouter\u003e\n      \u003cdiv\u003e\n        \u003ch1\u003eHello, React Router!\u003c/h1\u003e\n        \u003cRoutes\u003e\n          \u003cRoute path=\"/\" element={\u003cHome /\u003e} /\u003e\n        \u003c/Routes\u003e\n      \u003c/div\u003e\n    \u003c/BrowserRouter\u003e\n  );\n}\n```\n\n### 使用script标签全局安装\n\n\u003e 原文路径 https://reactrouter.com/docs/en/v6/getting-started/installation#html-script-tags\n\nReact-router v6与React16.8+完全兼容。您完全可以在一个HTML中通过`\u003cscript\u003e`引入对应的js文件进行全局使用：（我这里删掉了原文的注释）\n```html\n\u003cbody\u003e\n  \u003cdiv id=\"root\"\u003e\u003c/div\u003e\n\n  \u003cscript src=\"https://unpkg.com/react@\u003e=16.8/umd/react.development.js\" crossorigin\u003e\u003c/script\u003e\n  \u003cscript src=\"https://unpkg.com/react-dom@\u003e=16.8/umd/react-dom.development.js\" crossorigin\u003e\u003c/script\u003e\n\n  \u003c!-- Load history --\u003e\n  \u003cscript src=\"https://unpkg.com/history@5/umd/history.development.js\" crossorigin\u003e\u003c/script\u003e\n\n  \u003c!-- Load React Router and React Router DOM --\u003e\n  \u003cscript src=\"https://unpkg.com/react-router@6/umd/react-router.development.js\" crossorigin\u003e\u003c/script\u003e\n  \u003cscript src=\"https://unpkg.com/react-router-dom@6/umd/react-router-dom.development.js\" crossorigin\u003e\u003c/script\u003e\n\n  \u003c!-- A simple example app --\u003e\n  \u003cscript\u003e\n  var e = React.createElement;\n  var Router = ReactRouterDOM.BrowserRouter;\n  var Routes = ReactRouterDOM.Routes;\n  var Route = ReactRouterDOM.Route;\n\n  ReactDOM.render(\n    (\n      e(Router, null, (\n        e(Routes, null, (\n          e(Route, {\n            element: e('div', null, 'Hello, React Router!')\n          })\n        ))\n      ))\n    ),\n    document.getElementById('root')\n  );\n  \u003c/script\u003e\n\n\u003c/body\u003e\n```\n虽然这种方法来得比较快，但是也引入了一些不必要的代码引用。React Router包含了很多小工具和组件，按需引入才是王道。所以还是推荐前三种安装方式。\n\n\n## 2. 快速开始（有一些与安装重复）\n\n\u003e 原文地址 https://reactrouter.com/docs/en/v6/getting-started/overview#quick-start-overview\n\n### 引入 \n\n安装依赖，前边已经提到：\n\n```js\nnpm install react-router-dom@6\n```\n\n配置路由\n```jsx\nimport ReactDOM from \"react-dom/client\";\nimport {\n  BrowserRouter,\n  Routes,\n  Route,\n} from \"react-router-dom\";\n// import your route components too\n\nconst root = ReactDOM.createRoot(\n  document.getElementById(\"root\")\n);\nroot.render(\n  \u003cBrowserRouter\u003e\n    \u003cRoutes\u003e\n      \u003cRoute path=\"/\" element={\u003cApp /\u003e}\u003e\n        \u003cRoute index element={\u003cHome /\u003e} /\u003e\n        \u003cRoute path=\"teams\" element={\u003cTeams /\u003e}\u003e\n          \u003cRoute path=\":teamId\" element={\u003cTeam /\u003e} /\u003e\n          \u003cRoute path=\"new\" element={\u003cNewTeamForm /\u003e} /\u003e\n          \u003cRoute index element={\u003cLeagueStandings /\u003e} /\u003e\n        \u003c/Route\u003e\n      \u003c/Route\u003e\n    \u003c/Routes\u003e\n  \u003c/BrowserRouter\u003e\n);\n```\n在v6之前的版本，有多路由要匹配时，需要合理安排前后放置顺序。在v6中，匹配更智能，不要在担心顺序问题了，举个例子：\n```jsx\n\u003cRoute path=\"teams/:teamId\" element={\u003cTeam /\u003e} /\u003e\n\u003cRoute path=\"teams/new\" element={\u003cNewTeamForm /\u003e} /\u003e\n```\n路由`teams/new`似乎对于上边两个路径都可以匹配，但是第二个更精确，所以v6 router会选择第二个NewTeamForm。\n\n### 路由跳转\n\n可使用`Link`标签来点击改变URL，或者使用`useNavigate`钩子通过代码跳转。\n\n- Link\n```jsx\nimport { Link } from \"react-router-dom\";\n\nfunction Home() {\n  return (\n    \u003cdiv\u003e\n      \u003ch1\u003eHome\u003c/h1\u003e\n      \u003cnav\u003e\n        \u003cLink to=\"/\"\u003eHome\u003c/Link\u003e |{\" \"}\n        \u003cLink to=\"about\"\u003eAbout\u003c/Link\u003e\n      \u003c/nav\u003e\n    \u003c/div\u003e\n  );\n}\n```\n\n- navigate\n```jsx\nimport { useNavigate } from \"react-router-dom\";\n\nfunction Invoices() {\n  let navigate = useNavigate();\n  return (\n    \u003cdiv\u003e\n      \u003cNewInvoiceForm\n        onSubmit={async (event) =\u003e {\n          let newInvoice = await createInvoice(\n            event.target\n          );\n          navigate(`/invoices/${newInvoice.id}`);\n        }}\n      /\u003e\n    \u003c/div\u003e\n  );\n}\n```\n\n### 获取路由参数\n\n可以使用 `:style` 形式传参， 使用 `useParams()` 获取参数：\n```jsx\nimport { Routes, Route, useParams } from \"react-router-dom\";\n\nfunction App() {\n  return (\n    \u003cRoutes\u003e\n      \u003cRoute\n        path=\"invoices/:invoiceId\"\n        element={\u003cInvoice /\u003e}\n      /\u003e\n    \u003c/Routes\u003e\n  );\n}\n\nfunction Invoice() {\n  let params = useParams();\n  return \u003ch1\u003eInvoice {params.invoiceId}\u003c/h1\u003e;\n}\n```\n举一个通过路由参数获取异步数据的例子：\n```jsx\nfunction Invoice() {\n  let { invoiceId } = useParams();\n  // useFakeFetch可以理解为一个异步请求\n  let invoice = useFakeFetch(`/api/invoices/${invoiceId}`);\n  return invoice ? (\n    \u003cdiv\u003e\n      \u003ch1\u003e{invoice.customerName}\u003c/h1\u003e\n    \u003c/div\u003e\n  ) : (\n    \u003cLoading /\u003e\n  );\n}\n```\n\n---\n\u003e 2023.3.9 补充：这里顺便补充一下获取问号传参的方式，方便查询\n\n### 问号传参获取\n\n#### v6 中\n\n```jsx\n// 引入\nimport { useSearchParams } from 'react-router-dom';\n...\n\n// 获取\nconst [searchParams] = useSearchParams();\n// 使用\nconst currentType = searchParams.get('type');\n```\n\n#### v5中\n\nv5 版本没有这个hook，需要自己定义一下：\n\n```jsx\n// useSearchParams.js\nimport { useLocation } from \"react-router-dom\";\nimport { useMemo } from \"react\";\n\n/**\n * 获取当前页面的查询参数\n */\nexport default function useSearchParams() {\n  const { search } = useLocation();\n  return useMemo(() =\u003e {\n    const urlSearchParams = new URLSearchParams(search);\n    let params = {};\n    urlSearchParams.forEach((value, key) =\u003e {\n      params[key] = value;\n    });\n    return params;\n  }, [search]);\n}\n```\n\n使用：\n\n```jsx\nconst searchParams = useSearchParams();\n\nconsole.log(searchParams.type)\n```\n\n---\n\n\n### 路由嵌套\n\n路由嵌套是一个很强大的功能，可以减少冗杂的布局代码，降低布局的难度。如下使用：\n```jsx\nfunction App() {\n  return (\n    \u003cRoutes\u003e\n      \u003cRoute path=\"invoices\" element={\u003cInvoices /\u003e}\u003e\n        \u003cRoute path=\":invoiceId\" element={\u003cInvoice /\u003e} /\u003e\n        \u003cRoute path=\"sent\" element={\u003cSentInvoices /\u003e} /\u003e\n      \u003c/Route\u003e\n    \u003c/Routes\u003e\n  );\n}\n```\n分别通过如下三种路径匹配：\n-   `\"/invoices\"`\n-   `\"/invoices/123\"`\n-   `\"/invoices/sent\"`\n\n### Outlet\n\n可以使用一个路由占位符，针对多匹配的路由位置进行复用，类似于vue router的路由插槽和Angular的`router-outlet`：\n```jsx\nimport {\n  Routes,\n  Route,\n  Link,\n  Outlet,\n} from \"react-router-dom\";\n\nfunction App() {\n  return (\n    \u003cRoutes\u003e\n      \u003cRoute path=\"/\" element={\u003cLayout /\u003e}\u003e\n        \u003cRoute path=\"invoices\" element={\u003cInvoices /\u003e} /\u003e\n        \u003cRoute path=\"dashboard\" element={\u003cDashboard /\u003e} /\u003e\n      \u003c/Route\u003e\n    \u003c/Routes\u003e\n  );\n}\n\nfunction Layout() {\n  return (\n    \u003cdiv\u003e\n      \u003ch1\u003eWelcome to the app!\u003c/h1\u003e\n      \u003cnav\u003e\n        \u003cLink to=\"invoices\"\u003eInvoices\u003c/Link\u003e | {\" \"}\n        \u003cLink to=\"dashboard\"\u003eDashboard\u003c/Link\u003e\n      \u003c/nav\u003e\n      \u003cdiv className=\"content\"\u003e\n        \u003cOutlet /\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n  );\n}\n\nfunction Invoices() {\n  return \u003ch1\u003eInvoices\u003c/h1\u003e;\n}\n\nfunction Dashboard() {\n  return \u003ch1\u003eDashboard\u003c/h1\u003e;\n}\n```\n这样会把URL片段构建为组件树，路由下的子路由会动态的去替换掉父路由的`\u003cOutlet /\u003e`，以此达到嵌套的目的。\n\n### 默认路由\n\n当一个父路由有多个子路由，且当前URL停留在父路由时（上个例子中，路由为'/'时，outlet里就无法识别渲染），界面该如何渲染呢？你需要给父路由设置一个默认渲染的子路由。\n```jsx\nfunction App() {\n  return (\n    \u003cRoutes\u003e\n      \u003cRoute path=\"/\" element={\u003cLayout /\u003e}\u003e\n        \u003cRoute index element={\u003cActivity /\u003e} /\u003e\n        \u003cRoute path=\"invoices\" element={\u003cInvoices /\u003e} /\u003e\n        \u003cRoute path=\"activity\" element={\u003cActivity /\u003e} /\u003e\n      \u003c/Route\u003e\n    \u003c/Routes\u003e\n  );\n}\n```\n加上`index`属性后就会默认渲染该路由下的组件。而且默认索引路由可以放在路由嵌套的任何一级中使用。\n\n### 嵌套路由中使用Link\n\n```jsx\n...\n// \u003cDashboard /\u003e\n\u003cnav\u003e\n    \u003cLink to=\"invoices\"\u003eInvoices\u003c/Link\u003e{\" \"}\n    \u003cLink to=\"team\"\u003eTeam\u003c/Link\u003e\n\u003c/nav\u003e\n\n...\n\u003cRoutes\u003e\n    \u003cRoute path=\"/\" element={\u003cHome /\u003e} /\u003e\n    \u003cRoute path=\"dashboard\" element={\u003cDashboard /\u003e}\u003e\n        \u003cRoute path=\"invoices\" element={\u003cInvoices /\u003e} /\u003e\n        \u003cRoute path=\"team\" element={\u003cTeam /\u003e} /\u003e\n    \u003c/Route\u003e\n\u003c/Routes\u003e\n\n```\n在这种情况下，上述两个Link会连接到`/dashboard/invoices` 和 `/dashboard/team`两个地址，这就是相对路由。\n\n### 404路由\n\n当没有一个URL匹配时，就会查找是否配置了通用路由`path=\"*\"`，他可以匹配任何形式的路由，当没有更精确的路由匹配时，就进入该路由的配置，该路由的优先级是最低的。\n\n```jsx\nfunction App() {\n  return (\n    \u003cRoutes\u003e\n      \u003cRoute path=\"/\" element={\u003cHome /\u003e} /\u003e\n      \u003cRoute path=\"dashboard\" element={\u003cDashboard /\u003e} /\u003e\n      \u003cRoute path=\"*\" element={\u003cNotFound /\u003e} /\u003e\n    \u003c/Routes\u003e\n  );\n}\n```\n\n### 多个路由组\n\n一个`Routes`组件包裹的路由为一组，v6中你可以使用多个`Routes`。每一个`\u003cRoutes\u003e`都是独立的，分别进行路由匹配，其都是相对于跟路由的一个链接。\n```jsx\nfunction App() {\n  return (\n    \u003cdiv\u003e\n      \u003cSidebar\u003e\n        \u003cRoutes\u003e\n          \u003cRoute path=\"/\" element={\u003cMainNav /\u003e} /\u003e\n          \u003cRoute\n            path=\"dashboard\"\n            element={\u003cDashboardNav /\u003e}\n          /\u003e\n        \u003c/Routes\u003e\n      \u003c/Sidebar\u003e\n\n      \u003cMainContent\u003e\n        \u003cRoutes\u003e\n          \u003cRoute path=\"/\" element={\u003cHome /\u003e}\u003e\n            \u003cRoute path=\"about\" element={\u003cAbout /\u003e} /\u003e\n            \u003cRoute path=\"support\" element={\u003cSupport /\u003e} /\u003e\n          \u003c/Route\u003e\n          \u003cRoute path=\"dashboard\" element={\u003cDashboard /\u003e}\u003e\n            \u003cRoute path=\"invoices\" element={\u003cInvoices /\u003e} /\u003e\n            \u003cRoute path=\"team\" element={\u003cTeam /\u003e} /\u003e\n          \u003c/Route\u003e\n          \u003cRoute path=\"*\" element={\u003cNotFound /\u003e} /\u003e\n        \u003c/Routes\u003e\n      \u003c/MainContent\u003e\n    \u003c/div\u003e\n  );\n}\n```\n\n### 多级Routes时注意事项\n\n当子组件也使用了`Routes`时，需要在其上一级父路由后边追加`/*`，追加的`*`的层级数取决于你子路由的层级数。\n```jsx\nfunction App() {\n  return (\n    \u003cRoutes\u003e\n      \u003cRoute path=\"/\" element={\u003cHome /\u003e} /\u003e\n      // 不加*会匹配不到Dashboard中的子路由\n      \u003cRoute path=\"dashboard/*\" element={\u003cDashboard /\u003e} /\u003e\n    \u003c/Routes\u003e\n  );\n}\n\nfunction Dashboard() {\n  return (\n    \u003cdiv\u003e\n      \u003cp\u003eLook, more routes!\u003c/p\u003e\n      \u003cRoutes\u003e\n        \u003cRoute path=\"/\" element={\u003cDashboardGraphs /\u003e} /\u003e\n        \u003cRoute path=\"invoices\" element={\u003cInvoiceList /\u003e} /\u003e\n      \u003c/Routes\u003e\n    \u003c/div\u003e\n  );\n}\n```\n\n常用配置介绍完毕了。源文档的[Tutorial](https://reactrouter.com/docs/en/v6/getting-started/tutorial)感觉与本章基本类似，我打算跳过他，下一章讲解FAQs。"])</script><script>self.__next_f.push([1,"4d:T19bb,"])</script><script>self.__next_f.push([1,"## 1. 前言\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;承接上一篇[# 手把手搭建基于React的前端UI库 （三）-- 基础组件Icon和Button](https://juejin.cn/post/7076668781044924453)。我们继续添加组件，本次记录的是布局组件Box和Combine。\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;本文的代码展示的是主要的核心示意代码，全部代码见仓库：[Github仓库](https://github.com/heiheihoho1213/dux-ui)\n\n\n## 2. Box\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;关于页面布局，最流行的便是flex布局，Box组件便是对flex布局进行的一次封装。废话不多说，上代码。在`src/component`文件夹下新建文件夹`Box`，在其中新建文件`index.tsx`：\n\n```tsx\nexport interface BoxProps {\n  children?: ReactNode;\n  direction?: 'row' | 'row-reverse' | 'column' | 'column-reverse';\n  wrap?: 'nowrap' | 'wrap' | 'wrap-reverse';\n  alignItems?: 'center' | 'flex-start' | 'flex-end' | 'stretch';\n  alignContent?: 'center' | 'flex-start' | 'flex-end' | 'space-between' | 'space-around';\n  justifyContent?:\n    | 'center'\n    | 'flex-start'\n    | 'flex-end'\n    | 'space-between'\n    | 'space-around'\n    | 'stretch';\n  padding?: number | string;\n  width?: string;\n  height?: string;\n  flex?: string;\n}\n\nclass Box extends PureComponent\u003cBoxProps\u003e {\n  render() {\n    const box = \u003cBoxWrap {...this.props} /\u003e;\n\n    return box;\n  }\n}\n\n...\n\n```\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;上边定义了一些接收参数，其与flex的css参数是对应的，我们就每一个具体的参数，在代码里进行实现便可以完成该组件了。接下来实现`BoxWrap`组件：\n\n\n```tsx\nimport styled from '@emotion/styled';\nimport { css } from '@emotion/core';\n\nexport const BoxWrap = styleWrap({\n  className: prefixCls,\n})(\n  styled('div')((props: any) =\u003e {\n      // 要实现的内容\n  }),\n);\n```\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;架子已经搭起来，老样子，仍然使用styleWrap包裹一层公共样式，内部用一个div承接，中间要实现的内容应该返回要使用的css，这边是核心内容：\n\n\n```tsx\n...\nconst {\n    children,\n    direction,\n    wrap,\n    justifyContent,\n    alignItems,\n    alignContent,\n    span,\n    flex,\n    width,\n    height,\n    padding,\n} = props;\n\n...\n\nreturn css`\n    box-sizing: border-box;\n    \n    // direction\n    ${direction != null \u0026\u0026\n      css`\n        flex-direction: ${direction};\n      `}\n\n    // wrap\n    ${wrap != null \u0026\u0026\n      css`\n        flex-wrap: ${wrap};\n      `}\n      \n    // justifyContent\n    ${justifyContent != null \u0026\u0026\n      css`\n        justify-content: ${justifyContent};\n      `}\n      \n    // ...\n`\n```\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;可以看到，只是简单加一个css便可以实现，相当简单。需要解释的是children的属性并没有公开声明，而是传递给`styled`生成的组件后隐式的渲染了。\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;创建完毕后，在组件外便可以这样实现：\n\n\n```tsx\n\u003cBox direction=\"column\" justifyContent=\"center\"\u003e\n    \u003cdiv\u003e1\u003c/div\u003e\n    \u003cdiv\u003e2\u003c/div\u003e\n    \u003cdiv\u003e3\u003c/div\u003e\n\u003c/Box\u003e\n```\n\n## 3. Combine\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;Combine组件用于组合不同的组件，类似Box，仍然是样式为主的组件，是为了布局方便的，对css进行的封装。我们不使用flex，使用一个大div包裹一堆inline-block元素即可。在`src/components`下新建文件夹`Combine`，在文件夹下新建文件`index.tsx`：\n\n\n```tsx\nconst Combine = ({\n  children,\n  sharedProps = {},\n  spacing = 'smart',\n  separator,\n  ...rest\n}: CombineProps) =\u003e {\n  const { size = 'md' } = sharedProps;\n  let isFirstItem: boolean;\n  return (\n    \u003cCombineWrap spacing={spacing} {...rest}\u003e\n        {React.Children.map(children, (child) =\u003e (\n            // 遍历child\n            \u003c\u003e\n                // 放置分隔符\n                {separator \u0026\u0026 !isFirstItem ? \u003cspan className={separatorCls} key=\"separator\"\u003e\n                    {separator}\n                  \u003c/span\u003e : null\n                }\n                // 放置子元素\n                \u003cdiv className={itemCls}\u003e\n                    {React.cloneElement(child)}\n                    ...\n                \u003c/div\u003e\n            \u003c/\u003e\n          )\n        )}\n    \u003c/CombineWrap\u003e\n  )\n}\n```\n上边代码中定义了子元素和分隔符的类：\n\n```tsx\nexport const itemCls = prefixCls + '-item';\nexport const separatorCls = prefixCls + '-separator';\n```\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;组件接收spacing参数来控制相关联组件之间的距离，同时还可以设置separator来作为自定义分隔符。来看一下组件`CombineWrap`的实现：\n\n```tsx\nimport styled from '@emotion/styled';\nimport { css } from '@emotion/core';\n\nexport const CombineWrap = styledWrap\u003c{ spacing: string }\u003e({\n  // 接受自定义class\n  className: prefixCls,\n})(\n  // 生成一个自定义样式包裹的div\n  styled('div')((props) =\u003e {\n    const {\n      spacing,\n      theme: { designTokens: DT },\n    } = props;\n    \n    // spacingMap为designTokens里定义的常量\n    const space = (DT as any)[spacingMap[spacing]];\n\n    return css`\n      display: inline-block;  // inlink使得各个子元素平铺排列\n      vertical-align: middle;\n      \n      // 子元素样式\n      \u003e .${itemCls} { \n        \u0026:focus {\n          z-index: 2;\n        }\n        \u0026:hover {\n          z-index: 3;\n        }\n      }\n      \n      // 子元素下一个兄弟，分隔符下一个子元素，子元素下一个分隔符 统一都加上左边距，这里就是space的用法\n      \u003e .${itemCls}+.${itemCls}, \u003e .${separatorCls}+.${itemCls}, \u003e .${itemCls}+.${separatorCls} {\n        margin-left: ${space};\n      }\n    `;\n  }),\n);\n\n```\n\n关于spacing常量，可以在theme主体中定义常量：\n\n```js\nT_SPACING_COMMON_XS: '4px',\nT_SPACING_COMMON_SM: '8px',\nT_SPACING_COMMON_MD: '12px',\nT_SPACING_COMMON_LG: '16px',\nT_SPACING_COMMON_XLG: '20px',\nT_SPACING_COMMON_XXLG: '24px',\nT_SPACING_COMMON_XXXLG: '32px',\n```\n\n然后我们在项目中使用一下：\n\n```tsx\n\u003cCombine\u003e\n  \u003cButton styleType=\"primary\"\u003e按钮组展示\u003c/Button\u003e\n  \u003cButton\u003e按钮组展示\u003c/Button\u003e\n  \u003cButton\u003e按钮组展示\u003c/Button\u003e\n  \u003cButton disabled\u003e按钮组展示\u003c/Button\u003e\n\u003c/Combine\u003e\n```\n\n\n至此，布局组件`Box`和`Combine`已经介绍完毕~  更多组件参照代码仓库：[Github仓库](https://github.com/heiheihoho1213/dux-ui)\n\n### 参考\n\n[React-components](https://ucloud-fe.github.io/react-components/)\n\n[Antd之Space和Grid](https://ant.design/components/grid-cn/)"])</script><script>self.__next_f.push([1,"4e:T3b59,"])</script><script>self.__next_f.push([1,"## 1. 前言\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;承接上一篇[手把手搭建基于React的前端UI库（二）-- 主题配置](https://juejin.cn/post/7076652936331280421/)。在主题配置之后，我们着手写一些基础组件以及其周边的配置工具。（本期用到的styleWrap的定义可查看上期）\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;本文的代码展示的是主要的核心代码，全部代码见仓库：[Github仓库](https://github.com/heiheihoho1213/dux-ui)\n\n\n## 2. Icon\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;图标的设计是个技术活，需要设计出自己专属的风格，就像上一期一开始讲的那样，Style风格设计是三要素之首。基础组件设计，比如按钮是扁平还是立体，输入框是方角还是圆角，加不加阴影等这些，受项目经理. 产品和交互的影响会多一点，但是大体来说，应与公司同类产品保持一致，至于如何设计，那就是另外的课题了，不在本文的讨论之列。\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;本文中的Icon图标使用字体库来完成，通过CSS无侵入式的在一个元素上加入`before`或者`after`伪类来实现图标显示，这里不是浏览器的字体，也不是客户电脑里安装的字体，也不是图片或其他方式，而且是以文字的方式显示，这样做相对比较简洁，方便修改，更重要的是利于SEO优化。浏览器兼容性比较好的字体库有`WOFF`. `WOFF2`等。字体库兼容性见[官方解释](https://developer.mozilla.org/zh-CN/docs/Web/CSS/@font-face)。字体库有专门的自定义生成工具，例如[fonteditor](http://www.fonteditor.com/)，可以试用30天；至于字体库，你也可以使用第三方开源的字体库，例如[Font Awesome](https://fontawesome.dashgame.com/)。这里作者就使用Font Awesome的woff字体库，我们打开图形创建工具fonteditor来查看这个文件：\n\n![image.png](/img/posts/2022-3-19/2022-3-19-6.png)\n\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;可以看到，每一个Icon都有对应的`Code-points`，这样我们就能通过CSS来配置字体图标了：\n\n```css\n// 上图中玻璃杯\n.glass:before {\n    content: '\\F000';\n}\n```\n设计思路有了，接下来就开始动工！\n\n### Icon.tsx\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;在`src/components`文件夹下，新建文件夹`Icon`，在该文件夹下新建`Icon.tsx`：\n\n```tsx\n// 定义接收参数\nexport interface IconProps {\n    /** 图标类型 */\n    type: string;\n    /** 是否旋转 */\n    spin?: boolean;\n    /** 自定义 icon 类名前缀，使用自定义图标库时使用，默认为 icon\\_\\_ */\n    prefix?: string;\n}\n\n// 图标控件\nconst Icon = ({\n    type,\n    spin,\n    prefix,\n    className,\n    ...rest\n}) =\u003e {\n    const configContext = useContext(ConfigContext);\n    const finalPrefix = useMemo(() =\u003e prefix || configContext.iconDefaultPrefix || 'icon__', [\n        configContext.iconDefaultPrefix,\n        prefix\n    ]);\n    return (\n        \u003cIconWrap\n            className={classnames(prefixCls, `${finalPrefix}${type}`, spin \u0026\u0026 `${prefixCls}-spin`, className)}\n            spin={spin}\n            {...rest}\n        /\u003e\n    );\n};\n\nexport default React.memo(Icon);\n```\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;这里可以看到，我在全局`configContext`定义了默认的图标类名前缀，默认为`icon__`，你也可以自定义，只要和CSS样式对应即可。最后返回的是一个`IconWrap`组件，我们在`Icon`文件夹下新建`style`文件夹来放置样式包裹类，`style`下设置`font`文件夹来安置我们下载的WOFF文件，并在`style`同目录下新建`icon.css`和`index.ts`：\n\nsrc/components/Icon/style/icon.css：\n\n```css\n/* 自定义专属的字体类型 */\n@font-face {\n    font-family: duiicon;\n    /* src: url(./fonts/duiicon.eot?v=1552285261926); */\n    src: url(./fonts/fontawesome-webfont.woff) format('woff');\n    font-weight: 400;\n    font-style: normal;\n}\n\n...\n/* 设置字体对应的类 */\n[class*=' icon__']:before,\n[class^='icon__']:before {\n    display: inline-block;\n}\n.icon__glass:before {\n    content: '\\F000';\n}\n...\n```\n\nsrc/components/Icon/style/index.ts:\n\n```ts\nimport styled from '@emotion/styled';\nimport { css } from '@emotion/core';\n\n// spinMixin是公共的旋转样式，详见全部代码\nconst iconSpinMixin = css`\n    ${spinMixin};\n    line-height: normal;\n`;\n\nexport const IconWrap = styleWrap\u003c{ spin?: boolean }\u003e({})(\n    styled('i')(props =\u003e {\n        const { spin } = props;\n\n        return css`\n            vertical-align: baseline;\n            \u0026\u0026\u0026 {\n                ${spin \u0026\u0026 iconSpinMixin};\n            }\n        `;\n    })\n);\n```\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;从代码中看到，虽然这里面没有用到主题样式的变量，但为了风格统一，这里用`styleWrap`包裹一下，不给输入参数即可，其返回的仍然是一个回调函数，接受一个函数式组件作为参数，这里传递一个i标签：`styled('i')`，参数`props`是组件`IconWrap`接受的参数，如果有spin旋转，那就加上旋转的样式。\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;关于前缀的拼接，我这里说一下：\n\n```js\nclassnames(prefixCls, `${finalPrefix}${type}`, spin \u0026\u0026 `${prefixCls}-spin`, className)\n```\n第一段是公共样式，这里为`dux-ui-icon`，可以理解为来自组件库的标识，也方便用户在使用时批量添加样式；第二段就是我们代码中拼接的`icon__glass`等，用于实际图标显示；第三段是旋转标识；第四段提供了用户自定义class。\n\n现在，代码目录结构如下：\n\n![image.png](/img/posts/2022-3-19/2022-3-19-7.png)\n\n当然别忘了在`src/index`导出：\n\n```ts\nexport { default as Icon } from './components/Icon';\n```\n\n### Icon demo\n\n我们在同目录下的`index.md`中写上demo用例：\n\n```tsx\nimport React from 'react';\n// dumi-dux-ui要与你package.json中的name一致\nimport { Icon } from 'dumi-dux-ui';\nimport Copy from 'copy-to-clipboard';\n\n// demo start\nconst layout = {\n    style: {\n        marginRight: 10\n    }\n};\n\nconst Icons = [\n    'glass',\n];\nconst TypeDemo = () =\u003e (\n    \u003cdiv style={{ display: \"flex\" }}\u003e\n        {Icons.map(item =\u003e (\n            \u003cdiv key={item} style={{ width: '50px', height: '50px', cursor: 'pointer' }} onClick={() =\u003e Copy(item)}\u003e\n                \u003cIcon type={item} {...layout} /\u003e\n            \u003c/div\u003e\n        ))}\n    \u003c/div\u003e\n);\n```\n修改`.umirc.ts`：\n\n```ts\n...\nmenus: {\n    // 需要自定义侧边菜单的路径，没有配置的路径还是会使用自动生成的配置\n    '/components': [\n      {\n        title: '组件',\n        path: '/components',\n        children: [\n          // 菜单子项（可选）\n          'components/Icon/index.md',\n        ],\n      },\n    ],\n  },\n```\n\n然后在根目录下执行：`npm run docs`，打开浏览器，进入localhost:8000/components/icon即可看到：\n\n![image.png](/img/posts/2022-3-19/2022-3-19-8.png)\n\n我们的玻璃杯图标加载出来了！F12查看元素，确实是我们想要的加载方式：\n\n![image.png](/img/posts/2022-3-19/2022-3-19-9.png)\n\n\n\u003e 关于 @emotion中的`styled`和`css`方法，可以避免使用外挂css文件，同时组件传递参数更加方便，当然也可以完全不用styled，如下面代码所示，其效果是等价的。详细使用可以查看[emotion官网](http://emotion.sh/docs)\n\n\n```tsx\nfunction Content(props: any) {\n    // props的属性需要特殊处理，可传递className属性，通过外挂css实现相同的样式\n    ...\n    return \u003ci {...props}\u003e\u003c/i\u003e\n}\n\nexport const IconWrap = styleWrap\u003c{ spin?: boolean }\u003e({})(Content);\n```\n\n---\n\n## 3. Button\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;按钮一般会分类别，不同的类别有不同的颜色，我们分为实心，边框空心和禁用三种模式。下面列一个表格说明所有的button样式：\n\n\n| 类别名称 | 种类名集合 |\n| --- | --- |\n| StyleTypes 种类 | ['primary', 'warning', 'success', 'error', 'border', 'border-gray'] |\n| Sizes 大小 | ['sm', 'md', 'lg'] |\n| Shapes 形状 | ['circle', 'square'] |\n| Shadowed 阴影 | ['true', 'false'] |\n| Loading 加载 | ['true', 'false'] |\n| Disabled 禁用 | ['true', 'false'] |\n| Block 块级显示 | ['true', 'false'] |\n\n我们根据罗列的类型，开始搭建组件！\n\n### 搭建基础\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;我们在`src/components`文件夹下新建文件夹`Button`，在该目录下新建文件`index.tsx`：\n\n\n```tsx\n// 定义接受参数，为表格中罗列属性\nexport interface ButtonProps {\n  /** 按钮类型 */\n  styleType?: 'primary' | 'warning' | 'success' | 'error' | 'border' | 'border-gray';\n  /** 按钮尺寸 */\n  size?: 'sm' | 'md' | 'lg';\n  /** 形状 */\n  shape?: 'circle' | 'square';\n  /** 阴影 */\n  shadowed?: boolean;\n  /** 主题 */\n  // theme?: 'dark';\n  /** 是否加载中 */\n  loading?: boolean;\n  /** 图标 */\n  icon?: string | ReactNode;\n  /** 设置原生的 button 上 type 属性 */\n  type?: string;\n  /** 展示设置为块元素 */\n  block?: boolean;\n}\n```\n同样的，我们使用一个样式类包裹一下原生的button（还是在这个文件）：\n\n```tsx\n...\nrender() {\n    // eslint-disable-next-line @typescript-eslint/no-unused-vars\n    const { loading, icon, children, ...rest } = this.props;\n\n    return (\n      \u003cStyleButton loading={loading} {...rest}\u003e\n        // renderIcon为挂载按钮内图标的函数\n        {this.renderIcon()}\n        {children}\n      \u003c/StyleButton\u003e\n    );\n  }\n```\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;接下来去创建`StyleButton`，与Icon创建一样地，我们在`src/components/Button`文件夹下新建`style`文件夹，在该文件夹下新建`index.tsx`，核心代码在这里：\n\n```tsx\n...\nconst Button = ({\n  loading,\n  styleType,\n  disabled,\n  onClick,\n  block,\n  shadowed,\n  ...rest\n}) =\u003e (\n  \u003cbutton\n    disabled={disabled}\n    onClick={!disabled ? onClick : undefined}\n    {...rest}\n  /\u003e\n);\n\nexport const StyleButton = styleWrap\u003cSButtonProps, HTMLButtonElement\u003e({\n  className: classNameMixin,\n})(styled(Button)(buttonStyleMixin));\n\n```\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;定义一个叫Button的函数式组件，其返回的就是一个原生的button，所以rest参数里你可以传递原生的属性，最后用styleWrap包裹后导出。与Icon不同的是，Button的样式更多，而且还要适配主题。所以这里多了一个类名声明`classNameMixin`和一个样式函数`buttonStyleMixin`.\n\nclassNameMixin：\n```tsx\n// classNameMixin负责添加各种类名，用于唯一识别和开发者进行定制\nconst classNameMixin = ({\n  size,\n  styleType,\n  shape,\n  loading,\n  disabled,\n  checked,\n}) =\u003e\n  classnames(\n    prefixCls,\n    `${prefixCls}-size-${size}`,\n    `${prefixCls}-styletype-${styleType}`,\n    shape \u0026\u0026 `${prefixCls}-${shape}`,\n    loading \u0026\u0026 `${prefixCls}-loading`,\n    disabled \u0026\u0026 `${prefixCls}-disabled`,\n    checked \u0026\u0026 `${prefixCls}-checked`,\n  );\n```\n\nbuttonStyleMixin是一个总开关，用于添加各种样式：\n\n```tsx\n// buttonStyleMixin\nconst buttonStyleMixin = (props) =\u003e {\n  const { theme, loading, shape, checked, block } = props;\n  const { designTokens: DT } = theme;\n  return css`\n    margin: 0;\n    box-sizing: border-box;\n    border-radius: ${DT.T_CORNER_LG};\n    text-align: center;\n    text-decoration: none;\n    cursor: pointer;\n    outline: none;\n    font-size: ${DT.T_TYPO_FONT_SIZE_1};\n    white-space: nowrap;\n    ${inlineBlockWithVerticalMixin};  // 块级\n\n    ${sizeMixin(props)};  // 大小\n    ${styleTypeMixin(props)};  // styleType\n    ${shape \u0026\u0026 shapeMixin(props)}; // 形状\n    ${loading \u0026\u0026 loadingMixin(props)};  // 加载中\n    ${block \u0026\u0026\n    css`\n      width: 100%;\n    `};\n  `;\n};\n```\n接下来分别记录上述各个样式变量：\n\nsizeMixin：\n\n```tsx\n// 通过getHeightBySize拿到主题配置文件中的各个大小\n...\nreturn css`\n    height: ${getHeightBySize(DT, size)};\n    line-height: ${getHeightBySize(DT, size)};\n    padding: 0 ${getPaddingBySize(DT, size)};\n`;\n...\n```\n\nshapeMixin：\n\n```tsx\n...\n// 目前支持圆形和方形\nswitch (shape) {\n    case 'circle':\n      return css`\n        border-radius: 50% !important;\n        padding: 0;\n        overflow: hidden;\n        width: ${getHeightBySize(DT, size)};\n      `;\n    case 'square':\n      return css`\n        padding: 0;\n        overflow: hidden;\n        width: ${getHeightBySize(DT, size)};\n      `;\n    default:\n      return css``;\n}\n```\n\nloadingMixin的设置也一样，使得鼠标不可点击，暗灰色显示即可。\n\nstyleTypeMixin用来通过styleType的不同，对应的设置不同的主题配色， 以primary为例：\n\n```tsx\nconst {\n  // 接受ThemeProvider传递的theme参数\n  theme: { designTokens: DT },\n  styleType,\n  disabled,\n  size,\n  shadowed,\n} = props;\n\n...\nprimary: {\n  background: DT.T_BUTTON_PRIMARY_COLOR_BG_DEFAULT,\n  ':hover,:active': {\n    background: DT.T_BUTTON_PRIMARY_COLOR_BG_HOVER,\n    boxShadow: shadowed ? DT.T_SHADOW_BUTTON_PRIMARY_HOVER : 'none',\n  },\n  color: DT.T_BUTTON_PRIMARY_COLOR_TEXT_DEFAULT,\n  fill: DT.T_BUTTON_PRIMARY_COLOR_TEXT_DEFAULT,\n  border: 'none',\n  boxShadow: shadowed ? DT.T_SHADOW_BUTTON_PRIMARY : 'none',\n  transition: `${transitionProperty} ${transitionFlat}`,\n  ':link,:visited': {\n    color: DT.T_BUTTON_PRIMARY_COLOR_TEXT_DEFAULT,\n  },\n},\n...\n```\n可以看到，当`styleType='primary'时`，设置了其背景色. 文字颜色. 填充色. 渐变. 过渡. 激活时的样式以及被访问后的样式等。\n\n如此，一个简单的Button组件封装装好了，我们只是对样式进行了改动，其本质还是返回了一个原生按钮，原来的事件不影响使用。\n\n### Button demo\n\n我们写个demo测试一下。在`src/components/Button`下新建`index.md`：\n\n```tsx\nimport React from 'react';\n\nimport { Button } from 'dumi-dux-ui';\n\n// demo start\nconst { StyleTypes } = Button;\n\nconst ColorDemo = () =\u003e {\n  return (\n    \u003cdiv\u003e\n      {StyleTypes.map((type) =\u003e (\n        \u003cButton styleType={type} key={type} onClick={() =\u003e console.log('clicked')}\u003e\n          Button\n        \u003c/Button\u003e\n      ))}\n    \u003c/div\u003e\n  );\n};\n// demo end\n\nexport default ColorDemo;\n```\n在`.umirc.ts`中加入：\n\n```js\n...\nmenus: {\n    // 需要自定义侧边菜单的路径，没有配置的路径还是会使用自动生成的配置\n    '/components': [\n      {\n        title: '组件',\n        path: '/components',\n        children: [\n          // 菜单子项（可选）\n          'components/Icon/index.md',\n          'components/Button/index.md',\n        ],\n      },\n    ],\n  },\n```\n\n根目录下执行`npm run docs`， 不出意外的话，在localhost:8000/components/button下可以看到：\n\n![image.png](/img/posts/2022-3-19/2022-3-19-10.png)\nF12测试点击事件：\n\n![image.png](/img/posts/2022-3-19/2022-3-19-11.png)\n\n至此，基础组件Icon和Button的记录就到此结束了。下一期会记录布局组件的搭建，敬请期待~\n\n\n---\n\n参考：\n[antd样式设计](https://ant.design/docs/spec/values-cn) \n[Material UI设计](https://mui.com/zh/components/buttons/)"])</script><script>self.__next_f.push([1,"4f:T2957,"])</script><script>self.__next_f.push([1,"## 1. 前言\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;承接上一篇[手把手搭建基于React的前端UI库 （一）-- 项目初始化](https://juejin.cn/post/7074915729601986567)，如果没有看过项目搭建的，可以点击前边的链接。在dumi项目搭建完毕后，我们着手写一下全局主题配置。\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;本文的代码展示的是主要的核心代码，全部代码见仓库：[Github仓库](https://github.com/heiheihoho1213/dux-ui)\n\n## 2. UI库三要素\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;在决定要写核心组件之前，首先要确定这么几个注意事项：\n\n- `1. Style风格`\n- `2. 适配性`\n- `3. 内容适应性`\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;`Style风格`可以包含组件库的色彩设计，视觉风格设计，字体，动画效果，主题皮肤和一些基础样式的设计等；`适配性`则表示要考虑组件库要运行在什么平台，是PC端还是移动端，或者是兼容其他平台等；`内容适应性`指的是组件包含的功能范围，文案友好度，是否考虑国际化，对开发者是否友好等问题。这些设计风格仁者见仁，在之后的文章中会陆续记录我是如何设计的。\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;基于上述原则，我们可以先从主题色彩入手。\n\n\u003chr /\u003e\n\n## 3. ThemeProvider\n\nTheme和样式自然是属于全局的，我们用一个`provider`来承接。\n\n### ThemeProvider.tsx\n\n在`src/components`下新建一个文件夹`ThemeProvider`，在该文件夹下新建一个文件`ThemeProvider.tsx`：\n\n```tsx\nclass ThemeProvider extends Component {\n    ...\n}\n```\n\n\n在`src/components/ThemeProvider/ThemeProvider.tsx`中添加props，其中的theme表示当前的主题：\n\n```tsx\nstatic propTypes = {\n    /**\n     * 自定义主题\n     */\n    theme: PropTypes.object.isRequired\n};\n```\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;接下来安装一个第三方依赖`emotion-theming`来提供主题化的解决方案，详细配置可查看其[主页](https://emotion.sh/docs/theming#themeprovider-reactcomponenttype)，就当做是一个全局的`context`来管理状态吧。执行指令：\n```sh\nnpm i --save emotion emotion-theming @emotion/core @emotion/styled\n```\n\n然后定义构造器和渲染函数：\n```tsx\nimport React, { Component } from 'react';\nimport _ from 'lodash';\nimport PropTypes from 'prop-types';\nimport { ThemeProvider as EThemeProvider } from 'emotion-theming';\n\nconstructor(props: any) {\n    super(props);\n    const theme = props.theme;\n \n    this.state = {\n        theme\n    };\n}\n...\nrender() {\n    // eslint-disable-next-line no-unused-vars\n    const { theme: _theme, ...rest } = this.props as any;\n    const { theme } = this.state;\n    return \u003cEThemeProvider theme={theme} {...rest} /\u003e;\n}\n```\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;留心的朋友可能会注意到，我这里的state中的theme是写在构造器中的，在挂载的时候只执行一次，如果用户想要切换主题，必然会通过`props`传递新的theme值，我们这里检测props变化：\n\n```tsx\n...\ncomponentWillReceiveProps(nextProps: any) {\n    const { theme } = nextProps;\n    if (JSON.stringify(theme) !== this.cache) {\n        const mergedTheme = this.getMergedTheme(theme);\n        this.cache = JSON.stringify(theme);\n        this.setState(\n            {\n                theme: mergedTheme\n            },\n        );\n    }\n}\n\ngetMergedTheme = (theme: string) =\u003e {\n    return generateTheme(theme);\n};\n```\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;可以看到，加了一个本地的缓存`cache`来避免重复变更。其中`generateTheme`是我写的一个增强方法，用于处理前后两个主题对比更新，并加入了一些常用样式，比如`fontSize`等，如果你觉得没必要，那么你直接设置拿到的theme就行了。\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;至此，一个提供主题的provider就写好了，现在来给他增加灵魂：配色。这里我写了两种配色（你也可以自己设计，如果你具备设计师的美学素养和专业知识的话）：`Black`和`White`。\n\n### designTokens.ts\n\n我们在`ThemeProvider.tsx`同目录新建文件`designTokens.ts`来放置默认主题配色：\n\n\n```ts\n/** 默认的主题配色 */\nconst designTokens = {\n    ...\n};\n\nexport { designTokens };\n```\n具体的配色变量应全大写，以T开头，仅包含字母. 数字. 下划线，由于变量太多，这里给出一部分：\n\n背景色：\n\n![image.png](/img/posts/2022-3-19/2022-3-19-1.png)\n\n多彩色：\n\n![image.png](/img/posts/2022-3-19/2022-3-19-2.png)\n\n\n渐变色池：\n\n![image.png](/img/posts/2022-3-19/2022-3-19-3.png)\n\n\n常用尺寸：\n\n![image.png](/img/posts/2022-3-19/2022-3-19-4.png)\n\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;同理，在相同的目录下，新建文件`dark.ts`, 放入相同的变量，但是色号应该是暗色调的配色，亮色调下的亮色，在暗色调下应该是暗色。比如渐变色池应该是下面这样：\n\n![image.png](/img/posts/2022-3-19/2022-3-19-5.png)\n\n\n这些配色方案，网上也能找到类似的，选择自己喜欢的就行了。\n\n有了这些颜色池，我们写一个方法来获取当前的`designTokens`，还是在同目录下，新建文件`useDesignTokens.ts`：\n\n\n```tsx\nimport { useTheme } from 'emotion-theming';\n\n// ../../style中写了几个辅助的样式，对解释原理没有影响，想看全部代码可以去项目仓库查看\nimport { defaultTheme, Theme } from '../../style';\n\nconst useDesignTokens = () =\u003e {\n  // 拿到Themeprovider的theme\n  const theme = useTheme\u003cTheme\u003e();\n  if (!Object.keys(theme).length) return defaultTheme.designTokens;\n  return theme.designTokens;\n};\n\nexport default useDesignTokens;\n\n```\n这样，就可以在任何一个地方，通过useDesignTokens拿到当前的主题配色了。\n\n## 4. 反思\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;再回到`ThemeProvider`本身进行思考，总觉得少了点什么。是不是显得功能有点单薄，传值只能传递theme，不够灵活。整个组件库项目要维护的公共变量应该不会只有主题，后来可能还会有国际化什么的，所以，是不是要写一个更通用的Provider来统一处理？\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;我们在`src/components`文件夹下，创建一个新的文件夹`ConfigProvider`，在新创建的文件夹下创建文件`ConfigProvider.tsx`，写上如下代码：\n\n```tsx\nimport React, { ReactNode, createContext } from 'react';\n\nimport ThemeProvider from '../ThemeProvider';\n\nexport interface ConfigProviderProps {\n  /** @ignore */\n  children: ReactNode;\n\n  /** 提供时会使用 ThemeProvider 包裹 */\n  theme?: any;\n}\n\nconst ConfigProvider = ({ children, theme, ...rest }: ConfigProviderProps) =\u003e {\n\n  const defaultConfig = {};\n  const ConfigContext = createContext\u003cany\u003e(defaultConfig);\n\n  let provider = (\n    \u003cConfigContext.Provider value={{ ...defaultConfig, ...rest }}\u003e\n      {children}\n    \u003c/ConfigContext.Provider\u003e\n  );\n  if (theme) provider = \u003cThemeProvider theme={theme}\u003e{provider}\u003c/ThemeProvider\u003e;\n\n  // 下边可以追加其他情况的Provider ...\n\n  return provider;\n};\n\nexport { ThemeProvider };\nexport default ConfigProvider;\n```\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;这里，我们使用`createContext`来创建一个context放置全局变量，使用`ConfigContext.Provider`作为基础全局参数，通过拿到的不同参数来动态叠加转换为其他不同的`Provider`。当然，context可以自己再单写一个文件来存储，这里就不赘述了。\n\n## 5. 如何使用\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;为了能够在组件中使用的内置主题色，需要将配置对外暴露出来，在`src/index.ts`文件中删除上一期导入的Foo组件：\n\n\u003cdel\u003e`export { default as Foo } from './components/Foo';`\u003c/del\u003e\n\n然后加入如下代码：\n\n```ts\nexport { default as ThemeDark } from './components/ThemeProvider/dark';\nexport { designTokens as ThemeDefault } from './components/ThemeProvider/designTokens';\nexport {\n  default as ConfigProvider,\n  ThemeProvider,\n} from './components/ConfigProvider/ConfigProvider';\n```\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0

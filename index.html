026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;主题配置有了，接下来要怎么用呢？用这个Provider把全局App组件包裹一下吗？如果有个别组件想要定制样式呢？似乎不够灵活，作者认为应该封装一个工具类，在需要配置主题色的组加上使用即可。在`src`目录下新建`style`文件夹用来放置公共的样式配置，在该文件夹下新增文件`styleWrap.tsx`：\n\n```tsx\n// 引入依赖\nimport React, { FC, useMemo } from 'react';\nimport { useTheme } from 'emotion-theming';\nimport defaultTheme from '../components/ThemeProvider/theme';\n\n...\n\n// 新建一个函数\nconst styleWrap = () =\u003e {\n    ...\n    return Com =\u003e {\n        const WithThemeComponent = (props) =\u003e {\n\n            ...\n\n            const theme = useTheme();\n\n            const memoTheme = useMemo(\n                () =\u003e (!theme || !Object.keys(theme)?.length ? defaultTheme : theme),\n                [theme],\n            );\n\n            const result = {\n                ...props,\n                theme: memoTheme,\n            };\n            ...\n\n            const Com = Comp as unknown as FC;\n            // result中带有theme主题参数，在基础业务组件中应接受并处理\n            return \u003cCom {...result} /\u003e;\n        } \n\n        return WithThemeComponent;\n    }\n}\n\n```\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;可以看到，styleWrap返回的是一个高阶组件WithThemeComponent，在该组件里获取当前主题并使用`useMemo`节省渲染开销，将结果收集到`result`里作为属性传递给基础业务组件`Com`.\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;接下来记录一下`ThemeProvider`在组件中的使用方式：\n\n\n```tsx\n...\n// 1. 引入一种字体\nconst [theme, setTheme] = useState(ThemeDark);\n...\n\n// 2. 使用\n\u003cConfigProvider theme={theme}\u003e\n    // 放置被styleWrap包裹的业务组件\n    ...\n\u003c/ConfigProvider\u003e\n\n// 3. 切换主题\nsetTheme(designTokens);\n```\n\n\n\u003chr /\u003e\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;本期主题配置的记录到这里就结束了，下一期讲解基础组件`Button`和`Icon`的设计，同时会将主题色应用在这些组件上，为了能够更好地理解基础组件如何处理传入的theme参数，下一期会和本期一起发布，敬请期待~~"])</script><script>self.__next_f.push([1,"50:T14b2,"])</script><script>self.__next_f.push([1,"## 1. 前言\n\n### 写作背景\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;现在开始我在掘金的第一个专栏，记录一下我在实际项目中搭建UI组件库的过程，以便于以后查询，同时也为大家提供一种基于React创建前端UI库的思路。\n\n### 为什么要自己写UI库\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;现在优秀的前端开源UI库已经很多了，比如antd. Material UI. element UI等等，这些UI库生态都比较完善，文档也写得很好，你在项目中直接用不就行了，可为什么还要自己写呢？借用一句老话，租不如买，买不如造，从这个角度也能知道老用别人的总觉得有点缺陷，这里作者个人认为坚持写自己的UI库主要有这么几个原因：\n\n*1.* *会受制于人。*\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;虽然是开源的库，但是遍观市面上大多数产品，都没有用这些组件库，相反的是企业内部的项目用的比较多。我想更多的原因是不想受制于人，如果哪一天UI库的作者想要收专利费了，你的项目要不要迁移到别的组件库？还是说乖乖交钱呢？另一方面，如果你公司所有的产品都用了antd，日积月累，你就会天然的依赖阿里的开发习惯，选择新产品的时候就会更倾向于阿里同系的，所以说，免费的代价是失去自主权。\n\n*2.* *升级产品需要看脸色。*\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;举个例子，你的产品所使用的框架，Vue要从2升3，Angular要从9升12，React要升级18了，而你所依赖的第三方UI组件库还不支持新版本框架，或者对新版本框架或其他的依赖部分兼容，这就会使得你的开发非常的难受。\n\n*3.* *不好维护。*\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;使用别人的组件库，如果出了Bug怎么修呢？难道要在Github上提Issue嘛😂，这样抱怨的是你的客户，受损的是你的产品。第三方进行的开源，是个双刃剑，免费给你用，但是出了问题人家也不负责。\n\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;有了这些原因，应该不会再质疑为什么要做自己的UI库了吧。拥有自己全套的产品体系，对于企业，是一个拿回自主权的重要一步，对于我们开发者，也是锤炼自己基本功的过程，何乐而不为？\n\n## 2. 基于React\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;这里记录我现在正在搭建的企业项目，一边搭建一边记录，其乐融融，可以称得上手把手教学本学了\\[doge\\]。\n\n### 1. 使用dumi创建\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;dumi是一个开源的负责组件开发及组件文档生成的工具，这里仅为了方便组件库文档展示使用。在最后打包发布时，dumi不参与打包，所以这里使用dumi是可以的。\n\n接下来就开始记录实操步骤。\n\n首先安装 [node](https://nodejs.org/en/)，并确保`node \u003e= 10.13 \u0026\u0026 node \u003c 17.6.0`。这里作者亲测，node 17.6.0是不兼容的，而作者本地使用的`v16.14.2`可以完全兼容。\n\n在空白的地方新建文件夹\n```sh\nmkdir dux-ui \u0026\u0026 cd ./dux-ui\n```\n\n然后执行安装命令，这里我选择站点式的创建方式\n\n```sh\n$ npx @umijs/create-dumi-lib        # 初始化一个文档模式的组件库开发脚手架\n// or\n$ yarn create @umijs/dumi-lib\n\n$ npx @umijs/create-dumi-lib --site # 初始化一个站点模式的组件库开发脚手架\n// or\n$ yarn create @umijs/dumi-lib --site\n```\n在根目录下执行命令\n\n```sh\nnpm install\nnpm run dev\n```\n然后项目就跑起来了！（盗用官网的图，仅供参考）\n\n![image.png](/img/posts/2022-3-14/2022-3-14-1.png)\n\n### 2. 文件目录\n\n脚手架搭建起项目后，可以看到初始文件目录\n\n![image.png](/img/posts/2022-3-14/2022-3-14-2.png)\n\n\n这里为了开发方便，我们把自定义的组件放在单独的`components`文件夹下：\n\n![image.png](/img/posts/2022-3-14/2022-3-14-3.png)\n\n\n然后修改`src`下的`index`文件中组件的导入路径：\n\n```js\nexport { default as Foo } from './components/Foo';\n```\n修改dumi配置文件`.umirc.ts`，新增menu展示路径：\n\n```js\nimport { defineConfig } from 'dumi';\n\nexport default defineConfig({\n  title: 'test-dumi',\n  favicon:\n    'https://user-images.githubusercontent.com/9554297/83762004-a0761b00-a6a9-11ea-83b4-9c8ff721d4b8.png',\n  logo: 'https://user-images.githubusercontent.com/9554297/83762004-a0761b00-a6a9-11ea-83b4-9c8ff721d4b8.png',\n  outputPath: 'docs-dist',\n  mode: 'site',\n  \n  // 新增\n  menus: {\n    // 需要自定义侧边菜单的路径，没有配置的路径还是会使用自动生成的配置\n    '/components': [\n      {\n        title: '组件',\n        path: '/components',\n        children: [\n          // 菜单子项（可选）\n          'components/Foo/index.md',\n        ],\n      },\n    ],\n  },\n});\n```\n\n修改`package.json`\n\n![image.png](/img/posts/2022-3-14/2022-3-14-4.png)\n\n\n然后执行\n\n```sh\nnpm run docs\n```\n\n可以看到跑起来了\n\n![image.png](/img/posts/2022-3-14/2022-3-14-5.png)\n![image.png](/img/posts/2022-3-14/2022-3-14-6.png)\n\n至此，项目就搭建起来了！本章到此结束，下一节会逐步记录各个组件的开发过程。"])</script><script>self.__next_f.push([1,"51:T2618,"])</script><script>self.__next_f.push([1,"## 1. node环境与开发工具准备\n\n前端工程化开发，本地启动开发环境都是基于nodejs的，命令行里输入指令`node -v`可以帮助确认您的电脑上是否安装了node，如果没有安装，则可以去 [node官网](http://nodejs.cn/download/) 下载安装包，如下图所示：\n![node官网下载界面](/img/posts/2022-3-1/2022-3-1-1.png)\n不管是在windows还是在mac环境下，都是一键傻瓜式安装，甚至连环境变量都不需要手动配置，这里就不过多介绍了。\n\n\n## 2. 开发工具准备\n前端的开发工具，常见的有VSCode. WebStorm. Atom等，只需用其中之一便足可以完成您的开发任务。这里笔者给出常用编辑器的对比。\n\n\n| 工具名称 | 优点 | 缺点 | 推荐度 |\n| --- | --- | --- | --- |\n| WebStorm | 插件很多，功能齐全 | 收费，占用资源大 | ☆★★ | \n| Atom | 界面整洁，免费 | 插件安装多了会慢，不够流畅 | ☆★★ | \n| VSCode | 轻量级，插件繁多，支持定制，免费 | 插件过多会出现冲突，代码的提示不友好 | ☆★★★★ | \n\n\n笔者接下来的开发就以VSCode为准。\n\nvsCode作为目前最为流行的轻量级开发工具，广受前后端程序员的喜爱，其插件库也是十分的丰富，可以供开发的进行自定义配置，而且提供了插件开发的功能，使得开源作者能够更加轻松的自定义自己的插件，并且有支持远程开发等优点。相比于webStorm和sublime这种需要购买正式版（sublime虽然不买也没什么关系）的产品，其最直接的优点是他是免费的！\nvsCode官网地址为：`https://code.visualstudio.com/`，开发者可以下载自己所需的版本：\n\n![image.png](/img/posts/2022-3-1/2022-3-1-2.png)\n国内用户未翻墙的可能会出现下载缓慢的问题，这里作者提前下载好了国内版本放在文章末尾供大家下载。\n\natom也是免费的开发工具，这个根据自己的喜好来使用。作者一开始写网页也是用的atom，但是当你下载了官网的安装包，看到他的大小后，或者在使用很长一段时间后打开资源管理器后，你可能就会像作者一样弃用它！这里还是给出其官网地址`https://atom.io/`，他的界面作者还是挺喜欢的。\n\n## 3. react项目开发环境搭建\nreact工程化项目创建的脚手架工具这里作者介绍主流的两种：`create-react-app`和`vite`.\n### 3.1. create-react-app构建\n这里使用npx安装：`npx create-react-app \u003c工程名\u003e`。\n注意工程名称使用字母数字连接线的形式(范例参考：\\\u003chttps://create-react-app.dev/docs/getting-started/\u003e )，这里作者使用hello-world1.\n构建成功后会看到控制台打印如下指令：\n\n![10.png](/img/posts/2022-3-1/2022-3-1-3.png)\n\n进入工程根目录`cd ./hello-world1`\n\u003e 若创建时没有安装依赖成功，进入工程根目录下手动安装`npm inatall`即可\n\n执行指令：`npm start`，启动成功后在浏览器输入网址`localhost:3000`即可看到欢迎界面：\n\n![11.png](/img/posts/2022-3-1/2022-3-1-4.png)\n\n### 3.2. vite构建\n终端输入指令\n```sh\n# npm 6.x\nnpm init vite@latest \u003c工程名\u003e --template \u003c模板名\u003e\n# npm 7+\nnpm init vite@latest \u003c工程名\u003e -- --template \u003c模板名\u003e\n```\n这里我们当然使用`react`作为模板名. hello-world2作为工程名来构建工程目录。输入指令后你会发现项目构建的很快，那是因为脚手架没有默认帮你安装依赖，所以要进入工程目录（`cd ./hello-world2`）并手动安装依赖：`npm install`。依赖安装完成后，即可启动项目：`npm run dev`，同样的，在浏览器输入网址`localhost:3000`即可看到欢迎界面：\n\n![12.png](/img/posts/2022-3-1/2022-3-1-5.png)\n\n至此项目就启动完毕了~~ \n\n如果您只是想快速开发一个项目，环境配置到这里就结束了。以下内容为选择性观看内容，如果您觉得依赖安装比较慢，又或者需要管理不同版本的node，可以继续往下看。\n\n## 4. 依赖安装的方式(选读)\n上边章节中，作者主要使用`npm install`的方式安装依赖，但是有时候，尤其是网络不太好的情况下，依赖总是不能被正确安装，出现安装错误。这个时候可能就需要进行下一步操作。\n### 4.1. npm国内镜像配置\n国内npm镜像可以绕开被墙的困扰，作者推荐taobao的镜像。你可以这样执行命令：\n`npm install -g cnpm --registry=https://registry.npm.taobao.org`，这样就全局安装了使用的taobao国内镜像的cnpm指令。你在项目根目录下试试`cnpm install`就会快很多。\n你还可以这样配置镜像：\n`npm config set registry https://registry.npm.taobao.org`，这样你即使使用npm指令安装，也会走国内镜像安装。\n\n### 4.2. 不同的依赖安装策略\n前端工程化项目依赖安装不只有npm方式，还有他的各种变种。比如安装速度快，版本能够更好统一的`yarn`或者运行速度更快的`pnpm`。细心的读者可以发现，上面`create-react-app`安装的方式使用了`npx`，而没有使用`npm -g`这种全局指令方式。在`npm 5.2`以后的版本默认会安装`npx`命令，它可以避免全局安装模块。这些不同的策略在之后的文章中会提及，在这里不做过多的赘述。\n\n### 4.3. 使用nvm管理node版本\nnvm是目前比较主流的node版本管理工具，类似的还有nodist（`https://github.com/nullivex/nodist/releases`）。这里以nvm为准进行介绍。\n#### 4.3.1. windows环境安装\n进入官网下载链接`https://github.com/coreybutler/nvm-windows/releases`，下载assets中的安装包（文章末尾提供安装包）。\n\n![13.png](/img/posts/2022-3-1/2022-3-1-6.png)\n\n这里可以直接下载setup版的，解压后双击就可安装。当然也可以选择noinstall版本的，通过手动配置环境来达到相同的目的。这里以安装版为例。下图为安装界面：\n\n![14.png](/img/posts/2022-3-1/2022-3-1-7.png)\n一路next到底完成安装即可。环境变量已经自动配置好了。\n在命令行中检查是否安装成功：\n\n![15.png](/img/posts/2022-3-1/2022-3-1-8.png)\n\n看到版本说明已经正确安装！！\n#### 4.3.2. MacOS环境安装（需翻墙）\n进入官网下载链接`https://github.com/nvm-sh/nvm#installing-and-updating`，可以看到安装指引，我们遵从官方给的指令直接执行即可：\n```sh\ncurl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.1/install.sh | bash\n```\n接下来您可能不会看到安装成功，反而会提示如下：\n\u003e Failed to connect to raw.githubusercontent.com port 443\n\n这是因为某种神秘的东方力量导致的github访问的问题，我们可以借助网址`https://ipaddress.com/website/raw.githubusercontent.com`查一下`githubusercontent.com`的真实IP，输入githubusercontent.com查询会看到：\n\n![16.png](/img/posts/2022-3-1/2022-3-1-9.png)\n我们找下边查到的IP其中一个即可（如果不行就换着试试），执行下述步骤：\n\n1. 进入mac的host文件：`sudo vim /etc/hosts`\n2. 最下边追加IP映射\n\n![17.png](/img/posts/2022-3-1/2022-3-1-10.png)\n\n经过这两步后再次尝试一哈，就可以执行成功了。\n```sh\ncurl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.1/install.sh | bash\n```\n如果很不幸你叒叕出现了如下错误，不要惊慌，应该是没有检测到你的github账户，你只需要打开github主页登录账号重试即可。\n\u003e unable to access 'https://github.com/nvm-sh/nvm.git/': LibreSSL SSL_connect: SSL_ERROR_SYSCALL in connection to github.com:443\n\n最后！\n\n安装成功的界面如下：\n\n![18.png](/img/posts/2022-3-1/2022-3-1-11.png)\n\n此时先不要着急，全局的`nvm`指令还没有加入环境变量中，需要你来手动添加。执行命令(以zsh终端为例) `sudo vim ~/.zshrc`，进入编辑后，追加：\n```sh\nexport NVM_DIR=\"$([ -z \"${XDG_CONFIG_HOME-}\" ] \u0026\u0026 printf %s \"${HOME}/.nvm\" || printf %s \"${XDG_CONFIG_HOME}/nvm\")\"\n[ -s \"$NVM_DIR/nvm.sh\" ] \u0026\u0026 \\. \"$NVM_DIR/nvm.sh\" # This loads nvm\n```\n然后生效配置文件：`source ~/.zshrc`即可。\n\n现在就试试nvm指令：\n\n![19.png](/img/posts/2022-3-1/2022-3-1-12.png)\n\n成功！\n\n##### 4.3.3. nvm基础使用\n\n我们可以使用`nvm list`命令查看当前node的版本列表\n\n![20.png](/img/posts/2022-3-1/2022-3-1-13.png)\n\n可以看到，当前只有系统默认的16.13.2版本。如果想要安装别的node版本，没有必要再去node官网下载了，可以直接使用nvm指令下载。我们可以先使用`nvm ls-remote`看一下官方都有哪些正式版本：\n\n![21.png](/img/posts/2022-3-1/2022-3-1-14.png)\n\n列出的版本都是可以安装的，我们这里可以安装稳定版：`nvm install stable`\n\n![23.png](/img/posts/2022-3-1/2022-3-1-15.png)\n\n可以看到截止作者写这篇文章时，node的稳定版本是17.4.0，nvm会自动切换进安装的版本上。如果想要自定义版本号安装，可以使用指令`nvm install \u003c版本号\u003e`\n\n![24.png](/img/posts/2022-3-1/2022-3-1-16.png)\n\n这里我们安装了12.22.10版本，再次`nvm list`可以看到已经有三个版本了。想要在多个版本之间切换，只需使用指令`nvm use \u003c版本号\u003e`即可一键切换！\n\n![25.png](/img/posts/2022-3-1/2022-3-1-17.png)\n\nwindows下使用过程中若出现如下错误：\n\n![image.png](/img/posts/2022-3-1/2022-3-1-18.png)\n\n一般是vscode或者终端没有管理员权限，以管理员身份打开即可。\n\n至此，前端工程化项目的环境配置已经结束！ \n\n## 5. 附件\n附件清单：vscode安装包. nvm安装包（win）. atom安装包（mac）。\n\n下载链接：\n\u003e 链接: https://pan.baidu.com/s/1zD2s9UjXrVZ06NANnx8oXg  提取码: 5diu"])</script><script>self.__next_f.push([1,"52:T2b05,"])</script><script>self.__next_f.push([1,"## 0. 引言\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;一个好的前端产品，必然是用户体验优秀. 使用流畅. 数据准确. 界面友好的产品。要想达到这个目标，一开始的技术选型就需要非常慎重，不能图一时之快而导致后期维护升级成本指数级上涨，也不能忽视团队的技术沿革和老板对产品定位的要求。\n\n\u003e PS. 技术选型仁者见仁，本文只谈经验，提供一个选型的思路，而不是给你具体的方案\n\n#### 选型的目的\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;顾名思义，就是为了实现收益最大化，是产品要求和技术成本之间的一个权衡。\n\n## 1. 从企业的角度考虑选型\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;企业的存活宗旨是用最少的人力成本创造出尽可能多的企业效益，从这个出发点就可以得出企业对一个产品选型的要求。\n#### 保证产品质量是基础\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;产品质量要过基本关。不要求能有很惊艳的效果，但是一定要满足客户的要求，网页不能长时间白屏，要不错位不卡死，操作正常，数据精准。更进阶一点的，可能还会要求一定的交互和视觉体验，还有可能会加入无障碍效果。\n\n\u003e 如果要加入兼容阿拉伯语网站排版的话，已有的架构可能完全不能用，需要单独增加一倍的工作量再写一套 -_- \n\n#### 降低成本是必要条件\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;成本包括前期开发投入的人力和后期维护投入的人力。前提投入人力越多，开发的周期可能会短，但是与之对应的是团队协作的管理成本会高起来；前期人投入的少，可能技术选型会有漏洞或者可扩展性不足，后期换人来维护的话可能会举步维艰，不得不重构。\n\n## 2. 从产品技术形态上来考虑选型\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;产品的技术形态指的是其技术模式，分为纯前端开发. 前后端分离和后端驱动的开发。\n\n#### 纯前端页面\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;纯前端的一般是一些静态页面，比如个人博客. 一些活动页面. 宣传网站等。一般来说一个人足以，此时你就不需要考虑什么架构了，使用你最擅长的技术栈和成熟的生成工具，能够快速堆砌起来页面就好。\n\n#### 前后端分离\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;这种产品形态应该是目前市面上大多数产品的开发模式，比如大型的ToB项目. 成熟的APP网页客户端. 网页购物等。这种的产品，页面渲染基本上是前端的工作，后端只需要提供API文档即可。\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;这样的产品，推荐做成Web端渲染框架开发的单页应用，或者使用node.js做成直出模板渲染式的。如果项目业务比较多，可以考虑部署前端微服务。\n\n#### 后端主导开发\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;后端主导的产品团队，一般上不会有单独的前端开发组，都是一个团队配一到两个前端来配合后端开发。此时作为前端，你就不需要有太多自己的想法，一切从简即可。比如使用前端预处理器Sass时，可能就需要慎重一些。同时也不要标新立异，使用这个团队没有用过的前端框架，跟随原来的技术栈走即可。\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;这时候你可能就会比较痛苦，一方面要维护前任写的乱七八糟的代码，一方面又不能用自己擅长的技术。作者就“有幸”做过这样的产品。当时后端的要求是API接口映射名称不能写死到代码里，前端要做成可配置式的；后端不愿意修改返回的JSON，我不得不一层层来解析像无底洞一样深的JSON数据。这种情况下，与团队积极沟通是一方面，另一方面是找准自己的定位来使用技术。这样才是一个好的程序员的基本修养，毕竟这个程序你不可能自己一个人拿出去卖不是。\n\n## 3. 从面向用户群来考虑选型\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;前端产品面向的用户群体不同，展现的形式会有差异，现代互联网开发对于同一个用户群又分为PC端和移动端产品两种。主要分类有如下几种：外部用户PC端. 外部用户移动端. 内部用户PC端. 内部用户移动端；同时国内外用户的使用习惯也会有细微的差别。\n\n#### 外部用户PC端\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;对于外部用户，视觉体验是第一位的，PC端上SSR也是很有必要的。你可能需要一个比较完善的框架，支持SSR配置和UI动画库，而且要调研清楚是否要支持IE用户（甚至是IE8），`JQuery`(或**Zepto.js**) 有时也是比较管用的。\n\n#### 外部用户移动端\n**1. 移动端访问的页面**\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;即用手机浏览器访问Web页面。页面切换还都是传统链接跳转，属于传统Web页面，前后端分离开发，页面直出渲染，与PC端的架构基本一致，只是要做一些适配工作。\n\n**2. 移动端Native应用**\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;这部分产品目前来说对于前端开发用的技术栈比较多的是`React Native`，作者就曾经做过APP里的广告页和活动详情页面。如果你的产品有Native化的要求，那么整个产品技术栈首选React，毕竟要和React Native兼容。\n\n#### 内部系统用户\n**1. PC访问的页面**\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;内部用户使用的管理系统。诸如OA. 项目管理系统等。这些需求比较通用，可以使用快速开发的架构，你甚至都不需要使用公司内部的组件库，开源的框架 + UI库 + 图表库完全可以满足要求。\n\n**2. 移动端访问的页面**\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;企业内部使用的移动端产品，大多依附于企业微信等APP。就拿企业微信举例，工作台开放有API，支持二次开发。这样的内嵌H5页面也多为单页应用，单独部署并配置微信相关验证即可。\n\n#### 海外用户\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;针对海外用户，配置PWA或者AMP应该会成为架构选择的一个必选项。目前三大框架也都普遍支持PWA。\n\n## 4. 从产品预期的效果来考虑选型\n\n#### 短生命周期\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;短生命周期的产品通常要求快速起步：门槛低. 书写自由. 不强制遵循任何最佳实践，使用过后就废弃。这时候就需要使用简单的. 不过度封装的架构，不使用`eslint`和`Typescript`。甚至不需要安排code review，因为不考虑后期维护。\n\n#### 长期产品\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;对于长期产品，后期维护是比较重要的。要选择具有完整生态的架构，能够平稳升级，采用模块化封装业务组件，不用硬编码，控制单文件代码行数等。同一个产品线上的产品过多，比如阿里云的架构，上微服务也是必要的。\n\n#### 探索性产品\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;探索型产品往往也是短周期产品，是需要比较激进的探索新的前沿技术。如果成功了，可能会过渡到长周期产品上去。这中间需要架构师做好可移植的能力。\n\n## 5. 比较通用的建议\n\n#### 框架选择\n\u003e `React` OR `Vue` OR `Angular` ?\n\n简单介绍：\n1. Vue上手难度最低，学好了不容易，`2.0`往`3.0`迁移也不是无创的，逐渐开始对`TS`支持，但不是天然支持，需要你在配置一下下。\n2. React性能很好，但同时也比较难学，版本更新的很快，新版本的`Hooks`很多人不能适应。与复杂对应的是他的灵活性，生态也做得很好，同时也支持`TS`。\n3. Angular天然支持`TS`，内置`Rxjs`，可嵌入. 注入和自带单元测试。使用过`Java`的同学应该会比较容易接受。目前在国内使用率比较低。\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;作者的建议是，**用你团队常用的**！这是最主要的，我之前的公司是从最早的前端MVC架构演进来的，保留了大量` Angular 1.x `的项目，那升级自然是往 `2.x `迁移（虽然完全是两个框架，但并不完全是! 🐶；此外，你的团队对于之前使用的框架有着大量的技术积淀，封装了大量的工具库. 图表库来支持这个框架，贸然切换架构可能需要重复造轮子，增加学习成本，除非你的客户指明要你用！\n\n#### 依赖升级的平滑度\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;项目在框架升级的时候，你的package.json里的依赖应能够平滑升级，你在引用依赖之前，要先看其主页上描述的支持的框架版本，并且要清楚其将来会不会支持新版本的框架。对于一些工具型的依赖都还好说，但是有些依赖，比如`moment.js`哪一天说其不支持`React18`了（开个玩笑），你的重构成本就会很高。\n\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;作者给的建议是，小型项目用成熟的开源UI库和工具库没有关系，将来重构的成本还能接受，况且将来也不太会涉及到主版本的频繁更新。如果是长期维护的重要项目，建议主要的依赖，比如UI库等最好使用公司内部的，这样在框架升级的时候，UI可以同步跟着升级就好，而不用看第三方库的脸色了。\n\n#### TS or JS\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;团队没用过TS，就不要贸然用，一直用TS的话就一定要用。快速项目用JS，大型项目用TS。\n\n#### UI/图表库选择\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;有能力就团队自己开发，差一点的就对开源库，比如UI库像`antd`. `elementUI`. `MaterialUI`等，图表库如`D3.js`. `Apache ECharts`. `g2plot`进行二次封装后使用。\n\n#### 作者常用的技术栈\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;下面是作者常用的技术栈，经过公司反复打磨过的，有一定的参考价值，但也不要盲目相信。\n\n1. `Angular9+` + `ng-zorro` (或者自建组件库) + `lodash-es` + `echarts` + `jsplumb`.\n2. `React17+` + `antd/Material UI`（或者自建组件库） + 自建API Service库 + 公司自建微服务架构 + `moment.js` + `Typescript` + `webpack`，状态管理使用`mobx`.\n3. `Vue2` + `Vuex` + `elementUI` + `echarts` + `axios`.\n4. 类库使用 `rollup`\n\n## 6. 结论\n\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;没有最好的架构选择，只有适合自己的。也不要盲目相信别人的经验，还是要基于自己的产品和团队进行调研后，按照实事来制定策略。\n\n\n\u003e 欢迎评论交流！如果发现有不足的地方，希望各位大神不吝赐教！"])</script><script>self.__next_f.push([1,"7:[\"$\",\"$L10\",null,{\"content\":{\"en\":{\"projects\":[{\"id\":\"1\",\"title\":\"Pixel-UI\",\"description\":\"An open-source Vue component library focusing on pixel style design.\",\"link\":\"https://maomentai817.github.io/pixel-ui/\",\"image\":\"/img/projects/pixel-ui.webp\",\"tags\":[\"Vue\",\"Pixel Style\",\"UI\"],\"category\":\"UI\"},{\"id\":\"2\",\"title\":\"Pixel-UI React\",\"description\":\"一个开源的 React 组件库，专注于像素风格设计。\",\"link\":\"https://maomentai817.github.io/pixel-ui-react/\",\"image\":\"/img/projects/pixel-ui-react.webp\",\"tags\":[\"Vue\",\"Pixel Style\",\"UI\"],\"category\":\"UI\"},{\"id\":\"3\",\"title\":\"Dux-UI\",\"description\":\"A React component library, providing one-stop project setup, component development, and documentation system deployment using dumi.\",\"link\":\"https://heiheihoho1213.github.io/dux-ui/\",\"image\":\"/img/projects/dux-ui.webp\",\"tags\":[\"React\",\"Component Library\"],\"category\":\"UI\"},{\"id\":\"2\",\"title\":\"CodeReview AI\",\"description\":\"A code review tool based on AI, supporting multiple languages.\",\"link\":\"https://code-review-home.vercel.app/\",\"image\":\"/img/projects/code-review.webp\",\"tags\":[\"AI\",\"Code Review\"],\"category\":\"Tools\"},{\"id\":\"3\",\"title\":\"Chinese Color Palette\",\"description\":\"A color palette for Chinese style.\",\"link\":\"https://heiheihoho1213.github.io/monto-color/\",\"image\":\"/img/projects/china-color.webp\",\"tags\":[\"Color Palette\"],\"category\":\"Tools\"},{\"id\":\"1\",\"title\":\"Colorful Bookmark\",\"description\":\"A colorful tag bookmark extension for Chrome.\",\"link\":\"https://chromewebstore.google.com/detail/colorful-bookmark/ilcmekmgeldhckdembghkiohkdffihpe?hl=zh-CN\u0026utm_source=ext_sidebar\",\"image\":\"/img/projects/colorful-bookmark.webp\",\"tags\":[\"Chrome Extension\"],\"category\":\"Tools\"},{\"id\":\"4\",\"title\":\"Timestamp Converter-Time Zone Clock\",\"description\":\"A timestamp converter and time zone clock extension for Chrome.\",\"link\":\"https://chromewebstore.google.com/detail/%E6%97%B6%E9%97%B4%E6%88%B3%E8%BD%AC%E6%8D%A2-%E6%97%B6%E5%8C%BA%E6%97%B6%E9%92%9F/pjcapgdifnhgkkojoggfdlijpelpohcf?hl=zh-CN\u0026gl=DE\",\"image\":\"/img/projects/clock.webp\",\"tags\":[\"Chrome Extension\"],\"category\":\"Tools\"},{\"id\":\"1\",\"title\":\"Web Themes Switch\",\"description\":\"Use css variables to implement theme switching, support black mode, light mode and dark mode.\",\"link\":\"https://code.juejin.cn/pen/7317573307016806435\",\"image\":\"/img/projects/themes-switch.webp\",\"tags\":[\"CSS\"],\"category\":\"Web Themes Switch\"},{\"id\":\"2\",\"title\":\"Ant Design Themes Switch\",\"description\":\"Use antd's theme to implement theme switching, support light mode and dark mode.\",\"link\":\"https://heiheihoho1213.github.io/antd-theme/\",\"image\":\"/img/projects/themes-switch-1.webp\",\"tags\":[\"CSS\"],\"category\":\"Web Themes Switch\"},{\"id\":\"3\",\"title\":\"Sass Preprocessor Theme Switch\",\"description\":\"Use Sass preprocessor to implement theme switching, support light mode, blue mode and dark mode.\",\"link\":\"https://heiheihoho1213.github.io/sass-theme/\",\"image\":\"/img/projects/themes-switch-2.webp\",\"tags\":[\"CSS\"],\"category\":\"Web Themes Switch\"}],\"blog\":[{\"id\":\"1\",\"title\":\"🎮 从 NES 到现代 Web —— 像素风组件库 Pixel UI  React 版本，欢迎大家一起参与这个项目\",\"date\":\"2025-11-19\",\"readTime\":\"3 min\",\"excerpt\":\"掘金作者 @猫闷台817 的 Pixel U Vue3 版上线了，现在我与他合作的 React 版也来了...\",\"tags\":[\"REACT\",\"GITHUB\",\"UI/UX\"],\"content\":\"$11\",\"slug\":\"Pixel-UI-React\"},{\"id\":\"$undefined\",\"title\":\"React 源码解读\",\"date\":\"2024-04-25\",\"readTime\":\"10 min\",\"excerpt\":\"介绍 React 的虚拟 DOM、Fiber 结构、调度器等核心概念和实现原理 ...\",\"tags\":[\"React\",\"源码解读\"],\"content\":\"$12\",\"slug\":\"react-source\"},{\"id\":\"$undefined\",\"title\":\"图片懒加载：从低像素预览到高清加载\",\"date\":\"2024-02-07\",\"readTime\":\"10 min\",\"excerpt\":\"介绍图片懒加载的实现方法 ...\",\"tags\":[\"性能优化\",\"图片懒加载\"],\"content\":\"$13\",\"slug\":\"react-18-use-12\"},{\"id\":\"$undefined\",\"title\":\"前端主题切换浅析：使用前端CSS框架\",\"date\":\"2024-01-25\",\"readTime\":\"2 min\",\"excerpt\":\"使用前端CSS框架实现主题切换 ...\",\"tags\":[\"CSS\",\"主题切换\"],\"content\":\"$14\",\"slug\":\"theme-css-frame\"},{\"id\":\"$undefined\",\"title\":\"前端主题切换浅析：CSS-IN-JS\",\"date\":\"2024-01-25\",\"readTime\":\"2 min\",\"excerpt\":\"使用CSS-IN-JS实现主题切换 ...\",\"tags\":[\"CSS\",\"主题切换\"],\"content\":\"$15\",\"slug\":\"theme-css-in-js\"},{\"id\":\"$undefined\",\"title\":\"前端主题切换浅析：使用CSS预处理器\",\"date\":\"2024-01-25\",\"readTime\":\"2 min\",\"excerpt\":\"使用CSS预处理器实现主题切换 ...\",\"tags\":[\"CSS\",\"主题切换\"],\"content\":\"## CSS 预处理器\\n\\n我们来看一个例子：[sass 预编译 theme](https://duheng1992.github.io/sass-theme/)\\n\\n将所有的样式文件使用 Sass 预先定义好：\\n\\n![image.png](/img/posts/2024-1-25/2024-1-25-5.png)\\n\\n然后写一个 `buildThemes.js` 脚本在打包前编译为 css，然后将这个文件动态插入到 head 里：\\n\\n```js\\nconst createLinkElementWithKey = (key) =\u003e {\\n  const linkEl = document.createElement('link');\\n  linkEl.setAttribute('rel', 'stylesheet');\\n  linkEl.classList.add(getClassNameForKey(key));\\n  document.head.appendChild(linkEl);\\n  return linkEl;\\n};\\n\\n...\\n// 切换时调用\\nconst setStyle = (key = 'theme', path = 'white') =\u003e {\\n  getLinkElementForKey(key).setAttribute('href', `sass-theme/assets/themes/${path}.css`);\\n}\\n```\\n\\n示意图：\\n![image.png](/img/posts/2024-1-25/2024-1-25-6.png)\\n\\n\u003e 脚本的写法见 [Demo](https://github.com/heiheihoho1213/sass-theme/tree/master)\\n\\n最终效果：\\n\\n![image.png](/img/posts/2024-1-25/2024-1-25-7.png)\\n\\n\u003e 在我这个 demo 里，其实也是把主题样式挂载为全局的 css 变量，只是使用 css 预处理器过度了一下\\n\\n\\n优点：\\n\\n- 样式切换流畅，不会卡顿\\n- 语法更多样，开发成本低\\n- 与 css 变量一样，新增或修改样式，只需要改动 Scss/Less 变量即可\\n\\n缺点：\\n\\n- 需要在编译时手动编译，运行时没办法热替换\\n- 学习成本高一些\",\"slug\":\"theme-css-preprocessor\"},{\"id\":\"$undefined\",\"title\":\"前端主题切换浅析：使用CSS变量\",\"date\":\"2024-01-25\",\"readTime\":\"2 min\",\"excerpt\":\"使用CSS变量实现主题切换 ...\",\"tags\":[\"CSS\",\"主题切换\"],\"content\":\"## CSS 变量\\n\\n这个方案是目前主流推荐的方案。在介绍之前，先讲一下浏览器的几个新特性。\\n\\n#### color-scheme 方案\\n \\n [color-scheme](https://developer.mozilla.org/zh-CN/docs/Web/CSS/color-scheme) 是浏览器普遍支持的配置主题的属性。他表示调用操作系统默认的主题方案覆盖当前元素样式：\\n \\n [color-scheme：CSS 变量主题切换案例](https://code.juejin.cn/pen/7317573307016806435)\\n \\n#### 自定义方案\\n\\n如果要自定义变量，可以这样定义自己的样式变量：\\n\\n```css\\n// theme.css\\n\\n// 夜间模式\\nhtml[data-theme='dark'] {\\n  --text-color: #fff;\\n  --brand-primary: #1668dc;\\n}\\n\\n// 普通模式\\n:root {\\n  --text-color: #333;\\n  --brand-primary: #1677ff;\\n}\\n```\\n\\n然后在使用时：\\n\\n```js\\n// 入口文件\\nimport './theme.css';\\n\\n// 组件样式\\na {\\n  color: var(--brand-primary);\\n}\\n```\\n\\n在切换主题时：\\n\\n```js\\ndocument.documentElement.dataset.theme = 要设置的theme\\n```\\n\\n你可以维护一个 `useTheme` 来动态获取当前的主题。\\n\\n这里有一个成熟的案例：[daisyUI](https://daisyui.com/)\\n\\n优点：\\n\\n- 原生支持，是现在主流方案\\n- 轻量级，部署方便，可定制化程度高\\n- 不存在优先级冲突问题\\n- 可实现热替换和更改\\n\\n缺点：\\n\\n- 老的浏览器存在兼容性问题\",\"slug\":\"theme-css-variable\"},{\"id\":\"$undefined\",\"title\":\"前端主题切换浅析：使用Link动态引入\",\"date\":\"2024-01-25\",\"readTime\":\"2 min\",\"excerpt\":\"使用Link动态引入实现主题切换 ...\",\"tags\":[\"CSS\",\"主题切换\"],\"content\":\"## Link 动态引入\\n\\n提前准备好各个主题的 CSS 文件，在切换的时候加载，比如：\\n\\n```js\\n// js\\n const autoThemeChange = (e) =\u003e {\\n    const isDark = e.matches;\\n    document.getElementById('theme').href = `${isDark ? 'dark' : 'light'}.css`; // 这里的文件，可以是远程的，也可以是项目中的静态文件\\n}\\n\\n mediaQueryListDark = window.matchMedia('(prefers-color-scheme: dark)');\\n mediaQueryListDark.addListener(autoThemeChange); \\n```\\n\\n```html\\n\u003c!-- html --\u003e\\n\u003chead\u003e\\n  \u003clink rel=\\\"stylesheet\\\" src=\\\"https://cdn.xxx.com/dark.css\\\"\u003e\\n\u003chead\u003e\\n```\\n\\n优点：\\n\\n- 实现简单，只需要关注维护 css 即可\\n- 可以实现主题样式按需加载\\n\\n缺点：\\n\\n- 如果 css 文件过大, 可能会导致页面样式闪烁\\n- 各个主题文件相互独立，修改样式比较麻烦\\n- 在服务端渲染时，没办法直接操作客户端 DOM 元素，会影响加载性能\\n- 不够灵活，不能满足现代前端开发的需求\",\"slug\":\"theme-link\"},{\"id\":\"$undefined\",\"title\":\"前端主题切换浅析：提前加载样式，类名切换方案\",\"date\":\"2024-01-25\",\"readTime\":\"2 min\",\"excerpt\":\"提前加载样式，类名切换方案实现主题切换 ...\",\"tags\":[\"CSS\",\"主题切换\"],\"content\":\"## 提前加载样式，类名切换方案\\n\\n先引入各个主题的 css，通过切换类名实现主题切换。\\n\\n我们来看一个 antd 的实现案例：[antd-theme-change-demo](https://heiheihoho1213.github.io/antd-theme/)\\n\\n他的原理是切换主题时，引入不同的主题算法（css 文件）：\\n\\n然后配置 `ThemeProvider`:\\n\\n```js\\nreturn (\\n   \u003cConfigProvider\\n     theme={{\\n       algorithm: themeLight ? theme.defaultAlgorithm : theme.darkAlgorithm,\\n     }}\\n   \u003e\\n     {children}\\n   \u003c/ConfigProvider\u003e\\n );\\n```\\n在两种模式下，相同的元素，但是类名不同了，则使用不同的 css 主题文件：\\n\\n亮：\\n![image.png](/img/posts/2024-1-25/2024-1-25-1.png)\\n\\n暗：\\n![image.png](/img/posts/2024-1-25/2024-1-25-2.png)\\n\\n此外，还可以配置前缀来自定义组件样式：\\n\\n```js\\nexport const PREFIX = 'tech-theme';\\n...\\n\\n\u003cConfigProvider\\n  prefixCls={prefixCls}\\n\u003e\\n  {children}\\n\u003c/ConfigProvider\u003e\\n```\\n默认：\\n![image.png](/img/posts/2024-1-25/2024-1-25-3.png)\\n\\n自定义前缀：\\n\\n![image.png](/img/posts/2024-1-25/2024-1-25-4.png)\\n\\n\u003e 此方案的样式还可以通过 hook 动态获取为 token 使用。\\n\\n优点：\\n\\n- 样式切换会更加顺畅\\n- 便于组件封装与状态管理\\n- 可配置性比较强，支持动态自定义样式\\n\\n缺点：\\n\\n- 首屏加载会慢一些\\n- 除了样式切换不会闪烁，其余缺点与动态 link 方案缺点一样\",\"slug\":\"theme-preload\"},{\"id\":\"$undefined\",\"title\":\"Nextjs: App Router 的官网解读\",\"date\":\"2024-01-19\",\"readTime\":\"10 min\",\"excerpt\":\"介绍 Nextjs App Router 的实现方法 ...\",\"tags\":[\"Nextjs\",\"SSR\"],\"content\":\"$16\",\"slug\":\"nextjs-app-router\"},{\"id\":\"$undefined\",\"title\":\"搭建微前端 MontoApp（六） - js 沙箱：自执行 Script 与 快照隔离\",\"date\":\"2024-01-11\",\"readTime\":\"10 min\",\"excerpt\":\"介绍自执行 Script 与 快照隔离的实现方法 ...\",\"tags\":[\"微前端\"],\"content\":\"$17\",\"slug\":\"monto-app-sandbox-snapshot-script\"},{\"id\":\"$undefined\",\"title\":\"搭建微前端 MontoApp（五） - js 沙箱：Web Components 与 iframe隔离\",\"date\":\"2024-01-10\",\"readTime\":\"10 min\",\"excerpt\":\"介绍 Web Components 与 iframe隔离的实现方法 ...\",\"tags\":[\"微前端\"],\"content\":\"$18\",\"slug\":\"monto-app-sandbox-webcomponents-iframe\"},{\"id\":\"$undefined\",\"title\":\"搭建微前端 MontoApp（三） - 动态 script 方案\",\"date\":\"2024

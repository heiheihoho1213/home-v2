动画和选中等等不能通过props传递的命令式的行为上使用即可。上面的父组件调用子组件的例子，完全可以用 useEffect + props 或者 Events 解决。"])</script><script>self.__next_f.push([1,"2d:T3fca,"])</script><script>self.__next_f.push([1,"- 官网地址：[React](https://beta.reactjs.org/)\n\n## 1. 使用场景对比\n\n- `useEffect`: 用于副作用捕获，在 dom 元素渲染之后调用，常用于页面数据处理工作。\n- `useLayoutEffect`: useEffect 的一个版本，在 DOM 更新之后同步执行，但在浏览器绘制之前执行，常用于页面元素布局工作，可能会阻塞页面渲染。\n- `useInsertionEffect`: useEffect 的一个版本，在 DOM 更新前执行。常用于 CSS-in-JS 插入动态样式。\n\n\n## 2. useEffect\n\nuseEffect 是一个捕获副作用的函数，用来代替类式组件中组件的生命周期函数。声明方式如下：\n\n```js\nuseEffect(setup, dependencies)\n```\n\n### 参考范例\n\n注意需在组件顶层使用\n\n```js\nfunction ChatRoom({ roomId }) {\n  const [serverUrl, setServerUrl] = useState('https://localhost:1234');\n\n  useEffect(() =\u003e {\n    const connection = createConnection(serverUrl, roomId);\n    connection.connect();\n    return () =\u003e {\n      connection.disconnect();\n    };\n  }, [serverUrl, roomId]);\n  // ...\n}\n```\n\n### 接收参数\n\n1. setup：具有 Effect 逻辑的设置函数。当你的组件被添加到 DOM 时，React 将运行你的设置函数。在每次使用更改的依赖项重新渲染后，React 将首先使用旧值运行清理函数（如果你提供了它），然后使用新值运行你的设置函数。在你的组件从 DOM 中移除后，React 将运行你的清理函数。\n\n其中清理函数范例如下：\n\n```js\nuseEffect(\n    // 设置函数\n    () =\u003e {\n        const connection = createConnection(serverUrl, roomId);\n        connection.connect();\n\n        // 清理函数\n        return () =\u003e {\n            connection.disconnect();\n        };\n    },\n    // 依赖\n    [serverUrl, roomId]\n);\n```\n2. 依赖项（可选）：是一个数组，通过 `Object.is` 来依次判断各个依赖项是否变化，若有至少一个发生变化，则执行设置函数和清理函数。如果有多个依赖项更新，在一个fiber更新周期内，设置函数和清理函数也**只会执行一次**。若省略此参数，设置函数和清理函数将在每次组件渲染时执行。\n\n### 返回参数\n\nundefined\n\n### 注意事项\n\n1. 他是一个hook，只能在函数式组件最外层使用，且不能放在循环和条件语句中。\n2. 他的作用是检测依赖项变化后执行，若为空数组依赖，则默认在组件挂载时执行一次。\n3. 严格模式下 `useEffect` 有一种特殊行为，即在第一次渲染之前会运行一个额外的设置和清理循环，这个循环的目的是为了验证设置逻辑和清理逻辑是否相互匹配，以及清理逻辑是否能够正确地停止或撤销设置逻辑所做的操作。如果你在严格模式下遇到了与 `setup 和 cleanup` 相关的问题，官方建议你实现适当的清理函数来解决。这样可以确保在组件卸载或重新渲染时进行必要的清理操作，避免潜在的问题和错误。\n4. 如果依赖项中的部分变量或者函数定义在了组件内部，就会有风险：组件每次渲染导致这个函数或者变量重新加载，进而导致 `useEffect` 每次都执行。考虑提取修改逻辑代码或者使用 `useCallback` 技术。\n5. `useEffect` 是在 dom 流绘制完成后执行的，如果你想要页面初始化过程中在该函数中处理 dom 结构，可以考虑放在 useLayoutEffect 中。\n6. `useEffect` 仅在客户侧能使用，服务侧使用详见我之后的文章。\n\n### 运行流程\n\n我们使用上面的聊天室的例子来解释一下 `useEffect` 运行流程。React 会在必要时调用一次或多次你的设置和清理函数。\n\n1. 组件初始化时，useEffect 的设置函数执行一次\n2. 依赖项更新时：\n- 使用旧的props和state，清理函数执行一次\n- 使用新的props和state，设置函数执行一次\n3. 组件销毁或者重渲染时，清理函数会执行一次\n\n\u003e useEffect 的作用在于提供一种将 `React`非受控的系统与 `React` 的状态链接的一个媒介。`React`非受控系统比如 setInterval、addEventListener、animation.start() 等。如果没有非受控系统参与，useEffect 往往不是必须的。\n\n### 各种使用例子\n\n#### 1. 监听鼠标事件\n\n下面的例子，监听了鼠标指针滑动事件，并在鼠标指针下方设置跟随的圆形阴影装饰：\n\n```js\nimport { useState, useEffect } from 'react';\n\nexport default function App() {\n  const [position, setPosition] = useState({ x: 0, y: 0 });\n\n  useEffect(() =\u003e {\n    function handleMove(e) {\n      setPosition({ x: e.clientX, y: e.clientY });\n    }\n    window.addEventListener('pointermove', handleMove);\n    return () =\u003e {\n      window.removeEventListener('pointermove', handleMove);\n    };\n  }, []);\n\n  return (\n    \u003cdiv style={{\n      position: 'absolute',\n      backgroundColor: 'pink',\n      borderRadius: '50%',\n      opacity: 0.6,\n      transform: `translate(${position.x}px, ${position.y}px)`,\n      pointerEvents: 'none',\n      left: -20,\n      top: -20,\n      width: 40,\n      height: 40,\n    }} /\u003e\n  );\n}\n```\n\n#### 2. 设置一段动画（部分代码）\n\n点击按钮，在页面渐变的显示一个块级元素（[完整代码](https://codesandbox.io/s/ld0mxv?file=/animation.js:463-472\u0026utm_medium=sandpack)）：\n\n```js\nuseEffect(() =\u003e {\n    const animation = new FadeInAnimation(ref.current);\n    animation.start(1000);\n    return () =\u003e {\n      animation.stop();\n    };\n  }, []);\n```\n\n#### 3. 追踪元素经过可视区域（部分代码）\n\n下面的代码，在打了 ref 的 div 进入可视区域后，添加背景色和字体色，离开可视区域后样式复原：\n\n```js\nuseEffect(() =\u003e {\n    const div = ref.current;\n    const observer = new IntersectionObserver(entries =\u003e {\n      const entry = entries[0];\n      if (entry.isIntersecting) {\n        document.body.style.backgroundColor = 'black';\n        document.body.style.color = 'white';\n      } else {\n        document.body.style.backgroundColor = 'white';\n        document.body.style.color = 'black';\n      }\n    });\n    observer.observe(div, {\n      threshold: 1.0\n    });\n    return () =\u003e {\n      observer.disconnect();\n    }\n  }, []);\n```\n\n#### 4. 在自定义 Hook 中使用\n\n我们还以上面聊天室的例子做说明。上面的功能是 roomId 和 service 切换就自动关闭旧的链接，打开新的链接，所有的聊天链接动作都一样，可以提取成公共组件来使用：\n\n```js\nfunction useChatRoom({ serverUrl, roomId }) {\n  useEffect(() =\u003e {\n    const options = {\n      serverUrl: serverUrl,\n      roomId: roomId\n    };\n    const connection = createConnection(options);\n    connection.connect();\n    return () =\u003e connection.disconnect();\n  }, [roomId, serverUrl]);\n}\n```\n\n这样，只需要使用这个函数就能完成聊天室的链接工作：\n\n```js\nuseChatRoom({  \n    roomId: roomId,  \n    serverUrl: serverUrl  \n});\n```\n\n当然了，[全局非受控事件（addEventListener）](https://codesandbox.io/s/b006ec?file=/useWindowListener.js\u0026utm_medium=sandpack)、[可视区域监听](https://codesandbox.io/s/m9drvd?file=/useIntersectionObserver.js\u0026utm_medium=sandpack)也可以封装为一个独立的 Hook 来使用。\n\n#### 5. 使用定时器操作 state\n\n如果想要在 `useState` 里使用定时器操作状态值，你可能会这样写：\n\n```js\nunction Counter() {  \n    const [count, setCount] = useState(0);  \n\n    useEffect(() =\u003e {  \n        const intervalId = setInterval(() =\u003e {  \n            setCount(count + 1); // You want to increment the counter every second...  \n        }, 1000)  \n\n        return () =\u003e clearInterval(intervalId);  \n    }, [count]); // 🚩 ... but specifying `count` as a dependency always resets the interval.  \n    // ...  \n}\n```\n\n上面的例子中，count 是一个响应值，在 useEffect 中引入了他的依赖，同时，这是函数中又改变了他的值，这就导致了 setInterval 函数会被反复的执行，定时器每次都会创建一个新的出来。代码逻辑出现错误不说，也浪费了内存空间。\n\n解决方案其实很简单，上一篇文章讲 `useState` 的时候提到过，useState 内部可以传一个函数，他的参数就是上一次更新完之后的状态值，所以这里并不需要去拿 count 这个变量：\n\n```js\nuseEffect(() =\u003e {\n  const intervalId = setInterval(() =\u003e {\n    setCount(c =\u003e c + 1); // ✅ Pass a state updater\n  }, 1000);\n  return () =\u003e clearInterval(intervalId);\n}, []); // ✅ Now count is not a dependency\n```\n\n### 关于依赖\n\n不推荐不引入必须的依赖或者添加额外的不需要的依赖项。你的依赖项的选择取决于 `useEffect` 包裹的代码。\n\n依赖的选择不仅包括设置函数内所应用的变量、函数，还应考虑到各个变量、函数各自的引用依赖。如果引用的函数内的变量变化引起了该函数重新设置，进而便会触发 `useEffec` 执行。\n\n在上面的聊天室例子中，rootId 是通过用户下拉切换得来的，可以看做是一个响应式数据；但是 serverUrl 是一个常量字符串，完全不需要放在 state 里，进而也可以移出依赖项：\n\n```js\nuseEffect(() =\u003e {  \n    const connection = createConnection(serverUrl, roomId);  \n    connection.connect();  \n\n    return () =\u003e connection.disconnect();  \n}, [roomId]); // ✅ All dependencies declared\n```\n\n如果包裹的函数没有任何可响应的数据，那么就用一个空数组即可。\n\n### 风险项\n\n可以通过一定的注释欺骗依赖项检查，比如：\n\n```js\nuseEffect(() =\u003e {\n  // ...\n  // 🔴 Avoid suppressing the linter like this:\n  // eslint-ignore-next-line react-hooks/exhaustive-deps\n}, []);\n```\n\n这种情况在你肥肠明确包裹函数的依赖关系时才可使用，但是这同样不利于团队合作中的代码维护。如果包裹函数中的变量或者函数在代码迭代维护过程中变成了响应式的，但是这里又抑制了告警提示，可能会出现难以排查的问题。\n\n\u003e P.S. 可能你会觉得: 我使用空数组就是表示组件初始化加载时调用的啊，为什么还要给我弹警告？这里，作者建议，不要在函数式组件里谈生命周期，这里只有响应式副作用和常量。\n\n## 3. 实验性API：useEffectEvent\n\n\u003e 该API还处于试验阶段，正式release版尚未发布。\n\n理论上，依赖更新了，设置函数就会重新执行，考虑下面记录页面访问量的代码：\n\n```js\nfunction Page({ url, shoppingCart }) {  \n    useEffect(() =\u003e { \n        // ...\n        logVisit(url, shoppingCart.length);  \n    }, [url, shoppingCart]); // ✅ All dependencies declared  \n    // ...  \n}\n```\nurl和shoppingCart变化，都会重新调用logVisit函数来增加访问计数。但是，你只希望访问url变化时才增加访问量，shoppingCart变化时logVisit不要重新执行，但是在执行时，购物车又得是最新的数据，怎么做呢？\n\n直接移除依赖可能会影响函数内部其他地方的变化。此时可以使用 `useEffectEvent`:\n\n```js\nfunction Page({ url, shoppingCart }) {\n  const onVisit = useEffectEvent(visitedUrl =\u003e {\n    // 非响应式的，即可以拿到实时其他响应式数据，又避免了他的变化引起外部更新\n    logVisit(visitedUrl, shoppingCart.length)\n  });\n\n  useEffect(() =\u003e {\n    onVisit(url);\n  }, [url]); // ✅ All dependencies declared\n  // ...\n}\n```\n上面的代码，在url变化后，会执行onVisit -\u003e logVisit函数，被 `useEffectEvent` 包裹的函数不是响应式的，所以这里使用了响应值shoppingCart，既可以及时拿到最新的购物车信息，又避免了购物车变化引起包裹onVisit函数的组件的变化。\n\n\u003e P.S. 他的使用方式同 useEvent\n\n## 4. useLayoutEffect\n\n`useLayoutEffect` 是 `useEffect` 的一个版本。一般用在控制页面渲染的工作中，其在页面渲染过程之前调用。（会影响性能）\n\n### 使用场景\n\n#### 1.页面初始化时获取矩形的高度\n\n在元素渲染之前，获取一个 ref 指向元素的高度，并设置给组件的state：\n\n```js\nimport { useState, useRef, useLayoutEffect } from 'react';\n\nfunction Tooltip() {\n  const ref = useRef(null);\n  const [tooltipHeight, setTooltipHeight] = useState(0);\n\n  useLayoutEffect(() =\u003e {\n    const { height } = ref.current.getBoundingClientRect();\n    setTooltipHeight(height);\n  }, []);\n  // ...\n}\n```\n\n#### 2. 在页面重绘之前改动布局\n\n上面的例子中，tooltip 组件需要在页面渲染时获取挂载元素的高度，进而确认在哪个方向上渲染：\n\n```js\nuseLayoutEffect(() =\u003e {\n    const { height } = ref.current.getBoundingClientRect();\n    setTooltipHeight(height);\n    console.log('Measured tooltip height: ' + height);\n  }, []);\n\n  let tooltipX = 0;\n  let tooltipY = 0;\n  if (targetRect !== null) {\n    tooltipX = targetRect.left;\n    tooltipY = targetRect.top - tooltipHeight;\n    if (tooltipY \u003c 0) {\n      // It doesn't fit above, so place below.\n      tooltipY = targetRect.bottom;\n    }\n  }\n  \n  // ...\n  \n  return createPortal(\n    \u003cTooltipContainer x={tooltipX} y={tooltipY} contentRef={ref}\u003e\n      {children}\n    \u003c/TooltipContainer\u003e,\n    document.body\n  );\n```\n完整例子见[官网demo](https://codesandbox.io/s/bj8hpt?file=/TooltipContainer.js\u0026utm_medium=sandpack)\n\n### 注意事项\n\n在使用react SSR时，初始的 HTML渲染会早于 js 脚本，但是在服务端没有布局信息，所以在 js 脚本加载完毕后，页面可能会出现问题，汇总如下：\n\n1.  不一致的渲染结果：由于服务端渲染和客户端渲染的执行环境不同，`useLayoutEffect` 在服务端和客户端可能会产生不一致的结果。这可能导致在服务端渲染时出现闪烁、布局错乱或不符合预期的行为。\n2.  无效的 DOM 操作：`useLayoutEffect` 在服务端执行时，无法直接访问到真实的 DOM。因此，在这个阶段对 DOM 进行的操作可能会导致错误或无效的结果。\n3.  性能问题：由于 `useLayoutEffect` 的执行是同步的，并且在每个渲染周期都会被调用，可能会对服务器的性能产生负面影响。在大规模的 SSR 项目中，频繁的同步 DOM 操作可能会导致性能下降和响应时间延长。\n\n\u003e 建议：服务端渲染的项目中使用 `useEffect` 替代，并使用 [`\u003cSuspense\u003e`](https://react.dev/reference/react/Suspense) 懒加载组件，或者使用 hydration 模式开发。\n\n## 5. useInsertionEffect\n\n`useInsertionEffect` 是 `useEffect` 的一个版本。其在 DOM 变更之前触发，是一个结合 CSS-in-JS 的样式修改的自定义 hook。\n\n### 使用场景\n\n###### 从 CSS-in-JS 库中插入动态样式\n\n在运行中的代码中，动态插入 style 样式，有两个弊端：\n\n1. 迫使浏览器更频繁地重新计算样式。\n2. 如果运行时注入发生在 React 生命周期的错误时间，它可能会非常慢。\n\n使用 useInsertionEffect 可以为我们提供一种方案，解决上面第二个问题。（第一个问题目前不可解）：\n\n```js\nlet isInserted = new Set();\nfunction useCSS(rule) {\n  useInsertionEffect(() =\u003e {\n    // As explained earlier, we don't recommend runtime injection of \u003cstyle\u003e tags.\n    // But if you have to do it, then it's important to do in useInsertionEffect.\n    if (!isInserted.has(rule)) {\n      isInserted.add(rule);\n      document.head.appendChild(getStyleForRule(rule));\n    }\n  });\n  return rule;\n}\n\nfunction Button() {\n  const className = useCSS('...');\n  return \u003cdiv className={className} /\u003e;\n}\n```\n\nuseInsertionEffect 同样不适用于服务端渲染，在书写时需要额外判断：\n\n```js\nlet collectedRulesSet = new Set();\n\nfunction useCSS(rule) {\n  if (typeof window === 'undefined') {\n    collectedRulesSet.add(rule);\n  }\n  useInsertionEffect(() =\u003e {\n    // ...\n  });\n  return rule;\n}\n```\n\n\u003e P.S. 他是如何解决第二条问题的：如果在渲染期间插入样式并且 React 正在处理非阻塞更新，则浏览器将在渲染组件树时每帧重新计算样式，这可能会非常慢。useInsertionEffect 比在 useLayoutEffect 或 useEffect 中插入样式要好，因为它确保当其他 Effects 在组件中运行时，\\\u003cstyle\\\u003e 标签已经被插入。否则，常规 Effects 中的布局计算将由于过时的样式而出错。\n\n----\n\n本期完了，债见！"])</script><script>self.__next_f.push([1,"2e:T3988,"])</script><script>self.__next_f.push([1,"官网地址：[React](https://beta.reactjs.org/)\n\n## 1. useState\n\nuseState 可以说是使用的最频繁的一个 hook 了。接下来看看官网怎么解释他的用法。他是一个在函数式组件内添加暂存状态的函数，在组件更新渲染时，能够保留state里变量的状态不被初始化。\n\n同其他 hook 一样，不能在循环和判断条件里使用，官方推荐在组件顶部使用：\n\n```js\nimport { useState } from 'react';  \n\nfunction MyComponent() {  \n    const [age, setAge] = useState(28);  \n    const [name, setName] = useState('Taylor');  \n    const [todos, setTodos] = useState(() =\u003e createTodos());  \n    // ...\n}\n```\n\n### 接受参数：initialState\n\n接受一个初始化的值。在state创建时，会将值记录为这个初始化的值，不传默认是 `undefined`。\n\n\u003e P.S. 如果初始化值传为一个函数，它将被作为初始化函数。要求必须是纯函数，不带任何参数，并且应该有返回值。初始化函数的返回将被记录为初始状态。该初始化函数只会加载一次，在下一个组件渲染时，不会被重新执行\n\n### 返回值\n\n他的返回值是一个数组解构的变量。\n\n- 状态\n\n第一个变量是状态变量本身\n\n- 设置状态函数\n\n第二个变量是设置状态的函数，调用这个函数会重新设置state值并触发组件的 re-render.\n\n设置状态的函数使用范例：\n\n```js\nconst [name, setName] = useState('Edward');  \n\nfunction handleClick() {  \n    setName('Taylor');  \n    setAge(a =\u003e a + 1);  \n    // ...\n}\n```\n\n### 关于设置函数（比如 setName）\n\n- 入参\n\n参数是要设置的新状态的值，可以是任何类型。\n\n\u003e P.S. 如果你传了一个函数进去（比如上面的 setName），这个函数会被作为更新函数对待。同样必须是纯函数，这个函数的参数是更新之前的状态值，函数的返回值会被作为新的状态值。React 会把你的更新函数放到一个任务队列里（fiber调度器），在下一个渲染周期到来时，fiber会遍历队列，按照一定的优先级执行函数并清空对列。\n\n- 返回值\n\n### 新的状态值\n\n- ⭐️ 设置状态函数的注意事项\n\n1. 状态只在下次更新时异步变化，如果在设置状态后立即读取状态值，读取到的还是老的状态。\n2. 如果提供的新值与当前状态相同（由 Object.is 比较确定），`React` 将跳过重新渲染组件及其子组件。\n3. `React` 是批量合并更新 state 的。多个状态更新操作会被放入一个队列中，然后在适当的时机进行合并和批量处理。这可以防止在单个事件期间多次重新渲染。在极少数情况下，需要强制 `React` 提前更新界面，例如访问 DOM，可以使用 flushSync。\n4. 在渲染期间调用 set 函数只允许在当前渲染组件中。 `React` 将丢弃其输出并立即使用新状态再次渲染。（下边有在渲染时设置状态值的例子）\n5. 在严格模式 + 开发环境下，初始化函数会被调用两次来帮助你调试错误。如果你使用的是纯函数，第二次结果会被忽略掉。\n\n### 注意事项\n\n1. 作为一个hook，他在函数式组件内是单向链表存储的，所以必须放在组件顶层使用。如果你需要在循环或者条件语句里使用，就提取成单独的组件使用。\n2. 在严格模式 + 开发环境下，初始化函数会被调用两次来帮助你调试错误。如果你使用的是纯函数，第二次结果会被忽略掉。\n\n### 各种使用例子\n\n#### 1. 在设置状态后立即读取状态值\n\n```js\nfunction handleClick() {\n    const [name, setName] = useState('Taylor');\n    //...\n    setName('Robin');  \n    console.log(name); // Still \"Taylor\"!  \n}\n```\n\n如果想要获取到变化后的值，可以使用 `useEffect`\n\n#### 2. 基础使用：多状态与表单结合\n\n```jsx\nimport { useState } from 'react';\n\nexport default function Form() {\n  const [name, setName] = useState('Taylor');\n  const [age, setAge] = useState(42);\n\n  return (\n    \u003c\u003e\n      \u003cinput\n        value={name}\n        onChange={e =\u003e setName(e.target.value)}\n      /\u003e\n      \u003cbutton onClick={() =\u003e setAge(age + 1)}\u003e\n        Increment age\n      \u003c/button\u003e\n      \u003cp\u003eHello, {name}. You are {age}.\u003c/p\u003e\n    \u003c/\u003e\n  );\n}\n```\n\n#### 3. 在定时器中使用\n\n在定时器回调函数中使用组件：\n\n```js\nconst [count, setCount] = useState(0);\n\nconst counterIntervalFunction = () =\u003e {\n  console.log(count);\n  setCount(count + 1)\n};\n\n// ...\nconst interval = setInterval(counterIntervalFunction, 1000);\n```\n\n上面的例子中，定时器中试图修改state的值，但是，因为闭包的原因，counterIntervalFunction中打印的结果每次都是 1，并没有实现累加的效果。\n\n此时可以使用第二种写法：\n\n```js\nsetCount(prev =\u003e prev + 1)\n```\n\n也可以借助 useRef：\n\n```js\nconst ref = useRef({ count });\nuseEffect(() =\u003e { \n    ref.current = { count }\n}, [count]);\n```\n这样，在 counterIntervalFunction 里拿 ref.current.count 就可以啦。当然了，你也可以把整个定时器都放在基于count的 `useEffect` 中，一样可以实现相同的功能。\n\n#### 4. 基于上一次状态更新状态值\n\n```js\nfunction handleClick() {  \n    // 错误写法\n    setAge(age + 1); // setAge(42 + 1)  \n    setAge(age + 1); // setAge(42 + 1)  \n    setAge(age + 1); // setAge(42 + 1)  \n    \n    // 正确写法 ✅\n    setAge(a =\u003e a + 1); // setAge(42 =\u003e 43)  \n    setAge(a =\u003e a + 1); // setAge(43 =\u003e 44)  \n    setAge(a =\u003e a + 1); // setAge(44 =\u003e 45)\n}\n```\n\n#### 5. state是一个对象时，修改state需要改变引用\n\n```js\n// 不生效\nform.firstName = 'Taylor';\n\n// 推荐\nsetForm({  \n    ...form,  \n    firstName: 'Taylor'  \n});\n```\n\n#### 6. 避免初始化函数重复执行\n\n考虑下面的例子：\n\n```js\nfunction TodoList() {  \n    const [todos, setTodos] = useState(createInitialTodos());  \n    // ...\n}\n```\n\n虽然createInitialTodos有效执行只有组件挂载时一次，但在之后组件历次re-render时都会被执行，这就造成了资源浪费。其实你只需要传递初始化函数声明就行了：\n\n```js\nfunction TodoList() {  \n    const [todos, setTodos] = useState(createInitialTodos);  \n    // ...\n}\n```\n\n#### 7. 重置状态值\n\n可以借助 `React` 最常见的 key 值来重置状态：\n\n```js\nimport { useState } from 'react';\n\nexport default function App() {\n  const [version, setVersion] = useState(0);\n\n  function handleReset() {\n    setVersion(version + 1);\n  }\n\n  return (\n    \u003c\u003e\n      \u003cbutton onClick={handleReset}\u003eReset\u003c/button\u003e\n      \u003cForm key={version} /\u003e\n    \u003c/\u003e\n  );\n}\n\nfunction Form() {\n  const [name, setName] = useState('Taylor');\n\n  return (\n    \u003c\u003e\n      \u003cinput\n        value={name}\n        onChange={e =\u003e setName(e.target.value)}\n      /\u003e\n      \u003cp\u003eHello, {name}.\u003c/p\u003e\n    \u003c/\u003e\n  );\n}\n```\n\n上面的例子中，把一个 state 当做key传递给表单组件，当需要重置表单组件时，改变这个key值，React组件就会自自动 re-create 一次表单，达到了重置的目的，重置后，表单组件里的所有state都会重置。\n\n#### 8. 组件渲染期间 改变 state\n\n一般上，状态值的修改都会放在一个事件的handleBar里，但是，有时候你想要在除了事件以外的响应中改变状态值 （比如 props 改变的时候），应该怎么办呢？下面给出一个范例：\n\n```js\nimport { useState } from 'react';\n\nexport default function CountLabel({ count }) {\n  const [prevCount, setPrevCount] = useState(count);\n  const [trend, setTrend] = useState(null);\n  if (prevCount !== count) {\n    setPrevCount(count);\n    setTrend(count \u003e prevCount ? 'increasing' : 'decreasing');\n  }\n  return (\n    \u003c\u003e\n      \u003ch1\u003e{count}\u003c/h1\u003e\n      {trend \u0026\u0026 \u003cp\u003eThe count is {trend}\u003c/p\u003e}\n    \u003c/\u003e\n  );\n}\n```\n上面的例子使用起来需注意，`prevCount !== count`的判断条件不能省去，不然就会陷入反复 set 状态的死循环里。\n\n当然了，你也可以像上一篇文章那样，使用 useMemo 获得计算属性。\n\n### Q\u0026A\n\n#### 1. 我已经更新了状态，但是console.log打印了旧的值\n\n```js\nfunction handleClick() {  \n    console.log(count); // 0  \n    setCount(count + 1); // Request a re-render with 1  \n    console.log(count); // Still 0!  \n    \n    setTimeout(() =\u003e {  \n        console.log(count); // Also 0!  \n    }, 5000);  \n}\n```\n\n因为React 的state类似于快照，更新了状态后，并不影响之前已经在fiber任务事件循环里的状态。如果需要立即使用，可以借助临时变量：\n\n```js\nconst nextCount = count + 1;  \n\nsetCount(nextCount);  \n\nconsole.log(count); // 0  \n\nconsole.log(nextCount); // 1\n```\n\n#### 2. 我已经更新了状态，但是界面不变化\n\n前后两次修改的状态，如果相等（Object.is）的话，就不会去触发渲染。错误示范：\n\n```js\nobj.x = 10; // 🚩 Wrong: mutating existing object  \nsetObj(obj); // 🚩 Doesn't do anything\n```\n\n正确使用方式：\n\n```js\n// ✅ Correct: creating a new object\nsetObj({\n  ...obj,\n  x: 10\n});\n```\n\n#### 3. 控制台报错 “Too many re-renders. React limits the number of renders to prevent an infinite loop.”\n\n一般这种情况就是组件渲染进入了死循环。下面是一个可能的例子及解决方案：\n\n```js\n// 🚩 Wrong: calls the handler during render\nreturn \u003cbutton onClick={handleClick()}\u003eClick me\u003c/button\u003e\n\n// ✅ Correct: passes down the event handler\nreturn \u003cbutton onClick={handleClick}\u003eClick me\u003c/button\u003e\n\n// ✅ Correct: passes down an inline function\nreturn \u003cbutton onClick={(e) =\u003e handleClick(e)}\u003eClick me\u003c/button\u003e\n```\n\n#### 4. 我想要把一个函数作为 state，但是却当成了初始函数执行了\n\n上面的讲过，useState 的入参如果是一个函数，则会将函数执行结果作为初始函数。如果一定要传一个函数作为状态，可以使用高阶函数：\n\n```js\nconst [fn, setFn] = useState(() =\u003e someFunction);\n\nfunction handleClick() {\n  setFn(() =\u003e someOtherFunction);\n}\n```\n\n## 2. useReducer\n\nuseReducer 是一个一般化的 useState，比 useState 多了一个处理函数，该函数可以根据不同的分发状态来相应的改变状态。可以这么理解，useReducer 是一个提前写好了怎么处理 state 的函数的 useState。\n\n声明格式：\n\n```js\nconst [state, dispatch] = useReducer(reducer, initialArg, init)\n```\n\n### 接收参数\n\n1. reducer\n\nreducer 函数指定如何更新状态，必须是一个纯函数。\n\n2. initialArg\n\n状态的初始值\n\n3. init\n\n可选初始化处理函数。如果未指定，则初始状态设置为 initialArg。否则，初始状态设置为调用 `init(initialArg)` 的结果。\n\n### 返回值\n\n1. state 为当前的状态值\n2. dispatch 函数，用于更新状态\n\n### 注意事项\n\n使用方式同 useState\n\n### 基本使用\n\n```js\nimport { useReducer } from 'react';\n\nfunction reducer(state, action) {\n  // ...\n}\n\nconst [state, dispatch] = useReducer(reducer, { age: 42 });\n\nfunction handleClick() {\n  dispatch({ type: 'incremented_age' });\n  // ...\n}\n```\n\n#### dispatch 函数\n\n接受一个 state 和 action。action 可以是任意类型的值，可以是一个标志位 + payload 的形式；同时，dispatch 函数没有返回值。\n\n### 使用例子\n\n###### 1. 与form表单结合\n\n```jsx\nimport { useReducer } from 'react';\n\nfunction reducer(state, action) {\n  switch (action.type) {\n    case 'incremented_age': {\n      return {\n        ...state,\n        age: state.age + 1\n      };\n    }\n    case 'changed_name': {\n      return {\n        name: action.nextName,\n        age: state.age\n      };\n    }\n  }\n  \n  // 这里处理未知情况，可以返回一个自定义对象，也可以抛出错误\n  throw Error('Unknown action: ' + action.type);\n}\n\nconst initialState = { name: 'Taylor', age: 42 };\n\nexport default function Form() {\n  const [state, dispatch] = useReducer(reducer, initialState);\n\n  function handleButtonClick() {\n    dispatch({ type: 'incremented_age' });\n  }\n\n  function handleInputChange(e) {\n    dispatch({\n      type: 'changed_name',\n      nextName: e.target.value\n    }); \n  }\n\n  return (\n    \u003c\u003e\n      \u003cinput\n        value={state.name}\n        onChange={handleInputChange}\n      /\u003e\n      \u003cbutton onClick={handleButtonClick}\u003e\n        Increment age\n      \u003c/button\u003e\n      \u003cp\u003eHello, {state.name}. You are {state.age}.\u003c/p\u003e\n    \u003c/\u003e\n  );\n}\n```\n\n表单元素的 value 是 state内部的值，在表单元素改变的事件中，dispatch这个reducer，dispatch里传了个 type和一个 payload 项：nextName，此时，reducer就可以接收参数了：state就是当前变更前的状态值，action就是 dispatch 传递的参数。\n\n\u003e P.S. reducer 函数里不能直接改 state：`state.age = state.age + 1;`，他应该返回一个新的引用的对象，这个对象会自动被 useReducer 设置。\n\n###### 2. 避免重新执行初始函数\n\n考虑下面的例子：\n\n```js\nfunction createInitialState(username) {  \n    // ...  \n}  \n\nfunction TodoList({ username }) {  \n    const [state, dispatch] = useReducer(reducer, createInitialState(username));  \n    // ...\n}\n```\n\n第二个参数本来是初始化状态的位置，传了个函数调用，而不是函数声明，在每次组件re-render时都会被执行，影响性能。\n\n考虑如下改造：\n\n```js\nconst [state, dispatch] = useReducer(reducer, username, createInitialState);\n```\n第二个参数还是静态的初始值，第三个参数是自定义的初始化处理函数，在初始化时，会将 `createInitialState(username)` 的返回值作为初始值。\n\n### Q\u0026A\n\n###### 1. dispatch 后如何使用最新的状态值\n\n与 useState 类似，需使用局部变量：\n\n```js\nconst action = { type: 'incremented_age' };\ndispatch(action);\n\nconst nextState = reducer(state, action);\nconsole.log(state);     // { age: 42 }\nconsole.log(nextState); // { age: 43 }\n```\n\n###### 2. 我的 reducer 为什么总是被执行了多次？\n\n这个还是跟严格模式和开发环境有关系的。开发环境会帮你检测你的 reducer 是否是纯函数。考虑下面的例子：\n\n```js\nfunction reducer(state, action) {\n  switch (action.type) {\n    case 'added_todo': {\n      // 🚩 Mistake: mutating state\n      state.todos.push({ id: nextId++, text: action.text });\n      return state;\n    }\n    // ...\n  }\n}\n```\n上面的 reducer 就不是一个纯函数，在开发环境中，执行两次，todos数组数据就会错乱，开发者就很容易发现问题并及时改正。下面给出正确的参考：\n\n```js\n// ✅ Correct: replacing with new state\nreturn {\n  ...state,\n  todos: [\n    ...state.todos,\n    { id: nextId++, text: action.text }\n  ]\n};\n```\n\n\u003e 不知不觉，写到这里已经 1W 字了...\n\n----\n\n本期的官网解读就到这里啦，债见！"])</script><script>self.__next_f.push([1,"2f:T2d8e,"])</script><script>self.__next_f.push([1,"React 官网出了 beta 版的新版本，仍旧没有中文版。对于国内不少开发者来说增加了不少麻烦。我这里以前端开发的角度归纳总结一下，把其中大家重点使用的部分介绍给大家。\n\n官网地址：[React](https://beta.reactjs.org/)\n\n我们先从用的最多的 hook 部分开始。\n\n## 1. [useCallback]\n\nuseCallback 返回一个记忆化的回调函数，这个函数只有在依赖项改变时才会发生变化。这是对回调函数进行性能优化的一种方式，以确保子组件不会在父组件重新渲染时重复渲染。\n\n定义：\n\n```js\nconst cachedFn = useCallback(fn, dependencies);\n```\n\n### 使用\n\n```js\nimport { useCallback } from 'react';\n\nexport default function ProductPage({ productId, referrer, theme }) {\n  const handleSubmit = useCallback(\n    (orderDetails) =\u003e {\n      post('/product/' + productId + '/buy', {\n        referrer,\n        orderDetails,\n      });\n    },\n    [productId, referrer],\n  );\n}\n```\n\n### 参数\n\n- fn：想要缓存的函数\n- 依赖项：缓存更新的条件\n\n### 返回值\n\n- 初始化时，返回缓存的原始函数\n- 依赖项没有变化（Object.is 判断），返回上次缓存的函数，否则返回最新的函数\n\n### 注意事项\n\n- 组件文件修改后，缓存会失效\n- 初始化后，suspends 加载前的组件，不会缓存函数\n\n### Future\n\n- 有望在虚拟列表实现滚动区域外的元素停止缓存\n\n### 使用场景\n\n#### 在组件 re-render 时跳过重渲染\n\n官方案例：\n\n```js\n// 假设没有使用 useCallback 的 ProductPage\nexport default function ProductPage({ productId, referrer, theme }) {\n  const handleSubmit = (orderDetails) =\u003e {\n    post('/product/' + productId + '/buy', {\n      referrer,\n      orderDetails,\n    });\n  }\n\n  return (\n    \u003cdiv className={theme}\u003e\n      \u003cShippingForm onSubmit={handleSubmit} /\u003e\n    \u003c/div\u003e\n  );\n}\n```\n\n当 theme 变化时，ShippingForm 会被重新渲染，页面难免造成阻塞。接下来优化 ShippingForm。\n\n\u003e 官方注释：By default, when a component re-renders, React re-renders all of its children recursively. \n\n为了规避由 props 变化造成的不必要的渲染，可以使用 memo：\n\n```js\nconst ShippingFormMemo = memo(function ShippingForm({ onSubmit }) {\n  // ...\n});\n```\n\n上面这种情况下，当 props 检测出变化前后一样时，被 memo 包裹的组件不做重新渲染。此时，**useCallback 就能起到作用了**。上面的例子，如果你不使用 useCallback，组件渲染前后，js 会创建两次 handleSubmit，他们在内存中地址不一样，自然是不同的数据，此时 memo 就失效了！\n\n所以为了 memo 能够起作用，被他包裹的 组件中的props的属性应该使用 useCallback。\n\n#### 在缓存中使用 state\n\n```js\nfunction TodoList() {\n  const [todos, setTodos] = useState([]);\n\n  const handleAddTodo = useCallback(\n    (text) =\u003e {\n      const newTodo = { id: nextId++, text };\n      setTodos([...todos, newTodo]);\n    },\n    [todos],\n  );\n  // ...\n}\n```\n\n设置 state 的语句可以写成下面形式：\n\n```js\nconst handleAddTodo = useCallback((text) =\u003e {\n  const newTodo = { id: nextId++, text };\n  setTodos((todos) =\u003e [...todos, newTodo]);\n}, []); // ✅ No need for the todos dependency\n```\n\n#### 防止 useEffect 过多触发\n\n看下面聊天室的例子：\n\n```js\nfunction createOptions() {\n  return {\n    serverUrl: 'https://localhost:1234',\n    roomId: roomId,\n  };\n}\n\nuseEffect(() =\u003e {\n  const options = createOptions();\n  const connection = createConnection();\n  connection.connect();\n  return () =\u003e connection.disconnect();\n}, [createOptions]);\n```\n\n用 createOptions 会造成循环检测，导致一直调用 useEffect 的死循环。此时，可以将 createOptions 也缓存一下即可：\n\n```js\nconst createOptions = useCallback(() =\u003e {\n  return {\n    serverUrl: 'https://localhost:1234',\n    roomId: roomId,\n  };\n}, [roomId]);\n```\n\n此时，既然有一个引用链，根源都依赖 roomId，所以可以合并，因此有更进一步的改进方案：\n\n```js\nuseEffect(() =\u003e {\n  function createOptions() {\n    // ✅ No need for useCallback or function dependencies!\n    return {\n      serverUrl: 'https://localhost:1234',\n      roomId: roomId,\n    };\n  }\n\n  const options = createOptions();\n  const connection = createConnection();\n  connection.connect();\n  return () =\u003e connection.disconnect();\n}, [roomId]); // ✅ Only changes when roomId changes\n```\n\n#### 自定义 hook 时使用\n\n自定义 hook 时，推荐所有的函数缓存一下，以便于在外部使用时不留性能问题的坑，便于随时优化性能：\n\n```js\nfunction useRouter() {\n  const { dispatch } = useContext(RouterStateContext);\n\n  const navigate = useCallback(\n    (url) =\u003e {\n      dispatch({ type: 'navigate', url });\n    },\n    [dispatch],\n  );\n\n  const goBack = useCallback(() =\u003e {\n    dispatch({ type: 'back' });\n  }, [dispatch]);\n\n  return {\n    navigate,\n    goBack,\n  };\n}\n```\n\n### QA\n\n- 如何在循环列表里使用 useCallback\n\n不可以直接使用，会破坏 hook 的链表结构。推荐的做法是将公共组件提取出来，在提取的公共组件中使用。\n\n## 2. [useMemo]\n\nuseMemo 与 useCallback 的原理类似。它是用来缓存计算结果的，类似于 vue 的计算属性。\n\n定义：\n\n```js\nconst cachedValue = useMemo(calculateValue, dependencies)\n```\n\n### 使用\n\n```js\nimport { useMemo } from 'react';  \n\nfunction TodoList({ todos, tab }) {  \n    const visibleTodos = useMemo(  \n        () =\u003e filterTodos(todos, tab),  \n        [todos, tab]  \n    );  \n    // ...  \n}\n```\n\n### 参数\n\n- fn：用户返回想要缓存的数值，可以传递参数\n- 依赖项：缓存更新的条件\n\n### 响应式返回值\n\n- 初始化时，返回一次 fn 的返回值\n- 依赖项没有变化（Object.is 判断），返回上次缓存的值，否则返回最新的计算值，并再次缓存\n\n### 注意事项\n\n- 只能在函数式组件顶部使用\n- 在严格模式下，React会调用计算函数两次，以帮助您查找意外杂质。这只是**开发行为**，不影响生产。如果您的计算函数是纯的，这不会影响组件的逻辑。其中一个调用的结果将被忽略。\n- 缓存被丢弃的情况：在开发中，当编辑组件文件时，React会丢弃缓存。在开发和生产环境中，在 suspends 加载前的组件，不会缓存函数，React将丢弃缓存。\n\n### Future\n\n- 未来期望添加对虚拟化列表的内置支持。此时会自动丢弃不在可视窗口内的列表缓存。\n\n### 使用场景\n\n#### 跳过没必要的值重计算\n\n这个是最常用的使用场景，在依赖没有变化时，使用缓存值，而不用重新计算：\n\n```js\nimport { useMemo } from 'react';\n\nfunction TodoList({ todos, tab, theme }) {\n  const visibleTodos = useMemo(() =\u003e filterTodos(todos, tab), [todos, tab]);\n  // ...\n}\n```\n\n这里的计算函数，可简单可复杂。如果计算函数很简单，那么不缓存不是问题，因为计算会很快。然而，如果要过滤或转换大型数组或者复杂的数据结构时，或进行一些耗时的计算（`console.time`来测试）时，缓存就很有必要了。\n\n#### 跳过没必要的组件重渲染\n\n还以上面的待办列表的例子：\n\n```js\nexport default function TodoList({ todos, tab, theme }) {\n  // Every time the theme changes, this will be a different array...  \n  const visibleTodos = filterTodos(todos, tab);\n  \n  return (\n    \u003cdiv className={theme}\u003e\n      \u003cList items={visibleTodos} /\u003e\n    \u003c/div\u003e\n  );\n}\n```\n\n上面的代码，基于 React 的渲染原理，当一个组件重渲染，其子组件会全部重渲染。所以 theme 变化后，List 组件就会被重渲染。我们使用 memo 检测 props 变化：\n\n```js\nimport { memo } from 'react';\n\nconst List = memo(function List({ items }) {\n  // ...\n});\n```\n\n但还是之前的问题，props 传入的对象也应该缓存。每次 TodoList 重渲染，visibleTodos 列表是一个不同的值了，所以，List 的 memo 会失效。因为 visibleTodos 不是函数，我们不用 useCallback，我们使用 useMemo：\n\n```js\nconst visibleTodos = useMemo(\n  () =\u003e filterTodos(todos, tab),\n  [todos, tab] // ...so as long as these dependencies don't change...\n);\n```\n\n#### 缓存一个 hook 的依赖关系\n\n假设有个在组件内部新创建的对象：\n\n```js\nfunction Dropdown({ allItems, text }) {\n  const searchOptions = { matchMode: 'whole-word', text };\n\n  const visibleItems = useMemo(() =\u003e {\n    return searchItems(allItems, searchOptions);\n  }, [allItems, searchOptions]); // 🚩 Caution: Dependency on an object created in the component body\n  // ...\n}\n```\n上面例子中，searchOptions 就是一个新的对象，每次渲染组件都会创建一个新的。这就又会造成 下边 useMemo 失效，我们可以这样：\n\n```js\nconst searchOptions = useMemo(() =\u003e {  \n  return { matchMode: 'whole-word', text };  \n}, [text]); // ✅ Only changes when text changes\n```\n\n当然，也可以两个 useMemo 合并一个：\n\n```js\nconst visibleItems = useMemo(() =\u003e {\n  const searchOptions = { matchMode: 'whole-word', text };\n  return searchItems(allItems, searchOptions);\n}, [allItems, text]); // ✅ Only changes when allItems or text changes\n```\n\n#### 缓存函数\n\n举一个表单提交的例子：\n\n```js\nexport default function ProductPage({ productId, referrer }) {\n  function handleSubmit(orderDetails) {\n    post('/product/' + productId + '/buy', {\n      referrer,\n      orderDetails,\n    });\n  }\n\n  return \u003cForm onSubmit={handleSubmit} /\u003e;\n}\n```\n\nhandleSubmit 每次重渲染都会创建一个新的对象，导致 Form 子组件也重渲染了。除了使用 useCallback，还可以使用 useMemo：\n\n```js\nconst handleSubmit = useMemo(() =\u003e {\n  return (orderDetails) =\u003e {\n    post('/product/' + product.id + '/buy', {\n      referrer,\n      orderDetails,\n    });\n  };\n}, [productId, referrer]);\n```\n\n只需要让 useMemo 的 fn 返回一个函数就行了。官方建议，缓存函数使用 useCallback，这样会避免多写一个包裹函数而造成代码可读性下降。\n\n### QA\n\n- **为什么我的计算值每次渲染都执行两次**\n\n因为，在严格模式下，React将调用某些函数两次而不是一次。而且这只停留在开发模式下，只要你的组件和计算函数是纯的，这就不会影响逻辑。但是为了让代码更健壮，下面的代码就是可改进的：\n\n```js\nconst visibleTodos = useMemo(() =\u003e {\n  // 🚩 Mistake: mutating a prop\n  todos.push({ id: 'last', text: 'Go for a walk!' });\n  const filtered = filterTodos(todos, tab);\n  return filtered;\n}, [todos, tab]);\n```\ntodos作为依赖项 会被 push 两次，我们可以这样写：\n\n```js\nconst visibleTodos = useMemo(() =\u003e {\n  const filtered = filterTodos(todos, tab);\n  // ✅ Correct: mutating an object you created during the calculation\n  filtered.push({ id: 'last', text: 'Go for a walk!' });\n  return filtered;\n}, [todos, tab]);\n```\n这样就保证了 useMemo 依赖的一致性。即使调用了两次，那个对象也不会被 push 两个相同的对象。\n\n- **为什么我的 useMemo 返回了 undefined**\n\n错误代码示例：\n\n```js\n// 🔴 You can't return an object from an arrow function with () =\u003e {\nconst searchOptions = useMemo(() =\u003e {\n  matchMode: 'whole-word',\n  text: text\n}, [text]);\n```\n原因：没有写返回值。你应该把想要的对象 return 返回出去。可能对箭头函数的使用还不太熟悉。\n\n- **如何在循环列表里使用 useMemo**\n\n不可以直接使用，会破坏 hook 的链表结构。推荐的做法是将公共组件提取出来，在提取的公共组件中使用。"])</script><script>self.__next_f.push([1,"30:T1da3,"])</script><script>self.__next_f.push([1,"\u003e 有分享才有进步，欢迎大家批评指正\n\n最近在开发一个国际站项目，涉及到的任务流转可能会跨多个国家和地区，这就涉及到时间差的问题了。本文就来梳理一下我在实际开发中涉及到的前端时区的逻辑处理方案。\n\n## 1. 实际业务场景\n\n在 Asia/shanghai 时区下创建定时流转任务时，产品会有要求：设置为迪拜时间的 `2023-06-24 23:00:00` 点触发任务流程，这就牵扯到时区转换的问题；同时，在 Asia/shanghai 时区下创建的任务，在世界其他各个时区下看到的应该是不同的时间，但是这里需要格式化为同一个时间（创建地的）格式，并标明 `UTC +8`。\n\n\u003e 我们来举个近一点的例子： 拿东京举例，是 `UTC+9` 时区，比我们快了一个时区。如果在 Asia/shanghai 时区下选择了设定在东京的 `2023-06-24 00:00:00` 下触发，那么这个时间以东京时间格式化为时间戳后，在上海本地格式化，应该是 `2023-06-23 23:00:00`\n\n基于上面的业务场景，我这里给出了几种处理方案：\n\n## 2. 方案一、后端调整时区\n\n可以直接把选择的时间字符串 `2023-06-24 00:00:00` 和需要设置的当地时间的时区 `Asia/Tokyo` 给到后端，后端来根据时区将时间字符串格式化为相对于东京的时间戳。\n\n以 Go 为例，time 包下就有按照时区格式化的函数：\n\n```go\nlayout := \"2006-01-02 15:04:05\"\nvalue := \"2023-06-24 00:00:00\"\nlocation := time.LoadLocation(\"Asia/Tokyo\")\nt := time.ParseInLocation(layout, value, location)\n\nfmt.Println(\"Parsed time:\", t.unix())\n```\n\n这样就能在数据库里存下所选时间的时区和绝对的时间戳了。\n\n这时你会问，那么我前端如何获取到 `Asia/Tokyo` 这个正确的时区格式给到后端呢？\n\n1. 使用 moment-timezone 库\n\n```js\nimport moment from 'moment-timezone';\n\nmoment.tz.names(); // [\"Africa/Abidjan\", \"Africa/Accra\", \"Africa/Addis_Ababa\", ...]\n```\n\n选择完时区后，可以通过 `const zone = moment.tz.zone('Asia/Tokyo');` 来获取时区对象，对象里便有了 offset 等信息。\n\n实际在项目落地中，moment库比较大，一般使用 dayjs 代替，但是 dayjs 中没有相关的时区 API，所以这个时区列表，我在本地使用 moment 获取到以后做了本地的特殊格式化，并作为静态文件挂载在 CDN 上了，数组结构如下：\n\n```js\n[\n  {\n    value: 'Japan Standard Time',\n    abbr: 'JST',\n    offset: 9,\n    isdst: false,\n    text: '(UTC+09:00) Osaka, Sapporo, Tokyo',\n    UTC: ['Asia/Dili', 'Asia/Jayapura', 'Asia/Tokyo', 'Etc/GMT-9', 'Pacific/Palau']\n  },\n  {\n    value: 'China Standard Time',\n    abbr: 'CST',\n    offset: 8,\n    isdst: false,\n    text: '(UTC+08:00) Beijing, Chongqing, Hong Kong, Urumqi',\n    UTC: ['Asia/Hong_Kong', 'Asia/Macau', 'Asia/Shanghai']\n  },\n  // ...\n]\n```\n\n上面的 offset 是相对于 UTC 标准时区的偏差，该值可以从 moment 的 zone 对象中获取。\n\n\u003e Zone 对象里 offsets 常见的有 PST 时区 和 PDT 时区，前者为太平洋标准时间（英文：*Pacific Standard Time*，縮寫：*PST*），UTC-8；后者为夏令时间（夏季）称为太平洋夏令时間（英文：Pacific Daylight Time，縮寫：*PDT*），UTC-7；使用其中一个，根据偏差做加减即可。\n\n2. 使用原生的 Intl 对象\n\n如果不需要交互选择时区列表，只是在页面上根据当地时区格式化时间戳，可以使用js原生的 Intl 对象：\n\n```js\nconst timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;\nconsole.log(timeZone); // Asia/Shanghai\n```\n\n而且该方法的兼容性目前已经比较好了：\n\n\n![image.png](/img/posts/2023-6-26/2023-6-26-1.png)\n\n这样在中国的页面上这样显示：\n\n```\n(Asia/Shanghai UTC +8) 2023-06-23 23:00:00\n```\n\n在日本的页面这样显示：\n\n```\n(Asia/Tokyo UTC +9) 2023-06-24 00:00:00\n```\n\n## 3. 方案二、前端格式化为时间戳\n\n这种方案不依赖后端，前端选择时区，前端转换为绝对值时间戳给到后端。获取时区列表的方式参见方案一。这里我们使用手动时区转换的思路，获取到应该转换为上海时间的时间字符串，即，将 `2023-06-24 00:00:00` 转换为 `2023-06-23 23:00:00`。\n\n在获取到时区 `timeZoneOffset` （这里是 9） 和 时间字符串 `time` （这里是 2023-06-24 00:00:00）后，前端按照当地时间模拟时区变化来处理：\n\n```js\n// 模拟转换为标准 UTC 时间，这里减去9个小时即可\nconst UTC = dayjs(time).add(-timeZoneOffset, 'hour');\n// 获取浏览器当地时间的小时差，offsetHours 如果在上海，就是 8\nconst date = new Date();\nconst offsetHours = -(date.getTimezoneOffset() / 60);\n// 将上面的 UTC 加上浏览器本地的时差 \nconst result = dayjs(UTC).add(offsetHours, 'hour');\n```\n\n通过上述操作，就将东京时间的 `2023-06-24 00:00:00` 转换为上海时区的 `2023-06-23 23:00:00`，此时在将这个 result 转换为时间戳即可：\n\n```js\nresult.unix() // 1687532400\n```\n\n\n## 4. 方案三、dayjs格式化为时间戳\n\n该方案为方案二的变种，只是不用原生操作时区差来计算，而是使用 dayjs 内置的方法替代之：\n\n```js\nconst d = dayjs.tz('2023-06-24 00:00:00', 'Asia/Tokyo')\nconsole.log(d.format()) // 2023-06-24T00:00:00+09:00\nconsole.log(d.unix()) // 1687532400\n```\n\n\n![image.png](/img/posts/2023-6-26/2023-6-26-2.png)\n\n该方法的前提是引入时区插件：\n\n```js\nimport timezone from 'dayjs/plugin/timezone';\n\ndayjs.extend(timezone);\n```\n\n这种方案的缺点是必须提前传入时区字符串。方案二不需要任何条件，只需要知道是 UTC 几的时区就可以了。\n\n## 5. 逆向：时间戳展示为给定时区的时间\n\n上面讲了怎么把本地时间选择器选中的指定时区的时间（dayjs）按照所选时区格式化为时间戳。下面说的是他的逆向：怎么从时间戳格式化为所在时区的时间字符串。\n\n\u003e 比如时间戳：1688439600，他在北京时间是 2023-7-4 11:00:00，在东京时间（UTC +9）应该快一个小时\n\n按照上边的例子，我们可以对比浏览器所在时区和给定 offset 的差值来比对，进而将时间加或者减对应的小时数即可：\n\n```js\n// 传入 1688439600，9\nexport const showWithTimeZone = (timestamp, timeZoneOffset) =\u003e {\n  if (typeof timeZoneOffset === 'number') {\n    const date = new Date();\n    const offsetHours = -(date.getTimezoneOffset() / 60);\n\n    // 给定时区与浏览器本地时区的差异\n    const offset = timeZoneOffset - offsetHours;\n    // 直接加法即可，如果时区快，就是正数，否自是负数\n    const result = dayjs(timestamp * 1000).add(offset, 'hour');\n\n    return {\n      format: `(UTC ${timeZoneOffset \u003e 0 ? '+' + timeZoneOffset : timeZoneOffset + ''}) ${result.format('YYYY-MM-DD HH:mm:ss')}`\n    };\n  }\n};\n```\n\n如此，在界面就会看到：\n\n\n![image.png](/img/posts/2023-6-26/2023-6-26-3.png)\n\n## 6. 总结\n\n个人使用的是方案三和方案一的结合，获取到时区列表并缓存CDN后，前端选择时区并转换为绝对值时间戳，后端进行二次校验并在列表显示的地方格式化为字符串返回。\n\n\u003e 需要注意的是，网上获取到的时区偏移可能会有延迟（有些城市会不停调整时区），比如柏林的时区，我在列表里的是 +1，但是网上搜到的最新消息是 GMT+2 的，但是今年10月份又会调回 +1。我这里就还以moment获取的数据为准了。\n\n\n![image.png](/img/posts/2023-6-26/2023-6-26-4.png)"])</script><script>self.__next_f.push([1,"31:T484f,"])</script><script>self.__next_f.push([1,"\u003e 本文针对 ESLint 8+ 版本\n\n## 1. 配置文件格式\n\nESLint 配置文件可以使用多种文件格式，常用的有以下几种：\n\n-   .eslintrc.js：使用 JavaScript 编写的配置文件，返回一个配置对象。\n-   .eslintrc.yaml、.eslintrc.yml：使用 YAML 语言编写的配置文件。\n-   .eslintrc.json：使用 JSON 格式编写的配置文件。\n-   .eslintrc.cjs：使用这种配置时，中需要在`package.json`中配置`type\":\"module\"`。\n-   eslintConfig：使用npm包进行配置。\n-   .eslintrc：普通配置文件\n\n此外还有行内配置：\n\n-   `/* eslint-disable */` 和 `/* eslint-enable */`，禁用启用规则\n-   `/* global */`，定义全局变量\n-   `/* eslint */`，配置规则\n-   `/* eslint-env */`，指定当前运行环境\n\n现在，有一种新的配置文件类型：`eslint.config.js`，官方将在 v9 版本全面使用该配置类型。\n\n\n\n其中，推荐使用 .js 文件格式，因为它可以使用 JavaScript 的所有特性，方便编写复杂的配置规则。本文以推荐的格式为例来讲解配置:\n\n```js\n// .eslintrc.js\nmodule.exports = {\n...\n}\n```\n\n```js\n//eslint.config.js\nexport default [\n\n]\n```\n\n## 2. 常用配置项\n\n### root\n\n指定ESLint在查找配置文件时的起始位置。\n\n假设现在目录层级如下：\n\n```bash\nproject/\n├── package.json\n├── .eslintrc.js\n├── src/\n│   ├── .eslintrc.js\n│   └── index.js\n└── test/\n    ├── .eslintrc.js\n    └── test.js\n```\n\n我们在 顶层.eslintrc.js 中配置 root：\n\n```\n// project/.eslintrc.js\nmodule.exports = {\n  root: true,\n  // ...\n}\n```\n这告诉了ESLint应该使用此文件作为起始位置来查找其他配置文件。这将确保ESLint始终使用project/.eslintrc.js作为项目中所有文件的配置文件，而不是使用子目录中的其他配置文件。\n\n如果在上述的例子中没有指定\"root\"字段，ESLint会使用最近的配置文件来检测代码，如果当前目录下没有配置文件，ESLint会继续向上查找父目录，直到找到一个配置文件为止。\n\n### env\n\n用来指定校验环境。它告诉 ESLint 代码运行在哪个环境中，从而帮助 ESLint 更好地理解您的代码并检测潜在的问题。\n\n配置如下：\n\n```js\nenv: {\n  es6: true /** 启用除了modules以外的所有 ES6 特性,开启后会自动设置ecmaVersion为6 */,\n  node: true /** Node.js 全局变量和 Node.js 作用域 */,\n  browser: true /** 浏览器全局变量 */,\n  commonjs: true /**  CommonJS 全局变量和 CommonJS 作用域 (用于 Browserify/WebPack 打包的只在浏览器中运行的代码) */,\n  jest: false /** Jest 全局变量 */,\n  jquery: false /** jQuery 全局变量 */,\n  'shared-node-browser': false /** Node.js 和 Browser 通用全局变量 */,\n  worker: false /** Web Workers 全局变量 */,\n  amd: false /** 将 require() 和 define() 定义为像 amd 一样的全局变量 */,\n  mocha: false /** 添加所有的 Mocha 测试全局变量 */,\n  jasmine: false /** 添加所有的 Jasmine 版本 1.3 和 2.0 的测试全局变量。 */,\n  phantomjs: false /** phantomjs 全局变量 */,\n  protractor: false /** protractor 全局变量 */,\n  qunit: false /** QUnit 全局变量 */,\n  prototypejs: false /** Prototype.js 全局变量 */,\n  shelljs: false /** ShellJS 全局变量 */,\n  meteor: false /** Meteor 全局变量 */,\n  mongo: false /** MongoDB 全局变量 */,\n  applescript: false /** AppleScript 全局变量 */,\n  nashorn: false /** Java 8 Nashorn 全局变量 */,\n  serviceworker: false /** Service Worker 全局变量 */,\n  atomtest: false /** Atom 测试全局变量 */,\n  embertest: false /** Ember 测试全局变量 */,\n  webextensions: false /** WebExtensions 全局变量 */,\n  greasemonkey: false /** GreaseMonkey 全局变量 */,\n}\n```\n\n### parser\n\n指定用于解析JavaScript代码的解析器。ESLint默认使用 esprima 解析器，但是可以通过\"parser\"配置来使用其他解析器。\n\n常用的解析器如下：\n\n1. esprima：默认的解析器，用于解析ECMAScript 5到ECMAScript 2021之间的JavaScript代码。\n2.  @babel/eslint-parser：由Babel项目提供的解析器，用于解析ES6+代码。\n3.  @typescript-eslint/parser：由TypeScript团队提供的解析器，用于解析TypeScript代码。\n4.  eslint-plugin-html：用于解析HTML文件中的JavaScript代码。\n5.  vue-eslint-parser：用于解析Vue单文件组件中的JavaScript代码。\n\n### parserOptions\n\n给配置的解析器添加可选配置项。\n\n如果使用的是默认parser配置，可以有如下配置：\n```js\n// .eslintrc.js\nmodule.exports = {\n  parser: \"esprima\",\n  parserOptions: {\n    ecmaVersion: 2022, \n    sourceType: \"module\",\n    range: true,\n    loc: true,\n  },\n  // ...\n}\n```\n字段解析：\n\n-   `ecmaVersion`: 指定要解析的 ECMAScript 版本。可以设置为数字（如 3、5、6、7、8、9、10、11、12、13、2020、2021 等）或字符串（如 `\"latest\"`）。默认为 `5`。\n-   `sourceType`: 指定要解析的模块系统类型。可选值为 `\"script\"`（默认）或 `\"module\"`。\n-   `ecmaFeatures`: 一个对象，用于启用或禁用 ECMAScript 中的特定语言功能。可用的选项包括：\n    -   `globalReturn`：允许在全局作用域中使用 return 语句。\n    -   `impliedStrict`：允许在非严格模式下解析为严格模式。\n    -   `jsx`：启用 JSX 语法。\n    -   `experimentalObjectRestSpread`：启用对象的 rest 和 spread 操作符。\n-   `allowImportExportEverywhere`: 允许在代码的任何位置使用 import 和 export 语句。默认为 `false`。\n-   `codeFrame`: 当发生语法错误时，提供更详细的错误信息。默认为 `true`。\n-   `requireConfigFile`: 如果设置为 `true`，则必须提供 `tsconfig.json` 或 `.eslintrc.*` 文件来配置解析器。默认为 `false`。\n-   `babelOptions`: 传递给 `@babel/parser` 的选项对象。示例如下：\n```js\nbabelOptions: {\n  ecmaVersion: \"es2020\",\n  ecmaFeatures: {\n    globalReturn: true,\n    jsx: true,\n  },\n  lib: [\"ES2020\"],\n},\n```\n-   `tsconfigRootDir`: 指定 TypeScript 配置文件的根目录。默认为解析 `tsconfig.json` 文件的目录。\n\n如果使用@babel/eslint-parser解析器，则可以有如下配置：\n\n```js\n// .eslintrc.js\nmodule.exports = {\n  parser: \"@babel/eslint-parser\",\n  parserOptions: {\n    ecmaVersion: 2022,\n    sourceType: \"module\",\n    ecmaFeatures: {\n      jsx: true,  //支持 jsx\n    },\n  },\n  // ...\n}\n```\n\n若使用 @typescript-eslint/parser，可以使用如下配置：\n\n```js\n// .eslintrc.js\nmodule.exports = {\n  parser: \"@typescript-eslint/parser\",\n  \"parserOptions\": {\n    \"ecmaVersion\": 2021,\n    \"sourceType\": \"module\",\n    \"project\": \"./tsconfig.json\",\n    \"tsconfigRootDir\": \"./\",\n    \"extraFileExtensions\": [\".tsm\"]\n  },\n}\n```\n\n### globals\n\n指定全局变量的一个配置项。在 JavaScript 中，如果一个变量没有经过声明就被使用，会导致该变量被当作全局变量处理，这可能会导致一些潜在的问题。通过配置 `globals`，我们可以告诉 ESLint 这些变量是全局变量，从而避免出现这种问题。\n\n`globals` 可以是一个对象，键为全局变量的名称，值为该变量的使用情况，可以是 `readonly`、`writable` 或 `off`。例如：\n\n```js\n{\n  \"globals\": {\n    \"foo\": \"writable\",\n    \"bar\": \"readonly\",\n    \"baz\": \"off\"\n  }\n}\n```\n\n在上面的示例中，`foo` 和 `bar` 都被指定为全局变量，`foo` 可以被写入，而 `bar` 是只读的，`baz` 被关闭，也就是说，ESLint 不会对它进行任何检查。\n\n可以将 `globals` 视为一个白名单，其中包含了明确指定的全局变量，而其他未被列出的变量会被认为是未定义的，从而避免了不经意地使用未声明的变量而导致的错误。\n\n需要注意的是，使用全局变量可能会降低代码的可读性和可维护性，因此应该谨慎使用，并且只在确实需要使用全局变量时才使用。同时，`globals` 可能也会导致一些不可预测的问题，因此建议仅在必要时使用。\n\n### rules\n\n配置文件中最常用的配置项之一，用于设置 ESLint 的规则和规则的错误等级。`rules` 配置项是一个对象，它的每个属性表示一个规则，属性值表示该规则的错误等级。\n\n配置方式：\n\n```js\n\"rules\": {\n    \"eqeqeq\": \"off\",  // 关闭告警\n    \"no-undef\": \"warn\", // 警告级别\n    \"react/prop-types\": \"error\", // 错误级别\n}\n```\n\n配置项还有第二个参数：\n\n```js\n\"semi\": [\"error\", \"always\"] // 要求在语句末尾始终使用分号。\n\"semi\": [\"error\", \"never\"] // 要求在语句末尾不使用分号。\n```\n\n当然了，也可以这样写来拦截特定的文件：\n\n```js\noverrides: [\n  {\n    files: [\"*.ts\", \"*.tsx\"],\n    rules: {\n      \"no-undef\": \"off\",\n      \"react/prop-types\": \"off\",\n      \"semi\": \"off\"\n    },\n  },\n],\n```\n要注意规则集之间的顺序问题，后面的规则集会覆盖前面的规则集。如果需要保留前面的规则集中的规则：\n\n```js\n\"rules\": Object.assign({}, require(\"eslint-config-airbnb/rules\"))\n```\n\n\n常见的rule有如下这些，\n\n-   `no-var`: 禁止使用 `var` 关键字声明变量，使用 `let` 或 `const` 代替。\n-   `no-unused-vars`: 禁止声明变量但未使用，减少代码冗余。\n-   `no-console`: 禁止使用 `console` 语句，避免代码在生产环境中泄漏敏感信息。\n-   `semi`: 要求在语句末尾使用分号，规范代码风格。\n-   `indent`: 要求使用指定的缩进风格，提高代码可读性。\n-   `quotes`: 要求在字符串周围使用指定的引号类型，规范代码风格。\n-   `no-undef`: 禁止使用未声明的变量，减少错误出现的概率。\n-   `no-extra-parens`: 禁止出现不必要的括号，提高代码可读性。\n-   `no-multiple-empty-lines`: 禁止出现多行空白行，提高代码可读性。\n-   `no-trailing-spaces`: 禁止行末出现空格，提高代码可读性。\n-   `no-unreachable`: 禁止出现无法到达的代码，减少代码冗余。\n-   `no-useless-return`: 禁止出现不必要的 `return` 语句，减少代码冗余。\n\nReact\n\n-   `react/jsx-uses-react`: 检测是否使用了 React 库，如果没有使用则报错。\n-   `react/jsx-uses-vars`: 检测是否声明了 JSX 变量，如果声明了但未使用则报错。\n-   `react/jsx-no-undef`: 检测是否使用了未定义的 JSX 变量，如果使用了则报错。\n-   `react/jsx-indent`: 要求 JSX 元素的缩进为指定数量的空格。\n-   `react/jsx-indent-props`: 要求 JSX 属性的缩进为指定数量的空格。\n-   `react/no-unescaped-entities`: 禁止在 JSX 中使用未转义的 HTML 实体字符。\n-   `react/prop-types`: 检测是否为组件声明了 props 类型定义，如果没有则报错。\n\nVue\n\n-   `vue/html-indent`: 要求模板中的缩进为指定数量的空格。\n-   `vue/no-unused-components`: 检测是否注册了但未使用的组件，如果有则报错。\n-   `vue/no-unused-vars`: 检测是否声明了但未使用的变量，如果有则报错。\n-   `vue/require-prop-types`: 要求组件声明 props 类型定义。\n-   `vue/require-default-prop`: 要求组件声明 props 的默认值。\n-   `vue/require-v-for-key`: 要求使用 v-for 指令时为每个项提供唯一的 key 属性。\n\n等等..\n\n除此之外，不同的插件还有对应的rule，可查看对应文档来配置。\n\n### plugins\n\n用来指定插件的一个选项。插件是一种扩展 ESLint 功能的方式，可以用于检查特定类型的问题或者应用特定的编码规范。ESLint 插件通常是一个 npm 包，包含一组规则和相关的配置，通过 `plugins` 选项将其引入到项目中，就可以使用这些规则来检查代码了。\n\nESLint 插件通常需要配合对应的规则进行使用，可以通过 `extends` 选项来继承插件的规则。常用的插件如下：\n\n1.  `eslint-plugin-import`：用于检查模块导入的规范性，包括路径、文件类型和文件内容等方面的检查。\n2.  `eslint-plugin-react`：用于检查 React 代码的规范性，包括 JSX 语法、组件使用和生命周期等方面的检查。\n3.  `eslint-plugin-vue`：用于检查 Vue.js 代码的规范性，包括模板、组件和指令等方面的检查。\n4.  `eslint-plugin-jest`：用于检查 Jest 测试代码的规范性，包括测试名称、匹配器和断言等方面的检查。\n5.  `eslint-plugin-node`：用于检查 Node.js 代码的规范性，包括 API 使用、文件系统和子进程等方面的检查。\n6.  `eslint-plugin-prettier`：用于将 Prettier 代码格式化集成到 ESLint 中，可以通过配置来自动修复代码格式问题。\n7.  `eslint-plugin-security`：用于检查代码中的安全问题，包括跨站点脚本攻击、命令注入和 SQL 注入等方面的检查。\n\n等等...\n\n这里以 eslint-plugin-react 为例讲解配置：\n\n安装：\n\n```\nnpm install eslint-plugin-react --save-dev\n```\n\n使用：\n\n```js\n{\n  \"plugins\": [\"react\"],\n  \"extends\": [\"eslint:recommended\", \"plugin:react/recommended\"],\n  \"rules\": {\n    \"react/jsx-props-no-spreading\": \"off\",\n    \"react/jsx-props-no-spreading\": [\n      \"error\",\n      {\n        \"exceptions\": [\"Component\"],\n        \"html\": \"enforce\",\n        \"custom\": \"ignore\"\n      }\n    ]\n  }\n}\n```\n\n在上面的配置中，使用了 `eslint:recommended` 和 `plugin:react/recommended` 扩展，分别表示使用了 ESLint 推荐的规则和 `eslint-plugin-react` 的推荐规则。这些规则可以通过 `rules` 配置项进行修改和覆盖。\n\n### extends\n\n用来继承和扩展 ESLint 规则集的配置项。通过 `extends`，可以将现有的规则集合并到自己的规则配置中，也可以基于现有的规则集进行扩展和定制化。其与 plugins的区别是，前者集成了后者的功能，而且自带了配置规则rules。\n\nESLint 提供了多个内置规则集，包括 `eslint:recommended`、`plugin:@typescript-eslint/recommended`、`plugin:react/recommended`、`plugin:vue/recommended` 等。通过在配置文件中设置 `extends` 为内置规则集的名称，可以直接使用内置规则集中的规则。\n\n除了内置规则集外，还有许多第三方规则集可以使用，比如 `airbnb`、`standard`、`prettier` 等。\n\n如果需要同时使用多个规则集，可以使用数组的方式将多个规则集合并到一起：\n\n```js\n{\n  \"extends\": [\n    \"eslint:recommended\",\n    \"plugin:@typescript-eslint/recommended\",\n    \"plugin:react/recommended\",\n    \"plugin:vue/recommended\"\n  ]\n}\n```\n\n如果需要定义自己的规则集，可以使用相对路径或绝对路径指定规则集的位置:\n\n```js\n{\n  \"extends\": \"./path/to/my-rule-set\"\n}\n```\nextends 的优先级是从低到高的，后面的规则会覆盖前面的规则，最终以最后一个规则集为准；而当一个规则在多个规则集中定义时，后边的会覆盖前面的。例如：\n\n```js\n// eslint-config-a.js\nmodule.exports = {\n  rules: {\n    'no-console': 'off',\n    'no-alert': 'error'\n  }\n};\n\n// eslint-config-b.js\nmodule.exports = {\n  extends: ['eslint-config-a'],\n  rules: {\n    'no-console': 'error',\n    'no-debugger': 'warn'\n  }\n};\n```\neslint-config-b 中，no-console使用error，而不是off。\n\n### settings\n\n一个可选的顶层属性，它可以用来配置一些额外的、自定义的信息，供插件和规则使用。它的值是一个对象，可以包含多个属性。下面是一些常用的 `settings` 属性及其作用：\n\n-   `react`：该属性用于配置 React 相关的环境和选项。具体来说，它可以包含以下属性：\n    -   `version`：React 的版本号，如果不设置该属性，则插件会尝试自动检测 React 的版本。\n    -   `pragma`：JSX 的注释语法，如果你使用了类似于 `/** @jsx h */` 的注释来指定 JSX 的转换函数，则需要设置该属性。\n    -   `fragment`：使用 Fragment 组件的名称，如果你使用了 Fragment 组件，则需要设置该属性。\n    -   `linkComponents`：配置自定义组件链接的规则，用于解决组件在某些情况下无法链接的问题。\n-   `import/resolver`：该属性用于配置导入模块时的解析器，通常用于解决路径问题。具体来说，它可以包含以下属性：\n    -   `node`：该属性用于解析 Node.js 模块。\n    -   `webpack`：该属性用于解析 Webpack 模块。\n    -   `typescript`：该属性用于解析 TypeScript 模块。\n    -   `alias`：配置模块路径的别名，用于解决路径问题。\n    -   `extensions`：配置模块的扩展名，用于解决模块文件类型的问题。\n-   `polyfills`：该属性用于配置一些需要在代码中手动引入的 Polyfill，通常用于解决兼容性问题。\n-   `react-native/style-sheet-object-names`：该属性用于配置 React Native 中使用的 StyleSheet 对象名称。\n-   `jest`：该属性用于配置 Jest 测试框架相关的信息。\n-   `svelte3`：该属性用于配置 Svelte 3 相关的信息。\n\n等等...\n\n## 3. 新配置文件\n\nESLint将在 9.0版本启用新的配置文件格式`eslint.config.js`，其换了一种新的配置方式，示例如下：\n\n```js\nexport default [\n  {\n    rules: {\n      semi: \"error\",\n      \"prefer-const\": \"error\"\n    }\n  },\n  {\n    files: [\"src/**/*.js\"],\n    ignores: [\"**/*.config.js\"],\n    rules: {\n      semi: \"off\"\n    }\n  }\n]\n```\n\n具体新的动向，可以关注[官网](https://eslint.org/docs/latest/use/configure/configuration-files-new)的更新。\n\n\n## 4. 发布npm\n\n建立一个文件仓库：\n\n\n![image.png](/img/posts/2023-4-21/2023-4-21-1.png)\n\nindex.js写入配置：\n\n![image.png](/img/posts/2023-4-21/2023-4-21-2.png)\n\n\npackage.json写入：\n\n\n![image.png](/img/posts/2023-4-21/2023-4-21-3.png)\n\n登录npm：\n\n```shell\nnpm login --registry=http://registry.npm.pre.xxx.com\n```\n\n执行发布脚本（patch为例）：\n\n```shell\nnpm run publish:patch\n```\n\n在前端项目中使用配置：\n\n\n![image.png](/img/posts/2023-4-21/2023-4-21-4.png)\n\n当然了，使用前记得 `yarn -D` 一下啦。\n\n剩余的配置husky等工作，就可以参见我之前的文章：[前端项目配置 git hook + prettier + eslint](https://juejin.cn/post/7172430884673421342)\n\n----\n\n总结：eslint配置文件单独封装在一个独立库中，便于扩展和维护升级，灵活性更强，适合前端多页面应用或者微服务应用的场景。\n\n至此，前端校验工具 eslint就配置完成啦！"])</script><script>self.__next_f.push([1,"32:T29d8,"])</script><script>self.__next_f.push([1,"## 1. 写在前面的话\n\n灰度这个概念，来自数字图像领域，最初是描述黑白数字图像的灰度值，范围从 `0` 到 `255`，`0` 表示黑色，`255` 表示白色，中间的数值表示不同程度的灰色。\n\n灰度系统的诞生源于交叉学科的建设，在互联网上也不例外。对于一个软件产品，在开发和发布的时候肯定希望用户能够顺利的看到想让其看到的内容。但是，发布没有一帆风顺的，如果在发布的某个环节出了问题，比如打错了镜像或者由于部署环境不同触发了隐藏的bug，导致用户看到了错误的页面或者旧的页面，这就出现了生产事故。为了避免这种情况出现，借鉴数字图像处理的理念，设计师们设计出了一种介于 `0` 和 `1` 之间的`过渡系统`的概念：让系统可以预先发布，并设置可见范围，就像朋友圈一样，等到风险可控后，再对公众可见。这就是灰度系统。\n\n灰度系统版本的发布动作称作 `灰度发布`，又名金丝雀发布，或者灰度测试，他是指在黑与白之间能够平滑过渡的一种发布方式。在其上可以进行A/B testing，即让一部分用户继续用产品特性A，一部分用户开始用产品特性B，如果用户对B没有什么反对意见，那么逐步扩大范围，把所有用户都迁移到B上面来。(概念来自知乎)\n\n对于前端领域，演进到现在，灰度系统主要有如下几点功能：\n\n1. 增量灰度：小的patch可以增量的添加在发布版本上，也可以通过开关一键关闭\n2. 用户灰度：增量和全量版本都可对不同群体或者某几个特定的用户进行灰度可见\n3. 版本回退：每一个版本都在灰度系统里可见，可以一键回退\n\n前端灰度系统工作流程图如下：\n\n\n```mermaid\nsequenceDiagram\n前端项目--\u003e灰度系统: 部署阶段\n前端项目-\u003e\u003e灰度系统: 1.CI 打包后写入打包资源，状态初始化\n前端项目--\u003e灰度系统: 访问阶段\n前端项目-\u003e\u003e灰度系统: 1.页面访问，请求当前登录用户对应的资源版本\n灰度系统--\u003e\u003e前端项目: 2.从对应版本的资源目录返回前端资源\n```\n\n![](/img/posts/2023-3-19/2023-3-19-1.png)\n---\n\n## 2. 灰度规则\n\n关于灰度资源优先级的说明如下：\n\n| 灰度策略 | 优先级 |\n| --- | --- |\n| 未生效 | 低 |\n| 生效 | 高 |\n| 全量 | 一般 |\n\n如此就起到了`灰度`的作用：全量表示所有人都可以看；生效表示只有在规则中的用户才可以看到这部分增量更新，优先级最高；未生效表示不灰度，优先级最低。\n\n## 3. 灰度系统数据库设计\n\n\u003e `为什么灰度系统有后端`：前端项目 CI 部署后，会产生一个 commit 号和一个镜像记录，并且打包后的文件存放在服务器中某一个深层的文件夹目录中，灰度系统需要存入该部署的目录地址，便于在切换灰度时查找不同版本的文件。\n\n\n先介绍一个要部署的前端项目（你可以根据自己的前端项目动态调整）。\n\n本项目针对的前端项目是一个基于微服务架构的项目，\n\n下面是设计ER图：\n\n\n![image.png](/img/posts/2023-3-19/2023-3-19-2.png)\n\n我们依此来分析：\n\n### 子项目表\n\n该表用于存放所有子项目的信息，新建一个微服务子项目时，会在这个表里新建一个条目，数据示意如下：\n\n\n![image.png](/img/posts/2023-3-19/2023-3-19-3.png)\n\n### 灰度用户表\n\n用于灰度系统登录的用户，拥有灰度权限的人才可以加入。\n\n### 资源表\n\n资源表存放项目在 CI 中写入的 commit 信息和 build 完以后在服务器的存放位置，数据示意如下：\n\n\n![image.png](/img/posts/2023-3-19/2023-3-19-4.png)\n\n其中 `branch` 是跑CI的分支，`data` 存放打包资源目录信息，一般结构如下：\n\n\n![image.png](/img/posts/2023-3-19/2023-3-19-5.png)\n\n`gitProjectId` 存放该产品在 gitlab 中的项目号， `status` 表示构建状态：0：构建完成 1：部署完成 2：构建失败，3：部署失败。\n\n这里简单提一下 CI 是如何写入灰度系统数据库的，过多详情不做解释，写入数据库方式很多，这只是其中一种实现方式。\n\n1. 首先在 CI build 环节往服务器写入打包信息的 JSON：\n\n![image.png](/img/posts/2023-3-19/2023-3-19-6.png)\n\n其中 build.sh 负责把传入的参数写到一个 json 中。上图中是往根目录copy，方便下一个 CI job读取json文件的示意图。\n\n2. 在 CI 部署环节，通过调用脚本创建资源：\n\n\n![image.png](/img/posts/2023-3-19/2023-3-19-7.png)\n\n其中 run_gray.js:\n\n```js\nconst { ENV, file, branch, projectId, gitProjectId, user, commitMsg } = require('yargs').argv;\n\naxios({\n    url: URL,\n    method: \"POST\",\n    headers: {\n        remoteUser: user\n    },\n    data: {\n        Action: \"CreateResource\",\n        projectId,\n        branch,\n        commitMsg,\n        gitProjectId,\n        channel: Channel,\n        data: fs.readFileSync(file, 'utf8'),\n        status: \"0\"\n    }\n}).then(...)\n```\n其中 status 的变化，在 CI 部署服务器完成后，追加一个 `UpdateResource` 动作即可：\n\n```\nif [[ $RetCode != 0 ]]; then curl \"$STARK_URL\" -X 'POST' -H 'remoteUser: '\"$GITLAB_USER_NAME\"'' -H 'Content-Type: application/json' -d '{\"Action\": \"UpdateResource\", \"id\": \"'\"$ResourceId\"'\", \"status\": \"2\"}' \u003e test.log \u0026\u0026 echo `cat test.log`; fi\n```\n\n### 灰度策略表\n\n灰度策略是对灰度资源的调动配置。其设计如下：\n\n![image.png](/img/posts/2023-3-19/2023-3-19-8.png)\n\n其中，`prijectId` 表示灰度的项目，`resourceId` 表示使用的资源，`rules` 配置了对应的用户或用户组（看你怎么配置了，我这里只配置了单独的 userId），`status` 是灰度的状态，我设置了三种：\n\n- default: 未生效\n- failure: 生效\n- success: 全量\n\n状态生效表示是增量发布的意思。\n\n到这里，数据库设计就完毕了。\n\n---\n\n## 4. 灰度系统接口API开发\n\n有了数据库，还需要提供能够操作数据库的服务，上边创建资源的接口就是调用的灰度自己的API实现的。主要的API列表如下：\n\n\n| 名称 | 描述 |\n| --- | --- |\n| getResourcesByProjectId | 获取单个产品下所有资源 |\n| getResourcesById | 通过主键获取资源 |\n| createResource | 创建一个资源 |\n| updateResource | 更新一个资源 |\n| getIngressesByProjectId | 获取单个产品下灰度策略任务列表 |\n| getIngressById | 通过主键获取单个灰度策略任务详情 |\n| createIngress | 创建一个策略 |\n| updateIngress | 更新一个策略 |\n\n剩余的接口有用户处理的，有子项目管理的，这里不做详述。除了上边的必须的接口外，还有一个最重要的接口，那就是获取当前登录用户需要的资源版本的接口。在用户访问时，需要首先调用灰度系统的这个接口来获取资源地址，然后才能重定向到给该用户看的页面中去：\n\n| 名称 | 描述 | 接收参数 | 输出 |\n| --- | --- | --- | --- |\n| getConsoleVersion | 获取当前用的产品版本 | userId，products | resource键值对列表 |\n\n`getConsoleVersion` 接受两个参数，一个是当前登录的用户 ID， 一个是当前用户访问的微服务系统中所包含的产品列表。该接口做了如下几步操作：\n\n1. 遍历 products，获取每一个产品的 projectId\n2. 对于每一个 projectId，联查资源表，分别获取对应的 resourceId\n3. 对于每一个resourceId，结合 userId，并联查灰度策略表，筛选出起作用的灰度策略中可用的资源\n4. 返回每一个资源的 data 信息。\n\n其中第三步处理相对繁琐一些，比如说，一个资源有两个起作用的灰度资源，一个是增量的，一个是全量的，这里应该拿增量的版本，因为他优先级更高。\n\n\n获取用户版本的流程图如下：\n\n\n```mermaid\ngraph TD\n用户登录页面 --\u003e 获取所有产品下的资源列表\n获取所有产品下的资源列表 --\u003e 根据灰度策略筛选资源中该用户可用的部分 --\u003e 返回产品维度的资源对象\n```\n\n![](/img/posts/2023-3-19/2023-3-19-9.png)\n\n最后返回的资源大概长这个样子：\n\n```js\ninterface VersionResponse {\n    [productId: number]: ResourceVersion;\n}\n\ninterface ResourceVersion {\n    files: string[];\n    config: ResourceConfig;\n    dependencies: string[];\n}\n```\n\n其中 files 就是 JSON 解析后的上述 data 信息的文件列表，因为打包后的文件往往有 css和多个js。\n\n至于这个后端使用什么语言，什么框架来写，并不重要，重要的是一定要稳定，他要挂掉了，用户就进不去系统了，容灾和容错要做好；如果是个客户比较多的网站，并发分流也要考虑进去。\n\n## 5. 前端页面展示\n\n前端页面就随便使用了一个前端框架搭了一下，选型不是重点，组件库能够满足要求就行：\n\n- 登录\n\n![image.png](/img/posts/2023-3-19/2023-3-19-10.png)\n\n- 查看资源\n\n\n![image.png](/img/posts/2023-3-19/2023-3-19-11.png)\n\n- 配置策略\n\n\n![image.png](/img/posts/2023-3-19/2023-3-19-12.png)\n\n\n![image.png](/img/posts/2023-3-19/2023-3-19-13.png)\n\n---\n\n部署以后，实际运行项目看看效果：\n\n\n![image.png](/img/posts/2023-3-19/2023-3-19-14.png)\n\n可以看到，在调用业务接口之前，优先调用了 getConsoleVersion来获取版本，其返回值是以产品为 key 的键值对：\n\n\n![image.png](/img/posts/2023-3-19/2023-3-19-15.png)\n\n## 6. 访问转发\n\n这里拿到部署信息后，服务器要进行下一步处理的。我这里是把它封装到一个对象中，带着参数传给了微服务的 hook 去了（微服务系统需要）；**如果你是单页应用，可能需要把工作重心放在 Nginx 的转发上，Nginx内部服务读取灰度系统数据库来拿到版本目录，然后切换路由转发（可能只是改变一个路由变量）。** （你也可以参照我 [nginx 相关文章](https://juejin.cn/post/7211702508371656759)），下面我简单的给个示意图：\n\n\n```mermaid\ngraph TD\n灰度系统配置灰度策略 --\u003e Nginx+Lua+Mysql获取灰度策略并写入Nginx变量\nNginx+Lua+Mysql获取灰度策略并写入Nginx变量 --\u003e Nginx服务器配置资源转发\n```\n\n![](/img/posts/2023-3-19/2023-3-19-16.png)\n\n## 7. 总结\n\n前端灰度系统，其实就是一个后台管理系统。他配置和管理了不同版本的前端部署资源和对应的用户策略，在需要的时候进行配置。\n\n接下来的文章我会配套性的讲一下 `Nginx` 和 `Docker` 的前端入门使用，敬请期待！\n\n完！大家对灰度系统有什么好的建议，可以在评论区讨论哦！\n\n---"])</script><script>self.__next_f.push([1,"33:T4612,"])</script><script>self.__next_f.push([1,"对于一个前端开发，虽然服务器开发部署不是主要业务，但是，独立开发前端项目总归是挂载在服务器上才能跑起来的，不能总指望运维来做这个工作。而且，作为一个程序员，不可能对项目部署一点都不了解。\n\n本文就讲一下作为一个前端开发应该要掌握的基本的 nginx 服务.\n\n\u003e 关于 nginx 与 CI 配合的使用，见我的文章：https://juejin.cn/post/7183517146729693221\n\n## 1. 概念\n\n- 正向代理\n\n特点：用户主动去联系分发设备，分发设备来判断分发的目标服务器。此时，**用户对于服务器未知**。\n\n路由器是正向代理的一个例子，与用户在一侧，有最大带宽限制。\n\n![image.png](/img/posts/2023-3-18/2023-3-18-1.png)\n\n- 反向代理\n\n反向代理一般是部署在服务侧的，灵活很多，可以做负载分流和扩展功能等。但是对于用户而言，反向代理服务器就相当于目标服务器，即用户直接访问反向代理服务器就可以获得目标服务器的资源。此时，**服务器对于用户未知**，提高了安全性。\n\n![image.png](/img/posts/2023-3-18/2023-3-18-2.png)\n\nnginx 便是高性能的 HTTP 和反向代理 web 服务器\n\n一个nginx的使用例子就是虚拟主机：多个域名绑定一个主机，由 nginx 转发不同的资源。\n\n## 2. 安装与部署前端应用\n\n- 平台：CentOS7 虚拟机\n- 安装版本：目前最新 1.21.6\n- 下载地址：[nginx 官网](https://nginx.p2hp.com/en/download.html)\n\n\n安装包解压后进入目录\n\n![image.png](/img/posts/2023-3-18/2023-3-18-3.png)\n\n安装依赖\n\n```\nyum install -y gcc\nyum install -y pcre-devel\nyum install -y zlib zlib-devel\n```\n\n开始安装 (安装目录/usr/local/nginx)\n\n```sh\n./configure --prefix=/usr/local/nginx\n\nmake\n\nmake install\n```\n\n安装成功，查看安装目录\n\n\n![image.png](/img/posts/2023-3-18/2023-3-18-4.png)\n\n测试运行\n\n执行 `./sbin/nginx` (也可以使用全局 nginx 命令)\n\n![image.png](/img/posts/2023-3-18/2023-3-18-5.png)\n\n可以看到进程已经启动\n\n```\nps -ef | grep nginx\n```\n\n![image.png](/img/posts/2023-3-18/2023-3-18-6.png)\n\n为了测试，先关闭防火墙：\n\n```\nsystemctl stop firewalld.service\n```\n\n正式线上使用的，可以配置防火墙放行端口。\n\n配置 nginx 配置文件：\n\n```\nvim ./conf/nginx.conf\n```\n\n![image.png](/img/posts/2023-3-18/2023-3-18-7.png)\n\n其中 location 根目录位置是已经 build 好的一个 vue 应用：\n\n![image.png](/img/posts/2023-3-18/2023-3-18-8.png)\n\n重启\n\n```\nnginx -s reload\n```\n\n浏览器查看 （使用 ip addr 指令可以查看ip）\n\n![image.png](/img/posts/2023-3-18/2023-3-18-9.png)\n\n---\n\u003e 上述在之前的文章中也有所提及，相面更深入的讲一下配置文件的使用\n---\n\n## 3. 配置文件最小集\n\n配置文件最小集是一个能够支撑 nginx 正常跑起来的最小的配置项集合，连注释一并写在下面，供大家参考：\n\n```json\n// ./conf/nginx.conf\nworker_process 1; // 并行执行的任务数，一般按照CPU内核配置\nevents: {\n    worker_connections 1024; // 配置单个worker进程最大的连接数，nginx 默认连接数是1024\n}\n\nhttp { // 支持 http 协议访问的服务\n    include      mime.types; // 当前目录下的配置的文件类型文件，使用默认即可。图片音频会自动解析给浏览器，不能解析的一律按照二进制流下载\n    default_type  application/octet-stream; // 默认文件类型 二进制流下载\n    sendfile        on;  // 是否允许目标服务器绕过 nginx 服务器直接返回结果给用户\n    keepalive_timeout  65;  // 超时时间\n    \n    server { // 隶属于 http 的一个 服务器\n        listen       10087;  // 端口\n        server_name  localhost;  // 服务部署的ip地址，可以是域名\n        charset utf-8;\n        location / {  // 配置 uri\n\t    root   /root/web/dist;  // 自定义的资源目录，可以是绝对目录；若前边不加 /, 则表示相对目录，相对的是 nginx 主目录\n            index  index.html index.htm;\n        }\n\n        error_page  404             404.html;  // 404页面配置，相对路由\n        error_page   500 502 503 504   50x.html; // 同上\n        location = /50x.html {\n            root   html;  // 50x 时，资源指向 html目录下寻找\n        }\n        location = /404.html {\n            root   html;  // 同上\n        }\n    } // end server\n} // end http\n```\n\n## 4. 多站点配置\n\n假设我们有两个资源目录，你可以理解为两个项目的 build 目录：\n\n```\n/root/web/vue/dist\n/root/web/react/dist\n```\n\n我们通过配置文件来控制不同的访问 url 分别分发给这两个资源。\n\n```json\nserver {\n    listen       80;  \n    server_name  www.vue.com;  \n    location / {  \n        root   /root/web/vue/dist; \n        index  index.html index.htm;\n    }\n}\n\nserver {\n    listen       8080;  \n    server_name  www.react.com;  \n    location / {  \n        root   /root/web/react/dist; \n        index  index.html index.htm;\n    }\n}\n```\n\n这样，访问 www.vue.com 就会进入 vue 的项目，访问 www.react.com:8080 会进入 react 的项目。\n\n注意：https 的域名需要在云端配置 ip 绑定为 nginx 的服务器。\n\n## 5. server_name 匹配\n\nserver_name 支持模糊匹配和通配符匹配。\n\n- 通配符： *.xxx.com 、www.baidu.*\n\n所有 .xxx.com 结尾的都可以匹配到\n\n- 完全匹配：www.react.com\n- 正则匹配：~^[0-9]+\\.xxx\\.com$ (规则：~开头)\n\n\n匹配优先级：\n\n1. 完全匹配\n2. 通配符在前的\n3. 通配符在后的\n4. 正则匹配\n\n如果都不匹配\n\n1. 优先选择listen配置项后有 default 或 default_server 的\n2. 上述都不满足，则去找端口配置的位置最靠前的server\n\n## 6. 负载均衡配置\n\n使用场景：访问同一个域名，但是目标地址可以是多个，根据使用情况和空闲程度自动分配一个使用。upstream 用于设置多台分发主机的集合。\n\n```json\nhttp {\n    ...\n    upstream my_server {\n        server 10.123.345.456:8000;\n        server 10.123.345.457:8000;\n    }\n\n    server {\n        location / {\n            proxy_pass http://my_server;\n        }\n    }\n}\n\n```\n\n这样配置后，实际访问 http://192.168.122.1 访问时，系统会在 456 和 457 两个 ip服务选择一个分发，雨露均沾。\n\n当然你也可以配置两个服务器的轮询权重(访问概率)。\n\n```json\nserver 10.123.345.456:8000 weight=8;\nserver 10.123.345.457:8000 weight=1;\nserver 10.123.345.457:8000 backup;  // 标识备用机，实在是没有可用的机器时启用\n```\n\n如果想要某一个服务器不参与负载均衡，可以如下配置：\n\n```json\nserver 10.123.345.456:8000 down;\n```\n\n## 7. 配置动静分离\n\n适合小中型网站，静态资源不太多的场景。原理是用户请求页面时，提取出静态资源，等下次用户访问相同页面时，静态资源可以不用再次找服务器获取，而是取缓存的内容。\n\n配置如下：\n\n\n```json\nhttp {\n    ...\n    upstream my_server {\n        server 10.123.345.456:8000;\n        server 10.123.345.457:8000;\n    }\n\n    server {\n        location / {\n            proxy_pass http://my_server;\n        }\n        \n        location ~.*\\.(js|png|jpg|svg|css)$ {  // 静态资源\n            root   html;\n            index  index.html index.htm;\n        }\n    }\n}\n```\n\n## 8. 配置 URLRewrite\n\n用于隐藏服务器真实url路径。\n\n```js\nhttp {\n    ...\n    upstream my_server {\n        server 10.123.345.456:8000;\n        server 10.123.345.457:8000;\n    }\n\n    server {\n        location / {\n            rewrite ^/([0-9]+).html$ /index/pageNum=$1 break;\n            proxy_pass http://my_server;\n        }\n        \n    }\n}\n```\n\n上边就使用了一个 rewrite 来配置了转发。\n\n这个例子隐藏了页面的分页信息：访问 /2.html 就相当于访问了 /index/pageNum=2 路径。\n\n匹配关键字：\n\n- break：停止所有rewrite匹配\n- last：本条匹配完成后，继续向后匹配其他的 location 的 rewrite\n- redirect：返回 302 重定向到真实地址，而不是用假地址\n- permanent：301 永久重定向到真实地址 （适用于爬虫）\n\n## 9. 配置防盗链\n\n盗链（Hotlinking）是指在一个网站上，使用别人网站上的图片或其他媒体资源来装饰自己的网站，而不获得该资源的所有者许可的行为。盗链可以导致被盗用者的带宽和流量受到消耗，甚至可能使其网站速度变慢或崩溃。\n\n防盗链也是资源节省优化的必备配置。nginx 中根据 http 请求头的 referer 判断来源可以做到拦截。\n\n一个配置防盗链的例子如下：\n\n```json\nlocation ~* \\.(jpg|jpeg|png|gif)$ {\n    valid_referers none blocked xxx.com;\n    if ($invalid_referer) {\n        return 403;\n    }\n}\n```\n\n以上代码表示，如果访问的图片URL的`referer`不是 xxx.com，则返回 403 禁止访问。如果访问的URL没有referer，则也会被禁止访问。\n\n配置项介绍：\n\n- none：referer不存在时可以访问，不设置则所有访问不是 xxx.com 都禁止\n- blocked：referer值被防火墙或者代理服务器删除或伪装时可以访问。一般是不带 http 前缀的访问放行配置。\n\n接下来配置错误提示页面：\n\n假设有个页面 ： `403.html`, 需要配置禁止访问时显示：\n\n```json\nerror_page 403 /403.html\nlocation = /403.html {\n    root   html;  // 资源指向 html目录下寻找\n}\n```\n\n或者在 return 403 时设置：`rewrite` 到一个配置好的资源也可以。\n\n## 10. 安全高可用方案配置\n\n安全高可用的意义：在不额外添加机器的情况下做到不down机动态切换机器，从而达到服务持续可用 \n\n### keepalived\n\n安装\n\n```sh\nyum install keepalived\n```\n\n编辑配置（/etc/keepalived.conf）:\n\n```json\nglobal_defs {\n    router_id lb111\n}\n\nvrrp_instance_test {  // 自定义 test 实例\n    state MASTER   // 主\n    interface eth01  // 你机器上网卡的名字\n    virtual_router_id 33  // 虚拟路由id，主从要一样\n    priority 100 // 优先级高的机器就为 master\n    advert_int 1 // 间隔检测时间\n    authentication {  // 认证配置，同一组保持一致即可\n        auth_type PASS  \n        auth_pass 1111  \n    }\n    virtual_ipaddress {\n        192.168.44.1  // 本台机器的虚拟地址\n    }\n}\n```\n\n上面是第一台机器的配置，在第二台虚拟机上也配置一下类似的配置，设置：\n\n```json\nglobal_defs {\n    router_id lb110  // 修改路由号\n}\n\nvrrp_instance_test {  // 同一个实例\n    state BACKUP   // 从\n    interface eth01  \n    virtual_router_id 33\n    priority 50 // 减低优先级\n    advert_int 1\n    authentication { \n        auth_type PASS  \n        auth_pass 1111  \n    }\n    virtual_ipaddress {\n        192.168.44.1  // 本台机器的虚拟地址\n    }\n}\n```\n\n两台机器分别启动一下：\n\n```\nsystemctl start keepalived\n```\n\n此时在外网可以ping通的ip是： 192.168.44.1。\n\n我们让 MASTER 机器关机后，再ping一下 192.168.44.1，发现仍然可以，此时在备份及使用指令 `ip addr` 查看，可以看到 有一个 192.168.44.1 的虚拟ip。这说明高可用生效了，这种配置叫 ip漂移。\n\n上述情况只能保证 keepalived 进程挂掉时起作用，更高级的用法是跑一个脚本，检测本机的 nginz 服务进程，如果服务异常，则 kill 掉本机的 keepalived 进程。\n\n\n### https 与 TLS\n\nhttp 协议往往是不安全的，即使有防火墙，但是没办法防御消息在传输过程中被劫持：\n\n![image.png](/img/posts/2023-3-18/2023-3-18-10.png)\n\n此时就需要对传输过程的消息进行加密。加密方式有对称加密和非对称加密。\n\n对称加密的加密和解密互为逆过程，规则是固定的，存放在服务器端或者客户端，这个加密算法传输过程中也容易被获取，所以并不是太安全。\n\n- 非对称加密\n\n非对称加密会设置一个公钥，用于传递；服务端和客户端分别设置一个私钥，自己保存，加密步骤如下：\n\n1. 用户通过服务器443端口下载公钥，并传递自己的公钥给服务器。\n2. 再次请求服务器，用**服务公钥+对称加密算法**来加密明文，生成密文\n3. 传递密文给服务器\n4. 服务端用**服务私钥+加密算法**解开密文，得到明文\n5. 类似的，服务端根据明文请求和用户传递的用户公钥进行响应：**用户公钥+算法的密文**\n6. 用户用**用户私钥+算法解密**获取数据\n\n其中需注意，公钥加密的数据公钥自己是解不开的，而且要保证都是公钥加密，私钥解密。\n\n但是，如果服务器被伪造了，公钥是坏人给的，那你的数据加密再好也没用了，这就是中间人攻击。\n\n- TLS\n\n为了解决中间人攻击，需要对使用者进行身份认证，这就引入了数字证书。常见的方式是找一个第三方公认的好人（CA）来颁发这个证书来认证公钥。\n\n服务器会申请公钥给CA来获取证书，CA判断你是否有所认证机构的管理权限和拥有权限，通过后颁发数字证书（CA自己的私钥+加密算法）；服务器拿到证书后，给用户传递的就是这个证书了，用户用CA公钥解密出服务器公钥来使用。\n\n此时，中间人获取不到CA的私钥，所以用户端浏览器就不认这个中间人，以此达到鉴伪。用户只要使用的是正版操作系统和正规浏览器，就能保证数字证书的获取。这期间使用了 TLS 算法生成了两组随机数，通过非对称加密，客户端和服务端达成一致，生成了一个只有他们自己知道的对称加密规则，我这里借用[b站](https://www.bilibili.com/video/BV1KY411x7Jp) 技术蛋老师的解释图：\n\n\n![image.png](/img/posts/2023-3-18/2023-3-18-11.png)\n\n上图的步骤如下：\n\n1. 服务器生成一套私钥和公钥\n2. 可以先生成一个随机数1，并传给服务端，请求公钥\n3. 服务端生成随机数2，带上公钥、证书一起给客户端\n4. 现在客户端、服务端、黑客都知道了公钥、随机数1和随机数2\n5. 客户端生成随机数3，结合公钥加密后给服务端，服务端通过私钥解密后得到明文\n6. 客户端和服务端各自通过 随机数1/2/3生成一个会话秘钥，这个会话秘钥就是对称加密的秘钥，且不在网络上传递。\n7. 接下来就是对称加通信环节，而黑客目前只知道公钥、随机数1和随机数2，无法破解通信。\n\n\n这里讲一下 nginx 如何配置 https。你需要有一个服务的公网ip（假设 123.456.789.111）和购买的域名（假设 www.abc.com ）并申请好了域名解析和数字证书（.key 和 .pem 文件）:\n\n```json\nserver {\n    listen 443 ssl;\n    server_name localhost;  // 域名已经和ip绑定，写 localhost也是能解析的\n    ssl_certificate xxxx.pem;\n    ssl_certificate_key xxxx.key;\n    underscores_in_headers on; // 允许请求头出现下划线\n    root html;\n}\n```\n\n\n## 11. 变量的使用\n\n跟其他技术的配置文件一样，nginx 也能使用变量：\n\n```json\nlocation / { \n    set $name \"zhangsan\"; \n    return 200 \"$name\"; \n}\n```\n\n上面就设置了一个变量叫 name，并且直接返回 200 的请求，在页面上显示 name 的值。其格式是：\n\n```sh\nset $变量名 变量值\n```\n\n当然了，nginx 也自带了一些变量，可以直接使用，比如：\n\n- `$request`  完整的原始的请求行，例如：GET /nginx/index?a=1\u0026b=2 HTTP/1.1\n- `$request_uri`  完整的原始请求URI，访问的URL除去域名(或IP)和 port, 如: /nginx/index?a=1\u0026b=2\n- `$args` 请求行中的全部参数 例如：a=1\u0026b=2\n- `$remote_addr` 客户端ip地址\n- `$remote_port` 客户端端口\n\n...\n\nnginx 配置文件的变量可以统一设置在文件的顶部，这样在整个文件中都可以使用同一个变量：\n\n```sh\nset $my_var \"hello\";\n```\n\n引申：变量值的计算\n\n```json\nlocation / { \n    set $my_var 10; \n    add_header X-Test $my_var; // 成功响应时，添加响应头\n    add_header X-Total $my_var*2; \n}\n```\n上面的例子就是变量简单的数值计算。\n\n\n## 12. 业务场景案例\n\n### 案例一\n\n- **项目介绍**：前端微服务项目\n- **需求**：各个子服务的部署，需要根据灰度系统传递过来的静态资源目录地址来动态切换转发地址\n- **业务介绍**：这是我参与的一个前端业务场景，访问微服务子应用时，微服务启动器会调用灰度系统接口获取当前登录用户的产品权限列表，并返回给前端打包好的前端页面静态资源地址。这个地址会根据用户权限和灰度策略变化。\n\n现在有上面一个工作，需要配置nginx来完成动态转发的工作，让用户看到不同版本的前端项目。\n\n#### 解析\n\n可以使用一个变量来标识资源地址，在前端服务build的CI中修改这个配置文件，更改变量值。\n\n一个示例：\n\n```json\nset $uri \"/root/web/vue/dist\";\n\nserver {\n    listen       80;  \n    server_name  www.test.com;  \n    location / {  \n        root   $uri; \n        index  index.html index.htm;\n    }\n}\n```\n\n在 CI 中修改配置文件：set $uri \"/root/web/react/dist\"，重启 nginx 后即可。\n\n\u003e 大家有更好的办法的话，可以在评论区讨论哦\n\n### 案例二\n\n- **使用场景**：在前端项目部署新版本后，用户没办法感知刷新，在不强制刷新的前提下，看到的仍然是旧版本。\n- **需求**：需要设置服务器配置，在前后端版本不一致时强制刷新\n\n#### 解析\n\n这个问题有多种解决方式。\n\n可以配置 nginx，高速浏览器不要缓存：\n\n```json\nlocation / {\n    add_header Cache-Control \"no-cache, must-revalidate\"\n}\n```\n\n或者配置强制浏览器缓存，常用的办法是添加hash或者版本号来让浏览器重新下载资源：\n\n```js\n\u003clink rel=\"stylesheet\" href=\"/css/main.css?version=v2\"\n```"])</script><script>self.__next_f.push([1,"34:T1f5a,"])</script><script>self.__next_f.push([1,"上一节讲了如何在 CentOS 上安装 gitlab，本节讲一下如何实现 gitlab CI/CD。\n\n## 1. 安装配置 gitlab-runner\n\n执行指令\n\n```shell\nmwget https://mirrors.tuna.tsinghua.edu.cn/gitlab-runner/yum/el7/gitlab-runner-11.5.1-1.x86_64.rpm\n```\n\n安装\n\n```shell\nrpm -i gitlab-runner-11.5.1-1.x86_64.rpm\n```\n\n查看版本\n\n```shell\ngitlab-runner -v\n```\n\n![image.png](/img/posts/2023-1-1/2023-1-1-1.png)\n\n注册：\n`gitlab-runner register`，\n会提示输入URL，\n\n![image.png](/img/posts/2023-1-1/2023-1-1-2.png)\n\n这个在仓库的配置的 Runners 里可以查到\n\n![image.png](/img/posts/2023-1-1/2023-1-1-3.png)\n\n接下来提示输入 gitlab-ci token，配置里紧挨着刚才的URL的就是Token，粘贴过去回车就可以啦。\n\n一路按照提示输入就行，输入tag为  test-deploy，最后会提示选择哪种执行器 executor：\n\n![image.png](/img/posts/2023-1-1/2023-1-1-4.png)\n\n看你熟悉哪个啦，这里以 shell为例。\n\n配置好后，需要将gitlab 校验一下\n\n![image.png](/img/posts/2023-1-1/2023-1-1-5.png)\n\n在web页面查看一下 runners配置，刚刚的注册runner已经存在啦：\n\n\n![image.png](/img/posts/2023-1-1/2023-1-1-6.png)\n\n点击编辑按钮进入runner编辑：\n\n![image.png](/img/posts/2023-1-1/2023-1-1-7.png)\n勾上图中所示选项让没有打标签的项目也能使用。我这里 打了 test-deploy 的标签。同一个标签的 CI 用的是一个 Runner。\n\n## 2. 项目build与Nginx部署\n\n先不使用gitlab流水线，自己实现一下该项目的build与nginx部署。\n\n本文准备的项目就是一个vite创建的 vue3 空项目：\n\n![image.png](/img/posts/2023-1-1/2023-1-1-8.png)\n\n查看他的 package.json：\n\n```json\n\"scripts\": {\n    \"dev\": \"vite\",\n    \"build\": \"vite build\",\n    \"preview\": \"vite preview\"\n}\n```\n\n执行：\n\n```shell\nyarn build\n```\n可以看到打包文件已经生成了：\n\n![image.png](/img/posts/2023-1-1/2023-1-1-9.png)\n\n接下来就是在 服务器（还以这个CentOS虚拟机为例）上安装一下 Nginx，把打包的文件丢进去就可以了。\n\n### Nginx 安装\n\n- 前置依赖安装\n\n```shell\nyum -y install gcc gcc-c++ autoconf pcre-devel zlib-devel openssl openssl-devel make automake\nyum -y install httpd vim\n```\n\n- 安装 Nginx\n\n```shell\n## 用户目录下，下载免安装版 (也可以用 yum)\ncd ~\nmwget http://nginx.org/download/nginx-1.18.0.tar.gz\n\n## 解压缩\ntar zxvf nginx-1.18.0.tar.gz\n\n## 进入安装目录 （你在哪里解压缩的，文件就在哪）\n## 配置安装运行目录\n./configure --prefix=/usr/local/nginx\n\n## 编译安装\nmake \u0026\u0026 make install\n\n## 配置环境变量 （我这里只配置用户级别）\n## 在用户主目录下\nvim .bash_profile\n\n## 追加\nPATH=$PATH:$HOME/bin:/usr/local/nginx/sbin\n\n## 保存退出后生效配置\nsource ./.bash_profile\n```\n\n此时在任意目录下执行：\n\n```shell\nnginx -v\n```\n便可以看到打印的版本号了。\n\n![image.png](/img/posts/2023-1-1/2023-1-1-10.png)\n\n### 启动Nginx\n\n```shell\n安装完毕，进入Nginx下的sbin目录并启动nginx\ncd /usr/local/nginx/sbin\n./nginx\n```\n\n\n### 配置 Nginx\n\n\u003e 这里讲 Nginx 只是为了辅助 CI/CD 讲解，配置详细不做过多展开\n\n若是 yum 安装的，配置文件在 `/etc/nginx/nginx.conf` 中，我这个是免安装版的，配置文件在 `/usr/local/nginx` 中：\n\n```shell\nvi /usr/local/nginx/conf/nginx.conf\n```\n按照自己的喜好配置，找对文件目录即可（建议单开一个全局目录）：\n\n\n![image.png](/img/posts/2023-1-1/2023-1-1-11.png)\n\n我们把 项目 dist 目录放入对应配置的位置（建议不要在自定义的用户下，不然 CI 使用的账户 会拿不到）：\n\n\n![image.png](/img/posts/2023-1-1/2023-1-1-12.png)\n\n按照上一节的讲解，配置了防火墙和虚拟机NAT配置，开通 10087 端口后，在 windows中访问虚拟机这个端口 http://192.168.137.128:10087\n\n\n![image.png](/img/posts/2023-1-1/2023-1-1-13.png)\n成功！\n\n## 3. 配置CI\n\n在项目根目录下创建 .gitlab-ci.yml 文件来编写执行流程。\n\n在编写之前，我们先清楚一个事情，CI/CD 所要完成的工作就是上边我们手动 build 完以后，再把 dist 目录移动到 nginx 配置的目录下并且重启 Nginx，只是变成了流水线自动化部署而已，省去了繁杂的部署工作。\n\n确定流水线分两步：打包 和 部署：\n\n```yaml\nstages:\n  - build\n  - deploy\n```\n\n流水线是串行执行的，故runner只用一个就可以，yml 中 tags 设置为同一个就行。\n\n我们写一些 build 的脚本测试：\n\n```yaml\nbuild:\n  stage: build\n  tags:\n    - test-deploy\n  only:\n    - master\n  script:\n    - pwd \u0026\u0026 ls -al\n    - npm install --registry https://registry.npm.taobao.org \u0026\u0026 npm run build\n    - cd $CI_PROJECT_DIR \u0026\u0026 ls\n    - cp -r ./dist /home/gitlab-runner/web/backup/ \n  cache:\n    paths:\n      - node_modules/\n```\n\n\u003e 最后的 cp 是为了在 deploy 能拿到 build 的文件。cp 的时候别忘了给文件夹权限\n\n推送到 master 后发现 CI 挂了：\n\n\n![image.png](/img/posts/2023-1-1/2023-1-1-14.png)\n\n原来是 runner 环境里没有node环境，通过如下脚本来看看runner的执行位置：\n\n```yaml\nbefore_script:\n    - whoami\n    - pwd\n    - locate npm\n    - echo ${PATH}\n    - node -v\n ```\n \n打印结果：\n\n![image.png](/img/posts/2023-1-1/2023-1-1-15.png)\n\n可以看到，PATH 里是有我们在服务器上配置的 node 的全局变量的，但是这里读不到。应该是服务器登录账户不同造成的。\n\n\n![image.png](/img/posts/2023-1-1/2023-1-1-16.png)\n\n源 node 我是配置在 root 下的全局变量，而 CI 是跑在自动创建的 gitlab-runner 账户下的，此时只要在runner账户下再安装一次，配置好环境变量就搞定啦。再测试一下：\n\n\n![image.png](/img/posts/2023-1-1/2023-1-1-17.png)\n\n可以看到 node 已经拿到，直接上 build：\n\n\n![image.png](/img/posts/2023-1-1/2023-1-1-18.png)\n\n可以看到 npm build 成功啦，那么打完包的 dist 要如何部署到服务器上呢？\n\n## 4. 配置CD\n\n首先进入查看一下 上一步 cp 的公共目录：\n\n\n![image.png](/img/posts/2023-1-1/2023-1-1-19.png)\n\n可以看到已经有啦。这样我们就可以在 deploy 阶段处理这些文件了。\n\n复习一下上一节，Nginx 部署目录是：/root/web/dist，我们试着 cp 一下：\n\n```yaml\ndeploy:\n  stage: deploy\n  tags:\n    - test-deploy\n  only:\n    - master\n  script:\n    - echo \"deploy\"\n    - pwd \u0026\u0026 ls -al\n    - cp -r /home/gitlab-runner/web/backup/dist /root/web/dist\n```\n\n发现读取不了 root 下的目录：\n\n\n![image.png](/img/posts/2023-1-1/2023-1-1-20.png)\n\n所以改进一下 Nginx 部署目录：\n\n\n![image.png](/img/posts/2023-1-1/2023-1-1-21.png)\n\n修改 deploy：\n```yaml\n- cp -r /home/gitlab-runner/web/backup/dist /home/gitlab-runner/web/\n```\n\n此时 10087 端口已经跑不起来了。我们提交一下 CI 再跑一次：\n\n\n![image.png](/img/posts/2023-1-1/2023-1-1-22.png)\n\n成功复制过去了。\n\n此时在 windows下再看看：\n\n\n![image.png](/img/posts/2023-1-1/2023-1-1-23.png)\n\n成功！\n\n我们改动一下代码提交测试一下：\n\n\n![image.png](/img/posts/2023-1-1/2023-1-1-24.png)\n\npush 到 master 上，等 CI/CD 跑完后刷新网页：\n\n\n![image.png](/img/posts/2023-1-1/2023-1-1-25.png)\n\n自动化部署完成！！\n\n## 5. 小结\n\n1. 安装 runner\n2. 配置 nginx\n3. 书写 .gitlab-ci.yml\n\n```yaml\nstages:\n  - build\n  - deploy\n\nbuild:\n  stage: build\n  tags:\n    - test-deploy\n  only:\n    - master\n  before_script:\n    - whoami\n    - pwd\n    - echo ${PATH}\n    - node -v\n  script:\n    - pwd \u0026\u0026 ls -al\n    - npm install --registry https://registry.npm.taobao.org \u0026\u0026 npm run build\n    - cd $CI_PROJECT_DIR \u0026\u0026 ls\n    - cp -r ./dist /home/gitlab-runner/web/backup/\n  cache:\n    paths:\n      - node_modules/\n\ndeploy:\n  stage: deploy\n  tags:\n    - test-deploy\n  only:\n    - master\n  script:\n    - echo \"deploy\"\n    - pwd \u0026\u0026 ls -al\n    - cp -r /home/gitlab-runner/web/backup/dist /home/gitlab-runner/web/\n```\n\n4. 部署目录检查与测试代码"])</script><script>self.__next_f.push([1,"35:T190d,"])</script><script>self.__next_f.push([1,"之前一直比较忌讳在前端项目中使用全局状态管理工具，安装包比较大，配置起来比较繁琐，比如 Redux。但是随着项目业务的增多，一些状态很难做到组件间共享，比如登录状态. 通知消息等。\n\n\n## 1. 前端状态管理方案\n\n下面来对比一下 前端项目中全局状态管理的几种方式。\n\n1. localStorage / sessionStorage\n\n2. cookie\n\n3. Context 全局上下文\n\n4. 状态管理工具，比如 Redux. Pinia等\n\n\n### 1. localStorage\n\n先说第一种，可以存在浏览器本地的一种存储方式。确实项目中经常在用：\n\n```js\nexport function setLocalStorage(key, value) {\n    try {\n        window.localStorage.setItem(key, JSON.stringify(value));\n    } catch (e) {\n        console.log(e.message)\n    }\n}\n\nexport function getLocalStorage(key) {\n    const value = window.localStorage.getItem(key);\n    try {\n        return JSON.parse(value);\n    } catch (e) {\n        return value;\n    }\n}\n```\n\n- 优势\n    1. 能够长期储存数据\n    2. 同一个域下共享同一个对象\n    3. 不会随 HTTP 请求发送\n    4. 页面级别使用\n- 缺点\n    1. 不同的浏览器窗口下，信息会相互干扰\n    2. 在浏览器的隐私模式下不可以读取\n    3. 由于服务关闭后信息还能存在在浏览器缓存中，故不适宜存储敏感信息，比如登录信息等\n    4. 由于使用了 window 对象，非浏览器环境不可使用\n    5. 无法响应式触发所有组件同步更新状态（这也是redux存在的意义）\n- 建议\n   - 存储常用的下拉菜单选择项. 公用列表. 枚举等。\n\n\n### 2. Cookie\n\n- 优势\n    1. 可以前后端共享\n    2. 同一个域下共享同一个对象\n- 缺点\n    1. 限制大小4K，只能存一些公共变量，使用场景不适合用于缓存\n    2. 存在额外的安全配置成本\n    3. 跨域存在问题，需要额外的配置成本\n    4. 不够灵活，不能适应越来越多的全局状态的添加\n\n### 3. Context\n\nContext 传递信息是组件级别的，往往包裹在需要共享参数的组件集合的最外层：\n\n```js\nconst BasicContext = React.createContext({});\n\n\u003cBasicContext.Provider value={{ ...context, ...systemStore }} \u003e\n    ...\n\u003c/BasicContext.Provider\u003e\n```\n\nContext 不产生数据来源，往往和缓存一起使用，比如 systemStore 可以是 getLocalStorage 拿到的一堆数据的集合，被他包裹的子元素便都可以共享同一份上下文数据。\n\n- 优势\n    1. 使用简单，不需要额外配置\n    2. 组件级别使用\n- 缺点\n    1. 只提供一个上下文环境，必须和其他的状态管理工具一起使用\n    2. 受框架限制\n    3. context相当于全局变量， 难以追溯数据源\n    4. 耦合度高，即不利于组件复用也不利于测试\n    5. 没办法反向修改状态值，子组件只能被动读取\n\n### Mobx\n\n使用框架级别的状态管理工具可以用来存储临时的前端层级的公共状态：\n\n\n- 优势\n    1. 便于代码管理\n    2. 组件级别使用\n    3. 读写方便，没有安全问题\n- 缺点\n    1. 受框架限制\n    2. 需要额外的配置\n    3. 业务耦合度高，用户写业务必须照顾到状态的配置\n    4. ...\n\nMobx 是一种相对能够克服配置繁琐问题的工具，这次在项目开发中就引入了 Mobx，使用响应式+函数式模式，并将 Reducer和Action合为一体，使得Mobx相对于 Redux 简单许多。\n\n## 2. Mobx 使用\n\n这里以实现一个运营系统内部当前待审核项目的数量提示为例，讲解 Mobx 在函数式组件中的使用。\n\n- 安装\n\n```js\nyarn add mobx mobx-react-lite\n```\n\n- 引入：新建 stores.js\n\n```js\nimport { runInAction } from \"mobx\"\nimport { useLocalObservable } from 'mobx-react-lite';\n\n// 自己定义的 API请求，本质是一个 Promise\nimport { GetAuditingDataCount } from '../../src/apis/usms';\n\nexport const Store = () =\u003e {\n\n  // 创建观察者\n  const storeContext = useLocalObservable(() =\u003e ({\n    // 状态\n    auditCount: {},\n    get getAuditCount() { return this.auditCount; },\n    // 请求API的action\n    reloadAuditCount() {\n      GetAuditingDataCount().then(res =\u003e {\n        runInAction(() =\u003e {\n          this.auditCount = res?.Data || {}\n        })\n      })\n    },\n    // 重置状态\n    resetAuditCount() {\n      runInAction(() =\u003e {\n        this.auditCount = {};\n      })\n    }\n  }));\n\n  return { storeContext }\n}\n\n```\n上面就创建了一个读取当前待审核数量的store。\n\n- 业务中使用：使用 observer 包裹要用到状态的组件，name在这个组件内部就建立了监听\n\n```js\nimport { observer } from \"mobx-react-lite\";\n\nfunction Menu() {\n  ...\n}\n\nexport default observer(Menus)\n```\n\n借助 Context 传值给 Menu：\n\n```js\n// 引入自定义的 store\nimport { Store as MobxStore } from '../stores';\n\nconst { storeContext } = MobxStore();\n\n// 单独一个文件写入：const BasicContext = React.createContext({});\n\u003cBasicContext.Provider value={{ storeContext }} \u003e\n    ...\n    \u003cMenu /\u003e\n    ...\n\u003c/BasicContext.Provider\u003e\n```\n\nMenu 组件内部使用：\n\n```js\nimport BasicContext from '../../BasicContext'\n\nconst context = useContext(BasicContext);\n\nconst storeContext = context.storeContext || {};\n```\n如此就拿到了那个 store 的单例，进而在渲染时就可以这样写：\n\n```js\n\u003cMenu.SubMenu\n    title={\n      \u003cspan\u003e\n        {menu.icon}\n        // 这里是重点，可直接获取状态数据 storeContext?.auditCount?.TotalCount\n        {menu.auditCount ? \u003cBadge offset={[4, 0]} dot={(storeContext?.auditCount?.TotalCount || 0) \u003e 0}\u003e\n          \u003cspan\u003e{menu.name}\u003c/span\u003e\n        \u003c/Badge\u003e : \u003cspan\u003e{menu.name}\u003c/span\u003e}\n      \u003c/span\u003e\n    }\n    key={menu.key}\n    \u003e\n    {genMenus(menu.children)}\n\u003c/Menu.SubMenu\u003e\n```\n\n数据变更：\n\n```js\n// 审核接口\n\nAuditAPI(...).then(() =\u003e {\n    ...\n    // 刷新 mobx 状态\n    storeContext.reloadAuditCount();\n});\n```\n当审核状态变化时，动态调用API重新设置stores里的值后，所有被 observe 的组件都会自动变化：\n\n\n![image.png](/img/posts/2022-12-26/2022-12-26-1.png)\n\n\n## 3. 总结\n\n不是万不得已，尽量不要上全局状态管理工具，使用 Context + sessionStorage 代替即可。在需要实时或触发式更新状态的地方，如果不能上 webSocket，实在要用，就使用配置简单，耦合性低的工具。同时还要照顾到安全性，推荐配置：Context + Mobx."])</script><script>self.__next_f.push([1,"36:Tbff,"])</script><script>self.__next_f.push([1,"在部署前端服务的过程中，需要实现登录信息共享的功能，若各个服务是在同一个域名下的，则可以共享cookie。但是，公司对外产品往往都是单独部署域名的，比如产品页面、门户网站等，他们若需要拿到当前登录信息，就需要特殊配置了。\n\n产品部署配置：\n\n- 登录页面： https://passport.xxx.com\n- 微服务产品系统：https://console.xxx.com\n- 门户网站：https://www.xxx.com\n- 产品文档：https://docs.xxx.com\n\n可以看到线上部署后，公司产品的二级域名虽然是不一样，但是一级域名一样，把cookie的Domain设置为 `.xxx.com` 就可以共享了。但是如果是本地开发就头疼了。本地开发，会先跳转到部署好的登录页：`passport.xxx.admin.com`，然后再跳转回 `localhost` ，此时，来源的一级域名不一样，就会出现cookie没办法共享的问题了。\n\n这里提供三种跨域cookie方案供选择。\n\n## 1. 后端配置\n\n我们知道 cookie 有几个属性：\n\n![image.png](/img/posts/2022-12-25/2022-12-25-1.png)\n\nHttpOnly 和 Secure 用于限制只能 https 传递不可读的安全 cookie；另外一个属性 SameSite 可以设置三个值：`Strict`、`Lax`、`None`：\n\n- `Strict`：完全禁止第三方获取cookie，跨站点时，任何情况下都不会发送cookie\n- `Lax`：防范跨站，大多数情况下禁止获取cookie，除非导航到目标网址的GET请求（链接、预加载、GET表单）\n- `None`：没有限制。必须同时设置`Secure`属性（Cookie 只能通过 HTTPS 协议发送），否则无效，需要 chrome \u003e 80，兼容性有问题：\n\n![image.png](/img/posts/2022-12-25/2022-12-25-2.png)\n\n此时，只要设置 只支持https 且 samesite=None，便会在 https 下携带 cookie 了。但是这只适用于 https，开发环境大多是 http，不能用。\n\n## 2. 前端配置\n\n前端也是可以设置 cookie 的，而且可以指定域名。在登录页面登录后设置 cookie：\n\n```js\nlet host = window.location.host;\n\nif (host.indexOf('passport.xxx.admin.com') \u003e -1) {\n    host = '.xxx.admin.com';\n}\n\nwindow.document.cookie = `${name}=${value};domain=${host}`;\n```\n\n\n## 3. 跳转时设置回调参数\n\n针对前端配置的补充方案，此方法也适合 iframe 传参方式。\n\n在 `localhost` 进入开发页面，此时检测到没有 cookie 信息，会自动跳转到登录页面： `passport.xxx.admin.com`, 跳转时回带参数：\n\n```shell\nhttp://passport.xxx.admin.com?origin=localhost\n```\n\n登录页面登录后，直接读取路由参数中的 origin，并设置带着 host 的 cookie：\n\n```js\nwindow.document.cookie = `${name}=${value};domain=${origin}`;\n```\n设置完毕后重定向页面跳转回 origin 即可实现 cookie 携带。\n\n\n## 4. 对比\n\n- 后端配置倾向于前后端传递 cookie 时使用，若只是前端共享 cookie，不需要告知后端时则不可用\n- 前端配置可以实现后端无感的cookie传递，但是安全性不高，不可传递明文，尽量只用在开发环境。\n\n--------\n完 ！"])</script><script>self.__next_f.push([1,"37:T18f4,"])</script><script>self.__next_f.push([1,"在团队代码私有仓库中，互联网公司中gitlab应该是首选的，不仅仅是个仓库，其支持私有化部署和具备独有的CI/CD，优势明显。gitlab 有免费的社区版（CE）也有收费的企业版（EE），国内还有极狐版（JH）。本文以 CE 为例讲解。\n\n本文介绍如何在服务器（以centOS7为例）上安装gitlab，并实现web端账号配置与ssh配置仓库。\n\n\u003e 国内可以使用 gitlab 在国内的代理 [极狐](https://gitlab.cn/install/) 来安装，很多设置都已经做好了，也不存在网络问题，可以省去很多繁重的配置工作。本文还是以清华的镜像源为例。\n\n## 1. 安装前检查\n\n在安装前，可以检查一下是否安装有旧版本，卸载掉他！\n\n按顺序执行如下指令：\n\n```shell\n## 停止gitlab\ngitlab-ctl stop\n\n## 卸载 (请确定版本`ce/ee/jh`等。若找不到包说明上次没有安装成功)\nrpm -e gitlab-ce\n\n## 检查一下进程\nps aux | grep gitlab\n```\n\n\n![image.png](/img/posts/2022-12-24/2022-12-24-1.png)\n\n```shell\n## 清除掉 service 的进程\nkill -9 9956\n\n## 删除所有包含gitlab文件 （递归查找有些慢，可以不做）\nfind / -name gitlab | xargs rm -rf\n```\n\n## 2. 安装\n\n- 操作系统：CentOS7\n- gitlab：GitLab-ce 清华源镜像 （gitlab-ce-11.5.3-ce.0.el7.x86_64.rpm）\n\n### 前置安装\n\n在系统防火墙中打开 HTTP、HTTPS 和 SSH 访问。如果打算仅从本地网络访问极狐GitLab，则可以跳过它。\n\n```shell\n## 全部粘贴一起丢到终端里\nsudo yum install -y curl policycoreutils-python openssh-server perl\nsudo systemctl enable sshd\nsudo systemctl start sshd\n\nsudo firewall-cmd --permanent --add-service=http\nsudo firewall-cmd --permanent --add-service=https\nsudo systemctl reload firewalld\n```\n\nssh配置：\n\n```shell\nsudo yum install curl policycoreutils openssh-server openssh-clients\n```\n\n配置邮件通知（可选）\n\n```shell\nsudo yum install postfix\nsudo systemctl enable postfix\nsudo systemctl start postfix\n```\n\n修改邮件配置：vi /etc/postfix/main.cf\n\n```shell\ninet_interfaces = all            //之前应该是localhost\n```\n\n启动 postfix：\n\n```shell\nservice postfix start\nsystemctl status postfix.service\nsudo systemctl enable postfix\n```\n\n由于国内 wget速度较慢，可以使用 mwget：(这一堆丢到终端里)\n\n```shell\nwget http://jais

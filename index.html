 renderToStaticMarkup\n\n`renderToStaticMarkup` 会将非交互的 React 组件树渲染成 HTML 字符串。其输出无法进行二次渲染，且对 Suspense 的支持有限。不建议在客户端代码中使用它。\n\n使用方式：\n\n```js\nimport { renderToStaticMarkup } from 'react-dom/server';\n\n// 路由处理程序语法取决于你的后端框架\napp.use('/', (request, response) =\u003e {\n  const html = renderToStaticMarkup(\u003cPage /\u003e);\n  response.send(html);\n});\n```\n\n如果要渲染的是纯静态内容，则非常合适。\n\n\n### renderToStaticNodeStream\n\n`renderToStaticNodeStream` 可以为 [Node.js 只读流](https://nodejs.org/api/stream.html#readable-streams) 渲染非交互式 React 树。\n\n其使用也是一个管道，并声称静态的非交互式网页。不同的是，他需要等待所有 [Suspense边界](https://zh-hans.react.dev/reference/react/Suspense) 完成后才返回输出，且返回给客户端的输出结果不支持 hydrate。这个方法的作用在于缓冲所有输出，这个输出是一个utf-8 编码的字节流，\n\n----\n\n上面的 API 用于在自定义的服务器中手动部署 SSR，但是一般情况下，推荐使用 Nextjs 部署一个 SSR 应用。\n\n## 3. React SSR/SSG 最佳实践方案 - Next\n\n官方文档推荐使用 Nextjs 来配置 SSR 页面，最新版的 React 也推荐使用 [Nextjs](https://www.nextjs.cn/learn/basics/create-nextjs-app/setup) 来创建 React App。我们来实战一下。\n\n\u003e Node \u003e= v18，，最新版的 next 需要 node18+\n\n### ①. 新建一个空的 npm 仓库\n\n```shell\nnpm init\n```\n\n### ②. 安装依赖\n\n```shell\nyarn add next react react-dom\n```\n\n### ③. 修改 `package.json`\n\n```json\n\"scripts\": {\n  \"dev\": \"next dev\",\n  \"build\": \"next build\",\n  \"start\": \"next start\",\n  \"lint\": \"next lint\"\n}\n```\n\n### ④. 创建页面文件\n\n- 项目中创建一个 `pages` 目录\n- 目录中写一个 index.js\n\n\n```js\nfunction HomePage() {\n  return \u003cdiv\u003eWelcome to Next.js!\u003c/div\u003e\n}\n\nexport default HomePage\n```\n\n- 目录中再写一个页面 about.js\n\n\n```js\nfunction AboutPage() {\n  return \u003cdiv\u003eWelcome to My blog!\u003c/div\u003e\n}\n\nexport default AboutPage\n```\n\n- 启动项目 `yarn dev`\n- 通过路由访问页面看看：`localhost:3000/about`\n\n\n### ⑤. 添加动态路由\n\npages 目录中创建一个文件夹叫 posts，在下面创建动态路由页面 \\[pid].js\n\n```js\nimport { useRouter } from 'next/router'\n\nconst Post = () =\u003e {\n  const router = useRouter()\n  const { pid } = router.query\n\n  return \u003cp\u003ePost: {pid}\u003c/p\u003e\n}\n\nexport default Post\n```\n\n使用 `localhost:3000/post/abc` 访问查看页面效果\n\n\n![image.png](/img/posts/2023-11-3/2023-11-3-3.png)\n\n### ⑥. 配置预渲染\n\n- SSG\n\n如果你的页面是纯静态页，使用 SSG 时，HTML 文件将在每个页面请求时被重用，还可以被 CDN 缓存。如果你的页面不需要获取外部数据，可以这么写，posts 下新建一个 blog.js：\n\n\n```js\nfunction Blog() {\n  const posts = [...];\n  return (\n    \u003cul\u003e\n      {posts.map((post) =\u003e (\n        \u003cli\u003e{post.title}\u003c/li\u003e\n      ))}\n    \u003c/ul\u003e\n  )\n}\n\nexport default Blog\n```\n\n博客渲染自然会依赖外部接口，可以这么配置，在同文件（blog.js）中导出一个async函数：\n\n```js\n// posts 是外部接口获取到后， getStaticProps 传入的\nfunction Blog({ posts }) {...}\n\nexport async function getStaticProps() {\n  // 调用外部 API 获取博文列表 (编译和打包时就会调用)\n  const res = await fetch('https://.../posts')\n  const posts = await res.json()\n\n  // 通过返回 { props: { posts } } 对象，Blog 组件\n  // 在构建时将接收到 `posts` 参数\n  return {\n    props: {\n      posts,\n    },\n  }\n}\n```\n\u003e getStaticProps 函数，在页面打包时就会执行并缓存，在线上模式便不会反复执行。而在开发环境，每次刷新页面时，整个页面会等待 fetch 返回数据后才加载。\n\n\n此外，动态路由页 \\[pid].js 的渲染，也会依赖外部动态接口，传入 abc，就表示展示 abc 这一篇文章的信息，现在来配置路径预渲染（pages/posts/\\[pid].js 中）：\n\n\n```js\n// 此函数在构建时被调用\nexport async function getStaticPaths() {\n  // 调用外部 API 获取博文列表\n  const res = await fetch('https://.../posts')\n  const posts = await res.json()\n\n  // 据博文列表生成所有需要预渲染的路径\n  const paths = posts.map((post) =\u003e ({\n    params: { pid: post.id },\n  }))\n\n  // We'll pre-render only these paths at build time.\n  // { fallback: false } means other routes should 404.\n  return { paths, fallback: false }\n}\n\n// 在构建时也会被调用\nexport async function getStaticProps({ params }) {\n  // params 包含此片博文的 `pid` 信息。\n  // 如果路由是 /posts/1，那么 params.pid 就是 1\n  const res = await fetch(`https://.../posts/${params.pid}`)\n  const post = await res.json()\n\n  // 通过 props 参数向页面传递博文的数据\n  return { props: { post } }\n}\n```\n\n上面的代码，getStaticPaths 返回允许访问的 pid 集合，比如接口返回了数据 paths: \\[1,2,3,4], 那么你请求 `localhost:3000/posts/5` 就会 404; getStaticProps 的逻辑与上面一样，实际访问了 pid=1的路径，那么 params 就是 `{pid: 1}`，然后阻塞页面去获取数据。\n\n- SSR\n\n如果你要使用 **服务器端渲染**，则会在 **每次页面请求时** 重新生成页面的 HTML，虽然速度不及前者，但是预渲染的页面将始终是最新的。\n\n类似地，也在页面文件导出一个async函数：\n\n\n```js\nfunction Blog({ data }) {\n  // Render data...\n}\n\n// This gets called on every request\nexport async function getServerSideProps() {\n  // Fetch data from external API\n  const res = await fetch(`https://.../data`)\n  const data = await res.json()\n\n  // Pass data to the page via props\n  return { props: { data } }\n}\n```\n执行过程大同小异，不同的是每次线上请求页面都会去调用 getServerSideProps 来请求接口。\n\n### ⑦. 配置入口组件\n\n在 pages 目录下配置一个文件 _app.js:\n\n```js\n// 如果有 css 就引入\nimport '../styles.css'\n\n// 新创建的 `pages/_app.js` 文件中必须有此默认的导出（export）函数\nexport default function MyApp({ Component, pageProps }) {\n  return \u003cComponent {...pageProps} /\u003e\n}\n```\n_app.js 默认是所有页面文件的总入口，他可以接受两个参数，Component 是当前的组件，pageProps 是这个组件的 props。作为统一的入口，在这里你就可以配置很多参数了，比如 seo配置、公共样式、布局菜单等。\n\n### ⑧. 配置样式\n\n在项目根目录创建 style.css，并在 _app.js 中引入：\n\n\n```css\nbody {\n  font-family: 'SF Pro Text', 'SF Pro Icons', 'Helvetica Neue', 'Helvetica',\n    'Arial', sans-serif;\n  margin: 0 auto;\n}\n```\n\n如果要使用 sass，可以先安装依赖：\n\n```\nyarn add sass\n```\n\n在项目中引入 sass 模块：\n\n```js\nimport variables from '../styles/variables.module.scss'\n```\n\n### ⑨. 页面布局\n\n在 _app.js 中引入自定义的布局组件：\n\n```js\nimport Layout from '../components/layout'\n\nexport default function MyApp({ Component, pageProps }) {\n  return (\n    \u003cLayout\u003e\n      \u003cComponent {...pageProps} /\u003e\n    \u003c/Layout\u003e\n  )\n}\n```\n\nLayout 可以是下面的形式：\n\n```js\nimport useSWR from 'swr'\nimport Navbar from './navbar'\nimport Footer from './footer'\n\nexport default function Layout({ children }) {\n  const { data, error } = useSWR('/api/navigation', fetcher)\n\n  if (error) return \u003cdiv\u003eFailed to load\u003c/div\u003e\n  if (!data) return \u003cdiv\u003eLoading...\u003c/div\u003e\n\n  return (\n    \u003c\u003e\n      \u003cNavbar links={data.links} /\u003e\n      \u003cmain\u003e{children}\u003c/main\u003e\n      \u003cFooter /\u003e\n    \u003c/\u003e\n  )\n}\n```\n\n这里用了第三方库来请求，其中的 fetcher 可以这么写：\n\n```js\nconst fetcher = (url) =\u003e fetch(url).then((res) =\u003e res.json());\n```\n\n### ⑩. 配置静态资源\n\n在根目录下新建 public 目录。\n\n- 引入本地图片\n\n```js\nimport Image from 'next/image'\nimport profilePic from '../public/me.png'\n\n\u003cImage\n    src={profilePic}\n    alt=\"Picture of the author\"\n/\u003e\n```\n- 加载远程图片\n\n```js\n\u003cImage\n    src=\"/me.png\"\n    alt=\"Picture of the author\"\n    width={500}\n    height={500}\n    priority\n/\u003e\n```\n远程资源域名配置有两种方式，在根目录下新建配置文件 next.config.js:\n\n第一种：\n```js\nmodule.exports = {\n  images: {\n    domains: ['example.com', 'example2.com'],\n  },\n}\n```\n这个配置专门用于加载图片，设置域名只是其中一个选择项，默认使用数组第一个域名，在具体使用时，可以手动指定数组中的枚举项：`\u003cImage src=\"my-image.jpg?domain=https://example2.com\" alt=\"My Image\" /\u003e`\n\n第二种：\n\n```js\nasync rewrites() {\n    return {\n      fallback: [\n        {\n          source: '/home/:image*',\n          destination: `https://${isProd ? CDNPath : filePath}/home/:image*`\n        }\n      ]\n    }\n}\n```\n这个配置用于重写规则，作用域比较广，还可以用来拦截 API 请求等。\n\n- 使用外挂字体\n\n在 pages 新建一个 _document.js 文件：\n\n```js\nimport Document, { Html, Head, Main, NextScript } from 'next/document'\n\nclass MyDocument extends Document {\n  render() {\n    return (\n      \u003cHtml\u003e\n        \u003cHead\u003e\n          \u003clink\n            href=\"https://fonts.googleapis.com/css2?family=Inter\u0026display=optional\"\n            rel=\"stylesheet\"\n          /\u003e\n        \u003c/Head\u003e\n        \u003cbody\u003e\n          \u003cMain /\u003e\n          \u003cNextScript /\u003e\n        \u003c/body\u003e\n      \u003c/Html\u003e\n    )\n  }\n}\n\nexport default MyDocument\n```\n\n\u003e _document.js 用于自定义 \\\u003chead\u003e 标签、定义 CSS 样式、添加元数据（metadata）等\n\n- 使用外部脚本\n\n```js\nclass MyDocument extends Document {\n...\n    \u003cHead\u003e\n        \u003cScript src=\"https://connect.facebook.net/en_US/sdk.js\" strategy=\"lazyOnload\" /\u003e\n    \u003c/Head\u003e\n    \u003cbody\u003e\n      \u003cMain /\u003e\n      \u003cNextScript /\u003e\n    \u003c/body\u003e\n}\n```\n\n### ⑪. 环境变量配置\n\nNext.js 内置支持将环境变量从 `.env.local` 加载到 `process.env` 中。你可以在本地根目录文件 `.env.local` 中写入自定义的变量：\n\n```\nenvironment=development\n```\n\n然后可以在配置文件中获取：`process.env.environment`\n\n你也可以直接加上前缀：NEXT_PUBLIC\n\n```\nNEXT_PUBLIC_ANALYTICS_ID=abcdefghijk\n```\n这样的变量会加载在nodejs中，你在js文件里也可以通过 process 来访问了。\n\n### ⑫. 配置i18n\n\n安装依赖：`yarn add react-i18next i18next next-i18next`\n\n在 _app.js 中引入：\n\n```js\nimport { appWithTranslation } from 'next-i18next';\n\n...\nexport default memo(appWithTranslation(MyApp));\n```\n\n在 public 文件夹里写入中英文文案：\n\n![image.png](/img/posts/2023-11-3/2023-11-3-4.png)\n\n![image.png](/img/posts/2023-11-3/2023-11-3-5.png)\n\n![](/img/posts/2023-11-3/2023-11-3-6.png)\n\n根目录下添加配置文件 next-i18next.config.js：\n\n```js\nmodule.exports = {\n  i18n: {\n    localeDetection: false, // 不检测浏览器语言环境\n    defaultLocale: 'en',\n    locales: ['en' , 'zh']\n  },\n  localePath: typeof window === 'undefined'\n    ? require('path').resolve('./public/locales')\n    : require('path').resolve('./public/locales'),\n  reloadOnPrerender: process.env.NEXT_PUBLIC_DOMAIN_ENV === 'development',\n};\n```\n并在 next-config.js 中引入：\n\n```js\nconst { i18n } = require('./next-i18next.config');\n\nmodule.exports = () =\u003e {\n\n  return {\n    i18n,\n  }\n}\n```\n\n在组件中使用：\n\n```js\nimport { serverSideTranslations } from 'next-i18next/serverSideTranslations';\nimport { useTranslation } from 'next-i18next';\n\nconst { t } = useTranslation(['common']);\n\n...\n// 渲染时使用\n\u003cbutton className={`${Style['btn-link']} mr-16 primary button-outlined`}\u003e\n  {t('login')}\n\u003c/button\u003e\n...\n\nexport const getStaticProps = async ({\n  locale,\n}) =\u003e {\n  return {\n    props: {\n      ...(await serverSideTranslations(locale ?? 'en', [\n        'common'\n      ])),\n    },\n  }\n}\n\n```\ni18n 会在预编译的时候，往 getStaticProps 传入国际化文案参数。控制显示哪一个文案，是根据配置的目录和访问路径来的，比如要显示中文，locales下有个zh文件夹，你的访问路径也应该对应：\n\n\n![image.png](/img/posts/2023-11-3/2023-11-3-12.png)\n\n所以可以写一个全局的切换按钮，来控制路由变化：`window.location.href = '/zh';`\n\n\n### ⑬. 自定义配置\n\nnextjs 提供自定义配置文件 next.config.js (或 mjs，使用 ESM) 用于高级配置:\n\n```js\n// 常用配置\nconst { PHASE_DEVELOPMENT_SERVER } = require('next/constants')\n\nmodule.exports = (phase, { defaultConfig }) =\u003e {\n  // 开发环境配置\n  if (phase === PHASE_DEVELOPMENT_SERVER) {\n    return {\n        env: {\n          env: 'dev', // 可在页面使用：\u003ch1\u003eenv is: {process.env.env}\u003c/h1\u003e\n        },\n        basePath: '/docs', // 基础路径，所有的Link跳转会以这个为基础\n        compress: false, // 压缩代码\n        generateEtags: false, // 禁用 ETag ？\n        distDir: 'build', // 自定义输出目录\n        async redirects() {  // 重定向\n          return [\n            {\n              source: '/about',\n              destination: '/',\n              permanent: true,\n            },\n          ]\n        },\n        async rewrites() { // 重写资源路径，默认是在检查文件系统（页面和`/public`文件）之后、动态路由之前应用的；使用 fallback 表示每次检查文件和动态路由之后触发\n          return {\n            fallback: [\n              {\n                source: '/home/:image*',\n                destination: `https://${isProd ? CDNPath : filePath}/home/:image*`\n              },\n            ]\n          }\n        },\n      }\n  }\n\n  return {\n    // 同上...\n  }\n}\n```\n### ⑭. 部署\n\n- 将代码推送到 github\n- 注册一个 vercel账号：https://vercel.com/signup\n- 选择关联仓库，选中你的仓库\n\n\n![image.png](/img/posts/2023-11-3/2023-11-3-7.png)\n\n\n![image.png](/img/posts/2023-11-3/2023-11-3-8.png)\n\n- 点击部署后会自动部署\n\n\n![image.png](/img/posts/2023-11-3/2023-11-3-9.png)\n\n- 然后在 github 仓库右侧会出现链接：\n\n\n![image.png](/img/posts/2023-11-3/2023-11-3-10.png)、\n\n- 查看博客\n\n\n![image.png](/img/posts/2023-11-3/2023-11-3-11.png)"])</script><script>self.__next_f.push([1,"22:T391a,"])</script><script>self.__next_f.push([1,"现代浏览器的底层原理特别的复杂，可以说是一个小型的操作系统。以 chrome 为例，他是多进程的浏览器，其中渲染页面是一个单独的进程，叫做渲染进程。目前用的最多的方式是一个 tab 页单独分配一个渲染进程来维护。每一个渲染进程中，有一个渲染主线程用于无阻塞地执行渲染任务。\n\n渲染，通俗的解释就是**将 html 字符串解析为图形像素信息**的过程。你输入一个 url 地址后，会通过一系列解析，从目标服务器直接或间接获取到这个 html 字符串，而渲染进程要做的就是这个翻译为像素信息的过程。\n\n本文就通过图解来讲述浏览器的渲染主线程的工作过程。\n\n[chromium 内核源码](https://github.com/chromium/chromium)\n\n----\n\n## 0. 渲染流水线\n\n依据消息循环的概念，浏览器渲染主线程按照各个任务队列（微任务队列、交互队列，延时队列等）优先级，取用任务包并执行。那么，执行的这些包后的变更，何时会真正呈现在页面上呢？我们看图：\n\n\n![无标题-2023-10-06-1925.png](/img/posts/2023-10-26/2023-10-26-1.png)\n\n在浏览器向前端服务器请求到 html 字符串后，就打包为一个消息循环中的一个渲染任务，交由渲染主线程执行渲染工作。\n\n那么浏览器是如何解析这个 html 字符串的呢？我们先来总览一下他的解析流水线，之后的小节再分步来讲解：\n\n\n![无标题-2023-10-06-1925.png](/img/posts/2023-10-26/2023-10-26-2.png)\n\n## 1. 解析 HTML\n\n我们获取一个页面，一般都是通过网络请求拿到 html 字符串本身的：\n\n\n![image.png](/img/posts/2023-10-26/2023-10-26-3.png)\n\n我们也可以加上 `view-source` 前缀来访问这个字符串：`view-source:https://www.ucloud.cn`\n\n\n![image.png](/img/posts/2023-10-26/2023-10-26-4.png)\n\n他与随后获取到的 css、js 文件共同影响了页面的渲染。\n\n浏览器获取到 HTML后，产生渲染任务，交给渲染主线程的消息队列。随后的渲染解析器会将这个结构解析为 DOM 树 和 CSSOM 树。\n\n先解释概念：\n\n- DOM树：文档对象模型，是网页中 html元素为根节点的一颗元素关联关系的集合\n\n\n![无标题-2023-10-06-1925.png](/img/posts/2023-10-26/2023-10-26-5.png)\n\n- CSSOM树: 是网页CSS对象模型，描述页面DOM结构层集中的css样式\n\n\n![无标题-2023-10-06-1925.png](/img/posts/2023-10-26/2023-10-26-6.png)\n\n其中：\n\n- StyleSheetList 是页面 CSSOM 根节点，代表页面所有的样式表，其包含多套不同优先级的样式表 \n- CSSStyleSheet 是页面样式表，有这几种：内联（`\u003cdiv style=\"\"\u003e`）、外部（`\u003clink\u003e`）、内部（`\u003cstyle\u003e`）和默认样式表 （也叫用户代理样式表，每个浏览器内置样式），通过 `document.styleSheets` 可以获取上下文中所有的样式表。\n- CSSStyleRule：css 规则，比如：`body { margin: 0 }` 就是一个规则\n\n\u003e 浏览器的 API 使用 C++ 实现，其使用 js 进行了封装，使得 DOM 操作可以使用 js 完成\n\n知道了上述概念，我们来看一下浏览器解析 html 的过程：\n\n\n![无标题-2023-10-06-1925.png](/img/posts/2023-10-26/2023-10-26-7.png)\n\n我们来看图说话：\n\n1. 渲染主线程无阻塞的读取 html 字符串\n2. 遇到css，交由预解析线程线程准备css资源，准备好后无阻塞解析，并推送任务。渲染主线程通过css构造CSSOM\n3. 遇到js，交由预解析线程准备js资源，准备好后开始执行js，js会影响CSSOM/DOM树的结构，所以主线程需要阻塞等待，执行完毕后，重新构建CSSOM/DOM树\n4. 渲染主线程继续向下执行，重复上面的步骤，直到结束。\n\n这一步的产出：DOM/CSSOM\n\n## 2. 样式计算\n\n这一步的目的是遍历 DOM树，找到页面各个元素的最终计算样式（Computed Style）：\n\n\n![image.png](/img/posts/2023-10-26/2023-10-26-8.png)\n\n在这个过程中：\n\n- 预设值会变为绝对值。比如 100% -\u003e px，0.125rem -\u003e px，red -\u003e rgb(255, 0, 0)等\n- 同一元素按照优先级层叠、继承等各种因素决定最终的样式\n- 计算样式会展示所有的可能样式，即使没有设置过，也会是 none 或者 unset\n\n获取计算样式有哪些，可以使用 API：`getComputedStyle`\n\n\n![image.png](/img/posts/2023-10-26/2023-10-26-9.png)\n\n## 3. 布局\n\n布局的过程，就是通过 CSSOM/DOM 树生成真正在页面展示的结构布局树。我们看图：\n\n\n![无标题-2023-10-06-1925.png](/img/posts/2023-10-26/2023-10-26-10.png)\n\n上图这个例子就很好的说明了 DOM 树和布局树的区别。布局树中的各个节点都是会有自己的包含块的。\n\n\u003e 包含块：100% 计算的相对尺寸就是该元素的包含块。如果是 absolute 定位元素，其包含块是离他最近的设置了非 static 定位的祖先元素\n\n\n其实在 chrome 源码中也规定了各个标签的内置样式，他们都会在布局阶段进行判断：\n\n![image.png](/img/posts/2023-10-26/2023-10-26-11.png)\n\n另外一个布局与 DOM 不一样的是：文本内容必须在行盒中，具名的行盒和块盒在布局树中不能相邻，比如一个 `inline-block` 和一个 `flex`，他们肯定是分两行显示的，浏览器一种处理方式是插入一个或多个匿名的盒子来做间隔：\n\n\n![无标题-2023-10-06-1925.png](/img/posts/2023-10-26/2023-10-26-12.png)\n\n\u003e 布局需要考虑的因素有很多，定位、样式、 BFC 等；同时在布局树里也会暴露一些常用信息，比如 clientHeight、offsetHeight 等\n\n\u003e 布局的例子还有很多，上面的例子旨在说明 DOM 树（json）和 布局树的结构（c++ 对象）往往是不一样的\n\n## 4. 分层\n\n现代浏览器为了提升渲染效率，将二维提升到三维，增加维度，开辟新的空间。类似于 PS 中的图层，便于局部渲染。\n\n在布局确定了元素的位置和样式以后，浏览器会根据渲染引擎的不同采用不同的分层方式。\n\n\n\n![屏幕录制2023-10-26 下午4.29.57 (2).gif](/img/posts/2023-10-26/2023-10-26-13.gif)\n\n\u003e 上图中可以看到，是有分层的。至少滚动条是默认层级高于页面的。\n\n分层一般是跟 css 属性有关系，一般地，堆叠上下文相关的属性会影响分层。 比如 z-index 强制提高层级；whil-change 则适用于分层渲染的浏览器，告诉浏览器，根据实际情况将其单独分层。\n\n分层的作用：\n\n- 提高渲染效率：适用于位置反复变化的元素，回流重绘只在同层出现，计算量会减少\n\n分层不能滥用：\n\n- 分层会增加内存消耗，过多的分层会导致浏览器遍历和计算的耗时变长。所以应该避免无意义的分层或者不合理的分层\n\n\n## 5. 绘制指令\n\n这一步是渲染主线程的最后一步操作，**他针对每一层元素，生成对应的绘制指令：比如将笔移动到 (x, y)，绘制宽度100px的黑色直线...**（类似 canvas）。\n\n从这一步往后，渲染主线程的工作就完成了，渲染主线程会带着所有生成的绘制指令集，将任务交给其他线程完成。\n\n![无标题-2023-10-11-1617.png](/img/posts/2023-10-26/2023-10-26-14.png)\n\n\n## 6. 分块（tiling）\n\n到了这一步，浏览器会将每一层上的元素分成不同的块，确定各个块的优先级。一般靠近视口的块优先级会相对较高。\n\n\n![无标题-2023-10-11-1617.png](/img/posts/2023-10-26/2023-10-26-15.png)\n\n分块一般是交给分块线程来完成的，他会维护很多个合成器来管理这些块的合并和展开。\n\n\n## 7. 光栅化（GPU计算为主）\n\n光栅化（Raster）是图像处理的一个概念，他将按照每一个块的优先级，将各个块元素解析为位图格式。如图展示了一个像素点及其周边连通区域像素点的示意图：\n\n\n![无标题-2023-10-11-1617.png](/img/posts/2023-10-26/2023-10-26-16.png)\n\n我们所说的 GPU计算主要就是在这一个环节，GPU 比 CPU 更擅长光栅化计算，其本质是矩阵的运算。在浏览器中，这一过程将分配给 GPU 进程来处理。\n\n## 8. 最终绘制（GPU计算为主）\n\n合成线程负责计算出每一个位图在屏幕上的位置，交给 GPU 进行最终呈现。\n\n\n这里来解释一下，渲染进程实际上是在沙盒里边运行的，其没有操作硬件的能力，所以这里必须要交给 GPU 进程过渡。\n\n比较神奇的是，css 样式 **transform** 并不是在光栅化中生成像素点，而是在这一步真正要画的时候决定的，就是在 GPU 做一个矩阵变换。\n\n我们举一个矩阵乘法 做 **skewX** 的例子。我们将 google 首页的 logo 横向扭曲一下：\n\n\n![image.png](/img/posts/2023-10-26/2023-10-26-17.png)\n\n\n我们用一个点 P(x, y, 1) 来说明问题，将其表示为齐次坐标形式 [x, y, 1]。（模型参考：[skewX() - CSS：层叠样式表 | MDN (mozilla.org)](https://developer.mozilla.org/zh-CN/docs/Web/CSS/transform-function/skewX)）\n\n```\nP = [x, y, 1] \n```\n\n使用乘法算子 T 表示转换矩阵： \n\n```\nT = \\begin{bmatrix}  \n1 \u0026  tan(25deg) \u0026 0 \\\\  \n0 \u0026 1 \u0026 0 \\\\  \n0 \u0026 0 \u0026 1  \\\\  \n\\end{bmatrix}\n```\n![image.png](/img/posts/2023-10-26/1.png)\n\n\n现在，我们要将这个点应用 `transform: skewX(25deg)` 变换。\n\n```\nP' = T * P^{\\text{T}} = [x', y', z']\n```\n![image.png](/img/posts/2023-10-26/2.png)\n\n计算后得：\n\n```\nx' = x + tan(25deg) * y  \n```\n```\ny' = y  \n```\n```\nz' = z = 1\n```\n![image.png](/img/posts/2023-10-26/3.png)\n\n\n可以看到，skewX 后，纵坐标没有变，横坐标整体向右移动了 `tan(25deg) * y` 的距离，根据三角函数公式可以看出，确实是向右倾斜了 25 度。\n\n\u003e skewX 倾斜是根据图形的中心点进行的，下半部分向右平移，上半部分向左平移；上面的例子只举例了下半部分的情况。\n\n\u003e 同类型的操作还有 缩放(`scale`)，旋转(`rotate`)以及位移(`translate`) 等\n\n--------------\n再来看一下完整的过程，帮助回忆：\n\n\n![无标题-2023-10-06-1925.png](/img/posts/2023-10-26/2023-10-26-18.png)\n\n-----\n\n## 9. Q \u0026 A\n\n#### 什么是 reflow ？\n\n回流的本质是重新计算布局树。我们来看一下回流的执行过程：\n\n\n![无标题-2023-10-11-1617.png](/img/posts/2023-10-26/2023-10-26-19.png)\n\n当进行了影响布局的操作后（cssom改变），会引发一次 layout。\n\n浏览器有自己的优化策略，往往将多次回流合并执行（浏览器会在消息队列做优化），比如在 js 代码全部执行完毕后进行统一执行，所以 reflow 是异步执行的。所以，在某种场景下，js 可能不能实时获取（同步获取）最新的布局信息。（可以通过直接同步读取属性来强制触发回流）\n\n\u003e 开发过程中，代码应该避免频繁修改布局树（height/width/margin/padding...）\n\n#### 什么是 repaint ？\n\n重绘的本质是重新根据分层信息计算绘制的指令。他开始的节点一般是 paint，某种情况也会引起分层变化。\n\n回流一定会引起重绘。\n\n\n![无标题-2023-10-11-1617.png](/img/posts/2023-10-26/2023-10-26-20.png)\n\n#### 为什么 transform 效率高 ？\n\n因为计算 transform 是在最后一步（draw）时，针对本层级的元素，在 GPU 中执行变换的，不会引起回流和重绘。\n\n\n![无标题-2023-10-11-1617.png](/img/posts/2023-10-26/2023-10-26-21.png)\n\n上图可以看到，transform 不在渲染主线程中执行任务，所以，即使页面 js 进入了死循环，动画也可以正确执行。\n\n\n## 10. 附：requestAnimationFrame 与 requestIdleCallback\n\n#### 渲染任务出现的时机\n\n视具体情况而定，并不是每一轮消息循环结束时都会产生一个**渲染任务**。这要根据屏幕刷新率、页面性能、页面是否在后台运行等来共同决定，通常来说这个渲染间隔是固定的。通常决定渲染时机的因素有如下几点：\n\n1. 显示器一般帧率为 60fps（每 16.66ms 渲染一次），如果页面性能维持不了 60fps，浏览器会降到 30fps 以保证渲染能够进行下去。\n2. 如果浏览器上下文不可见，那么页面会降低到 4fps 左右甚至更低。\n3. 如果浏览器判定当前改动不会引起视觉变化或者 **`requestAnimationFrame`** 回调为空时，则会跳过渲染。\n4. 在页面 resize、页面 scroll、**`requestAnimationFrame`** 调用、IntersectionObserver 触发显示、元素显示、隐藏或结构变化时，一般在渲染间隔到来时会推送一个渲染任务。\n\n#### requestAnimationFrame\n\nrequestAnimationFrame 的回调有两个特点：\n\n1.  在重新渲染前调用。\n2.  回调合并执行。\n\n第一条，保证了在渲染任务执行之前执行完想要改变的元素，保证了动画的流畅，不会拖延到下一帧再渲染。第二条我们可以看一段代码：\n\n```js\n// requestAnimationFrame 在渲染任务执行之前执行\nsetTimeout(() =\u003e {\n  console.log(1)\n  requestAnimationFrame(() =\u003e console.log(2))\n})\nsetTimeout(() =\u003e {\n  console.log(3)\n  requestAnimationFrame(() =\u003e console.log(4))\n})\n\nqueueMicrotask(() =\u003e console.log(5))\nqueueMicrotask(() =\u003e console.log(6))\n\n/** 输出\n5\n6\n1\n3\n2\n4\n*/\n```\n\n\u003e queueMicrotask 是 web API，用于创建一个微任务\n\n#### requestIdleCallback\n\nrequestIdleCallback 是空闲调度算法，把一些计算量较大但是又没那么紧急（任务队列的优先级决定）的任务放到空闲时间去执行。不要去影响浏览器中优先级较高的任务，比如动画绘制、用户输入、微任务等等。\n\n\n```js\n// 定义你的计算密集型任务  \nfunction computeIntensiveTask() {  \n  // 执行一些复杂的计算...  \n}  \n  \n// 使用 requestIdleCallback 在空闲时执行任务  \nrequestIdleCallback(function() {  \n  computeIntensiveTask();  \n}, {  \n  timeout: 1000, // 设置超时时间，如果在这段时间内没有空闲时间，回调函数将被取消  \n  dependencies: [] // 可以设置依赖项，当所有依赖项都完成时，才会执行回调函数  \n});\n```\n\n但是，其兼容性还不好，导致 React 的 fiber 不得不自己实现了一套这个 API。\n\n\n![image.png](/img/posts/2023-10-26/2023-10-26-22.png)\n\n\n## 11. 总结\n\n#### 浏览器是如何渲染页面的？\n\n1. 接受 HTML，产生渲染任务，交给渲染主线程的消息队列\n2. 在消息循环机制下，渲染主线程依次取出任务并开始渲染\n3. 渲染任务分为多个阶段串行流水执行:\n\n```js\n1. html解析\n2. 样式计算\n3. 布局\n4. 分层\n5. 绘制指令\n6. 分块\n7. 光栅化\n8. 画出像素点。\n```"])</script><script>self.__next_f.push([1,"23:T2812,"])</script><script>self.__next_f.push([1,"事件循环 （Event loop，又叫消息循环 Message loop）是浏览器的核心概念之一，是前端学习和技术提升绕不过去的知识。本文通过图解的方式，讲述一下现代浏览器事件循环的运行原理。\n\n## 1. 浏览器的进程与线程\n\n进程是计算机操作系统资源分配的最小单位。现代浏览器，以 chrome 为例，广泛采用的是多进程架构。为了减少连环崩溃的几率，启动浏览器后，会将各个任务拆分为多个进程。如下图所示：\n\n\n![进程.png](/img/posts/2023-10-12/2023-10-12-1.png)\n\nchrome 将浏览器任务拆分为多个进程：\n\n- 浏览器进程（Browser process）：我负责界面显示、用户交互、子进程管理等业务。\n- 网络进程（Network process）：我负责加载网络资源业务。\n- 渲染进程（Rendering process）：我是渲染的主角，负责执行 HTML、css、js 代码。默认情况，浏览器会为每一个 tab 页签开启一个渲染进程，以确保相互不影响。\n- ...\n\n\u003e 频繁开启进程会造成内存占用过多的情况，chrome 后续会进行改进，考虑相同站点（相同顶级域名和二级域名）共用一个渲染进程。\n\n![无标题-2023-10-06-19251.png](/img/posts/2023-10-12/2023-10-12-2.png)\n\n\n渲染进程会开启一个渲染主线程，用于无阻塞渲染任务。其余线程协助主线程完成任务。\n\n**渲染主线程（Main thread）** 负责执行代码、样式与布局（通过优先级、百分比换算、宽高等几何信息高动态计算、相对位置等计算最终样式表）、处理图层、控制60帧刷新、执行各种回调函数等，是最忙的一个，一刻也没有停歇。\n\n\n![无标题-2023-10-06-19252.png](/img/posts/2023-10-12/2023-10-12-3.png)\n\n此时就有一个问题，主渲染任务都交给一个线程，效率会高吗？为什么不多线程一起渲染？\n\n这是因为浏览器渲染和 JavaScript 执行共用一个线程，而默认情况下， JavaScript 执行又会影响 CSSOM/DOM 树的渲染和结构，所以必须阻塞渲染，他们也必须是单线程操作。在构建 DOM 时，HTML 解析器若遇到了 JavaScript，它会暂停构建DOM，将控制权移交给 JavaScript 引擎，等 JavaScript 引擎运行完毕，浏览器再从中断的地方恢复 DOM 构建。如果使用多线程处理可能会导致渲染DOM的冲突，复杂度会大幅度提升：\n\n\n![无标题-2023-10-06-19254.png](/img/posts/2023-10-12/2023-10-12-4.png)\n\n## 2. 消息循环\n\n上面使用单线程，使得在编写代码时无需考虑复杂的线程同步和互斥问题，从而降低了开发的复杂性，但是终归效率是上不去的。为了解决这个问题，这里巧妙地引入了消息循环来统一解决这个问题。\n\n**核心思想**：渲染主线程永久轮询执行任务；单独开辟一个消息队列（Message queue）空间用于存放各个线程加入的任务；渲染主线程只是简单的拿取任务执行，而不用操心这个任务是谁送过来的。在 Chrome 的源码中，使用的是一个死循环来完成的：\n\n```cpp\nfor(;;) {}\n```\n\n\u003e 消息队列的无限轮询就叫消息循环，消息循环就发生在渲染主线程里\n\n![无标题-2023-09-15-1456.png](/img/posts/2023-10-12/2023-10-12-5.png)\n\n1. 最开始，渲染主线程开始轮询\n2. 每一次呢循环检查消息队列是否有任务，有则取出第一个任务执行。\n3. 其他所有线程都可以追加任务进消息队列的末尾。\n\n### 异步\n\n在消息循环中，肯定会存在一些需要延时执行的代码，js在执行到他们时不会立即触发回调，而是需要某种计时机制或者触发机制来定时触发，他们一般是通过回调函数来返回执行的结果，大致分类如下：\n\n1. 前端API计时器：setTimeout、setInterval\n2. 前端异步 API：Promise等\n3. 网络通信：XHR、fetch等\n4. 用户交互回调：addEventListener\n\n\u003e 异步与同步最大的不同是，异步回调触发前的延时对用户是没有必要的。设计浏览器时，异步触发前的那段延时应该另外开辟线程（比如计时线程）单独计数，而不阻塞渲染主线程\n\n异步的渲染过程如下：\n\n\n![无标题-2023-09-15-1456.png](/img/posts/2023-10-12/2023-10-12-6.png)\n\n可以看到，异步任务在执行完毕后进入消息队列末尾排队即可！主线程只管拿消息任务，而不用管计时任务是否完成。\n\n\u003e 计时线程其实使用的是操作系统底层的逻辑，这里不做深究。\n\n\n#### 异步案例\n\n看下面的代码：\n\n```js\nfunction delay(duration) { /* 死循环 duration 秒 */ }\n\nconst btn = document.querySelector('button');\nconst h1 = document.querySelector('h1');\n\nbtn.onclick = function() {\n    h1.textContent = 'hello message queue !'\n    delay(3000)\n}\n```\n他执行后会有什么表现？是页面标题变为 'hello message queue !' 后假死3秒钟吗？我们用图解来分析一下：\n\n\n![无标题-2023-09-15-1456.png](/img/posts/2023-10-12/2023-10-12-7.png)\n\n我们来看图说话：\n\n1. 用户点击，点击的回调进入消息队列\n2. 这个回调事件分为两部分，同步代码 `h1.textContent = 'hello message queue !'` 立即执行，延时代码开始执行进入死循环\n3. 最后入队一个绘制任务，在其他代码执行完毕后开始绘制\n\n是不是看出问题来啦？浏览器实际效果是先假死3秒钟再改变标题文字！\n\n\u003e 绘制任务侧重于渲染原理，不是本文重点，不做赘述。他出现在循环的每一次迭代之后。在每一个事件循环的迭代中，浏览器会先处理所有的同步任务（例如：解析HTML，处理DOM操作等），然后处理异步任务（例如：网络请求，定时器回调等）。在这个异步任务完成后，浏览器会进入下一个事件循环迭代。\n\n#### 理解异步\n\n关于异步，我们是怎么理解的呢？\n\n一般来说，单线程语言是没有严格意义的异步的，代码是从上至下依次执行的。上面讲的异步，是在浏览器维度来讲的，js没有多线程，但是浏览器可以开辟多个线程来维护异步的任务。\n\n渲染主线程执行 js 任务（js线程阻塞执行），主线程有承担渲染的其他任务，如果都同步执行，主线程就会白白消耗时间，页面经常性假死。\n\n采用消息循环+异步时，在异步任务发生时，主线程将这个任务交给其他线程来执行，跳过这个任务往后执行；其他线程执行完毕后将回调包装成任务放入消息队列末尾，等待主线程调用。\n\n这就保证了单线程渲染时，永不阻塞渲染。最大限度保证主线程流畅。\n\n\n### 优先级\n\n任务本身没有优先级，渲染主线程依次从对头拿取任务执行。有优先级的是消息队列。\n\n在最新版的 chrome 中，消息队列其实不是一个队列，而是多个，他们有优先级，这个优先级决定了谁先进入渲染主线程被执行：\n\n- 延时队列（Delay queue）：计时器回调任务队列，优先级【中】\n- 交互队列（Interactive queue）：用户交互后回调事件队列，优先级【高】\n- 微任务队列（Micro queue）：用户数据最快执行队列，例如 Promise、MutationObserver 等，其优先级【最高】\n- ...\n\n\n\u003e 根据 W3C 最新标准，现代浏览器将宏任务队列的概念进一步做了细分。原来的宏任务主要包含：`script(整体代码)、setTimeout、setInterval、I/O、UI交互事件、postMessage、MessageChannel、setImmediate(Node.js 环境)`等。\n\n#### 优先级案例\n\n我们用一个例子来解释：\n\n```js\nsetTimeout(function() {\n  console.log(1);\n}, 0);\n\nconsole.log(2);\n\nPromise.resolve().then(function() {\n  console.log(3);\n});\n\nconsole.log(4);\n```\n\n我们将代码拆分几块来分析：\n\n\n![无标题-2023-10-11-1617.png](/img/posts/2023-10-12/2023-10-12-8.png)\n\njs 代码是同步执行的，所以这 4 块会被 js 执行引擎快速扫描到并加入响应的队列里：\n\n\n![无标题-2023-10-11-1617.png](/img/posts/2023-10-12/2023-10-12-9.png)\n\n然后渲染主线程会按照队列的优先级拿取任务，由于 2 和 4 号任务是同步代码，直接入渲染主线程，可直接执行，打印 2 和 4；接下来拿取优先级最高的微对列的任务 3 并执行，输出 3，接下来拿交互队列，没有任务；最后获取延时队列的任务，并依次执行。\n\n注意，这里 1 号延时任务执行时，会开辟计时线程来计数，计数完成后，将里边的同步代码 `console.log(1);` 加入同步的消息队列 (这里就是直接加入渲染主线程）同步执行，就可以输出 1 了。所以输出结果是：`2 4 3 1`\n\n----\n\n## 3. 总结\n\n**概念一**：消息循环又叫事件循环，是浏览器处理异步的一种调度策略。\n\n**概念二**：渲染主线程会反复轮询（for循环），不断拿取消息队列的任务来执行；其他线程获取到任务后，在合适的时机将其追加在消息队列末尾。\n\n**概念三**：任务队列分为 延时队列、交互队列、微任务队列；不同任务队列有不同的优先级。\n\n### Q\u0026A\n\n#### 延时队列是怎么计时的？时间精确吗？\n\n延时队列调用的是操作系统的功能，而计算机硬件并没有类似原子钟的设备（使用的是CPU寄存器计时），没有办法做到百分百精准。\n\n按照 W3C 标准，浏览器实现计时器时，如果嵌套层级超过 5 层，则会带有 4 毫秒的最小间隔时间，这又进一步加大了延时的误差。而且计时器回调也只会在渲染主线程空闲时执行，如果延时任务之前有一个很长的 js 同步阻塞，也会造成定时不准确。\n\n\nChrome 关于最小延时的源码：\n\n![image.png](/img/posts/2023-10-12/2023-10-12-10.png)\n\n\n\n----\n\n## 4. 练一练\n\n使用消息队列的理念，口算一下输出是什么吧！\n\n\n```js\nfunction test() {\n  console.log(1);\n  Promise.resolve().then(function() {\n    console.log(2);  \n  });\n}\n\nsetTimeout(function() {\n  console.log(3);\n  Promise.resolve().then(test);\n});\n\nPromise.resolve().then(function() {\n  console.log(4);\n  setTimeout(() =\u003e {\n    console.log(5);\n  });\n});\n\nconsole.log(6);\n```"])</script><script>self.__next_f.push([1,"24:T12d6,"])</script><script>self.__next_f.push([1,"本期来讲解一下 react-dom 库中用于客户端渲染的 API 们。\n\n## 1. 纯客户端渲染 createRoot\n\ncreateRoot 用于客户端创建 React 渲染的根节点。（服务端渲染无效）\n\n这里主要介绍使用方式。\n\n### 使用方式 \n\n1. 初始化一个 React 项目\n\n```js\nimport { createRoot } from 'react-dom/client';\nimport App from './App.js';\nimport './styles.css';\n\nconst root = createRoot(document.getElementById('root'));\nroot.render(\u003cApp /\u003e);\n```\n\n上面的人代码，createRoot 获取一个真实的 DOM 元素对象本身作为入参，返回 React 渲染树的根节点，他有 `render` 和 `unmount` 两个方法。他作为项目的入口，只建议使用一次。\n\n其执行流程如下：\n\n- 查找 HTML 中传入的 DOM node.\n- 在该 DOM 中放置组件 App （会清空已有元素）\n\n2. 项目中部分渲染\n\n比如项目中有一个 html 页面：\n\n```html\n\u003cnav id=\"navigation\"\u003e\u003c/nav\u003e\n\u003cmain\u003e\n  \u003cp\u003eThis paragraph is not rendered by React (open index.html to verify).\u003c/p\u003e\n  \u003csection id=\"comments\"\u003e\u003c/section\u003e\n\u003c/main\u003e\n```\n\n我们引入一个js文件：\n\n```js\nconst navDomNode = document.getElementById('navigation');\nconst navRoot = createRoot(navDomNode); \nnavRoot.render(\u003cNavigation /\u003e);\n\nconst commentDomNode = document.getElementById('comments');\nconst commentRoot = createRoot(commentDomNode); \ncommentRoot.render(\u003cComments /\u003e);\n```\n这样，在 nav 和 main 中就各自产生了一个 React 的渲染树：\n\n\n![image.png](/img/posts/2023-9-17/2023-9-17-1.png)\n\n如果你想要撤销上述渲染工作，可以这样写：\n\n```js\nroot.unmount();\n```\n\n3. 更新已经渲染过的React树\n\n已经创建出来的 root，如果想要替换其渲染内容，可以这样：\n\n```js\nroot.render(\u003cApp counter={i} /\u003e);\n```\n\n这会销毁原来的渲染，而重新建立新的渲染树。下面的例子就是利用这种原理实现的页面计时器：\n\n```js\nsetInterval(() =\u003e {\n  root.render(\u003cApp counter={i} /\u003e);\n  i++;\n}, 1000);\n```\n每过一秒就刷新一下页面渲染的组件。\n\n\n## 2. 水合服务端渲染代码 hydrateRoot\n\n`hydrate` 的主要作用是在客户端接管从服务器端渲染的应用程序，并将应用程序的状态与服务器端保持一致。\n\n在传统的 SSR 过程中，服务器端会渲染出 HTML 字符串，并将其发送给客户端。然后，客户端的 JavaScript 代码会接管这个已经渲染好的页面，并对其进行交互处理。但是，在客户端接管页面之前，用户可能会看到一个空白屏幕或者不完全渲染的页面，这被称为“闪烁”现象。\n\n`hydrate` 方法可以解决这个问题。它允许在服务器端渲染的 HTML 中插入一些特殊的注释（称为“hydration markers”），这些注释包含了客户端 JavaScript 需要的一些信息，例如应用程序的状态、组件的类型等等。当客户端加载页面时，它会查找这些注释，并使用这些信息来恢复应用程序的状态，从而快速接管页面，并减少“闪烁”现象。\n\n使用 `hydrate`（水合） 方法，可以使 SSR 的应用程序更加流畅地过渡到客户端，提高用户体验。\n\n### 使用方式\n\n1. 接收服务端过来的 html\n\n我们假设一段服务端过来的代码：\n\n```html\n\u003c!--\n  HTML content inside \u003cdiv id=\"root\"\u003e...\u003c/div\u003e\n  was generated from App by react-dom/server.\n--\u003e\n\u003cdiv id=\"root\"\u003e\u003ch1\u003eHello, world!\u003c/h1\u003e\u003cbutton\u003eYou clicked me \u003c!-- --\u003e0\u003c!-- --\u003e times\u003c/button\u003e\u003c/div\u003e\n```\n\n可以看到，有个 id 叫做 root 的根元素，我们就在入口文件中渲染：\n\n```js\nimport { hydrateRoot } from 'react-dom/client';\nimport App from './App.js';\n\nhydrateRoot(\n  document.getElementById('root'),\n  \u003cApp /\u003e\n);\n```\n\n这里 App 这个组件在 服务端返回的 html 中就有渲染好的版本，React 会根据传进来的第二个参数（App源码）重构渲染树进行渲染。\n\n2. 处理水合时的差异错误\n\n如果单个元素的属性或文本内容在服务器和客户端之间不可避免地存在差异（例如时间戳），您可以禁止水合不匹配的警告。要禁止某个元素的水合警告，请添加 `suppressHydrationWarning={true}`：\n\n```js\nhydrateRoot(document.getElementById('root'), \u003cApp /\u003e);\n```\n\n3. 区分服务端和客户端的不同\n\n如果你确实需要在客户端渲染一些与服务端不同的东西。 可以在客户端里这样写：\n\n```js\nexport default function App() {\n  const [isClient, setIsClient] = useState(false);\n\n  useEffect(() =\u003e {\n    setIsClient(true);\n  }, []);\n\n  return (\n    \u003ch1\u003e\n      {isClient ? 'Is Client' : 'Is Server'}\n    \u003c/h1\u003e\n  );\n}\n```\n\n这样，在水合的过程中，就会针对性的渲染了。这种方式就是说可以在 SSR 的基础上，客户端再增量更新只需要客户端渲染的内容，比如上面提到的计数器等。"])</script><script>self.__next_f.push([1,"25:T1a16,"])</script><script>self.__next_f.push([1,"## 1. createPortal\n\ncreatePortal 用于手动渲染动态组件。\n\n### 接受参数\n\n-   `children`: 第一个参数是一个可以被 render 的 React DOM.\n-   `domNode`: 第二个参数是一个真实的 DOM 节点，用于当做渲染的父容器.\n-   可选项 `key`: 第三个参数可选，作为动态组件的 key.\n\n### 返回值\n\n`createPortal`返回一个 React node. 在渲染时，React 会将指定的渲染组件放置在指定的 DOM 容器（domNode）内。\n\n### 注意事项\n\n-   使用 createPortal 是会事件冒泡的. 举个例子，如果你在 portal 内部点击鼠标, 这个 portal 又被 `\u003cdiv onClick\u003e` 包裹, 则 `onClick` 事件也会被触发. \n\n### 使用案例\n\n1. 往别的 div 里渲染一个组件\n\n```jsx\nexport default function MyComponent() {\n  return (\n    \u003cdiv style={{ border: '2px solid black' }}\u003e\n      \u003cp\u003eThis child is placed in the parent div.\u003c/p\u003e\n      {createPortal(\n        \u003cp\u003eThis child is placed in the document body.\u003c/p\u003e,\n        document.body\n      )}\n    \u003c/div\u003e\n  );\n}\n```\n看看界面，确实渲染在 body 下，原来的位置空空如也：\n\n\n![image.png](/img/posts/2023-9-15/2023-9-15-1.png)\n\n2. 实现一个弹窗\n\n如果你写过 UI 库，上面的 DOM 结构你可能会比较熟悉，这就是弹出层组件常用的插入方式。我们就用上面的原理，实现一个简单的弹窗，\n\n```js\nexport default function PortalExample() {\n  const [showModal, setShowModal] = useState(false);\n  return (\n    \u003c\u003e\n      \u003cbutton onClick={() =\u003e setShowModal(true)}\u003e\n        Show modal using a portal\n      \u003c/button\u003e\n      {showModal \u0026\u0026 createPortal(\n        \u003cModalContent onClose={() =\u003e setShowModal(false)} /\u003e,\n        document.body\n      )}\n    \u003c/\u003e\n  );\n}\n```\n如果不使用 createPortal，在 showModal 时，ModalContent 组件会追加在按钮下面，如果设置了绝对定位后，也只是针对上一级组件的偏移，而弹窗理应是个全局性的组件。我们看看运行效果：\n\n\n![image.png](/img/posts/2023-9-15/2023-9-15-2.png)\n\n\n3. 服务端渲染时，往独立的 html 中渲染\n\n服务端渲染时，会存在脱离 React 环境的页面 (比如 React root 只作为 web 项目的一部分时)，使用这个方法就可以实现渲染：\n\n```js\nconst sidebarContentEl = document.getElementById('sidebar-content');\n\n...\n\u003c\u003e\n  \u003cMainContent /\u003e\n  {createPortal(\n    \u003cSidebarContent /\u003e,\n    sidebarContentEl\n  )}\n\u003c/\u003e\n```\n\n4. **将只支持 js 引入方式的第三方库渲染为 React 组件**\n\n有的第三方库只提供了 js 引入方式，比如 地图组件 leaflet：\n\n```js\n// map-widget.js\nimport 'leaflet/dist/leaflet.css';\nimport * as L from 'leaflet';\n\nexport function createMapWidget(containerDomNode) {\n  const map = L.map(containerDomNode);\n  map.setView([0, 0], 0);\n  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {\n    maxZoom: 19,\n    attribution: '© OpenStreetMap'\n  }).addTo(map);\n  return map;\n}\n\nexport function addPopupToMapWidget(map) {\n  const popupDiv = document.createElement('div');\n  L.popup()\n    .setLatLng([0, 0])\n    .setContent(popupDiv)\n    .openOn(map);\n  return popupDiv;\n}\n```\n\n上面的两个函数都不是组件，我们不能在React组件中直接引用。\n\n看下面的处理：\n\n```js\nimport { useRef, useEffect, useState } from 'react';\nimport { createPortal } from 'react-dom';\nimport { createMapWidget, addPopupToMapWidget } from './map-widget.js';\n\nexport default function Map() {\n  const containerRef = useRef(null);\n  const mapRef = useRef(null);\n  const [popupContainer, setPopupContainer] = useState(null);\n\n  useEffect(() =\u003e {\n    if (mapRef.current === null) {\n      const map = createMapWidget(containerRef.current);\n      mapRef.current = map;\n      const popupDiv = addPopupToMapWidget(map);\n      setPopupContainer(popupDiv);\n    }\n  }, []);\n\n  return (\n    \u003cdiv style={{ width: 250, height: 250 }} ref={containerRef}\u003e\n      {popupContainer !== null \u0026\u0026 createPortal(\n        \u003cp\u003eHello from React!\u003c/p\u003e,\n        popupContainer\n      )}\n    \u003c/div\u003e\n  );\n}\n```\n\n上面的代码，使用 React 状态 popupContainer 接受了地图返回的容器 div，并包裹在组件 Map 中返回。如此，这个组件就可以被外部组件调用了。\n\n## 2. flushSync\n\nflushSync 用于强制刷新 React 所有已经挂起的渲染工作，并同步更新组件树。\n\n在默认情况下，React 使用异步更新策略，这意味着在调用 `setState` 或 `forceUpdate` 等更新方法后，React 将在事件循环的当前迭代中批量更新组件，而不是立即更新（可以了解一下 fiber 的调度原理）。这种异步更新策略可以提高性能，但有时候我们需要立即更新组件，这就是 `flushSync` 的用途。\n\n`flushSync` 方法可以强制 React 立即执行当前批次的所有更新，而不是等待事件循环的下一个迭代。\n\n\u003e 滥用会损害性能，最好不用。\n\n### 接受参数\n\n-   `callback`: 接受一个函数。会立即被调用，并刷新状态。同时也会刷新阻塞的更新任务、副作用等。\n\n### 注意事项\n\n-   `flushSync` 会显著影响性能.\n-   `flushSync` 可能强制阻塞 Suspense 组件，以至于 fallback 无法显示.\n\n### 使用案例\n\n1. 同一周期内渲染的问题\n\n有时候想要在同一个渲染周期内获取到最新的 state 的值，比如下面的打印机的例子：\n\n```js\nimport { useState, useEffect } from 'react';\n\nexport default function PrintApp() {\n  const [isPrinting, setIsPrinting] = useState(false);\n\n  useEffect(() =\u003e {\n    function handleBeforePrint() {\n      setIsPrinting(true);\n    }\n\n    function handleAfterPrint() {\n      setIsPrinting(false);\n    }\n\n    window.addEventListener('beforeprint', handleBeforePrint);\n    window.addEventListener('afterprint', handleAfterPrint);\n    return () =\u003e {\n      window.removeEventListener('beforeprint', handleBeforePrint);\n      window.removeEventListener('afterprint', handleAfterPrint);\n    }\n  }, []);\n\n  return (\n    \u003c\u003e\n      \u003ch1\u003eisPrinting: {isPrinting ? 'yes' : 'no'}\u003c/h1\u003e\n      \u003cbutton onClick={() =\u003e window.print()}\u003e\n        Print\n      \u003c/button\u003e\n    \u003c/\u003e\n  );\n}\n```\nbeforeprint 事件在调用打印页面时会被立即调用，但是你会发现，在界面上，isPrinting 却是 no。这是因为更新 state 的任务放入队列后，打印弹窗打开了，阻塞了任务。所以我们需要强制渲染：\n\n```js\nfunction handleAfterPrint() {\n  flushSync(() =\u003e {\n    setIsPrinting(false);\n  })\n}\n```\n\n这样，就会在打印弹窗打开的同时，同步渲染 UI 了。\n\n----\n\n到这里，常规的 API 就介绍完了，之后的系列文章就开始介绍客户端与服务端渲染的相关API了，敬请期待~~"])</script><script>self.__next_f.push([1,"26:T1a9d,"])</script><script>self.__next_f.push([1,"官网地址：[React](https://react.dev/)\n\n## 1. memo\n\n组件级别的缓存函数，使用它包裹的组件组成的新组件可以在 props 没有变化时阻止重渲染，从而提高性能。类似于Vue的 keepAlive。\n\n### 接受参数\n\n- 接受一个 react 组件。`memo` 不会改变这个组件本身的属性，任何有效的 React 组件，包括函数和 `forwardRef` 组件，都可以被接受。\n- 第二个参数是可选参数：组件以前的 props 和它的新 props。\n\n### 返回值\n\n`memo` 返回一个新的 React 组件。它的行为与提供给的组件相同，只是 React 不会总是在其父级被重新渲染时执行重新渲染，除非它的 props 发生了变化（Object.is 比较）。\n\n### 注意事项\n\n**memo 不是万能的：**\n\n1.  当一个组件在包装其他组件时，让它接受 JSX 作为子组件。这样，当父组件更新自己的状态时，需要让 React 知道它的子组件是否不需要重新渲染时，你才要考虑使用 memo。\n2. 更推荐使用组件级别的 state，而不要把所有状态都维护在顶级组件，再大量使用 memo 来挽回性能。\n3. 保持组件的纯净性。如果你的组件多次渲染返回的不同的状态，你应该许修复你组件的 bug，而不是加一个 memo。\n4. 避免不必要的状态更新，这些更新有时候会造成子组件反复渲染。\n5. 删除 useEffect 中不必要的依赖项，他有时候也会造成过多的渲染。\n6. props 如果是函数，父组件应将该函数缓存（useCallback等），否则父组件渲染，该函数引用会变化，导致子组件的 memo 失效。\n\n### 使用案例\n\n1. 部分属性变化更新组件\n\nReact 组件都是纯函数，或者说应该是纯函数，所以可以认为 props 没有变化的时候，其输出也不应该变化。这就是 memo 能够缓存而不造成错乱的理论基础。 \n\n下面的例子，只要入参 name 没有变化，Greeting 组件内部是不会重新渲染的。\n\n```js\nconst Greeting = memo(function Greeting({ name }) {\n  return \u003ch1\u003eHello, {name}!\u003c/h1\u003e;\n});\n\nexport default Greeting;\n\n// 其他组件引用\n\u003cGreeting name={name} /\u003e\n```\n\n2. 与 context 结合的缓存\n\n下面的例子，子组件 Greeting 是一个使用了mem包裹的组件，但是当父组件属性 theme 变化时，还是会引起子组件重渲染。 \n\n```js\nexport default function MyApp() {\n  const [theme, setTheme] = useState('dark');\n\n  function handleClick() {\n    setTheme(theme === 'dark' ? 'light' : 'dark'); \n  }\n\n  return (\n    \u003cThemeContext.Provider value={theme}\u003e\n      \u003cbutton onClick={handleClick}\u003e\n        Switch theme\n      \u003c/button\u003e\n      \u003cGreeting name=\"Taylor\" /\u003e\n    \u003c/ThemeContext.Provider\u003e\n  );\n}\n```\n若要使组件仅在某些 context 属性改变时重新渲染，请将组件一分为二。从外部组件的 context 中读取您需要的内容，并将其作为 props 传递给记忆的子组件。\n\n3. 组件规范：尽量减少组件成员的反复变化\n\nReact 的重渲染判断都是使用 Object.is 来判断的，但是 `Object.is({}, {})` 可是会返回 false 的。所以组件的人成员方法应该做必要的缓存，让组件在重渲染时这个方法还能保持过去的内存引用。\n\n```js\nfunction Page() {\n  const [name, setName] = useState('Taylor');\n  const [age, setAge] = useState(42);\n\n  const person = useMemo(\n    () =\u003e ({ name, age }),\n    [name, age]\n  );\n\n  return \u003cProfile person={person} /\u003e;\n}\n\nconst Profile = memo(function Profile({ person }) {\n  // ...\n});\n```\n上面的例子，person 被缓存了，当Page组件重渲染时，不会因为 person 的内存引用变化了而导致 Profile 不必要的渲染。\n\n4. 使用第二个参数来比对 props\n\n我们写个自定义的函数来比对 props，从而决定是否要重渲染。此函数作为第二个参数传递给子组件。仅当返回 true 时不做重渲染，否则就进行重渲染。\n\n```js\nconst Chart = memo(function Chart({ dataPoints }) {\n  // ...\n}, arePropsEqual);\n\nfunction arePropsEqual(oldProps, newProps) {\n  return (\n    oldProps.dataPoints.length === newProps.dataPoints.length \u0026\u0026\n    oldProps.dataPoints.every((oldPoint, index) =\u003e {\n      const newPoint = newProps.dataPoints[index];\n      return oldPoint.x === newPoint.x \u0026\u0026 oldPoint.y === newPoint.y;\n    })\n  );\n}\n```\n当用到自定义函数时，一定要测试一下是否性能比默认的比对方式更好。这里边坑比较多，尽量避免深度检查，**深度相等性检查可能会使组件变得非常慢**。\n\n## 2. forwardRef\n\nforwardRef 使组件向父组件暴露出自己的 DOM 结构。\n\n### 接收参数\n\n-  函数式组件。React 会在父组件中带着 props 和 ref 调用这个函数。\n\n### 返回值\n\n- `forwardRef` 返回原函数式组件，不过会在 props 中带入 ref 信息。\n\n### 使用案例\n\n1. 父组件获取子组件 DOM 实例\n\n```js\n// 子组件\nconst MyInput = forwardRef(function MyInput(props, ref) {\n  const { label, ...otherProps } = props;\n  return (\n    \u003clabel\u003e\n      {label}\n      \u003cinput {...otherProps} ref={ref} /\u003e\n    \u003c/label\u003e\n  );\n});\n\n// 父组件\nfunction Form() {\n  const ref = useRef(null);\n\n  function handleClick() {\n    ref.current.focus();\n  }\n\n  return (\n    \u003cform\u003e\n      \u003cMyInput label=\"Enter your name:\" ref={ref} /\u003e\n      \u003cbutton type=\"button\" onClick={handleClick}\u003e\n        Edit\n      \u003c/button\u003e\n    \u003c/form\u003e\n  );\n}\n```\n上面的例子中，子组件将 ref 打在 input 标签中，并暴露出去；父组件中，同样使用 ref 属性接受。`useRef` 的使用，可以参看之前的文章：[useRef](https://juejin.cn/post/7249607108044357690#heading-14)\n\n\u003e 使用 forwardRef 就相当于 ref 透传。父组件中的 useRef 直接打在子组件中的 input\n\n2. 播放器控制\n\n上面是控制文本框聚焦，下面是另外的 H5 API 的调用例子，父组件中控制播放器：\n\n```js\n// 子组件\n\u003cvideo width={width} ref={ref}\u003e\n  \u003csource\n    src={src}\n    type={type}\n  /\u003e\n\u003c/video\u003e\n\n// 父组件\n\u003cbutton onClick={() =\u003e ref.current.play()}\u003e\n    Play\n\u003c/button\u003e\n```\n\n3. 暴露子组件成员方法\n\nuseImperativeHandle 的使用可以参见 [useImperativeHandle](https://juejin.cn/post/7249607108044357690#heading-21)\n\n```js\nconst MyInput = forwardRef(function MyInput(props, ref) {\n  const inputRef = useRef(null);\n\n  useImperativeHandle(ref, () =\u003e {\n    return {\n      focus() {\n        inputRef.current.focus();\n      },\n      scrollIntoView() {\n        inputRef.current.scrollIntoView();\n      },\n      handleClick() {\n        handleClick();\n      }\n    };\n  }, []);\n  \n  function handleClick() {\n    // 自定义的成员方法\n    alert('click');\n  }\n\n  return \u003cinput {...props} ref={inputRef} /\u003e;\n});\n```\n这样在父组件中就可以这样调用了：`ref.current.scrollIntoView();`\n\n\n----\n完 ！！"])</script><script>self.__next_f.push([1,"27:T1449,"])</script><script>self.__next_f.push([1,"官网地址：[React](https://react.dev/)\n\n## 1. startTransition\n\n我们在讲 [useTransition](https://juejin.cn/post/7268530145202700303) 的一节我们讲过，通过 hook 可以获取到这个 API，推荐结合 hook 一起使用。\n\n当然也可以直接引入：\n\n```js\nimport { startTransition } from 'react';\n\nfunction TabContainer() {\n  const [tab, setTab] = useState('about');\n\n  function selectTab(nextTab) {\n    startTransition(() =\u003e {\n      setTab(nextTab);\n    });\n  }\n  // ...\n}\n```\n他的作用是防止 UI 阻塞，做到前端异步非阻塞渲染。具体使用方式见 useTransition。\n\n### 注意事项\n\n-  `startTransition` 不会追踪渲染 pending 的状态. 想要获取渲染实时状态，请使用 [`useTransition`](https://juejin.cn/post/7268530145202700303) .\n-  使用它包裹 state 的 `set` 函数来实现跟该 state 相关的渲染过渡。 如果想要响应 props 变化来实现渲染过渡，请使用 [`useDeferredValue`](https://juejin.cn/post/7268530145202700303).\n-  `startTransition` 内部函数必须是同步的.\n-  标记为 transition 的 state 更新会被其他 state 的更新打断渲染，在其他渲染调度结束后再次想重新执行该渲染.\n-  不能用于控制文本输入组件.\n-  如果同时有多个在运行的过渡，React 会把他们合并一起处理。这个方案似乎是个性能缺陷，随后的版本可能会修复它。\n\n## 2. createContext\n\n顾名思义，就是创建一个 context 对象，一般结合 hook 一起使用，可以参考我 [useContext](https://juejin.cn/post/7249607108044357690) 的文章。\n\n官网的部分描述与 useContext 有重复，这里及直接讲使用案例。\n\n### 使用案例\n\n1. 配置全局变量\n\n```js\n// 放在全局，创建时的默认值一般可以不用传递，在 provider 时会配置初始值的\nconst ThemeContext = createContext();  \nconst AuthContext = createContext();\n```\n我们定义主题信息和认证信息，用它包裹根组件：\n\n```jsx\nconst [theme, setTheme] = useState('dark');\nconst [currentUser, setCurrentUser] = useState({ id: 1 });\n\n\u003cThemeContext.Provider value={theme}\u003e\n  \u003cAuthContext.Provider value={currentUser}\u003e\n    \u003cPage /\u003e\n  \u003c/AuthContext.Provider\u003e\n\u003c/ThemeContext.Provider\u003e\n```\n\n在包裹的内部组件中，无论多深的层级，都可以这样使用来获取 value 值：\n\n```js\nconst theme = useContext(ThemeContext); // dark\n```\n\n\u003e 确保 ThemeContext 是一开始定义的那个单例\n\n他踢动了一个单向数据流，可以从顶向下传递动态响应式数据。如果在入口处维护一些 state，暴露出事件来给各个业务模块调用，就可以实现一个类似 redux 的功能。\n\n2. 局部引用\n\n```js\n// Button.js  \nimport { ThemeContext } from './Contexts.js';\n```\n\n比如上面的例子，我们全局配置了主题为 dark，但是有一个 Button 组件，其需要特殊处理，就可以这样写，在 Button 内部再次 Provider 自己想要的主题即可，相同的 context 遵循就近原则。\n\n## 3. lazy\n\n延迟加载组件的工具，往往与 [\\\u003cSuspense\u003e](https://juejin.cn/post/7270648629378252840#heading-4) 组件一起使用。\n\n\n简单使用：\n\n```js\nconst MarkdownPreview = lazy(() =\u003e import('./MarkdownPreview.js'));\n```\n\n### 接受参数\n\n接受一个函数，返回 Promise 或者 其他类 *thenable* 的异步函数。React 默认不会去加载 lazy 包裹的组件，除非明确的在界面上需要渲染他。当开始加载时，React 会等待其解析，解析过程中由 Suspense 提供过渡响应，解析完毕后即可渲染。返回的 Promise 和 Promise 中 resolve 的值都会被缓存（比如打包的js文件），再次渲染就不会重复请求资源。但是这个组件本身的重渲染还是会被触发。如果该 Promise reject 请求，异常会冒泡至最近的处理函数（Error Boundary）抛出。\n\n### 返回值\n\n返回一个可以渲染在 fiber 树中的组件。\n\n### 注意事项\n\n- lazy 要在 js 模块顶层使用，不要在组件内部使用\n- \n\n### 使用案例\n\n1. 动态引入加载\n\n```js\nconst MarkdownPreview = lazy(() =\u003e import('./MarkdownPreview.js'));\n\n\u003cSuspense fallback={\u003cLoading /\u003e}\u003e\n  \u003ch2\u003ePreview\u003c/h2\u003e\n  \u003cMarkdownPreview /\u003e\n\u003c/Suspense\u003e\n```\n效果：\n\n加载中：\n\n\n![image.png](/img/posts/2023-9-6/2023-9-6-1.png)\n\n加载后：\n\n![image.png](/img/posts/2023-9-6/2023-9-6-2.png)\n\n加载一次后便不会再出现 loading\n\n2. 路由懒加载\n\n介绍作者在工作中用过的一个使用 js 数组配置路由懒加载的案例：\n\n```jsx\n// route.js\nconst Loadable = (Component) =\u003e (props) =\u003e (\n    \u003cSuspense fallback={\u003cLoader /\u003e}\u003e\n      \u003cComponent {...props} /\u003e\n    \u003c/Suspense\u003e\n);\n\nconst Home = Loadable(lazy(() =\u003e import('views/pages')));\nconst User = Loadable(lazy(() =\u003e import('views/pages/common/user')));\n\nconst routes = [\n    {\n      path: 'home',\n      children: [\n        {\n          path: '/',\n          element: \u003cHome /\u003e\n        }\n      ]\n    },\n    {\n      path: 'setting',\n      children: [\n        {\n          path: 'user-setting',\n          element: \u003cUser /\u003e\n        }\n      ]\n    }\n]\n\nuseRoutes(routes);\n\n// 使用\nimport Routes from 'route.js';\n\n\u003cRoutes /\u003e\n```\n---\n\n完 ！"])</script><script>self.__next_f.push([1,"28:T18ef,"])</script><script>self.__next_f.push([1,"文章继承自 [记一次前端应用部署后，刷新静态资源丢失问题](https://juejin.cn/post/7269694294597287971) 的方案，这里换一种写法重新阐述，加上一些自己的思考和图文解释。\n\n## 1. 场景重现\n\n前端实现一个路由懒加载时，点击 menu 切换页面时出现资源 404 问题：\n\n![image.png](/img/posts/2023-8-27/2023-8-27-1.png)\n\n项目例子如下：\n\n```js\nconst AFunction = lazy(() =\u003e import('./page/a.js'))\nconst BFunction = lazy(() =\u003e import('./page/b.js'))\n\nfunction App() {\n\n  return (\n    \u003cdiv className=\"App\"\u003e\n        \u003cHashRouter basename=\"/\"\u003e\n          \u003cLink style={{marginRight: 20}} to=\"/\"\u003eHome\u003c/Link\u003e\n          \u003cLink to=\"/about\"\u003eAbout\u003c/Link\u003e\n          \u003cSuspense fallback={\u003cdiv\u003eLoading...\u003c/div\u003e}\u003e\n            \u003cRoutes\u003e\n              \u003cRoute path=\"/\" element={\u003cAFunction /\u003e}\u003e\u003c/Route\u003e\n              \u003cRoute path=\"/about\" element={\u003cBFunction /\u003e} /\u003e\n            \u003c/Routes\u003e\n          \u003c/Suspense\u003e\n        \u003c/HashRouter\u003e\n    \u003c/div\u003e\n  );\n}\n```\n\n上面的例子中，访问 `/` 路径时，`BFunction` 组件是不会被加载的，只会加载 webpack 对应路由的 chunk：\n\n\n![image.png](/img/posts/2023-8-27/2023-8-27-2.png)\n\n在切换路由到 `/about` 时，会加载这个路由对应的 chunk 文件，反复切换则不会重复加载。\n\n项目与使用场景描述完毕！\n\n## 2. 问题分析\n\n理论上，切换资源是会去服务器获取到对应 chunk 的 js 资源的，出现 404，要么是服务器文件被删除，要么是文件被重新打包，hash 值被改变了。\n\n第一种情况，资源被删除我们不考虑，不可控因素，我们自己也不会没事去删除还在使用的资源的。第二种情况就有可能了，我们本地打了包，替换了资源文件，是会造成 hash 变化的，每次打包都会针对不同的分包 chunk 打不同的 hash 值。\n\n## 3. 问题原理\n\n知道问题后，我们就来看一下打包部署流程出现了那些纰漏。\n\n前端项目简易部署流程如下：\n\n```mermaid\ngraph TD\nCI打包 --\u003e 服务器资源文件替换\n服务器资源文件替换 --\u003e 浏览器获取资源\n```\n\n![](/img/posts/2023-8-27/2023-8-27-3.png)\n\n而打包后目前在资源服务器存放目录如下：\n\n```shell\n├─console-fe\n│  ├─bundle\n│  ├─static\n│  ├─main.sdf67hda.js\n│  └─index.html\n```\n\n`index.html` 里引入了该次打包的入口文件：`main.[hash].js`，static 是静态资源文件夹，bundle 是打包好的 js 文件夹。\n\n由于 浏览器有缓存，在用户已经渲染出 index.html 后会产生缓存（比如入口 main.28cb0dcd.js），用户普通刷新页面时，浏览器默认去拿缓存的 入口 js，而分发的各个 chunk 路径是写在 入口 js 文件的，所以就拿不到了。\n\n\n用流程图描述如下：\n\n```mermaid\njourney\ntitle  前端资源部署与用户访问不同步\nsection 发布阶段\n打包: 5: 旧版本\n资源替换: 5: 旧版本\n更新服务器: 3: 可能出现问题\nsection 发布完成后\n用户刷新页面: 3: 强刷正常\n用户不刷新，原地点击路由资源: 1: 版本丢失 404\n```\n\n![](/img/posts/2023-8-27/2023-8-27-4.png)\n\n## 4. 解决方案\n\n1. 取消缓存 index.html\n\n\n我们试着从服务端提示阻止 index.html 缓存：\n\n```shell\n# nginx\nlocation ~ \\.html$ { add_header Cache-Control \"no-cache, no-store, must-revalidate\"; }\n```\n\n再次部署后，发现刷新页面的情况可以拿到新的资源了，但是如果用户停留在老页面，原地点击路由跳转还是不行。这个想想也是可以理解的，没有刷新，入口 main.js 没有改变，所以还需要特殊处理。\n\n2. 前后端统一版本号，跳转时提示需要更新\n\n后端返回的 API 中会带着约定好的适用于前端的版本号，而前端打包时也会通过 CI 写入该版本（可以是 redux、 cookie 或者 本地存储等），在任一请求 API 的地方，前端统一拦截比对两个版本号是否统一，若不统一则自动刷新页面，流程图如下：\n\n\n```mermaid\ngraph TD\n前端打包写入版本 --\u003e 用户点击切换路由时获取API实时版本号\n用户点击切换路由时获取API实时版本号 --\u003e 与前端版本号不相同时提示刷新\n```\n![](/img/posts/2023-8-27/2023-8-27-5.png)\n\n这种方案就是经常要提示用户，在多次发布新版本时对用户体验不太友好，但是可以保证用户始终拿到想要的版本。\n\n3. 服务器打包存放历史资源\n\n就像文章开头引用文章所说，资源服务器可以这样存放资源：\n\n```shell\n─console-fe\n│  ├─20230101\n│  │  ├─bundle\n│  │  ├─static\n│  │  └─main.sdf67hda.js\n│  ├─20230302\n│  │  ├─bundle\n│  │  ├─static\n│  │  └─main.qd52s5f7.js\n│  ├─index.html\n...\n```\n在部署时，CI 打包时设置一个版本：`BUILD_PATH = \"20230101\"`，在项目中，只有一个统一的 `index.html`，CI 部署时，在该文件写入制定目录下的脚本入口：\n\n```js\n\u003cscript src=\"/20230302/main.qd52s5f7.js\"\u003e\u003c/script\u003e\n```\n这样，就算用户不刷新页面，新部署的资源不会影响旧的资源，只要控制好打包的大小，定期清理老旧版本文件就可以了。\n\n这个方案的缺点是用户侧版本可能不统一，用户可能会看到旧的版本。但是接入灰度系统就会比较方便，有利有弊。\n\n\n**综合方案**\n\n综上所述，我们可以总结上述方案的优点，提出一个综合方案：\n\n- 设置不缓存 index.html\n- CI 打包时按照方案3，实现历史资源共存\n- 接入灰度系统，实现接口获取当前用户前端资源目录，比如：`/20230302/main.qd52s5f7.js`\n- 前后端约定好当前登录的灰度用户的版本，API 返回版本信息。\n\n这样，在用户第一次请求页面时，前置调用灰度 API，[灰度系统](https://juejin.cn/post/7212054600162132029)告知 nginx 服务器转发给前端页面。\n\n在用户刷新页面时，会再次调用灰度 API 并更新前端缓存，拿到最新的资源。在用户原地点击 menu 跳转路由时，资源也不会丢失，在 API 中获取灰度系统中登录用户版本号，返回给前端该约定好的版本（BUILD_PATH），前端判断版本不一致时提示用户刷新或者自行刷新页面即可。\n\n----\n\n不知道大家还有什么更好的方案吗？欢迎一起学习交流！"])</script><script>self.__next_f.push([1,"29:T2f67,"])</script><script>self.__next_f.push([1,"官网地址：[React](https://react.dev/)\n\n\n## 1. \\\u003cProfiler\u003e\n  \n\n`\u003cProfiler\u003e` 帮助开发者程式化地计算渲染性能。\n\n### 接受 props\n\n-   `id`: 想要测量性能的组件的唯一标识符\n-   `onRender`: 组件树更新时调用，传递的擦净书中包含测试组件信息和性能信息。参数信息如下：\n\n|参数|描述|\n|-|-|\n|id|该渲染元素的唯一标识，就是你自己在Profiler中打的id|\n|phase|枚举： `mount`, `update` or `nested-update`。标识渲染组件渲染的类型|\n|actualDuration|渲染包裹组件及其子组件所花费的毫秒数。这可以测试子树利用记忆函数（例如 memo 和 useMemo）的使用情况。理想情况下，此值在初始挂载后应显著降低，因为许多后代节点只需要在其特定依赖发生变化时才需要重新渲染。|\n|baseDuration|估计在没有任何优化的情况下重新呈现整个子树所需的时间的毫秒数。它是通过汇总树中每个组件的最新渲染持续时间来计算的。此值估计渲染的最坏情况成本（例如，初始挂载或没有记忆函数的树）。将实际持续时间与它进行比较，看看记忆函数是否有效。|\n|startTime|react 开始渲染时的时间戳|\n|endTime|React 当前更新组件被 commit （理解为 fiber 调度统一更新真实 dom）时的时间戳。此值在 commit 中的所有 profiler 之间共享，以便在需要时对它们进行分组。|\n\n### 注意事项\n\n性能分析会增加一些额外的开销，因此默认情况下在生产版本中会禁用它。\n\n### 使用案例\n\n1. 计算单个组件渲染性能\n\n```js\n\u003cApp\u003e\n  \u003cProfiler id=\"Sidebar\" onRender={onRender}\u003e\n    \u003cSidebar /\u003e\n  \u003c/Profiler\u003e\n  \u003cPageContent /\u003e\n\u003c/App\u003e\n```\n此时，你还可以在 [React Developer Tools](https://react.dev/learn/react-developer-tools) 中查看 Profiler 页签，里边有具体信息：\n\n\n![image.png](/img/posts/2023-8-24/2023-8-24-1.png)\n\n2. 多个组件性能测试\n\n```js\n\u003cApp\u003e\n  \u003cProfiler id=\"Sidebar\" onRender={onRender}\u003e\n    \u003cSidebar /\u003e\n  \u003c/Profiler\u003e\n  \u003cProfiler id=\"Content\" onRender={onRender}\u003e\n    \u003cContent\u003e\n      \u003cProfiler id=\"Editor\" onRender={onRender}\u003e\n        \u003cEditor /\u003e\n      \u003c/Profiler\u003e\n      \u003cPreview /\u003e\n    \u003c/Content\u003e\n  \u003c/Profiler\u003e\n\u003c/App\u003e\n```\n可以看到，使用同一个函数就行。\n\n\u003e Profiler 会影响性能，不要在生产环境使用\n\n\n## 2. \\\u003cSuspense\u003e\n\n`\u003cSuspense\u003e` 包裹一个需要懒加载的组件。\n\n### 接收 props\n\n- `children`: 懒加载的组件。在渲染过程中会用 fallback 函数填充空白区域.\n- `fallback`: 懒加载组件渲染过程中的替代品（placeholder），是一个函数，其返回值可以接受任何有效的 React Node，比如 loading 图标或者骨架屏等。当 组件延迟加载过程中，Suspense 会自动切换到 fallback，加载结束后自动换回到 children。多层 Suspense 包裹的情况时，会回落到最近的一层 fallback。\n\n### 注意事项\n\n- React 不会为在首次挂载之前被 Suspense 的渲染保留任何状态。当组件加载完毕后，React 将从头开始重试渲染挂起的渲染树。\n- 如果 Suspense 渲染树的内容已经显示后再次挂起，则“fallback”将再次显示，除非导致它的更新是由startTransition 引起的。\n- 如果 React 需要隐藏已经可见的内容，由于它再次挂起了，所以会清理渲染树中的布局效果。当内容准备好再次显示时，React 将再次触发布局重绘。这样，在组件隐藏时就不会再做布局重绘的计算了。\n- React 在 Suspense 中集成了一些底层优化，如*流服务器渲染*和*选择性水合*（Hydration）。在服务端渲染时可以用到。\n\n\u003e Suspense **不在** Effect 副作用 或者 event handler 中监测\n\n### 使用案例\n\n1. 使用 fallback 的 loading 效果\n\n```js\nconst [show, setShow] = useState(false);\n\n\u003cbutton onClick={() =\u003e setShow(true)}\u003e\u003c/button\u003e\n...\n\nif (show) {\n    return (\n        \u003cSuspense fallback={\u003cLoading /\u003e}\u003e\n          \u003cAlbums artistId={artist.id} /\u003e\n        \u003c/Suspense\u003e\n    )\n}\n\n...\nfunction Loading() {\n  return \u003ch2\u003e🌀 Loading...\u003c/h2\u003e;\n}\n```\n\n2. 一次性懒加载多个组件\n\n```js\n\u003cSuspense fallback={\u003cLoading /\u003e}\u003e\n    \u003cBiography artistId={artist.id} /\u003e\n    \u003cPanel\u003e\n      \u003cAlbums artistId={artist.id} /\u003e\n    \u003c/Panel\u003e\n\u003c/Suspense\u003e\n```\n\n被 Suspense 包裹的范围视为一个统一的更新单元。两个组件只有一个处于加载中时，整个显示都会变为指示器 fallback。在所有组件准备完毕后，会一次性渲染出来。\n\n换种思考方案，上面的代码是有问题的，多个异步组件不建议分开写，应该按照业务区分，统一使用 Details 组件封装：\n\n```js\n\u003cSuspense fallback={\u003cLoading /\u003e}\u003e\n  \u003cDetails artistId={artist.id} /\u003e\n\u003c/Suspense\u003e\n```\n\n3. 使用嵌套 Suspense\n\n```js\n\u003cSuspense fallback={\u003cBigSpinner /\u003e}\u003e\n    \u003cBiography artistId={artist.id} /\u003e\n    \u003cSuspense fallback={\u003cAlbumsGlimmer /\u003e}\u003e\n      \u003cPanel\u003e\n        \u003cAlbums artistId={artist.id} /\u003e\n      \u003c/Panel\u003e\n    \u003c/Suspense\u003e\n\u003c/Suspense\u003e\n```\n\n上面的 Biography 组件的加载不会受到 Albums 加载的影响。sequence 的运作流程：\n\n- 当 `Biography` 未加载时, 统一显示 `BigSpinner` 方案。\n- 一旦 `Biography` 加载结束, `BigSpinner` 就会被替换掉。\n- 此时 `Albums` 开始加载 `AlbumsGlimmer` 显示在对应区域。\n- 一旦 `Albums` 加载结束，则结束渲染。\n\nSuspense 边界设置就类似于堆栈的 pop 操作，是有层级关系的，最上层的最先加载。理论上 Suspense 可以用在任一个组件的任何一个地方，但是不建议在各个业务组件广泛的使用，具体的用户体验设计中的渲染顺序应该细粒度到具体的组件控制函数（usetate/useEffect 等），而不是使用懒加载技术。\n\n4. 输入框输入时，前端模拟异步查询搜索结果\n\n如下：\n\n```js\nconst [query, setQuery] = useState('');\n...\n\u003c\u003e\n  \u003clabel\u003e\n    Search albums:\n    \u003cinput value={query} onChange={e =\u003e setQuery(e.target.value)} /\u003e\n  \u003c/label\u003e\n  \u003cSuspense fallback={\u003ch2\u003eLoading...\u003c/h2\u003e}\u003e\n    \u003cSearchResults query={query} /\u003e\n  \u003c/Suspense\u003e\n\u003c/\u003e\n```\n上面的例子，setQuery 触发了组件的重渲染，SearchResults 就会出现加载界面。这可以用来在前端搜索的组件中模拟加载动画。\n\n当然，你还可以使用 useDeferredValue 来s使UI渲染更流畅：\n\n```js\nconst deferredQuery = useDeferredValue(query);\n\n...\n// 一个半透明的加载动画\n\u003cdiv style={{\n  opacity: query !== deferredQuery ? 0.5 : 1 \n}}\u003e\n    \u003cSearchResults query={deferredQuery} /\u003e\n\u003c/div\u003e\n```\n\n5. 阻止已渲染元素被隐藏 [例子](https://codesandbox.io/s/s5tn9m?file=%2FApp.js\u0026utm_medium=sandpack)\n\n我们可以这样写来懒加载一个路由 ：\n\n```js\nexport default function App() {\n  return (\n    \u003cSuspense fallback={\u003cBigSpinner /\u003e}\u003e\n      \u003cRouter /\u003e\n    \u003c/Suspense\u003e\n  );\n}\n\nfunction Router() {\n  const [page, setPage] = useState('/');\n  const [isPending, startTransition] = useTransition();\n\n  function navigate(url) {\n    startTransition(() =\u003e {\n      setPage(url);\n    });\n  }\n\n  let content;\n  \n  // 处理模拟路由逻辑赋值并content的操作省略\n  \n  return (\n    \u003cLayout isPending={isPending}\u003e\n      {content}\n    \u003c/Layout\u003e\n  );\n}\n``` \n\n上面的例子，你可能会认为组件加载时， Layout 组件也会消失并替换为 BigSpinner。 但是，可以看到，被包裹的组件使用了 `startTransition`，这告诉 React， Router 组件的渲染不是紧急的，可以缓一缓，此时，在下一次渲染结束之前，界面会保留上一次渲染的图形。所以即使 Suspense 包裹了最外层，但 Layout 组件并不会重渲染，直到下一次渲染结束后才变化。\n\n6. 在 navigate 时重置 Suspense\n\n上面的例子我们知道，在 transition 渲染阶段，UI 会避免隐藏掉已经渲染出来的数据，但是在路由导航时，恰恰需要告诉 React 给我立即销毁原来的数据并展示你准备好的 fallback。你可以这样做：\n\n```jsx\n\u003cProfilePage key={queryParams.id} /\u003e\n```\n\n我们举一个使用场景例子，一个用户的 ProfilePage 与另一个用户的 ProfilePage 内容不同。通过指定一个键，你可以确保 React 将不同用户的 ProfilePage 视为不同的组件，并在导航过程中重置 Suspense 边界。\n\n\u003e 上面是官网的解释，用人话说，就是 key 变化了，transition 不会缓存原来渲染的 UI 了，而是随着路由切换进入懒加载的 fallback\n\n7. 显示服务器错误\n\n如果你使用了服务端渲染，并且一个组件在服务端报了错后，React 不会终止服务端的渲染，而是往上层找最近的\\\u003cSuspense\u003e，使用其 fallback 进行替换错误区域；另一方面，在客户端出现错误后，客户端会直接抛出错误，如果客户端并未出现错误，则用户无法感知服务端出错了。\n\n可以在服务端使用如下代码：\n\n```js\n\u003cSuspense fallback={\u003cLoading /\u003e}\u003e\n  \u003cChat /\u003e\n\u003c/Suspense\u003e\n\nfunction Chat() {\n  if (typeof window === 'undefined') {\n    throw Error('Chat should only render on the client.');\n  }\n  // ...\n}\n```\n此时，在服务端则会抛出错误，在客户端则正常显示 Chat。\n\n8. 做全局路由懒加载\n\n可以结合 lazy 使用，做路由的懒加载来提高页面性能：\n\n```js\nconst container = document.getElementById('root');\nconst root = createRoot(container); // createRoot(container!) if you use TypeScript\n\nroot.render(\n  \u003cBrowserRouter basename={config.basename}\u003e\n    \u003cCustomRoutes /\u003e\n  \u003c/BrowserRouter\u003e\n);\n```\n\n在 `\u003cCustomRoutes /\u003e` 中：\n\n```js\nconst Home = lazy(() =\u003e import('./Home'))\nconst About = lazy(() =\u003e import('./About'))\n\n\u003cRoutes\u003e\n  \u003cSuspense fallback={\u003cLoading type=\"home\" /\u003e}\u003e\n    \u003cRoute path=\"/\" element={\u003cHome /\u003e} /\u003e\n  \u003c/Suspense\u003e\n  \u003cSuspense fallback={\u003cLoading type=\"about\" /\u003e}\u003e\n    \u003cRoute path=\"about\" element={\u003cAbout /\u003e} /\u003e \n  \u003c/Suspense\u003e\n\u003c/Routes\u003e\n```\n上面的例子，在 location pathname 切换时，会加载不同的 fallback 加载动画，加载结束后，显示对应的渲染元素。\n\n----\n\n此外， react 中还有两个组件：`\u003cFragment\u003e`,`\u003cStrictMode\u003e`，因为功能比较单一，茄使用较为简单，这里做简单描述。\n\n## 3. \\\u003cFragment\u003e\n\n由于 react 渲染必须有一个根组件，但是又不想破坏原来的 dom 结构，react 实现了这么个虚拟的容器。使用方式如下：\n\n```js\nfunction Post() {\n  return (\n    \u003c\u003e\n      \u003cPostTitle /\u003e\n      \u003cPostBody /\u003e\n    \u003c/\u003e\n  );\n}\n```\n在 fiber 实际渲染真实 dom 时，Fragment 会被清除掉，不会占用 dom 树空间。当需要再循环列表中使用时，往往需要添加元素的 key 属性，这就不能使用匿名标签，而要使用全名：\n\n```js\nfunction Blog() {\n  return posts.map(post =\u003e\n    \u003cFragment key={post.id}\u003e\n      \u003cPostTitle title={post.title} /\u003e\n      \u003cPostBody body={post.body} /\u003e\n    \u003c/Fragment\u003e\n  );\n}\n```\n\n\u003e Fragment 没有任何属性，添加样式也是不会生效的。一级 Fragment 的渲染不会触发组价重渲染，但是多级 Fragment 则会导致重渲染，例如从 `\u003c\u003e\u003c\u003e\u003cChild /\u003e\u003c/\u003e\u003c/\u003e` 到 `\u003cChild /\u003e`，子组件 state 会重置。\n\n## 4. \\\u003cStrictMode\u003e\n\n帮助在开发模式发现更多的潜在 bug。使用方式：\n\n```js\nconst root = createRoot(document.getElementById('root'));\nroot.render(\n  \u003cStrictMode\u003e\n    \u003cApp /\u003e\n  \u003c/StrictMode\u003e\n);\n```\n\n严格模式下，开发环境会有如下变化：\n\n-   组件都会被渲染两次，以发现一些非纯函数。例如：\n\n```js\n// 错误写法\nexport default function StoryTray({ stories }) {\n  const items = stories;\n  items.push({ id: 'create', label: 'Create Story' });\n  return (\n    \u003cul\u003e\n      {items.map(story =\u003e (\n        \u003cli key={story.id}\u003e\n          {story.label}\n        \u003c/li\u003e\n      ))}\n    \u003c/ul\u003e\n  );\n}\n```\n-   副作用函数会被执行两遍，以发现没有被清理（clean up）的副作用订阅。\n-   会检查是否用了一些不合适的 API，比如 findDOMNode\n\n当然，严格模式也可以部分加在局部组件上：\n\n```js\n\u003cStrictMode\u003e\n    \u003cmain\u003e\n      \u003cSidebar /\u003e\n      \u003cContent /\u003e\n    \u003c/main\u003e\n\u003c/StrictMode\u003e\n```\n----\n\n完！！"])</script><script>self.__next_f.push([1,"2a:T2df4,"])</script><script>self.__next_f.push([1,"官网地址：[React](https://react.dev/)\n\n\n## 1. useTransition\n\nuseTransition 可以让你不阻塞 UI 渲染来更新 state 的值。可以理解为实现更流畅的页面过渡。使用方式为：\n\n```js\n// 一个切换 tab 页签的例子\nfunction TabContainer() {\n  const [isPending, startTransition] = useTransition();\n  const [tab, setTab] = useState('about');\n\n  function selectTab(nextTab) {\n    startTransition(() =\u003e {\n      setTab(nextTab);\n    });\n  }\n  // ...\n}\n```\n\n其中：\n\n- isPending：一个布尔值，表示当前是否阻塞\n- startTransition：开启过渡，并可修改 state\n\n### 注意事项\n\n- 作为一个 hook，只能在函数式组件或者自定义 hook 里被调用，如果想要单独作为 API 调用，可使用 [`startTransition`](https://react.dev/reference/react/startTransition)\n- 仅仅可以在 setState 中触发，若想要在 props 变化后触发，需使用 [`useDeferredValue`](https://react.dev/reference/react/useDeferredValue)\n- startTransition 里的方法不能有异步函数，设置异步会打乱渲染顺序，这个渲染就失去作用了。\n- 标记为 transition 的 state 会被其他 state 的更新打断。如果您在 transition 中更新图表组件，但在图表处于重新渲染过程中开始在另外的 input 中键入输入，则 React 将在处理输入更新后重新启动图表组件的渲染工作。\n- 不能用于控制文本输入\n- 如果有多个正在进行的 transition，React 目前会将它们批处理在一起。此功能可能会在将来的版本中删除\n\n### 使用案例\n\n1. 切换 tab 卡顿问题：\n\n这里有几个tab，tab内容如下：\n\n```js\n// tab 1 一个按钮\n\u003cbutton onClick={() =\u003e {\n  onClick();\n}}\u003e\n  {children}\n\u003c/button\u003e\n\n// tab 2 一个 p\nreturn (\n    \u003cp\u003eWelcome to my profile!\u003c/p\u003e\n);\n\n// tab 3 一个复杂列表\nlet items = [];\nfor (let i = 0; i \u003c 500; i++) {\n    items.push(\u003cSlowPost key={i} index={i} /\u003e);\n}\nreturn (\n    \u003cul className=\"items\"\u003e\n      {items}\n    \u003c/ul\u003e\n);\n\nfunction SlowPost({ index }) {\n  let startTime = performance.now();\n  while (performance.now() - startTime \u003c 1) {\n    // 人为模拟的卡顿\n  }\n\n  return (\n    \u003cli className=\"item\"\u003e\n      Post #{index + 1}\n    \u003c/li\u003e\n  );\n}\n```\n\n可以看到，tab3包含 500 个元素，页面渲染势必会卡顿1-2秒，我们写一个 tab 切换组件：\n\n```js\nexport default function TabContainer() {\n  const [isPending, startTransition] = useTransition();\n  const [tab, setTab] = useState(1);\n\n  function selectTab(nextTab) {\n    setTab(nextTab);      \n  }\n\n  return (\n    \u003c\u003e\n      \u003cTabButton\n        isActive={tab === 1}\n        onClick={() =\u003e selectTab(1)}\n      \u003e\n        About\n      \u003c/TabButton\u003e\n      ...\n      \u003cTabButton\n        isActive={tab === 3}\n        onClick={() =\u003e selectTab(3)}\n      \u003e\n        Posts (slow)\n      \u003c/TabButton\u003e\n      ...\n    \u003c/\u003e\n  );\n}\n```\n上面的例子，TabButton 是一个公共子组件，是几个顶部的按钮，用于接受事件切换 tab：\n\n```js\n\u003cbutton onClick={() =\u003e {\n  // 调用父组件TabContainer的 selectTab 方法\n  onClick();\n}}\u003e\n  {children}\n\u003c/button\u003e\n```\n\nPosts 页签（tab3）在 active 的时候就会加载渲染，我们来看看页面的反应：\n\n\n![image.png](/img/posts/2023-8-18/2023-8-18-1.png)\n\n我们接入 useTransition 试试：\n\n```js\nconst [isPending, startTransition] = useTransition();\n  const [tab, setTab] = useState('about');\n\n  function selectTab(nextTab) {\n    startTransition(() =\u003e {\n      setTab(nextTab);      \n    });\n  }\n```\n\n再次切换 tab 看看效果：\n\n![image.png](/img/posts/2023-8-18/2023-8-18-2.png)\n\n截图看的不明显，我在图上把效果用文字标识出来了。也就是说跟 startTransition 相关的 state 的变化引起的渲染都会进入过渡中。\n\n2. 子组件更改父组件 state\n\n上面的例子，你也可以将更改 state 的操作放在子组件中，效果是一样的。我们改写 tabButton 组件：\n\n```js\n\u003cbutton onClick={() =\u003e {\n  startTransition(() =\u003e {\n    // 调用父组件TabContainer的 selectTab 方法\n    onClick();\n  });\n}}\u003e\n  {children}\n\u003c/button\u003e\n```\n而在父组件中，就可以直接设置 state 了：\n\n```js\nfunction selectTab(nextTab) { \n  setTab(nextTab); \n}\n```\n\n3. 页面上显示阻塞渲染时的进度\n\n这个就是 useTransition 的返回值 isPending 的应用，他为 true 时表示这个过渡动画还在进行中。\n\n```js\nconst [isPending, startTransition] = useTransition();\n \nif (isPending) {\n  return \u003cb className=\"pending\"\u003e{children}\u003c/b\u003e;\n}\n```\n\n4. 与 Suspends 结合，做组件懒加载\n\n沿用第二个例子的代码，子组件tabButton实现useTransition，我们只改父组件：\n\n```js\n\u003cSuspense fallback={\u003ch1\u003e🌀 Loading...\u003c/h1\u003e}\u003e\n  \u003cTabButton\n    isActive={tab === 'about'}\n    onClick={() =\u003e setTab('about')}\n  \u003e\n    About\n  \u003c/TabButton\u003e\n  ...\n\u003c/Suspense\u003e\n```\n这样在第一次加载时就会出现 fallback提示：\n\n\n![image.png](/img/posts/2023-8-18/2023-8-18-3.png)\n\n使用 Suspense 的好处在于，复杂组件只需加载一次，第二次切换加载时就被缓存了，可以很快的渲染.\n\n5. 自定义一个自己的 react 路由！（当然不是真的路由）\n\n\n我们可以像下面这样定义一个 Router 函数：\n\n```js\nfunction Router() {\n  const [page, setPage] = useState('/');\n  const [isPending, startTransition] = useTransition();\n\n  function navigate(url) {\n    startTransition(() =\u003e {\n      setPage(url);\n    });\n  }\n\n  let content;\n  if (page === '/') {\n    content = (\n      \u003cIndexPage navigate={navigate} /\u003e\n    );\n  } else if (page === '/the-beatles') {\n    content = (\n      \u003cArtistPage\n        artist={{\n          id: 'the-beatles',\n          name: 'The Beatles',\n        }}\n      /\u003e\n    );\n  }\n  return (\n    \u003cLayout isPending={isPending}\u003e\n      {content}\n    \u003c/Layout\u003e\n  );\n}\n```\n来分析一下，上面 Layout 组件是自己定义的一个容器组件，内部直接抛出 children 属性即可；上面判断当前的状态 page 是 `'/the-beatles'` 和 `'/'` 时，自动渲染不同的组件；其中，`navigate` 函数用于导航跳转，他其实操作的就是一个带 Transition 的 setPage，这样就实现了一个平滑的路由切换。\n\n\n### Q\u0026A\n\n1. 为啥我的 input 中 useTransition 不生效？？\n\n因为你试图用他来控制输入框，这是不支持的：\n\n```js\nconst [text, setText] = useState('');\n// ...\nfunction handleChange(e) {\n  // ❌ Can't use transitions for controlled input state\n  startTransition(() =\u003e {\n    setText(e.target.value);\n  });\n}\n// ...\nreturn \u003cinput value={text} onChange={handleChange} /\u003e;\n```\n这是因为 useTransition 是非阻塞渲染的，但是输入框比较特殊，他的 change 事件必须是同步更新的，如果你非要使用平滑过渡来控制输入组件，有如下两种方案：\n\n- 定义两个 state，一个用于控制输入，一个用于监听输入值变化后同步更新\n- 使用 [`useDeferredValue`](https://react.dev/reference/react/useDeferredValue) 来代替\n\n2. 我的 state 变化似乎没有实现过渡，还是被阻塞了？\n\n因为你在 startTransition 使用异步了：\n\n```js\n// 案例1\nstartTransition(() =\u003e {\n  // ❌ Setting state *after* startTransition call\n  setTimeout(() =\u003e {\n    setPage('/about');\n  }, 1000);\n});\n\n// 案例2\nstartTransition(async () =\u003e {\n  await someAsyncFunction();\n  // ❌ Setting state *after* startTransition call\n  setPage('/about');\n});\n```\n如果非得使用 setTimeout，可以这样：\n\n```js\n// 案例1\nsetTimeout(() =\u003e {\n  startTransition(() =\u003e {\n    // ✅ Setting state *during* startTransition call\n    setPage('/about');\n  });\n}, 1000);\n\n// 案例2\nawait someAsyncFunction();\nstartTransition(() =\u003e {\n  // ✅ Setting state *during* startTransition call\n  setPage('/about');\n});\n```\n\n3. 我的代码执行顺序不太对：it will print 1, 2, 3:\n\n```js\nconsole.log(1);\nstartTransition(() =\u003e {\n  console.log(2);\n  setPage('/about');\n});\nconsole.log(3);\n```\n但是，1 2 3 就应该是期望的顺序，不同于 setTimeout，startTransition 还是立即执行函数的，只是渲染不同步而已，他的简单实现类似于：\n\n```js\nlet isInsideTransition = false;\n\nfunction startTransition(scope) {\n  isInsideTransition = true;\n  scope();\n  isInsideTransition = false;\n}\n\nfunction setState() {\n  if (isInsideTransition) {\n    // ... schedule a transition state update ...\n  } else {\n    // ... schedule an urgent state update ...\n  }\n}\n```\n其定义一个全局变量 isInsideTransition = true，在执行完回调函数后，置为 false；设置 state 时判断为 true 时表示在过渡中，此时执行过渡的操作。所以可以看到，他并不阻塞 scope 的执行。\n\n\n## 2. useDeferredValue\n\n一个可以让你延迟（defer）更新UI的 hook。\n\n- 接收参数 value：你想要延迟的值，可以是任何类型。\n- 返回值：在初始渲染期间，返回的延迟值将与你提供的值相同。在更新期间，React 将首先尝试使用旧值重新渲染（因此它将返回旧值），然后尝试使用新值在后台重新渲染（因此它将返回更新的值）。\n\n### 使用案例\n\n1. 弥补useTransition不足：监听input输入并平滑过渡\n\n```js\nimport { Suspense, useState } from 'react';\nimport SearchResults from './SearchResults.js';\n\nexport default function App() {\n  const [query, setQuery] = useState('');\n  const deferredQuery = useDeferredValue(query);\n  \n  return (\n    \u003c\u003e\n      \u003clabel\u003e\n        Search albums:\n        \u003cinput value={query} onChange={e =\u003e setQuery(e.target.value)} /\u003e\n      \u003c/label\u003e\n      \u003cSuspense fallback={\u003ch2\u003eLoading...\u003c/h2\u003e}\u003e\n        \u003cSearchResults query={deferredQuery} /\u003e\n      \u003c/Suspense\u003e\n    \u003c/\u003e\n  );\n}\n```\n上面的例子，每当输入框输入时，Suspense 的 fallback 将不再渲染，而是直接平滑过渡显示最新的值，这就使得显示更加稳定，不会抖动。\n\n\n![image.png](/img/posts/2023-8-18/2023-8-18-4.png)\n\n上图中，输入值，输入框立马变化，下面显示区域演示变化，但不会显示 fallback 的 loading。\n\n2. 添加渲染过度动画\n\n在上面例子的基础上，添加一个透明效果：\n\n```js\n // 旧值和新值不一样，表示在过渡中，过渡完毕后 query 会变为与 deferredQuery 一样\n const isStale = query !== deferredQuery;\n ...\n \u003cSuspense fallback={\u003ch2\u003eLoading...\u003c/h2\u003e}\u003e\n    \u003cdiv style={{\n      opacity: isStale ? 0.5 : 1,\n      transition: isStale ? 'opacity 0.2s 0.2s linear' : 'opacity 0s 0s linear'\n    }}\u003e\n      \u003cSearchResults query={deferredQuery} /\u003e\n    \u003c/div\u003e\n\u003c/Suspense\u003e\n```\n如图，在输入过程中，结果文字变为半透明：\n\n![image.png](/img/posts/2023-8-18/2023-8-18-5.png)\n\n3. 优化长列表渲染\n\nSlowList 可以理解为一个肥肠多数据的长列表，每一个列表都有一个公共的值要控制，叫做 deferredText，我们这样实现：\n\n```js\nexport default function App() {\n  const [text, setText] = useState('');\n  const deferredText = useDeferredValue(text);\n  return (\n    \u003c\u003e\n      \u003cinput value={text} onChange={e =\u003e setText(e.target.value)} /\u003e\n      \u003cSlowList text={deferredText} /\u003e\n    \u003c/\u003e\n  );\n}\n\n```\n这样过渡是就不会出现短时间界面卡顿不可交互的情况，不然就会这样：\n\n![image.png](/img/posts/2023-8-18/2023-8-18-6.png)\n\n上图不使用useDeferredValue，没输入一下，就会卡一下，页面阻塞。使用了 useDeferredValue 就会一步渲染，不会阻塞你输入啦！可以去官网例子试试：[codesandbox.io/s/r6hcz2?file=%2FApp.js\u0026utm_medium=sandpack](https://codesandbox.io/s/r6hcz2?file=%2FApp.js\u0026utm_medium=sandpack)\n\n\u003e `SlowList` 组件应该放在 memo 里，不然优化会失效。每次deferredText变化时，App组价由于状态变化了，会重新渲染，导致 SlowList 变为了新的组件了。\n\n-----\n完！"])</script><script>self.__next_f.push([1,"2b:T1850,"])</script><script>self.__next_f.push([1,"官网地址：[React](https://react.dev/)\n\n## 1. useId\n\n`useId` 是一个生成唯一Id的hook。\n\n其不接收参数，返回值就是生成的Id，这个Id可以保证在当前的组件内部不重复，不管组件反复渲染多少次。\n\n\u003e 注意，这可是一个 hook，不能在 for 循环中使用，这就强制你养成好习惯：面向组件编程。\n\n#### 使用案例\n\n一个密码框组件：\n\n```jsx\nimport { useId } from 'react';\n\nfunction PasswordField() {\n  const passwordHintId = useId();\n  return (\n    \u003c\u003e\n      \u003clabel\u003e\n        Password:\n        \u003cinput\n          type=\"password\"\n          aria-describedby={passwordHintId}\n        /\u003e\n      \u003c/label\u003e\n      \u003cp id={passwordHintId}\u003e\n        The password should contain at least 18 characters\n      \u003c/p\u003e\n    \u003c/\u003e\n  );\n}\n```\n\n上面例子中，aria-describedby 是 [HTML accessibility](https://developer.mozilla.org/en-US/docs/Web/Accessibility/ARIA)属性，用于和其他元素关联以方便阅读器读取。\n \n\u003e 笔者认为 React 中 useId 很鸡肋，不能用于循环渲染列表，大多数场景都不太用的上，至少目前是这样。\n\n## 2. useSyncExternalStore\n\n用于订阅第三方 store 的hook。这个 hook 可以让我们不使用 redux/useReducer/useState 来获得存储状态的能力。\n\n使用方式：\n\n```js\nconst snapshot = useSyncExternalStore(subscribe, getSnapshot, getServerSnapshot)\n```\n\n其中：\n\n- `subscribe`：订阅的回调参数，可用于存储 store。其必须返回一个 取消订阅的清理函数。\n- `getSnapshot`：用于返回组件所需的存储区中的数据快照的函数。当存储未更改时，对 getSnapshot 的重复调用必须返回相同的值。如果存储更改并且返回值不同（Object.is ），即不是纯函数，React 将重新渲染组件\n- `getServerSnapshot`：可选参数。返回存储中数据的初始快照的函数。仅在 服务端渲染期间或者客户端 hydration 时使用。如果省略此参数，SSR应用中，服务器上呈现组件将引发错误。\n- `snapshot`: 当前 store 的快照 (是 store 的深拷贝)\n\n### 使用案例\n\n- 1、自定义 store 实现 todoList：\n\n```js\nimport { useSyncExternalStore } from 'react';\nimport { todosStore } from './todoStore.js';\n\nexport default function TodosApp() {\n  const todos = useSyncExternalStore(todosStore.subscribe, todosStore.getSnapshot);\n  return (\n    \u003c\u003e\n      \u003cbutton onClick={() =\u003e todosStore.addTodo()}\u003eAdd todo\u003c/button\u003e\n      \u003chr /\u003e\n      \u003cul\u003e\n        {todos.map(todo =\u003e (\n          \u003cli key={todo.id}\u003e{todo.text}\u003c/li\u003e\n        ))}\n      \u003c/ul\u003e\n    \u003c/\u003e\n  );\n}\n\n// todoStore.js\nlet nextId = 0;\nlet todos = [{ id: nextId++, text: 'Todo #1' }];\nlet listeners = [];\n\nexport const todosStore = {\n  addTodo() {\n    todos = [...todos, { id: nextId++, text: 'Todo #' + nextId }]\n    emitChange();\n  },\n  subscribe(listener) {\n    listeners = [...listeners, listener];\n    return () =\u003e {\n      listeners = listeners.filter(l =\u003e l !== listener);\n    };\n  },\n  getSnapshot() {\n    return todos;\n  }\n};\n\nfunction emitChange() {\n  for (let listener of listeners) {\n    listener();\n  }\n}\n```\n\n上面的例子，自定义的 subscribe 读取了所有监听器函数，使用数组来维护。清理函数中，过滤掉了当前的监听器； getSnapshot 则返回了 store。\n\n\u003e 一般上，`useSyncExternalStore` API 通常用于集成 non-React 代码.\n\n- 2,、传递一个监听事件，判断当前网络连接状态：\n\n```js\nimport { useSyncExternalStore } from 'react';\n\nexport default function ChatIndicator() {\n  const isOnline = useSyncExternalStore(subscribe, getSnapshot);\n  return \u003ch1\u003e{isOnline ? '✅ Online' : '❌ Disconnected'}\u003c/h1\u003e;\n}\n\nfunction getSnapshot() {\n  return navigator.onLine;\n}\n\nfunction subscribe(callback) {\n  window.addEventListener('online', callback);\n  window.addEventListener('offline', callback);\n  return () =\u003e {\n    window.removeEventListener('online', callback);\n    window.removeEventListener('offline', callback);\n  };\n}\n```\n上面的订阅事件中，监听了原生 online 事件，将监听器当做回调 callback，这样，当 navigator.onLine 变化时，isOnline 就会改变。\n\n- 3、与自定义 hook 组合\n\n上面的例子，我们将这个封装在一个 hook 里：\n\n```js\nexport function useOnlineStatus() {\n  const isOnline = useSyncExternalStore(subscribe, getSnapshot);\n  return isOnline;\n}\n\n...\n```\n现在就可以在其他组件中使用了：\n\n```js\nfunction StatusBar() {\n  const isOnline = useOnlineStatus();\n  return \u003ch1\u003e{isOnline ? '✅ Online' : '❌ Disconnected'}\u003c/h1\u003e;\n}\n```\n\n- 4、服务端渲染时配置\n\n如果使用了服务端渲染，这就意味着你不能再使用浏览器自带的API，上面判断是否在线的例子就不成立了。我们可以如下写：\n\n```js\nimport { useSyncExternalStore } from 'react';\n\nexport function useOnlineStatus() {\n  const isOnline = useSyncExternalStore(subscribe, getSnapshot, getServerSnapshot);\n  return isOnline;\n}\n\nfunction getSnapshot() {\n  return navigator.onLine;\n}\n\nfunction getServerSnapshot() {\n  return true; // Always show \"Online\" for server-generated HTML\n}\n\nfunction subscribe(callback) {\n  // ...\n}\n```\n上面的例子中，通过第三个参数 getServerSnapshot 配置SSR，return 值就是渲染时获取到的 store 的值。\n\ngetServerSnapshot 函数类似于 getSnapshot，但它仅在两种情况下执行：\n\n1. 生成 HTML 时，在服务器上运行。\n2. 它在 [hydration](https://react.dev/reference/react-dom/client/hydrateRoot) 期间在客户端上运行，即当 React 获取服务器 HTML 并使其交互时。\n\n他提供一个在页面可交互之前的初始快照值。如果服务器呈现没有有意义的初始值，则会忽略此参数并强制在客户端上渲染。\n\n\u003e 使用时需确保 getServerSnapshot 在初始客户端渲染上返回的数据与在服务器上返回的数据完全相同。\n\n\u003e 例如，如果 getServerSnapshot 在服务器上返回了一些预填充的存储内容，则需要将此内容传输到客户端。一种方法是在服务器渲染期间打一个\\\u003cscript\u003e标签，用于设置全局变量，类似 `window.MY_STORE_DATA`，然后在 getServerSnapshot 中从客户端上全局读取。\n\n----\n完！"])</script><script>self.__next_f.push([1,"2c:T2984,"])</script><script>self.__next_f.push([1,"- 官网地址：[React](https://beta.reactjs.org/)\n\n## 1. useContext\n\n`useContext` 是一个传递组件上下文的钩子，提供读取和订阅功能。\n\n\n### 接收参数\n\n- context：是 [`createContext`](https://react.dev/reference/react/createContext) 创建出来的对象，他不保持信息，他是信息的载体。声明了可以从组件获取或者给组件提供信息。在 provider 中可以传递具体的值。\n\n### 返回值\n\n- contextValue：返回传递的只读context载体的值。是调用堆栈中组件上方最近的 SomeContext.Provider 出来的值。如果没有这样的Provider，则返回的值将是传递给该context的 createContext 的 defaultValue。其返回的值始终是最新的。如果上下文发生变化，React 会自动重新渲染读取context的组件。\n\n### 注意事项\n\n- useContext() 不受同一组件内`\u003cContext.Provider\u003e`的影响。useContext 要想拿到 provider提供的上下文，一定放在`\u003cContext.Provider\u003e`内部嵌套的组件中。\n- `\u003cContext.Provider\u003e`传递的context的值，如果值变化了（Object.is 判断法），其下各级组件就会触发重新渲染。可使用 memo 这个API来阻止重渲染。\n- 确保传递context的对象和读取context的对象是同一个context，最好提取为公共组件，使用时引用这个单例即可。\n\n\u003e useContext() 总是在调用它的组件上级寻找最接近的Provider。它逐级向上搜索，并且排除掉 使用 useContext() 的同级组件中的Provider。\n\n### 各种参考案例\n\n#### 1. 传递主题颜色\n\n创建一个 context：\n\n```js\nconst ThemeContext = createContext(null);\n```\n\n定义根组件：\n\n```js\nexport default function MyApp() {\n  return (\n    \u003cThemeContext.Provider value=\"dark\"\u003e\n      \u003cForm /\u003e\n    \u003c/ThemeContext.Provider\u003e\n  )\n}\n```\n他往下提供了一个 context 的初始值，叫 dark。在子组件中，使用 useContext 引入 ThemeContext，获取到这个context载体具体的值：\n\n```js\nfunction Panel({ title, children }) {\n  const theme = useContext(ThemeContext);\n  const className = 'panel-' + theme;\n  return (\n    \u003csection className={className}\u003e\n      \u003ch1\u003e{title}\u003c/h1\u003e\n      {children}\n    \u003c/section\u003e\n  )\n}\n```\n\n#### 2. 切换主题颜色\n\n在上面的基础上，我们添加更新主题颜色的功能。首先在根组件加入主题的state和改变的表单元素：\n\n```js\n// MyApp\nconst [theme, setTheme] = useState('light');\n\n// ...\n\u003cThemeContext.Provider value={theme}\u003e\n   // ...\n   \u003cinput\n      type=\"checkbox\"\n      checked={theme === 'dark'}\n      onChange={(e) =\u003e {\n        setTheme(e.target.checked ? 'dark' : 'light')\n      }}\n    /\u003e\n// ...\n\u003c/ ThemeContext.Provider\u003e\n```\n\n由于 context 是只读的，所以子组件不需要任何修改。根组件中点击 checkbox 就可以改变子组件中的 classname 了。\n\n\n#### 3. 多context嵌套的情况\n\n我们在根组件中定义两个 Provider：\n\n```js\nconst ThemeContext = createContext(null);\nconst CurrentUserContext = createContext(null);\n\n// ...\n\n\u003cThemeContext.Provider value={theme}\u003e\n  \u003cCurrentUserContext.Provider\n    value={{\n      currentUser,\n      setCurrentUser\n    }}\n  \u003e\n    \u003cWelcomePanel /\u003e\n// ...\n  \u003c/ CurrentUserContext.Provider\u003e\n\u003c/ ThemeContext.Provider\u003e\n```\n\n这样在子组件 WelcomePanel 中就可以获取：\n\n```js\nconst {currentUser} = useContext(CurrentUserContex);\nconst {theme} = useContext(ThemeContext);\n```\n可以看到，通过不同的 context 载体，可以获取到不同作用域的值。\n\n#### 4. 封装为高阶组件！\n\n上面的代码，context 都交给根组件维护，代码耦合性比较高，可以统一提出来一个新组件MyProviders：\n\n```js\nfunction MyProviders({ children, theme }) {\n  const [currentUser, setCurrentUser] = useState(null);\n  return (\n    \u003cThemeContext.Provider value={theme}\u003e\n      \u003cCurrentUserContext.Provider\n        value={{\n          currentUser,\n          setCurrentUser\n        }}\n      \u003e\n        {children}\n      \u003c/CurrentUserContext.Provider\u003e\n    \u003c/ThemeContext.Provider\u003e\n  );\n}\n```\n\n这样再应用这个组件就会方便很多：\n\n```js\n\u003cMyProviders theme={theme} setTheme={setTheme}\u003e\n  // ...\n\u003c/MyProviders\u003e\n```\n\n\u003e P.S. 上面的例子有没有注意到，一个全局的 Context，加上 useReducer（useState） 就是一个小型的 redux，比如下面的[例子](https://codesandbox.io/s/3pzgg8?file=/AddTask.js\u0026utm_medium=sandpack)：\n\n```js\nexport function TasksProvider({ children }) {\n  const [tasks, dispatch] = useReducer(\n    tasksReducer,\n    initialTasks\n  );\n\n  return (\n    \u003cTasksContext.Provider value={tasks}\u003e\n      \u003cTasksDispatchContext.Provider value={dispatch}\u003e\n        {children}\n      \u003c/TasksDispatchContext.Provider\u003e\n    \u003c/TasksContext.Provider\u003e\n  );\n}\n```\n\n#### 5. 同一个context，局部修改状态\n\n比如在全局白色背景下，想要在局部的组件中使用其他主题色，可以这样定义：\n\n```js\n\u003cThemeContext.Provider value=\"light\"\u003e\n  ...\n  \u003cThemeContext.Provider value=\"dark\"\u003e\n    \u003cFooter /\u003e\n  \u003c/ThemeContext.Provider\u003e\n  ...\n\u003c/ThemeContext.Provider\u003e\n```\n\n#### 6. 性能优化：在传值时避免不必要的重渲染\n\n考虑下面的例子：\n\n```js\n\u003cAuthContext.Provider value={{ currentUser, login }}\u003e\u003c/ AuthContext.Provider\u003e\n```\n\n传递的context是一个对象(currentUser)和一个函数(login)，在顶层组件重渲染时，他们可能会被重新创建，进而造成context重渲染。所以这里对注入的被字面量值也要做缓存：\n\n```js\nconst login = useCallback((response) =\u003e {...})\n\nconst contextValue = useMemo(() =\u003e ({  \n  currentUser,  \n  login  \n}), [currentUser, login]);\n\n// 使用\n\u003cAuthContext.Provider value={contextValue}\u003e\u003c/ AuthContext.Provider\u003e\n// ...\n```\n\n### Q\u0026A\n\n#### 1. 我的组件为什么拿不到context提供的数据\n\n排查可能的原因：\n\n- 你在 `\u003cSomeContext.Provider\u003e` 同一级组件中使用了 useContext() \n- 你没有用 `\u003cSomeContext.Provider\u003e` 包裹上级组件\n- 由于打包问题或者代码引入的问题，你提供context的地方和使用context的地方，引用的不是一个Context对象。比如你使用全局变量挂载了多个 context：`window.SomeContext1` and `window.SomeContext2`，你需要使用 `===` 提前判断是否相同。\n\n\n#### 2. 即使我设置了初始值，但是总是在获取值的时候拿到 `undefined`\n\n你在 Provider 时忘记传递 value 属性了。\n\n## 2. useRef\n\n用于设置一个可变的引用值，不随组件渲变化。与 `useState` 不同，`useRef` 返回的引用对象在组件重新渲染时保持不变，设置引用值也不会触发组件的重新渲染。\n\n\u003e P.S. 由于 useRef 是一个引用，其内部的值是一个 current 对象来接受的，所以有些不确定是否有初始值的情况下，需要判断 ref.current 是否为空。\n\n### 参考案例\n\n###### 1. 点击计数器\n\n注意，这个计数值的变化，不会引起组件重渲染，在不需要渲染的场合适用。所以在jsx中这么写是不会起作用的 ❌：`\u003cspan\u003e{ref.current}\u003c/span\u003e`\n\n```js\nlet ref = useRef(0);\n\nfunction handleClick() {\n  ref.current = ref.current + 1;\n  alert('You clicked ' + ref.current + ' times!');\n}\n```\n\n###### 2. 获取input的焦点\n\nuseRef 可以挂载在原生元素上来获取其DOM对象本身。\n\n```js\nconst inputRef = useRef(null);\n\nfunction handleClick() {\n  inputRef.current.focus();\n}\n\n\u003cinput ref={inputRef} /\u003e\n```\n\n###### 3. 控制元素滚动\n\nH5 有个API叫 `scrollIntoView`, 获取到 DOM 元素后可以控制将其滚动到特定的位置：\n\n```js\nconst listRef = useRef(null);\n\nfunction scrollToIndex(index) {\n    const listNode = listRef.current;\n    // This line assumes a particular DOM structure:\n    const imgNode = listNode.querySelectorAll('li \u003e img')[index];\n    imgNode.scrollIntoView({\n      behavior: 'smooth',\n      block: 'nearest',\n      inline: 'center'\n    });\n}\n\n// ...\n\u003cul ref={listRef}\u003e\n  \u003cli onClick={scrollToIndex(0)}\u003e\u003cimg ... /\u003e\u003c/li\u003e\n  \u003cli onClick={scrollToIndex(1)}\u003e\u003cimg ... /\u003e\u003c/li\u003e\n  \u003cli onClick={scrollToIndex(2)}\u003e\u003cimg ... /\u003e\u003c/li\u003e\n\u003c/ul\u003e\n```\n\n###### 4. 控制 video 播放\n\n```js\n// 控制方法代码片段\nif (!isPlaying) {\n  ref.current.play();\n} else {\n  ref.current.pause();\n}\n\n...\n// dom 定义\n\u003cvideo\n    width=\"250\"\n    ref={ref}\n    onPlay={() =\u003e setIsPlaying(true)}\n    onPause={() =\u003e setIsPlaying(false)}\n  \u003e\n    \u003csource\n      src=\"https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4\"\n      type=\"video/mp4\"\n    /\u003e\n\u003c/video\u003e\n```\n\n###### 5. 自定义组件设置 ref 属性\n\n因为默认函数式组件不会往外暴露 refs 属性，所以我们首先要用 `forwardRef` 将我们的自定义组件包裹后导出：\n\n```js\n// 将 ref 给到 input\nconst MyInput = forwardRef((props, ref) =\u003e {\n  return \u003cinput {...props} ref={ref} /\u003e;\n});\n```\n接着在父组件中使用包裹好的组件：\n\n```js\n\u003cMyInput ref={inputRef} /\u003e\n```\n上面的例子中，想要拿到子组件内部的 input 元素实例，只需：\n\n```js\ninputRef.current.focus();\n```\n\n## 3. useImperativeHandle\n\n这个 hook 需要结合 ref 使用，用于控制在自定义组件中向外暴露哪些组件属性或方法。\n\n上面的 useRef 只能控制自定义组件本身的 DOM，如果想要在父组件调用子组件本身的成员方法，就需要结合 `useImperativeHandle` 来使用了。\n\n### 接收参数\n\n- ref：组件forwardRef包裹后暴露出来的ref\n- 控制函数：其返回值是个对象，列举了暴露的方法的变量\n\n### 参考案例\n\n###### 1. 封装一下上面聚焦input的功能\n\n我们将上面在父组件中使用 `inputRef.current.focus();` 的过程，在子组件中暴露成一个方法：\n\n```js\n// MyInput\nuseImperativeHandle(ref, () =\u003e {\n    return {\n      focus() {\n        inputRef.current.focus();\n      },\n    }\n})\n```\n\n在父组件中使用：\n\n```jsx\nref.current.focus();\n\n...\n\u003cMyInput label=\"Enter your name:\" ref={ref} /\u003e\n```\n\n###### 2. 暴露子组件的方法给父组件\n\n子组件：\n\n```js\nuseImperativeHandle(ref, () =\u003e ({\n  getData: () =\u003e getData(filter),\n  refreshTable: () =\u003e refreshTable()\n}));\n```\n\n父组件：\n\n```js\ntableRef.current \u0026\u0026 tableRef.current.refreshTable();\n\n...\n\u003cCommonTable loading={loading} ref={tableRef}\u003e...\u003c/CommonTable\u003e\n```\n\n上面的代码，实现了在自定义表格组件时，通过父组件来调用表格组件内部方法重新获取数据和原地刷新的功能。\n\n\u003e P.S. 不要过度使用 refs 功能。仅仅需要在一些聚焦、滚动、

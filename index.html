03chttps://github.com/maomentai817/pixel-ui-react\u003e\n\n***\n\n![image.png](/img/posts/Pixel-UI-React/1.jpeg)\n\n### 1️⃣ 项目初衷\n\n红白机、GameBoy 游戏，那种块状像素 UI 总让人心驰神往。现在虽然是现代 Web 时代，但像素风 UI 的美学依然令人着迷。\n\n现有的 8-bit 风组件库 *NES.css* 是一个 CSS 框架, 它只需要 CSS，不依赖于任何 JavaScript, 核心绘制逻辑都是基于 *box-shadow* 实现, 但在不同浏览器环境, 浏览器缩放时，*box-shadow* 的浮点偏移值经过缩放后无法精准对齐物理像素网格，导致渲染出现间隙。子像素定位、像素舍入误差和 *box-shadow* 本身不适合精细拼接渲染等原因造成了一些困扰\n\n![QQ\\_1747188289846.png](/img/posts/Pixel-UI-React/2.jpeg)\n\n[NES.css](https://link.juejin.cn?target=https%3A%2F%2Fgithub.com%2Fnostalgic-css%2FNES.css \"https://github.com/nostalgic-css/NES.css\")\n\n于是就有了基于 Vue 3 / React + TypeScript + UnoCSS + CSS Houdini 打造的一款组件库 —— 让**像素风重回前端视野**。\n\nVue3 项目地址👇\\\n📦 [pixel-ui](https://link.juejin.cn?target=https%3A%2F%2Fgithub.com%2Fmaomentai817%2Fpixel-ui \"https://github.com/maomentai817/pixel-ui\")\n\nReact 项目地址👇\\\n📦 [pixel-ui-react](https://github.com/maomentai817/pixel-ui-react)\n\n组件库首页👇\\\n📎 [Home](https://maomentai817.github.io/pixel-ui-react)\n\n***\n\n### 2️⃣ 技术选型\n\n| 技术栈               | 用途                       |\n| ----------------- | ------------------------ |\n| React19 + *Hooks* | 组件化开发核心                  |\n| TypeScript        | 类型系统增强开发体验               |\n| UnoCSS            | 原子化 CSS，灵活配置样式类          |\n| CSS Houdini       | 自定义 Paint Worklet 渲染像素边框 |\n| Dumi              | 组件展示 + 文档系统              |\n| Vitest            | 测试组件逻辑与渲染                |\n| pnpm + Monorepo     | 高效构建与多包管理                |\n\n***\n\n### 3️⃣ 项目目前进度\n\n已迁移上线组件：\n\n*   ✅ Button 按钮\n*   ✅ Icon 图标\n*   ✅ Overlay 遮罩层\n*   ✅ Text 文本\n*   ✅ ConfigProvider 全局配置\n*   ✅ Input 输入框\n*   ✅ Popconfirm 气泡确认框\n*   ✅ Tooltip 文字提示\n\n已发布 npm，可供下载。\n\n\u003e 更过规划见 vue 版：\u003chttps://juejin.cn/post/7503846429081944101\u003e\n\n***\n\n### 4️⃣ 效果预览\n\n![image.png](/img/posts/Pixel-UI-React/3.jpeg)\n\n![image.png](/img/posts/Pixel-UI-React/4.jpeg)\n\n![image.png](/img/posts/Pixel-UI-React/5.jpeg)\n\n欢迎大家：\n\n*   🌟 点个 Star\n*   🐛 提 Issue，有什么好的点子和想法都可以提\n*   🤝 提 PR，增强完善功能\n*   📢 分享给像素控朋友！\n\n\u003e 项目地址：\u003chttps://github.com/maomentai817/pixel-ui-react\u003e"])</script><script>self.__next_f.push([1,"12:Ta042,"])</script><script>self.__next_f.push([1,"## 1. 虚拟 DOM\n\n#### 为什么使用虚拟 DOM（vdom）\n\n- DOM 操作很慢，轻微的操作都可能导致页面重新排版，非常耗性能。相对于 DOM 对象，js 对象处理起来更快，而且更简单。通过 diff 算法对比新旧 vdom（js 对象） 之间的差异，可以批量的、最小化的执行 dom 操作，从而提升用户体验\n- DOM 内置属性太多，使用 vdom 可以只封装自己想要的属性来减少计算开销\n  ![图片](/img/posts/react/old-dom.png)\n\n#### react 渲染\n\n在某一时间节点调用 React 的 render() 方法，会创建一棵由 React 元素组成的树。在下一次 state 或 props 更新时，相同的 render() 方法会返回一棵不同的树。React 需要基于这两棵树之间的差别来判断如何有效率的更新 UI 以保证当前 UI 与最新的树保持同步。这种算法起个名字，叫做 DIFF 算法，字面意思，就是对比差异。\n\n#### DIFF\n\nreact 渲染树：\n\n![图片](/img/posts/react/diff-tree.png)\n\n算法策略\n\n- 深度优先遍历\n- 同级比较\n- 拥有不同类型的两个组件将会生成不同的树形结构。\n- 使用 key 来保持稳定渲染\n\ndiff 原则\n\n- 删除：newVdom 不存在时\n- 替换：vdom 和 newVdom 类型不同或 key 不同时\n- 更新：有相同类型和 key 但 vdom 和 newVdom 不同时\n\n## 2. Fiber 结构\n\n为什么需要 fiber\n\n一个新的更新渲染结构，更好的遍历渲染树，提高性能。\n\n- diff 算法采用深度优先遍历（递归）的方式，对于大型项目，组件树会很大，这个时候递归遍历的成本就会很高，会造成主线程被持续占用，结果就是主线程上的布局、动画等周期性任务就无法立即得到处理，造成视觉上的卡顿，影响用户体验。\n\nfiber 核心思想\n\n1. 增量渲染，空闲更新（把渲染任务拆分成块，匀到多帧），使用链表循环代替递归来进行深度优先遍历，算法时间复杂度 O(n)\n2. 更新时能够暂停，终止，复用渲染任务\n3. 给不同类型的更新赋予优先级\n4. 给新版 react 提供并发的基础能力\n\n![图片](/img/posts/react/fiber-1.jpeg)\n\nfiber 树(双向链表)：\n\n```js\n// 参考 jsx\n\u003cdiv\u003e\n  \u003carticle\u003e\n    \u003cspan\u003e\u003c/span\u003e\n  \u003c/article\u003e\n  \u003cp\u003e\n    \u003cstrong\u003e\u003c/strong\u003e\n  \u003c/p\u003e\n  \u003ca\u003e\u003c/a\u003e\n\u003c/div\u003e\n```\n\n![图片](/img/posts/react/fiber-2.png)\n\n因为要借助 fiber，所以在 vdom 外需要包装一个 fiber node 的封装来参与调度。\n\n## 3. 实现一个 mini-fiber\n\n### 〇 流程图\n\n![图片](/img/posts/react/fiber.png)\n\n### ① Tags\n\n由于要渲染不同的组件和原生标签，给各个类型打上标签：\n\n```js\n// ReactWorkTags\nexport const FunctionComponent = 0;\nexport const ClassComponent = 1;\nexport const IndeterminateComponent = 2;\n...\nexport const HostComponent = 5;\nexport const HostText = 6;\nexport const Fragment = 7;\n```\n\n### ② Fiber 对象\n\n新建一个 fiber 封装类\n\n```js\n// ReactFiber\nexport function createFiber(vnode, returnFiber) {\n  const fiber = {\n    type: vnode.type, // 表示fiber的真实类型 这个和elementType大部分情况下是一样的 在使用了懒加载之类的功能时可能会不一样。 区别于 tag，type可以自定义，当是组件时 type可以是这个组件的构造函数，用户创建元素时使用\n    key: vnode.key,\n    props: vnode.props, // 属性\n    // 第一个子节点fiber\n    child: null,\n    // 下一个兄弟fiber\n    sibling: null,\n    // 父fiber\n    return: returnFiber,\n    // dom或实例\n    // 函数式组件为null，他的实例存在child里，这也是为什么render里只能有一个跟节点\n    stateNode: null,\n    // 节点下标\n    index: null,\n    // old fiber\n    alternate: null,\n    flags: Placement,\n    tag: null,\n  };\n\n  const { type } = vnode;\n\n  // 打 tag\n  if (isStr(type)) {\n    // 原生标签\n    fiber.tag = HostComponent; // 传入的是dom.nodeName\n  } else if (isFn(type)) {\n    // 函数组件 类组件\n    fiber.tag = type.prototype.isReactComponent\n      ? ClassComponent\n      : FunctionComponent;\n  } else if (isUndefined(type)) {\n    // 此时是纯文本或数字节点\n    fiber.tag = HostText;\n    fiber.props = { children: vnode };\n  } else {\n    fiber.tag = Fragment;\n  }\n\n  return fiber;\n}\n```\n\n其中 flags 用于区分接下来进行什么操作：\n\n```js\nexport const Placement = /*                    */ 0b0000000000000000000010; // 2\nexport const Update = /*                       */ 0b0000000000000000000100; // 4\nexport const Deletion = /*                     */ 0b0000000000000000001000; // 8\n```\n\n\u003e 知道为什么使用 二进制吗？考虑到即将进行的操作可能会有多个，为了提高可扩展性，使用二进制方便位运算，相加同样具有唯一性。判断：`state \u0026 Update === true`\n\n区分 函数式组件和类式组件，需要额外加标志。我们都知道 类式组件最终都会继承 Component 组件，我能就在这个上边做手脚：\n\n```js\nexport default function Component(props) {\n  this.props = props;\n}\n\n// 类组件标记\nComponent.prototype.isReactComponent = {};\n```\n\n只要判断有没有 isReactComponent 就可以区分是否是函数式组件了。\n\n如此就构建了一个对 react vdom 二次封装的 Fiber 对象。\n\n### ③ 渲染容器\n\n我们都知道，React 17+ 的根组件渲染方式：\n\n```js\n// 新的渲染方式，开放出了 root 对象单例，方便重复render\nconst root = ReactDOM.createRoot(document.getElementById(\"root\"));\nroot.render(jsx);\n\n...\nroot.render(jsx1);\n```\n\n那不如就从这里入手，来看看 fiber 是怎么封装 dom 的。\n\n```js\nfunction createRoot(container) {\n  const root = {\n    containerInfo: container,\n  };\n\n  return new ReactDOMRoot(root);\n}\n\nfunction ReactDOMRoot(internalRoot) {\n  this._internalRoot = internalRoot;\n}\n```\n\ncreateRoot 返回了一个新的 ReactDOMRoot 对象:\n\n```js\nReactDOMRoot.prototype.render = function (children) {\n  const root = this._internalRoot;\n\n  updateContainer(children, root);\n};\n\nfunction updateContainer(element, container) {\n  const { containerInfo } = container;\n\n  // 这里可以看到， react的容器根节点一定是原生的dom，不然不存在nodeName\n  const rootFiber = createFiber(element, {\n    type: containerInfo.nodeName.toLocaleLowerCase(),\n    stateNode: containerInfo,\n  });\n\n  scheduleUpdateOnFiber(rootFiber);\n}\n```\n\n这个对象实现了 root 的 render 方法，调用了 updateContainer 方法。而这个方法创建了一个 Fiber 对象，通过 scheduleUpdateOnFiber 加入调度器：\n\n```js\nexport function scheduleUpdateOnFiber(fiber) {\n  // work in process\n  wip = fiber;\n  wipRoot = fiber;\n}\n```\n\nwork in process 表示当前正在处理的 fiber 节点。\n\n我们看到了，初始化工作完成后，似乎没有渲染的操作，只是 new 了一堆对象。所以需要创建一个调度任务。\n\n### ④ 调度器之一\n\n浏览器有自己的调度工具：\n\n\u003e 这里我们暂且使用浏览器自带的空闲时间片调度工具。由于考虑到兼容性，React 自己实现了这个函数，放在 Scheduler 里，下边会讲到。\n\n```js\n// TODO：react scheduler 部分原生实现了一套：浏览器事件循环空闲时间段内调用函数排队\nrequestIdleCallback(workLoop);\n```\n\n我们这里关注的重点还是在如何调度上：\n\n```js\nfunction workLoop(IdleDeadLine) {\n  // 可以自己定义优先级来核实执行什么事件，这里判断只要空闲就排队\n  while (wip \u0026\u0026 IdleDeadLine.timeRemaining() \u003e 0) {\n    // 执行任务：使用新的 O(n) 算法\n    performUnitOfWork();\n  }\n\n  // 确保调度器在运行\n  requestIdleCallback(workLoop);\n\n  // 如果所有的任务执行完毕，commit一下，就是说触发一次更新。从 root 开始刷新一遍渲染\n  if (!wip \u0026\u0026 wipRoot) {\n    commitRoot();\n  }\n}\n```\n\n上边的代码是一个循环调度，反复调用 requestIdleCallback，让 CPU 在空闲时间片调用我们自己定义的调度函数来渲染界面。当有空闲时间时，执行 performUnitOfWork，当没有工作中的 fiber 实例，说明是渲染根节点，此时不能复用上边的更新逻辑，因为节点都还没有呢，谈不上更新，此时需调用 commitRoot。\n\n执行任务代码如下：\n\n```js\n// performUnitOfWork\nconst { tag } = wip;\n\n// 通过 tag 区分渲染模式\nswitch (tag) {\n  case HostComponent:\n    updateHostComponent(wip);\n    break;\n\n  case FunctionComponent:\n    updateFunctionComponent(wip);\n    break;\n\n  case ClassComponent:\n    updateClassComponent(wip);\n    break;\n\n  case Fragment:\n    updateFragmentComponent(wip);\n    break;\n\n  case HostText:\n    updateTextComponent(wip);\n    break;\n\n  default:\n    break;\n}\n\n// 2. 更新wip 多叉树深度优先遍历\n// 优先找孩子，没有孩子就找兄弟，没有兄弟找父级的兄弟，直到找到根节点。时间复杂度：O(n)\nif (wip.child) {\n  wip = wip.child;\n  return;\n}\n\nlet next = wip;\n\nwhile (next) {\n  if (next.sibling) {\n    wip = next.sibling;\n    return;\n  }\n  next = next.return;\n}\nwip = null;\n```\n\ncommitRoot 代码如下：\n\n```js\n// commitRoot\ncommitWorker(wipRoot);\n// 防止被 多次执行\nwipRoot = null;\n\n// fiber 树创建的过程\nfunction commitWorker(wip) {\n  // 直到找不到 wip，退出\n  if (!wip) {\n    return;\n  }\n  // 自己\n  const { stateNode, flags } = wip;\n  // 父dom节点\n  const parentNode = getParentNode(wip.return); //wip.return.stateNode;\n\n  // 具体 flags 的设置，在 后边 diff 算法中实现\n\n  // 即将创建的\n  if (flags \u0026 Placement \u0026\u0026 stateNode) {\n    parentNode.appendChild(stateNode);\n  }\n\n  // 即将更新的\n  if (flags \u0026 Update \u0026\u0026 stateNode) {\n    updateNode(stateNode, wip.alternate.props, wip.props);\n  }\n\n  // 即将删除的\n  if (wip.deletions) {\n    commitDeletions(wip.deletions, stateNode || parentNode);\n  }\n\n  // 2. 下一个孩子\n  commitWorker(wip.child);\n  // 3. 下一个兄弟\n  commitWorker(wip.sibling);\n}\n\nfunction getParentNode(wip) {\n  // 自定义组件没有实体，return里全是child，需往上找父组件\n  let tem = wip;\n  while (tem) {\n    if (tem.stateNode) {\n      return tem.stateNode;\n    }\n    tem = tem.return;\n  }\n}\n\n// prev  {a: 1}\n// next { b: 3}\nexport function updateNode(node, prevVal, nextVal) {\n  Object.keys(nextVal).forEach((k) =\u003e {\n    if (k === 'children') {\n      // 有可能是文本，我们自己设置的文本节点 props.children\n      if (isStringOrNumber(nextVal[k])) {\n        node.textContent = nextVal[k] + '';\n      }\n    } else if (k.slice(0, 2) === 'on') {\n      const eventName = k.slice(2).toLocaleLowerCase();\n      node.addEventListener(eventName, nextVal[k]);\n    } else {\n      node[k] = nextVal[k];\n    }\n  });\n}\n\nfunction commitDeletions(deletions, parentNode) {\n  for (let i = 0; i \u003c deletions.length; i++) {\n    parentNode.removeChild(getStateNode(deletions[i]));\n  }\n}\n\nfunction getStateNode(fiber) {\n  let tem = fiber;\n  while (!tem.stateNode) {\n    tem = tem.child;\n  }\n\n  return tem.stateNode;\n}\n```\n\n### ⑤ 渲染节点\n\n上边的 commit 操作我们看到了，是根据节点的 flags 和 stateNode 实例来更新的。在渲染的时候，需要写入这两份属性，\n\n1. 渲染原生节点：\n\ncreateElement 创建元素，props 通过 updateNode 更新\n\n```js\nexport function updateHostComponent(wip) {\n  // 初次加载，stateNode=null\n  if (!wip.stateNode) {\n    // type : dom.nodeName.toLowerCase()\n    wip.stateNode = document.createElement(wip.type);\n    // 最终都会归类到原生节点\n    // 初始化在这里commit，之后的更新在commitWorker里commit\n    updateNode(wip.stateNode, {}, wip.props);\n  }\n\n  // 协调子节点\n  reconcileChildren(wip, wip.props.children);\n}\n```\n\n2. 渲染文本节点\n\n```js\nexport function updateTextComponent(wip) {\n  // 还记得上边原生节点放在了 props.children 中\n  wip.stateNode = document.createTextNode(wip.props.children);\n}\n```\n\n3. 渲染类式组件\n\n```js\nexport function updateClassComponent(wip) {\n  const { type, props } = wip;\n\n  // type 是类的构造器\n  const instance = new type(props);\n  const children = instance.render();\n\n  reconcileChildren(wip, children);\n}\n```\n\n4. 渲染函数式组件\n\n```js\nexport function updateFunctionComponent(wip) {\n  // 读取 hook 的操作之后讲hook原理时会提到\n  // renderWithHooks(wip);\n  const { type, props } = wip;\n\n  const children = type(props);\n\n  reconcileChildren(wip, children);\n}\n```\n\n5. 渲染 Fragment\n\n```js\nexport function updateFragmentComponent(wip) {\n  reconcileChildren(wip, wip.props.children);\n}\n```\n\n最后是调节子节点函数，这也是 diff 算法实现的地方，设置 flag 也在这里：\n\n```js\nfunction reconcileChildren(wip, children) {\n  if (isStringOrNumber(children)) {\n    return;\n  }\n\n  // 原生 dom 只有一个 child，会是一个对象，这里统一放在数组里\n  const newChildren = isArray(children) ? children : [children];\n\n  // 记录上一个fiber\n  let previousNewFiber = null;\n  let oldFiber = wip.alternate?.child;\n  for (let i = 0; i \u003c newChildren.length; i++) {\n    const newChild = newChildren[i];\n    if (!newChild) {\n      // 规避这样的写法： {null}\n      continue;\n    }\n    const newFiber = createFiber(newChild, wip);\n\n    const same = sameNode(newFiber, oldFiber);\n\n    if (same) {\n      // 标记：更新节点\n      Object.assign(newFiber, {\n        stateNode: oldFiber.stateNode,\n        alternate: oldFiber,\n        flags: Update,\n      });\n    }\n\n    if (!same \u0026\u0026 oldFiber) {\n      // 与新的不一样，标记：删除\n      deleteChild(wip, oldFiber);\n    }\n\n    if (oldFiber) {\n      oldFiber = oldFiber.sibling;\n    }\n\n    // createFiber 默认的 flags就是标识：Placement 新建\n    if (i === 0) {\n      // 子节点中的第一个，把链表构建起来\n      wip.child = newFiber;\n    } else {\n      previousNewFiber.sibling = newFiber;\n    }\n\n    previousNewFiber = newFiber;\n  }\n}\n\nfunction deleteChild(returnFiber, childToDelete) {\n  const deletions = returnFiber.deletions;\n\n  if (deletions) {\n    returnFiber.deletions.push(childToDelete);\n  } else {\n    returnFiber.deletions = [childToDelete];\n  }\n}\n\nfunction sameNode(a, b) {\n  return a \u0026\u0026 b \u0026\u0026 a.type === b.type \u0026\u0026 a.key === b.key;\n}\n```\n\n### ⑥ 调度器之二\n\n讲自定义调度 CPU 空闲时间片之前，先回顾一下之前加入调度器的函数：\n\n```js\n// root节点调用\nexport function scheduleUpdateOnFiber(fiber) {\n  // work in process\n  wip = fiber;\n  wipRoot = fiber;\n\n  // 新建一个自定义的调度\n  scheduleCallback(workLoop);\n}\n```\n\n上边为了不使用 js 自带的调度器 requestIdleCallback，react 这里自定义了调度的实现。我们来简易实现一下这个调度器：\n\n---\n\n（调度器实现开始）\n\n```js\n// scheduler.js\n// 牵扯到最小堆的算法，可以参考知识库中基础部分算法\nimport { push, pop, peek } from './minHeap';\n\n// 任务队列\nlet taskQueue = [];\n// 任务计数\nlet taskIdCounter = 1;\n\n// 任务优先级 延迟时间\nexport function scheduleCallback(callback) {\n  const currentTime = getCurrentTime();\n\n  const timeout = -1; // 源码中还会有 priorityLevel 作为一个权重维度\n  const expirationTime = currentTime + timeout;\n\n  // 每次调度，id自增，push进堆\n  const newTask = {\n    id: taskIdCounter++,\n    callback, // 回调函数\n    expirationTime, // 任务开始时间\n    sortIndex: expirationTime, // 任务排序，取决于过期时间（这里简单的任务过期时间越近，优先级越高）\n  };\n  push(taskQueue, newTask);\n\n  // 请求调度\n  requestHostCallback();\n}\n\n// MessageChannel允许我们在不同的浏览上下文，比如window.open()打开的窗口或者iframe等之间建立通信管道，并通过两端的端口（port1和port2）发送消息。MessageChannel以DOM Event的形式发送消息，所以它属于异步的宏任务。\nconst channel = new MessageChannel();\nconst port = channel.port2;\nchannel.port1.onmessage = function () {\n  handleWorkMessage();\n};\n\nfunction requestHostCallback() {\n  port.postMessage(null);\n}\n\nfunction handleWorkMessage() {\n  // 每次取出堆顶最小的\n  let currentTask = peek(taskQueue);\n  while (currentTask) {\n    // 暂不考虑执行进度以及中断执行\n    const callback = currentTask.callback;\n    currentTask.callback = null;\n    callback();\n    // 删除任务\n    pop(taskQueue);\n    // 拿当前等待时间最小的任务\n    currentTask = peek(taskQueue);\n  }\n}\n\nfunction getCurrentTime() {\n  // Date.now()：返回的时间戳没有被限制在一毫秒的精确度内，小于 1ms 的测试不出来结果。\n  // performance.now()：返回的时间戳以双精度浮点数 double 的形式表示时间，精度最高可达微秒级。不受系统影响。Date.now() 约等于 performance.timing.navigationStart + performance.now()\n  return performance.now();\n}\n```\n\n（调度器实现结束）\n\n---\n\n此时调度器外边的 loop 函数就可以精简了：\n\n```js\nfunction workLoop() {\n  while (wip) {\n    performUnitOfWork();\n  }\n\n  // 确保调度器在运行\n  // requestIdleCallback(workLoop);\n\n  if (!wip \u0026\u0026 wipRoot) {\n    commitRoot();\n  }\n}\n```\n\n### 〇 改进的流程图\n\n![图片](/img/posts/react/fiber-3.png)\n\n## 4. Hooks\n\n写在前边：Hooks 严格来说也是 fiber 的一部分，也牵扯到 diff 和调度，单独拿出来是因为他确实是一个独立的概念，同时也避免上一个章节太过臃肿。\n\n`Hooks` 本质就是处理函数式组件的状态的集合。状态，是 react vdom 中自定义的一个属性，我们在 fiber 化之后也应该有，这里加上：\n\n```js\nexport function createFiber(vnode, returnFiber) {\n  const fiber = {\n    ...\n    memorizedState: null\n  }\n}\n```\n\nmemorizedState 属性对于类式组件存放的是 state 对象，对于函数式组件比较麻烦，因为 hooks 是一个一个的，所以这里又用了链式存储，memorizedState 存放第一个 hooks 指针即可。\n\n因为 hooks 是函数式组件特有的，所以只会在渲染函数式组件时使用：\n\n```js\nexport function updateFunctionComponent(wip) {\n  // 这里调用\n  renderWithHooks(wip);\n\n  const { type, props } = wip;\n  const children = type(props);\n  reconcileChildren(wip, children);\n}\n```\n\n我们新建一个 hooks.js 文件来同意处理 hook。\n\n先处理 hooks 中的全局属性：\n\n```js\nlet currentlyRenderingFiber = null;\n// 老hook, 在useEffect中使用\nlet currentHook = null;\n// 当前工作中的hook，同wip一样，hooks也是一个链表，需要一个当前的指针位置标识\nlet workInProgressHook = null;\n\nexport function renderWithHooks(wip) {\n  currentlyRenderingFiber = wip;\n  currentlyRenderingFiber.memorizedState = null;\n  workInProgressHook = null;\n}\n```\n\n这里类比前面的 fiber 应该好理解，讲当前 wip 传入变量 currentlyRenderingFiber，并初始化。\n\n接着写一个通用的方法来构造函数式组件中 hooks 的链表关系：\n\n```js\nfunction updateWorkInProgressHook() {\n  let hook;\n\n  // 拿到当前 fiber 在 diff 中的 old fiber\n  const current = currentlyRenderingFiber.alternate;\n\n  if (current) {\n    // 2.更新\n    currentlyRenderingFiber.memorizedState = current.memorizedState;\n\n    if (workInProgressHook) {\n      // 当前 hook 指针的位置\n      workInProgressHook = hook = workInProgressHook.next;\n      currentHook = currentHook.next;\n    } else {\n      // 没有指针，就从 hook0 开始\n      workInProgressHook = hook = currentlyRenderingFiber.memorizedState;\n      currentHook = current.memorizedState;\n    }\n  } else {\n    // currentHook 只有在 fiber 变更时才起作用，不然一直是 null\n    currentHook = null;\n\n    // 1.初次渲染\n    hook = {\n      memorizedState: null, // state\n      next: null, // 下一个hook\n    };\n\n    if (workInProgressHook) {\n      // 如果已经有hook，就找链表下一个，移动指针\n      workInProgressHook = workInProgressHook.next = hook;\n    } else {\n      // 不然就初始化memorizedState\n      workInProgressHook = currentlyRenderingFiber.memorizedState = hook;\n    }\n  }\n\n  return hook;\n}\n```\n\n到这里，一个简单的 Hooks 就初始化完成啦。接下来看看具体的 hooks 怎么用吧。\n\n### ① useReducer\n\nuseReducer 是 useState 的替代品，使用的方式如下：\n\n```js\n// 声明\nconst initialState = 1;\nconst reducer = (state: number, action: any | { type: string, value: any }) =\u003e {\n  return state + 1;\n};\n\nconst [count, dispatch] = useReducer(reducer, initialState);\n\n// 调用\ndispatch('add');\n```\n\n分析一下，useReducer 也是一个函数，接受一个处理函数 reducer 和一个初始值；同事返回一个当前的最新值和触发 reducer 的函数 dispatch，这个 dispatch 可以接受一个 action 参数，action 可以是一个字符串也可以是 一个对象：`{ type, value }`。\n\n我们定义这个函数：\n\n```js\nexport function useReducer(reducer, initalState) {\n  // 拿到当前的 workInProgressHook\n  const hook = updateWorkInProgressHook();\n  // 给初始值\n  if (!currentlyRenderingFiber.alternate) {\n    // 如果没有经过 diff 标记赋值 alternate，说明还没有初始化过 state。没有对比就不会存在 state 改变\n    hook.memorizedState = initalState;\n  }\n\n  ...\n}\n```\n\n接下来就是实现 将 reducer 转变为 dispatch 了。\n\n我们声明一个转换函数：\n\n```js\nfunction dispatchReducerAction(fiber, hook, reducer, action) {\n  // hook.memorizedState = reducer ? reducer(hook.memorizedState) : action;\n  if (reducer) {\n    hook.memorizedState = reducer(hook.memorizedState, action);\n  } else {\n    // useState: setState(1);\n    hook.memorizedState = action;\n  }\n\n  // 更新 alternate， fiber已经改变\n  fiber.alternate = { ...fiber };\n  // 兄弟节点置空，意思是只更新当前函数节点即可。这里不用担心链表断掉，reconcileChildren 中会重新构造链表关系。hook 更新只是据局部更新\n  fiber.sibling = null;\n  scheduleUpdateOnFiber(fiber);\n}\n```\n\n由于 参数 fiber, hook, reducer 是我们内部处理的，只有 action 是外部传的，所以，我们在 useReducer 这里 bind 一下：\n\n```js\n// useReducer 函数\n...\n\n// bind 到 null 上，是为了让 currentlyRenderingFiber 更新，直接调用 dispatchReducerAction，其指针指向没有变化，有多个函数式组件时，会产生渲染错乱。\n// currentlyRenderingFiber 作为一个形参存进来，形成了一个闭包。如果有多个函数式组件都有hooks的话，他们的currentlyRenderingFiber是各自的fiber，不会造成指针混乱。\nconst dispatch = dispatchReducerAction.bind(\n  null,\n  currentlyRenderingFiber,\n  hook,\n  reducer\n);\n\nreturn [hook.memorizedState, dispatch];\n```\n\n### ② useState\n\nuseState 是 useReducer 的一个特殊形态，没有 reducer，每次只返回 action 里的值。\n\n```js\n// reducer 为 null\nexport function useState(initialState) {\n  return useReducer(null, initialState);\n}\n```\n\n### ③ useEffect / useLayoutEffect\n\nuseEffect 在页面渲染完成后进入调度队列执行，是异步的。useLayoutEffect 则是同步执行副作用操作，也就是说，它会在浏览器渲染之前运行。\n\n由于 useEffect 也可以有多个，所以，仍然是按照链表的方式存储的，这里为了便于大家理解，暂时用数组代替：\n\n```js\nexport function renderWithHooks(wip) {\n  // old\n  currentlyRenderingFiber = wip;\n  currentlyRenderingFiber.memorizedState = null;\n  workInProgressHook = null;\n\n  // 为了方便，useEffect与useLayoutEffect区分开，并且以数组管理\n  // 源码中是放一起的，并且是个链表\n  currentlyRenderingFiber.updateQueueOfEffect = [];\n  currentlyRenderingFiber.updateQueueOfLayout = [];\n}\n```\n\n由于 useEffect 和 useLayoutEffect 都是在组件加载的某个时机执行一段方法。我们把公共的实现提取出来：\n\n```js\nfunction updateEffectImp(hooksFlags, create, deps) {\n  const hook = updateWorkInProgressHook();\n\n  // 初始化时没有 currentHook，必然会走到下边执行函数，组件状态变更时，会赋值 currentHook，用于拦截是否要更新\n  if (currentHook) {\n    // 用于校验两次 依赖 是否有变化\n    const prevEffect = currentHook.memorizedState;\n    if (deps) {\n      const prevDeps = prevEffect.deps;\n      if (areHookInputsEqual(deps, prevDeps)) {\n        return;\n      }\n    }\n  }\n\n  const effect = { hooksFlags, create, deps };\n\n  hook.memorizedState = effect;\n\n  // useEffect\n  if (hooksFlags \u0026 HookPassive) {\n    currentlyRenderingFiber.updateQueueOfEffect.push(effect);\n    // useLayoutEffect\n  } else if (hooksFlags \u0026 HookLayout) {\n    currentlyRenderingFiber.updateQueueOfLayout.push(effect);\n  }\n}\n\n// ! HookFlags\nexport const HookLayout = /*    */ 0b010;\nexport const HookPassive = /*   */ 0b100;\n\nexport function areHookInputsEqual(nextDeps, prevDeps) {\n  if (prevDeps == null) {\n    return false;\n  }\n\n  // 这里只是简单的按位置索引对比\n  for (let i = 0; i \u003c prevDeps.length \u0026\u0026 i \u003c nextDeps.length; i++) {\n    if (Object.is(nextDeps[i], prevDeps[i])) {\n      continue;\n    }\n    return false;\n  }\n\n  return true;\n}\n```\n\n最外层的调用可以这样写：\n\n```js\nexport function useEffect(create, deps) {\n  return updateEffectImp(HookPassive, create, deps);\n}\n\nexport function useLayoutEffect(create, deps) {\n  return updateEffectImp(HookLayout, create, deps);\n}\n```\n\n经过上面的函数后，组件内所有的 useEffect 就都收集在数组中了。接下来就是找个时机进度调度。分析一下，传递的函数需要在界面渲染前后调用，所以应该在 diff 之后，我们就把它加在 commit 函数中：\n\n```js\nfunction commitWorker(wip) {\n  // ...\n\n  if (wip.tag === FunctionComponent) {\n    invokeHooks(wip);\n  }\n\n  // 2. 提交子节点\n  commitWorker(wip.child);\n  // 3. 提交兄弟\n  commitWorker(wip.sibling);\n}\n```\n\n在当前节点变化更新完之后，还没有渲染子节点之前，检查一下是否有 useEffect 和 useLayoutEffect：\n\n```js\n// 之前写的调度函数\nimport { scheduleCallback } from './scheduler';\n\n// 核心调用代码示例\nfunction invokeHooks(wip) {\n  const { updateQueueOfEffect, updateQueueOfLayout } = wip;\n\n  // 同步，阻塞了 commitWorker\n  for (let i = 0; i \u003c updateQueueOfLayout.length; i++) {\n    const effect = updateQueueOfLayout[i];\n    // 未处理其返回值\n    effect.create();\n  }\n\n  // 加入调度，一般会在渲染结束后执行\n  for (let i = 0; i \u003c updateQueueOfEffect.length; i++) {\n    const effect = updateQueueOfEffect[i];\n\n    scheduleCallback(() =\u003e {\n      effect.create();\n    });\n  }\n}\n```\n\n\u003e 思考：还记得 Effect 的函数有 return 么？在副作用消失时调用。这里，effect.create() 的返回值就是那个 return 的函数，所以，这里也应该加入调度队列，只是要控制调用时机，**因为其只在组件被 delete 时调用**。\n\n### 〇 渲染流程图\n\n![图片](/img/posts/react/react-hooks-useReducer.jpg)\n\n![图片](/img/posts/react/react-hooks-useEffect.png)\n\n接下来，我们抛开 fiber，简化一下源码逻辑，同时换一种思路来看 hook 本身，使用 preact 中的实现来讲解：\n\n### ④ useMemo / useCallback\n\n我们把 react 内置的 hook 都编上号，便于 devtool 解析，比如 useState 是 1，useCallback 是 8，useMemo 是 7 等等。于是有了下表：\n\n| hook                | 编号（currentHook） |\n| ------------------- | ------------------- |\n| useState            | 1                   |\n| useReducer          | 2                   |\n| useEffect           | 3                   |\n| useLayoutEffect     | 4                   |\n| useRef              | 5                   |\n| useImperativeHandle | 6                   |\n| useMemo             | 7                   |\n| useCallback         | 8                   |\n| useContext          | 9                   |\n| useErrorBoundary    | 10                  |\n| useId               | 11                  |\n\n我们可以通过 getHookState 方法获取到这个 hook 的状态：\n\n```js\nfunction getHookState(index, type) {\n  // 通过 type 记录 state 类型，便于 devTool 解析\n  ...\n  // 通过 index 获取当前 hook\n  const hooks =\n\t\tcurrentComponent.__hooks ||\n\t\t(currentComponent.__hooks = {\n\t\t\t_list: [],\n\t\t\t_pendingEffects: []\n\t\t});\n\n\tif (index \u003e= hooks._list.length) {\n\t\thooks._list.push({ _pendingValue: EMPTY });\n\t}\n\treturn hooks._list[index];\n}\n```\n\n给当前的 vnode（currentComponent）设置`__hooks`属性，每一个 hook 呢，又有自己的`_list`来放置 hook 们的状态，以 useMemo 为例：\n\n```ts\nexport interface MemoHookState {\n  _value?: any;\n  _pendingValue?: any;\n  _args?: any[];\n  _pendingArgs?: any[];\n  _factory?: () =\u003e any;\n}\n```\n\n同时每一个 hook 还有自己的 \\_pendingEffects：\n\n```ts\nexport interface EffectHookState {\n  _value?: Effect;\n  _args?: any[];\n  _pendingArgs?: any[];\n  _cleanup?: Cleanup | void;\n}\n```\n\nuseMemo:\n\n```js\n// hook按照递增顺序，会给一个currentIndex\n// factory：用户传入的缓存函数\n// args: 依赖数组\nexport function useMemo(factory, args) {\n  /** @type {import('./internal').MemoHookState} */\n  const state = getHookState(currentIndex++, 7);\n  if (argsChanged(state._args, args)) {\n    state._pendingValue = factory();\n    state._pendingArgs = args;\n    state._factory = factory;\n    return state._pendingValue;\n  }\n\n  return state._value;\n}\n\n// 检测依赖更新\n// 返回true的情况：没有old deps、依赖长度变化、新依赖中有不和原依赖一样的对象\nfunction argsChanged(oldArgs, newArgs) {\n  return (\n    !oldArgs ||\n    oldArgs.length !== newArgs.length ||\n    newArgs.some((arg, index) =\u003e arg !== oldArgs[index])\n  );\n}\n```\n\n接下来看一下 useCallback:\n\n```js\n// currentHook 就是用于 devtool 解析的变量，这里忽略\nexport function useCallback(callback, args) {\n  currentHook = 8;\n  return useMemo(() =\u003e callback, args);\n}\n```\n\n### ⑤ useDebounce\n\n接下来我们来引申一下第三方 hook 库`ahooks`中的一个防抖 hook。\n\n使用：\n\n```jsx\nimport React, { useState } from 'react';\nimport { useDebounce } from 'ahooks';\n\nexport default () =\u003e {\n  const [value, setValue] = useState\u003cstring\u003e();\n  const debouncedValue = useDebounce(value, { wait: 500 });\n\n  return (\n    \u003cdiv\u003e\n      \u003cinput\n        value={value}\n        onChange={(e) =\u003e setValue(e.target.value)}\n        placeholder=\"Typed value\"\n        style={{ width: 280 }}\n      /\u003e\n      \u003cp style={{ marginTop: 16 }}\u003eDebouncedValue: {debouncedValue}\u003c/p\u003e\n    \u003c/div\u003e\n  );\n};\n```\n\n原理：\n\n```js\n// 外层函数入参：func, wait, options（maxWait等参数）\n// 内层函数\nfunction debounced(...args) {\n  const time = Date.now();\n  const isInvoking = shouldInvoke(time);\n\n  lastArgs = args;\n  lastThis = this;\n  lastInvokeTime = time;\n\n  if (timerId) {\n    cancelTimer();\n  }\n\n  if (isInvoking) {\n    // 重启定时器函数 timerExpired\n    timerId = startTimer(timerExpired, wait);\n    return invokeFunc(lastInvokeTime);\n  }\n\n  return result;\n}\n\nfunction invokeFunc(time) {\n  const args = lastArgs;\n  const thisArg = lastThis;\n\n  lastArgs = lastThis = undefined;\n  lastInvokeTime = time;\n  result = func.apply(thisArg, args);\n  return result;\n}\n```\n\n其中：\n\n```js\nfunction shouldInvoke(time) {\n  const timeSinceLastInvoke = time - lastInvokeTime; // 距离上一次调用的时间差\n\n  return (\n    lastInvokeTime === undefined ||\n    timeSinceLastInvoke \u003e= wait ||\n    timeSinceLastInvoke \u003c 0 ||\n    (maxing \u0026\u0026 timeSinceLastInvoke \u003e= maxWait)\n  );\n}\n\n// 这些都是内部对象，兼容了js不同运行时环境的其那句对象\nconst root =\n  freeGlobalThis || freeGlobal || freeSelf || Function('return this')();\nconst useRAF =\n  !wait \u0026\u0026 wait !== 0 \u0026\u0026 typeof root.requestAnimationFrame === 'function';\n\nfunction startTimer(pendingFunc, wait) {\n  if (useRAF) {\n    root.cancelAnimationFrame(timerId);\n    return root.requestAnimationFrame(pendingFunc);\n  }\n  return setTimeout(pendingFunc, wait);\n}\n```\n\n## 5. Diff 算法高级\n\n这里讲解一下高阶版 diff 算法。\n\n上边的 diff 算法（reconcileChildren）问题：\n\n- 按位置对比，重复组件没办法复用，性能较低\n\n因为大多数情况，页面的变化都是很小的，大部分 dom 树都是不变的，只有个别的变化，之前的算法中，如果对应位置上节点不一样就直接删掉，下边有需要这个节点了，只好再创建，成本高了不少。\n\n算法思路：\n\n- 创建一个 hash 表存放缓存节点\n- 需要删除的节点删掉后存到 hash 表中\n- 每需要新增一个位置的节点时，从 hash 表中读取\n- 一轮 diff 做完之后，清空 hash 表\n\n考虑到 fiber 的单链表结构，就不使用 vue 的双指针从前后同步查询，而是从左边往右遍历，比较新老节点，如果节点可以复用，继续往右，否则就停止。\n\n### 流程图\n\n渲染树（pfiber 就是 returnFiber）：\n![图片](/img/posts/react/diff-1.png)\n\n第一步：从左往右遍历，查找直接能用的，直到遇到不能用的为止（下图中的数字代表该 fiber 的 index）：\n\n![图片](/img/posts/react/diff-2.png)\n\n能复用的：\n\n```js\nconst same = sameNode(newChild, oldFiber);\n\nif (same) {\n  const newFiber = createFiber(newChild, returnFiber);\n\n  Object.assign(newFiber, {\n    stateNode: oldFiber.stateNode,\n    alternate: oldFiber,\n    flags: Update,\n  });\n}\n\n// newIndex 指针后移\n// lastPlacedIndex 指向最后放置的位置\n```\n\n停止条件：`!sameNode(newChild, oldFiber)`\n\n第二步：如新节点没有了（newIndex === newChildren.length）：\n\n![图片](/img/posts/react/diff-3.png)\n\n老节点往后的加入删除队列：\n\n```js\n// 遍历随后的节点，加入父节点的 deletions\nreturnFiber.deletions.push(...)\n```\n\n第三步：如果老节点没有了：\n\n![图片](/img/posts/react/diff-4.png)\n\n新的节点依次构建链表：\n\n```js\n...\nif (previousNewFiber == null) {\n  returnFiber.child = newFiber;\n} else {\n  previousNewFiber.sibling = newFiber;\n}\n```\n\n第四步：其他情况，使用 hash 表索引\n\n```js\n// 举例1\n// 0 1 [2 3 4 5 6]\n// 0 1 [3 4 5 6 7 2]\n\n// 举例2\n// [0 1 2 3 4 5 6]\n// [2 1 3 4 5]\n\n// 把老节点加入Map\nconst existingChildren = mapRemainingChildren(oldFiber); // new Map()\n// 遍历新节点，通过新节点的key去哈希表中查找节点，找到就复用节点，并且删除哈希表中对应的节点\n```\n\n![图片](/img/posts/react/diff-5.png)\n\n第五步：新节点遍历完后，若 hash 表中仍然有节点，则把这些节点加入 returnFiber.deletions;\n\n### 示意代码\n\n```js\n// oldfiber的头结点\nlet oldFiber = returnFiber.alternate?.child;\n// 下一个oldFiber | 暂时缓存下一个oldFiber\nlet nextOldFiber = null;\n// 用于判断是returnFiber初次渲染还是更新\nlet shouldTrackSideEffects = !!returnFiber.alternate;\nlet previousNewFiber = null;\nlet newIndex = 0;\n// 上一次dom节点插入的最远位置\n// old 0 1 2 3 4\n// new 2 1 3 4\nlet lastPlacedIndex = 0;\n\n// *1. 从左边往右遍历，比较新老节点，如果节点可以复用，继续往右，否则就停止\nfor (; oldFiber \u0026\u0026 newIndex \u003c newChildren.length; newIndex++) {\n  const newChild = newChildren[newIndex];\n  if (newChild == null) {\n    continue;\n  }\n\n  if (oldFiber.index \u003e newIndex) {\n    nextOldFiber = oldFiber;\n    oldFiber = null;\n  } else {\n    nextOldFiber = oldFiber.sibling;\n  }\n\n  const same = sameNode(newChild, oldFiber);\n  if (!same) {\n    if (oldFiber == null) {\n      oldFiber = nextOldFiber;\n    }\n    break;\n  }\n  const newFiber = createFiber(newChild, returnFiber);\n\n  Object.assign(newFiber, {\n    stateNode: oldFiber.stateNode,\n    alternate: oldFiber,\n    flags: Update,\n  });\n\n  // 节点更新\n  lastPlacedIndex = placeChild(\n    newFiber,\n    lastPlacedIndex,\n    newIndex,\n    shouldTrackSideEffects,\n  );\n\n  if (previousNewFiber == null) {\n    returnFiber.child = newFiber;\n  } else {\n    previousNewFiber.sibling = newFiber;\n  }\n\n  previousNewFiber = newFiber;\n  oldFiber = nextOldFiber;\n}\n\n// *2. 新节点没了，老节点还有\n// 0 1 2\n// 0\nif (newIndex === newChildren.length) {\n  deleteRemainingChildren(returnFiber, oldFiber);\n  return;\n}\n\n// *3. 初次渲染\n// 1）初次渲染\n// 2）老节点没了，新节点还有\nif (!oldFiber) {\n  for (; newIndex \u003c newChildren.length; newIndex++) {\n    const newChild = newChildren[newIndex];\n    if (newChild == null) {\n      continue;\n    }\n    const newFiber = createFiber(newChild, returnFiber);\n\n    lastPlacedIndex = placeChild(\n      newFiber,\n      lastPlacedIndex,\n      newIndex,\n      shouldTrackSideEffects,\n    );\n\n    if (previousNewFiber === null) {\n      // head node\n      returnFiber.child = newFiber;\n    } else {\n      previousNewFiber.sibling = newFiber;\n    }\n\n    previousNewFiber = newFiber;\n  }\n}\n\n// *4 新老节点都还有\n// 小而乱\n// old 0 1 [2 3 4]\n// new 0 1 [3 4]\n// !4.1 把剩下的old单链表构建哈希表\nconst existingChildren = mapRemainingChildren(oldFiber);\n\n// !4.2 遍历新节点，通过新节点的key去哈希表中查找节点，找到就复用节点，并且删除哈希表中对应的节点\nfor (; newIndex \u003c newChildren.length; newIndex++) {\n  const newChild = newChildren[newIndex];\n  if (newChild == null) {\n    continue;\n  }\n  const newFiber = createFiber(newChild, returnFiber);\n\n  // oldFiber\n  const matchedFiber = existingChildren.get(newFiber.key || newFiber.index);\n  if (matchedFiber) {\n    // 节点复用\n    Object.assign(newFiber, {\n      stateNode: matchedFiber.stateNode,\n      alternate: matchedFiber,\n      flags: Update,\n    });\n\n    existingChildren.delete(newFiber.key || newFiber.index);\n  }\n\n  lastPlacedIndex = placeChild(\n    newFiber,\n    lastPlacedIndex,\n    newIndex,\n    shouldTrackSideEffects,\n  );\n\n  if (previousNewFiber == null) {\n    returnFiber.child = newFiber;\n  } else {\n    previousNewFiber.sibling = newFiber;\n  }\n  previousNewFiber = newFiber;\n}\n\n// *5 old的哈希表中还有值，遍历哈希表删除所有old\nif (shouldTrackSideEffects) {\n  existingChildren.forEach((child) =\u003e deleteChild(returnFiber, child));\n}\n```\n\n其中工具函数：\n\n```js\n// 初次渲染，只是记录下标\n// 更新，检查节点是否移动\nfunction placeChild(\n  newFiber,\n  lastPlacedIndex,\n  newIndex,\n  shouldTrackSideEffects,\n) {\n  newFiber.index = newIndex;\n  if (!shouldTrackSideEffects) {\n    // 父节点初次渲染\n    return lastPlacedIndex;\n  }\n  // 父节点更新\n  // 子节点是初次渲染还是更新呢\n  const current = newFiber.alternate;\n  if (current) {\n    const oldIndex = current.index;\n    // 子节点是更新\n    // lastPlacedIndex 记录了上次dom节点的相对更新节点的最远位置\n    // old 0 1 2 3 4\n    // new 2 1 3 4\n    // 2 1(6) 3 4\n    if (oldIndex \u003c lastPlacedIndex) {\n      // move\n      newFiber.flags |= Placement;\n      return lastPlacedIndex;\n    } else {\n      return oldIndex;\n    }\n  } else {\n    // 子节点是初次渲染\n    newFiber.flags |= Placement;\n    return lastPlacedIndex;\n  }\n}\n\n// hash表\nfunction mapRemainingChildren(currentFirstChild) {\n  const existingChildren = new Map();\n\n  let existingChild = currentFirstChild;\n  while (existingChild) {\n    // key: value\n    // key||index: fiber\n    existingChildren.set(\n      existingChild.key || existingChild.index,\n      existingChild,\n    );\n    existingChild = existingChild.sibling;\n  }\n\n  return existingChildren;\n}\n```\n\n在 commitWorker 里加入：\n\n```js\nif (flags \u0026 Placement \u0026\u0026 stateNode) {\n  // 1\n  // 0 1 2 3 4\n  // 2 1 3 4\n  const before = getHostSibling(wip.sibling);\n  insertOrAppendPlacementNode(stateNode, before, parentNode);\n  // parentNode.appendChild(stateNode);\n}\n\n...\nfunction getHostSibling(sibling) {\n  while (sibling) {\n    if (sibling.stateNode \u0026\u0026 !(sibling.flags \u0026 Placement)) {\n      return sibling.stateNode;\n    }\n    sibling = sibling.sibling;\n  }\n  return null;\n}\nfunction insertOrAppendPlacementNode(stateNode, before, parentNode) {\n  if (before) {\n    parentNode.insertBefore(stateNode, before);\n  } else {\n    parentNode.appendChild(stateNode);\n  }\n}\n```\n\n```jsx\n/**\n * compact: true\n * inline: true\n */\nimport React from 'react';\nimport Giscus from '@giscus/react';\nimport { usePrefersColor } from 'dumi';\n\nexport default function Main() {\n  const [color] = usePrefersColor();\n\n  return (\n    \u003csection style={{ marginTop: '32px' }}\u003e\n      \u003cGiscus\n        id=\"comments\"\n        reactionsEnabled=\"1\"\n        emitMetadata=\"0\"\n        inputPosition=\"bottom\"\n        loading=\"lazy\"\n        src=\"https://giscus.app/client.js\"\n        repo=\"UMCloud-FE\"\n        repoId=\"R_kgDOIYRu5Q\"\n        category=\"Announcements\"\n        categoryId=\"DIC_kwDOIYRu5c4CU1sl\"\n        mapping=\"URL\"\n        strict=\"0\"\n        reactionsEnabled=\"1\"\n        emitMetadata=\"1\"\n        inputPosition=\"bottom\"\n        theme={color === 'dark' ? 'dark_tritanopia' : 'light_tritanopia'}\n        lang=\"zh-CN\"\n        loading=\"lazy\"\n        crossorigin=\"anonymous\"\n        async={true}\n        // theme={giscusTheme}\n      /\u003e\n    \u003c/section\u003e\n  );\n}\n```"])</script><script>self.__next_f.push([1,"13:T163a,"])</script><script>self.__next_f.push([1,"老生常谈的问题，图片太多太大的网站，往往由于图片加载过慢而导致页面白屏时间过长。本次年前最后一更，来讲一个加载方法来处理这种情况。\n\n\u003e 在使用 Next.js 时，发现其支持模糊图片占位符加载的方式，本文就手动实现一个\n\n\n![企业微信截图_0cbf1b0b-91ee-49ff-bb58-a0d390bc61a2.png](/img/posts/2024-2-7/2024-2-7-1.png)\n\n*图片解释：Nextjs 使用 placeholder=\"blur\" 来指定当前图片使用模糊图片占位符加载*\n\n## 1. 前置工作\n\n首先你得准备一堆图片，部署一个测试的网页。\n\n```html\n\u003cbody class=\"p-12 m-auto\"\u003e\n  \u003cdiv class=\"container flex justify-center\"\u003e\n    \u003cimg loading=\"lazy\" alt=\"9\" class=\"w-full object-cover rounded-lg\"\n      src=\"http://e.hiphotos.baidu.com/image/pic/item/a1ec08fa513d2697e542494057fbb2fb4316d81e.jpg\" /\u003e\n      ...\n      下面是并列的一堆 img，数量 100+\n  \u003c/div\u003e\n\u003c/body\u003e\n```\n\n页面预览：\n\n\n![image.png](/img/posts/2024-2-7/2024-2-7-2.png)\n\n但是，当网速慢一点，或者图片再高清一点时，图片就会出现加载白屏（从上往下的扫描线）。\n\n## 2. 设置延迟加载\n\n首先，我们利用 img 标签的能力，添加懒加载属性：\n\n```html\n\u003cimg loading=\"lazy\" src=\"image.jpg\" alt=\"...\" /\u003e\n```\n\n兼容性：\n\n![image.png](/img/posts/2024-2-7/2024-2-7-3.png)\n\n\n这个策略有一个动态的原则：\n\n1. *Lazy loading加载数量与屏幕高度有关，高度越小加载数量越少，但并不是线性关系。4G 网络下的视口距离阈值是 1250 像素，3G 网络下是 2500 像素。*\n2. *Lazy loading加载数量与网速有关，网速越慢，加载数量越多，但并不是线性关系*。\n3. *滚动会触发图片懒加载，不会说滚动一屏后再去加载。*\n4. *窗口resize尺寸变化也会触发图片懒加载。*\n5. *根据滚动位置不同，Lazy loading会忽略头尾的图片请求。*\n\n这个策略跟浏览器，网速和运行环境都有关系，我就以我本地为准进行测试。为了满足浏览器阈值，我们放置了 100+ 的网络图片，见上面预览图。在初始化加载时只加载了一部分，等往下滚动一些，看效果：\n\n![1.gif](/img/posts/2024-2-7/2024-2-7-4.gif)\n\n\n\u003e 注意图片的嵌套层级，如果 html 书写有误，或者嵌套层级过多，懒加载可能不会被触发\n\n## 3. 配置模糊图片\n\n我们准备好低像素的模糊图片，将每一个 img 用 div 包裹起来，并给 div 加上那个模糊的背景图片（next.js 也是这么做的）：\n \n```html\n\u003cdiv class=\"blur-load\" style=\"background-image: url(模糊图片)\"\u003e\n  \u003cimg ... loading=\"lazy\" /\u003e\n\u003c/div\u003e\n```\n\n其中模糊图片的样式可以这样定义, 保证背景图片与 img 能够重合：\n\n```css\nimg {\n  width: 100%;\n  aspect-ratio: 1/1;\n  object-fit: cover;\n  object-position: center;\n}\n\n.blur-load {\n  background-size: cover;\n  background-position: center;\n}\n```\n\n\u003e 这个方法的原理是 img 图片的层级要高于其本身或者父级的背景图片，当图片加载出来后自动覆盖背景图片\n\n制作模糊图片，可以使用 [ffmpeg](https://ffmpeg.org/) 工具（自行进入官网下载安装即可）。\n\n\u003e mac 电脑直接下载 Unix 可执行文件到本地就可以用它执行指令了；windows 电脑直接下载 build 的目录文件，找到 bin 目录下的 ffmpeg.exe 就可以执行了。\n\n运行指令：\n\n```sh\n# 我做了 20 倍缩放，你可以自己定义缩放比例\nffmpeg -i 1.jpg -vf scale=20:-1 1-sm.png\n```\n\n这样便生成了一个很小的图片：\n\n\n![image.png](/img/posts/2024-2-7/2024-2-7-5.png)\n\n调整代码：\n\n```html\n\u003cdiv class=\"blur-load rounded-lg\" style=\"background-image: url(./1-sm.png)\"\u003e\n\u003cimg loading=\"lazy\" alt=\"9\" class=\"w-full object-cover rounded-lg\"\n  src=\"http://e.hiphotos.baidu.com/image/pic/item/a1ec08fa513d2697e542494057fbb2fb4316d81e.jpg\"\u003e\n\u003c/div\u003e\n```\n\n我们将网速调慢看看效果：\n\n\n![image.png](/img/posts/2024-2-7/2024-2-7-6.png)\n\n但是这样还有问题，就是图片是从上往下逐渐加载的，部分加载也会显示的页面上：\n\n\n![1.gif](/img/posts/2024-2-7/2024-2-7-7.gif)\n\n我们想要的效果是图片完全加载后再让图片出来，这要借助 js：\n\n```js\nfunction loaded(div) {\n  div.classList.add('loaded');\n}\n\nconst blurDivs = document.querySelectorAll('.blur-load');\nblurDivs.forEach(div =\u003e {\n  const img = div.querySelector('img');\n  \n  // 在加载完成的时候添加样式\n  if (img.complete) { loaded(div) }\n  else { img.addEventListener('load', () =\u003e loaded(div)) }\n})\n```\n\n这样，在加载完成后才会有 'loaded' 样式加载在外围的 div 上。我们只需要给 div 添加样式：\n\n```css\n.blur-load.loaded \u003e img {\n opacity: 1;\n}\n\n/* 加载完成之前保持透明 */\n.blur-load \u003e img {\n  opacity: 0;\n  transition: opacity 200ms ease-in-out;\n}\n```\n\n这样在加载完成后才会有模糊图片过渡显示为原图的效果了：\n\n\n![1.gif](/img/posts/2024-2-7/2024-2-7-8.gif)\n\n## 4. 自定义 loading 动画\n\n如果你自己觉得还不满意，想要自己加入想要的动画效果，那么你可以子在这个div上自己定义样式。下面给出一种脉冲效果的参考样例：\n\n```css\n.blur-load {\n  position: relative;\n}\n.blur-load::before {\n  content: \"\";\n  position: absolute;\n  inset: 0;\n  animation: pulse 2s infinite;\n}\n\n@keyframes pulse {\n  0% {\n    background-color: rgba(255, 255, 255, 0);\n  }\n  \n  50% {\n    background-color: rgba(255, 255, 255, 0.4);\n  }\n  \n  100% {\n    background-color: rgba(255, 255, 255, 0);\n  }\n}\n\n/* 加载完成后取消 */\n.blur-load.loaded::before {\n  content: none;\n}\n```\n效果图如下：\n\n\n![1.gif](/img/posts/2024-2-7/2024-2-7-9.gif)"])</script><script>self.__next_f.push([1,"14:T812,"])</script><script>self.__next_f.push([1,"## 使用 CSS 框架\n\n如果你不想自己配置这些乱七八糟的配置，又苦于不会设计主题颜色，那么 [Tailwindcss](https://tailwindcss.com/docs/dark-mode) 就可以帮你完成这个任务。\n\n\u003e 使用 css 框架，原则上不算是一个新技术分类，他还是上面所讲的方案中的一种或几种，是对这些方案的企业级封装\n\n我们借用官方的夜间主题的例子：\n\n```js\n\u003cdiv class=\"bg-white dark:bg-slate-800 rounded-lg px-6 py-8 ring-1 ring-slate-900/5 shadow-xl\"\u003e\n  \u003cdiv\u003e\n    \u003cspan class=\"inline-flex items-center justify-center p-2 bg-indigo-500 rounded-md shadow-lg\"\u003e\n      \u003csvg class=\"h-6 w-6 text-white\" xmlns=\"http://www.w3.org/2000/svg\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" aria-hidden=\"true\"\u003e\u003c!-- ... --\u003e\u003c/svg\u003e\n    \u003c/span\u003e\n  \u003c/div\u003e\n  \u003ch3 class=\"text-slate-900 dark:text-white mt-5 text-base font-medium tracking-tight\"\u003eWrites Upside-Down\u003c/h3\u003e\n  \u003cp class=\"text-slate-500 dark:text-slate-400 mt-2 text-sm\"\u003e\n    The Zero Gravity Pen can be used to write in any orientation, including upside-down. It even works in outer space.\n  \u003c/p\u003e\n\u003c/div\u003e\n```\n\n使用 `dark:` 来声明在主题为夜间时的样式，可以配置为自动识别系统样式或者是可控的切换模式，切换为夜间模式后，会在 html 根元素上添加类 `dark`：\n\n\n![image.png](/img/posts/2024-1-25/2024-1-25-9.png)\n\n这样，Tailwind 就能识别并修改渲染样式了：\n\n![image.png](/img/posts/2024-1-25/2024-1-25-10.png)\n\n\u003e 这种切换方式，本质上还是类名切换模式，只是使用框架更加方便快捷，支持的生态也更好\n\n\u003e 详细的 Tailwindcss 的使用，可以见 [小肚带您 Tailwind CSS 快速入门](https://juejin.cn/post/7301910992312549376)\n\n优势：\n\n- 大势所趋，前景广阔\n- 易于管理和维护，使得定制主题变得随心所欲\n- 代码冗余小\n- 更好的性能与可扩展性\n\n不足：\n\n- 框架本身可能会与已有项目架构冲突\n- 框架约束了可定制的灵活性\n- 学习成本较高\n- 需要有额外的维护版本升级工作"])</script><script>self.__next_f.push([1,"15:T5d7,## CSS-IN-JS\n\n使用过 React 的朋友应该听说过 emotion，他的设计理念是 `All styles in Js`，我之前讲过的 UI组件库 就用的是这个：[手把手搭建基于React的前端UI库 （二）-- 主题配置](https://juejin.cn/post/7076652936331280421).\n\n他与 Antd 的实现理念一致，也是维护一个 `ThemeProvider` 来完成可配置的主题设置：\n\n```js\nimport { ThemeProvider as EThemeProvider } from 'emotion-theming';\n\nrender() {\n    const { theme: _theme, ...rest } = this.props;\n    const { theme } = this.state;\n    return \u003cEThemeProvider theme={theme} {...rest} /\u003e;\n}\n```\n\n\u003e Antd 是切换后使用不同的 css 文件，emotion 是切换后使用不同的样式 js，本质上没有区别\n\n上面的 theme 主题可以使用一个 `designTokens.ts` 配置各种尺寸，颜色等：\n\n\n![image.png](/img/posts/2024-1-25/2024-1-25-8.png)\n\n然后将文件导出后，全局来访问：\n\n```js\nmport { useTheme } from 'emotion-theming';\n\nimport { defaultTheme } from '../../style';\n\nconst useDesignTokens = () =\u003e {\n  // 拿到Themeprovider的theme\n  const theme = useTheme();\n  if (!Object.keys(theme).length) return defaultTheme.designTokens;\n  return theme.designTokens;\n};\n\nexport default useDesignTokens;\n```\n\n优点：\n\n- 不会存在 css 加载部署的问题，适合微前端这种需要隔离样式的场景\n- ...\\[Antd 方案优点]\n\n缺点：\n\n- 学习曲线比较高\n- 增加了运行时的开销和打包体积\n- 源码可读性可能会变差16:T573d,"])</script><script>self.__next_f.push([1,"随着 Nextjs 13+ 的推出，官方推出了一种很新的路由模式，叫 [App Router](https://nextjs.org/docs/app) 的，今天来看看这玩意怎么使用吧。\n\n他不同于之前的 pages 路由机制，而是以 app 文件夹为根目录，以 page.tsx（jsx） 为入口，以 layout.tsx (jsx) 为布局组件，参数获取不一样了，同时也引入了不少新的API。\n\nP.S. 新东西层出不穷，真的学不动了啊...\n\n![不敢吭声.jpeg](/img/posts/2024-1-19/2024-1-19-1.png)\n\n\u003e Node \u003e= v18.17\n\n\u003e 以后官方的更新方向全在 next 和 turbopack 了，所以传统的 create-react-app 和 react-router 渐渐被抛弃，如果将来 react-router 官方也不更新了，不知道 vite 将来要怎么支持 react 的创建？\n\n----\n\n## 0. 创建项目\n\n执行指令：\n\n```shell\nnpx create-next-app nextjs-app-router-test\n```\n\n最新的 CLI 会有很多提示选项，我们是 App router 的讲解，其他无关的选项关掉即可：\n\n```\n✔ Would you like to use TypeScript? … [No] / Yes  // 传统 js\n✔ Would you like to use ESLint? … [No] / Yes\n✔ Would you like to use Tailwind CSS? … [No] / Yes  // 不使用 css 框架，就会生成 css module 文件，比如 page.module.css\n✔ Would you like to use `src/` directory? … [No] / Yes // 扁平化管理\n✔ Would you like to use App Router? (recommended) … No / [Yes] // 开启 App Router\n✔ Would you like to customize the default import alias (@/*)? … No / [Yes]\n✔ What import alias would you like configured? … [@]/*\n```\n\n生成后，工程目录主要文件如下：\n\n```shell\n./app\n├── favicon.ico\n├── globals.css\n├── layout.js\n├── page.js\n└── page.module.css\n./public\n├── next.svg\n└── vercel.svg\nnext.config.js \npackage.json\n```\n\n我们安装依赖后启动项目：\n\n![image.png](/img/posts/2024-1-19/2024-1-19-2.png)\n\n## 1. 路由\n\n### 路由结构\n\n我们修改一下 page.js:\n\n```js\nimport styles from './page.module.css'\n\nexport default function Home() {\n  return (\n    \u003cmain className={styles.main}\u003e\n      Home\n    \u003c/main\u003e\n  )\n}\n```\n\n![image.png](/img/posts/2024-1-19/2024-1-19-3.png)\n\n而 layout.js 组件：\n\n```js\nexport default function RootLayout({ children }) {\n  return (\n    \u003chtml lang=\"en\"\u003e\n      \u003cbody className={inter.className}\u003e{children}\u003c/body\u003e\n    \u003c/html\u003e\n  )\n}\n```\n\n可以看到他是项目的主体结构，他传入的 children 是 page.js 中的内容。\n\n以上便是 App Router 的主体结构了 （app 目录 + page.js + layout.js）。可以对比 pages 路由（pages 目录 + _app.js + _document.js）.\n\n此外还有一个 public 目录，它里边的文件是可以被使用 `/` 直接引用的。\n\napp 文件夹中可以创建子文件夹用于区分子路由，在app顶层的文件就表示跟路由文件。每个项目文件夹单元可以包含的文件如下：\n\n\n|       文件名        |          可选的后缀           |           功能                   |\n| ------------------- | ------------------- | ---------------------------- |\n| [`layout`](https://nextjs.org/docs/app/api-reference/file-conventions/layout)                     | `.js` `.jsx` `.tsx` | 布局的顶层组件                       |\n| [`page`](https://nextjs.org/docs/app/api-reference/file-conventions/page)                         | `.js` `.jsx` `.tsx` | 页面主体                         |\n| [`loading`](https://nextjs.org/docs/app/api-reference/file-conventions/loading)                   | `.js` `.jsx` `.tsx` | 页面加载时的 loading                   |\n| [`not-found`](https://nextjs.org/docs/app/api-reference/file-conventions/not-found)               | `.js` `.jsx` `.tsx` | 页面 404 时显示，仅在顶层生效            |\n| [`error`](https://nextjs.org/docs/app/api-reference/file-conventions/error)                       | `.js` `.jsx` `.tsx` | 页面错误时显示，仅在顶层生效              |\n| [`global-error`](https://nextjs.org/docs/app/api-reference/file-conventions/error#global-errorjs) | `.js` `.jsx` `.tsx` | 全局错误时显示，仅在顶层生效             |\n| [`route`](https://nextjs.org/docs/app/api-reference/file-conventions/route)                       | `.js` `.ts`         | API 请求定制文件                 |\n| [`template`](https://nextjs.org/docs/app/api-reference/file-conventions/template)                 | `.js` `.jsx` `.tsx` | 重渲染时定制 layout           |\n| [`default`](https://nextjs.org/docs/app/api-reference/file-conventions/default)                   | `.js` `.jsx` `.tsx` | 平行路由回落页面（官方文档还在补充中。。。）|\n\n\u003e 如果某一级目录下没有 layout 和 page，则不会被认为是一个正确的路由结构\n\n从 app 文件夹开始往下，遵从目录路由结构：\n\n\n![image.png](/img/posts/2024-1-19/2024-1-19-4.png)\n\n比如我在 app 下新建 dashboard 目录，在下边写上自己的 layout.js 和 page.js 文件们就可以这样访问：`http://localhost:3000/dashboard` （`\u003cLink href=\"/dashboard\"\u003eDashboard\u003c/Link\u003e`）。此时目录结构可能是这个样子的：\n\n\n![image.png](/img/posts/2024-1-19/2024-1-19-5.png)\n\n我们也可以使用 template.js 来作为中间层，它介于 layout.js 和其孩子组件之间：\n\n```js\n// dashboard/template.js\nimport React from 'react'\n\nexport default function template({ children }) {\n  return (\n    \u003cdiv\u003e\n      接收来自 page.js 的数据：\n      {children}\n    \u003c/div\u003e\n  )\n}\n```\n\n然后页面显示：\n\n![image.png](/img/posts/2024-1-19/2024-1-19-6.png)\n\ntemplate 可用于页面布局，拆分页面功能等。\n\n### 路由组\n\n有时候我们想用一个大的文件夹管理分组文件，但是又不想 nextsjs 将其识别为路由，那么可以将文件夹用小括号包裹：\n\n\n![image.png](/img/posts/2024-1-19/2024-1-19-7.png)\n\n此时就可以这样访问了：`http://localhost:3000/about`。\n\n\u003e 需注意，有多个路由组时，内部的二级目录，比如 about 不能重名，不然会识别错误。\n\n当然了，各个路由组顶层也可以有自己的 layout.js ，或者各个二级路由（比如 about 文件夹）下分别放置自己的 layout.js 也可以。\n\n### 动态路由\n\n\u003e 仅在服务端组件使用\n\n可以将文件夹名称用中括号括起来表示动态路由：\n\n```shell\n./app/posts\n└── [id]\n    └── page.js\n```\n\n其中 page.js:\n\n```js\nexport default function Post({ params }) {\n  return (\n    \u003cdiv\u003ePost: {params.id}\u003c/div\u003e\n  )\n}\n```\n\n此时可通过路由 `http://localhost:3000/posts/1` 来访问:\n\n\n![image.png](/img/posts/2024-1-19/2024-1-19-8.png)\n\n当然了，参数不是只能传递一级参数，我们如果这样定义文件夹：`[...ids]`：\n\n```shell\n./app/posts\n└── [...ids]\n    └── page.js\n```\n\n此时访问：`http://localhost:3000/posts/12/56`，此时在服务端可打印拿到的参数：\n\n```js\n{ params: { ids: [ '12', '56' ] }, searchParams: {} }\n```\n\n上面的写法还有一种变体：`[[...ids]]`，使用双括号和单括号的功能是一样的，识别的基本没有差别，唯一的不同是，使用双括号可以识别不带参数的路径：`http://localhost:3000/posts`，而单括号的配置就 404 了。\n\n### 平行路由\n\n平行路由的文件夹以 `@` 开头，其默认也不会生成在路由中，不能直接访问。\n\n\n比如我们有两个文件夹：`@dashboard` 和 `@login` ，一个表示登录后的欢迎界面，一个表示没有权限时的登录页面：\n\n\n![image.png](/img/posts/2024-1-19/2024-1-19-9.png)\n\n\n我们重写一下 `app/layout.js`:\n\n```js\nimport { getUser } from '@/lib/auth'\n \nexport default function Layout({ dashboard, login }) {\n  const isLoggedIn = getUser()\n  return isLoggedIn ? dashboard : login\n}\n```\n\ngetUser 是获取当前用户的，这里忽略其实现。这样，在根路由下，就可以通过条件语句动态挂载和删除路由组件，当然了，他们也可以同时被渲染在同一个页面上。\n\n### 路由拦截\n\n路由拦截一般针对弹出层，在 nextjs 中，弹出层 modal 也有自己的路由，在弹出层路由下原地刷新页面，不应该再出现模态框，而是直接展示原来弹窗里边的详情，这样的一个url展示两种形态的路由，叫做拦截路由。\n\n路由拦截，是在路由目录命名前面加上小括号表示：\n\n-   `(.)`匹配**同一级别的段**\n-   `(..)`匹配**上一级的段**\n-   `(..)(..)`匹配**上面两级的段**\n-   `(...)`匹配**根** `app`目录中的段\n\n我们举例来说明。\n\n\n![image.png](/img/posts/2024-1-19/2024-1-19-10.png)\n\n上面的图片中，photo目录下放置的是路由 `photo/id` 要展示的图片详情内容，`@modal` 目录用于将 photo 目录拦截并包裹在一个模态框中。这里 `(..)`会从 `@modal` 上一级目录导入同级目录中去找 `photo` 目录来匹配。\n\n此时，当通过 ```\u003cLink key={id} href={`/photos/${id}`}\u003e``` 来访问目录时，就会出现主页面上弹出的模态框。\n\n在列表页点击 link 访问：\n\n\n![image.png](/img/posts/2024-1-19/2024-1-19-11.png)\n\n直接通过 url 访问：\n\n\n![image.png](/img/posts/2024-1-19/2024-1-19-12.png)\n\ndemo 地址：[路由拦截](https://github.com/vercel-labs/nextgram/tree/main)\n\n### 路由处理程序 （API路由）\n\n每一套路由，包括根路由，都是可以配有一个 `route.js` (ts) 文件用于自定义处理数据和路由返回内容的。我们看一下如下的路由目录：\n\n```shell\n./posts\n└── [...ids]\n    ├── page.js\n    └── route.js\n```\n\n在 route.js 中我们写入：\n\n```js\nexport async function GET(\n  request,\n  params\n) {\n  const ids = params.params.ids;\n  console.log(ids)\n\n  return new Response('Hello, Next.js!', {\n    status: 200,\n    headers: { 'Set-Cookie': `token=${ids}` },\n  })\n}\n```\n\n可以看到，他接受了路由参数 ids，并且根据自定义的逻辑返回了页面响应。页面访问 `http://localhost:3000/posts/111/122` 查看效果：\n\n\n![image.png](/img/posts/2024-1-19/2024-1-19-13.png)\n\n自定义的 cookie 设置进去了。\n\n### 路由中间件\n\n在项目目录中放置文件 `middleware.ts`（或 .js）来定义中间件。放置目录与`pages`或`app`同级，或在内部`src` 顶层（如果有 src），nextjs 会自动识别中间件文件，并在内容缓存和路由切换之前执行该文件。\n\n举一个我在项目中配置 i18n 的例子：\n\n```js\n// src/middleware.js\nexport function middleware(req) {\n  let lng\n  if (req.cookies.has(cookieName)) {\n    lng = acceptLanguage.get(req.cookies.get(cookieName).value)\n    console.log('Cookie language:', lng)\n  }\n  if (!lng) {\n    lng = acceptLanguage.get(req.headers.get('Accept-Language'))\n    console.log('Accept-Language:', lng)\n  }\n  if (!lng || !languages.includes(lng)) lng = fallbackLng\n\n  // Redirect if lng in path is not supported\n  if (\n    !languages.some(loc =\u003e req.nextUrl.pathname.startsWith(`/${loc}`)) \u0026\u0026\n    !req.nextUrl.pathname.startsWith('/_next')\n  ) {\n    return NextResponse.redirect(new URL(`/${lng}${req.nextUrl.pathname}`, req.url))\n  }\n\n  return NextResponse.next()\n}\n```\n\n上面的代码，拦截请求 req，判断请求的 cookie 里有没有语言的配置，如果没有就使用 Accept-Language 获取浏览器推荐的语言，如果还没有就使用回落兜底方案；最后使用 `NextResponse.redirect` 重定向到对应的语言路径。\n\n## 2. 数据获取方式\n\nNext.js 也可以请求第三方的服务来获取数据。\n\n### 服务端\n\n服务端组件中，官方推荐使用 fetch：\n\n```js\n// page.js\nasync function getData() {\n  const res = await fetch('https://api.example.com/...')\n  // The return value is *not* serialized\n  // You can return Date, Map, Set, etc.\n \n  if (!res.ok) {\n    // This will activate the closest `error.js` Error Boundary\n    throw new Error('Failed to fetch data')\n  }\n \n  return res.json()\n}\n \nexport default async function Page() {\n  const data = await getData()\n  console.log(data)\n  return \u003cmain\u003e\u003c/main\u003e\n}\n```\n此外，fetch 可以使用 `{ cache: 'force-cache' }` 来缓存数据。\n\n### 客户端\n\n要声明一个组件是客户端组件，需要这样写:\n\n```js\n'use client'\n \nexport default function ClientComponent({ updateItem }) {\n  return \u003cform action={updateItem}\u003e{/* ... */}\u003c/form\u003e\n}\n```\n\n客户端组件就跟平常的 react 开发一样，可以使用 React 的各种状态 Hook 和 第三方工具（比如 axios）来处理数据。\n\n客户端我们还可以请求前面的 API 路由来获取数据，API 路由中可以是服务端调用第三方接口请求的数据。\n\n## 3. 服务端渲染与客户端渲染\n\n### 服务端策略\n\n- 默认为静态渲染\n\n路由和服务端数据在 build 时同步获取，结果会存在服务端，支持缓存 CDN 中，此时就是标准的后端直出的静态页面。\n\n- 动态渲染\n\n路由在每次访问时动态获取页面数据，适用于一些需要展示实时数据的场景（比如 cookies、url params等）。\n\n如果页面中有动态函数或者未被缓存的数据，则自动转换为动态页面渲染：\n\nDynamic Functions | Data       | Route                |\n| ----------------- | ---------- | -------------------- |\n| No                | Cached     | Statically Rendered  |\n| Yes               | Cached     | Dynamically Rendered |\n| No                | Not Cached | Dynamically Rendered |\n| Yes               | Not Cached | Dynamically Rendered|\n\n关于动态函数，指的是只有在请求后才知道返回结果的函数，动态函数必须是内置的，因为 fetch 会被缓存：\n\n```js\nimport { cookies } from 'next/headers'\nimport { headers } from 'next/headers'\n```\n\n- 流式加载\n\n渐进式的 UI 渲染策略，可以通过 loading.js 文件，或者使用 `React.Suspense` 来开启。默认情况下，流式加载内置于 Next.js App Router 中，助于提高初始页面加载性能，比如加载哪些 依赖于较慢数据获取（会阻止渲染整个路由）的 UI（产品页面上的评论等）:\n\n```js\n// page.js\nimport { Suspense } from 'react'\nimport { PostFeed, Weather } from './Components'\n \nexport default function Posts() {\n  return (\n    \u003csection\u003e\n      \u003cSuspense fallback={\u003cp\u003eLoading feed...\u003c/p\u003e}\u003e\n        \u003cPostFeed /\u003e\n      \u003c/Suspense\u003e\n      \u003cSuspense fallback={\u003cp\u003eLoading weather...\u003c/p\u003e}\u003e\n        \u003cWeather /\u003e\n      \u003c/Suspense\u003e\n    \u003c/section\u003e\n  )\n}\n```\n\n### 客户端策略\n\n客户端组件在 build 时不参与获取数据和预渲染，他在客户浏览器运行时才开始执行并渲染数据。客户端组件可以使用状态、效果和事件侦听器，往往用于交互相对复杂的场景。\n\n在需要客户端渲染的代码片段顶层写上：`\"use client\"` 便可以声明客户端组件：\n\n```js\n'use client'\n \nimport { useState } from 'react'\n \nexport default function Counter() {\n  const [count, setCount] = useState(0)\n \n  return (\n    \u003cdiv\u003e\n      \u003cp\u003eYou clicked {count} times\u003c/p\u003e\n      \u003cbutton onClick={() =\u003e setCount(count + 1)}\u003eClick me\u003c/button\u003e\n    \u003c/div\u003e\n  )\n}\n```\n\nNext.js 渲染的策略是：在用户客户端拉取服务端组件代码和客户端组件代码，先渲染出无交互的页面信息，完成初始页面加载，之后使用客户端水合技术，更新 DOM 树，植入交互信息和事件监听。\n\n\n## 4. 关于缓存\n\n### 请求缓存\n\n为了不用每次都调用接口获取重复的数据，Next.js 扩展了 fetch API 去自动缓存请求数据，缓存命中策略是：`相同的 url、协议和请求体`。\n\n\n![image.png](/img/posts/2024-1-19/2024-1-19-14.png)\n\n在需要数据的地方，可以放心的直接使用 fetch 即可，Next.js 会进行兜底的。缓存策略工作流程如下：\n\n1. 在一个 route 加载时，第一次请求，不进行缓存\n2. 第二次请求，如果满足我们上面说的条件，则命中缓存，这次请求返回数据就从缓存中取\n3. 一旦 route 重渲染了，缓存则会清除，那么调用就会发起 API 请求了。\n\n如果不想缓存这个请求，可以这样写：\n\n```js\nconst { signal } = new AbortController()\nfetch(url, { signal })\n```\n\n### 数据的缓存\n\n**数据缓存和请求记忆之间的差异**\n\n官方解释：\n\n数据缓存在传入请求和部署中是持久的，而请求缓存的生命周期仅持续在请求过程中。\n\n通过请求缓存，可以避免重复请求缓存服务器、CDN等的数量。而通过数据缓存，我们减少了对原始数据源发出的请求数量。\n\n僵尸栽花，具体的区别我也理解不深，为啥要做两层~~ 😓\n\n我们看图：\n\n\n![image.png](/img/posts/2024-1-19/2024-1-19-15.png)\n\n请求缓存是在数据缓存前边的，请求缓存没有命中，才会去找数据缓存，还没有命中才会去请求原始数据源。\n\n我们可以这样请求：\n\n```js\nfetch('https://...', { next: { revalidate: 3600 } })\n```\n\n表示 3600 秒之内，数据是缓存有效的。3600 秒之后会自动重新验证，若没有变化则还是用缓存。\n\n我们还可以禁用缓存:\n\n```js\nfetch(`https://...`, { cache: 'no-store' })\n```\n\n### 小结\n\n我们来看一下全路由缓存的流程图：\n\n\n![image.png](/img/posts/2024-1-19/2024-1-19-16.png)\n\n1. 运行时，客户端的路由缓存，比如 Suspense.\n2. 编译时，路由已经确定，请求的路由如果命中缓存，则直接返回。\n3. 编译时，API 请求已经确定，请求的 API 如果命中缓存，则直接返回结果，不必再次发起对数据缓存的请求。\n4. 编译时，非动态 API 返回的结果已经确定，如果请求相同的数据，且缓存不过期，则使用缓存结果，不向元数据请求。\n\n## 5. 关于样式 \n\n可以使用 css 模块：\n\n```js\nimport styles from './styles.module.css'\n \nexport default function DashboardLayout({\n  children,\n}: {\n  children: React.ReactNode\n}) {\n  return \u003csection className={styles.dashboard}\u003e{children}\u003c/section\u003e\n}\n```\n\n也可以使用 CSS-in-JS，比如 emotion 等，当然一些预处理器，比如 sass、less 也可以使用，不过要在配置里增加配置项：\n\n```js\nconst path = require('path')\n \nmodule.exports = {\n  sassOptions: {\n    includePaths: [path.join(__dirname, 'styles')],\n  },\n}\n```\n\n当然，对于企业级大型应用，还是推荐使用 Tailwindcss，下一期讲实战会讲解。\n\n\n## 6. SEO 配置\n\n\n### meta \n\n在各个 page.js 文件中，都可以配置当前页面对应的 meta 信息：\n\n```js\nimport { Metadata } from 'next'\n\n// 使用 静态 meta\nexport const metadata: Metadata = {\n  title: '...',\n}\n \n// 使用 动态 meta\nexport async function generateMetadata({ params }) {\n  return {\n    title: '...',\n  }\n}\n\nexport default function Page() { return '...'}\n```\n当然你也可以直接在 layout 中写入。\n\n### sitemap\n\n推荐安装 `next-sitemap` 库，使用时只需要在 package.json 中写入指令即可：`\"postbuild\": \"next-sitemap\"`，这样在打包后就会在 public 文件夹生成 robots.txt 和 sitemap.xml 文件。当然了，如果你想自定义配置，可在根目录创建一个配置文件 `next-sitemap.config`:\n\n```js\n/** @type {import('next-sitemap').IConfig} */\nmodule.exports = {\n  siteUrl: process.env.SITE_URL || \"https://xxx.com\",\n  generateIndexSitemap: false,\n  generateRobotsTxt: true,\n  robotsTxtOptions: {\n    policies: [{ userAgent: '*', allow: '/' }],\n  },\n};\n```\n\n## 7. 附录：Next.js 13+ 新功能一览\n\n### React 服务器组件 （RSC）\n\nRSCs 允许在客户端和服务器上采用更精细的渲染方式。React 允许开发者选择组件是在服务器上还是在客户端渲染，而不是在用户请求时被迫决定在客户端还是服务器上渲染整个页面。这可以让你在搜索引擎结果页面中获得巨大优势。\n\n### Streaming UI\n\n流式 UI（Streaming UI）代码块是一个新兴的设计模式，称为`岛屿架构（the island architecture）`，旨在首次加载时尽量向客户端发送最少的代码。\n\n其实现目标是：向客户端发送一个无需 JavaScript 的完全渲染的页面，然后再发送剩余的内容。\n\n当 Next.js 在服务器端渲染页面时，通常会将页面的所有 JavaScript 捆绑并与之一起发送。而流式 UI 代码块的引入消除了这种需要，允许向客户端发送一个非常小的静态页面，显著改善了诸如首次内容呈现时间和整体页面速度等指标。\n\n流式 UI 的步骤大致如下：\n\n-   用户发起初始请求\n-   渲染并发送基本的 HTML 页面给客户端\n-   服务器准备 JavaScript 捆绑文件\n-   在客户端浏览器中显示需要 JavaScript 的页面部分\n-   仅将该组件所需的 JavaScript 捆绑文件发送给客户端\n\n### App Router\n\napp 目录下的所有东西都是预先配置好的，以允许 RSCs 和流式 UI 的出现。你只需要创建一个[loading.js](https://beta.nextjs.org/docs/routing/loading-ui)组件，它将完全包住页面组件和 suspense 边界内的任何子节点。\n\n### 升级的 Next Image 组件\n\n利用了浏览器原生支持的懒加载策略，添加了一些对 SEO 有很大帮助的改进：\n\n-   默认需要 alt 标签。\n-   更好的验证，以确定涉及无效属性错误。\n-   由于有了一个更像 HTML 的界面，更容易进行样式设计。\n\n### Font 组件\n\n网页性能中，CLS 是一个重要的指标（CLS 是 Cumulative Layout Shift 的缩写，衡量在网页的整个生命周期内发生的所有意外布局偏移的得分总和。），根据你所使用的框架（比如 Gatsby），让字体有效地预加载可能是很棘手的。一段时间以来，向谷歌等字体库发出外部请求是一个避免不了的行为，在许多 SPA 应用程序中造成了一个难以管理的瓶颈（页面文字会闪烁一下）。\n\nNext Font Component 旨在解决这个问题，它在构建时获取所有的外部字体，并从你自己的域中自我托管它们。字体也被自动优化，并且通过自动利用 CSS **size-adjust（大小调整）**  属性实现了零累积的布局转移。\n\n比如这样使用 google 字体：\n\n```js\nimport { Roboto } from 'next/font/google'\n\nconst roboto = Roboto({ weight: '400', subsets: ['latin'], display: 'swap',})\n\n...\n\u003chtml lang=\"en\" className={roboto.className}\u003e \u003cbody\u003e{children}\u003c/body\u003e \u003c/html\u003e\n```\n\n关于新功能 App router 就讲这么多啦，欢迎大家一起讨论交流，一起学习。"])</script><script>self.__next_f.push([1,"17:T1b89,"])</script><script>self.__next_f.push([1,"本节继续，介绍微前端中 js 隔离的方案。前一讲的 iframe 隔离，本质上是利用了 V8 引擎的隔离机制，借助 iframe 实现的；本节说的快照隔离，本质上还是把子应用执行在主应用上下文中，但是对主应用的 winodw 做快照，在子应用卸载的时候恢复快照即可。\n\n![image.png](/img/posts/2024-1-11/2024-1-11-1.png)\n\n[仓库地址：sandbox/snapshot-script 分支](https://github.com/heiheihoho1213/monto-app/tree/sandbox/snapshot-script)\n\n## 2. 主应用服务\n\n我们启动主应用服务：\n\n```js\napp.listen(port.main, host);\n```\n并在主应用里写入接口请求：\n\n```js\napp.post(\"/microapps\", function (req, res) {\n  // 这里可以是管理后台新增菜单后存储到数据库的数据\n  // 从而可以通过管理后台动态配置微应用的菜单\n  res.json([\n    {\n      name: \"micro1\",\n      id: \"micro1\",\n      // 这里暂时以一个入口文件为示例\n      script: `http://${host}:${port.micro}/micro1.js`,\n      style: `http://${host}:${port.micro}/micro1.css`,\n      // 挂载到 window 上的启动函数 window.micro1_mount\n      mount: \"micro1_mount\",\n      // 挂载到 window 上的启动函数 window.micro1_unmount\n      unmount: \"micro1_unmount\",\n      prefetch: true,\n    },\n    {\n      name: \"micro2\",\n      id: \"micro2\",\n      script: `http://${host}:${port.micro}/micro2.js`,\n      style: `http://${host}:${port.micro}/micro2.css`,\n      mount: \"micro2_mount\",\n      unmount: \"micro2_unmount\",\n      prefetch: true,\n    },\n  ]);\n});\n```\n\n### 子应用设置\n\n我们分别在两个子应用中各自配置自己的执行代码，任务设置全局的变量来验证沙箱的隔离效果：\n\n```js\n// micro1.js\nlet root = document.createElement(\"h1\");\nroot.textContent = \"微应用1\";\nroot.id = 'micro1-dom';\nroot.onclick = () =\u003e {\n  console.log(\"微应用1 的 window.a: \", window.a);\n};\ndocument.body.appendChild(root);\n\nwindow.a = 1;\n\n// micro2.js\nlet root = document.createElement(\"h1\");\nroot.textContent = \"微应用2\";\nroot.id = 'micro2-dom';\nroot.onclick = () =\u003e {\n  console.log(\"微应用2 的 window.a: \", window.a);\n};\ndocument.body.appendChild(root);\n\nwindow.a = 2;\n```\n\n## 3. 主应用渲染\n\n我们配置主应用的入口，并设置用于验证的同名全局变量：\n\n```html\n\u003c!-- 主应用导航 --\u003e\n\u003cdiv id=\"nav\"\u003e\u003c/div\u003e\n\n\u003c!-- 主应用内容区 --\u003e\n\u003cdiv id=\"container\"\u003e\u003c/div\u003e\n\n\u003cscript\u003e\n  window.a = 3;\n\u003c/script\u003e\n```\n\n接着在主应用启动的脚本写入沙箱配置。\n\n## 4. 实现沙箱\n\n沙箱的实现步骤可以参见 iframe 沙箱的流程，唯一不同的是 Sandbox 类的实现。\n\n我们实现沙箱类构造函数：\n\n```js\n// 类主要成员变量\n// 微应用 JS 运行之前的主应用 window 快照\nmainWindow = {};\n// 微应用 JS 运行之后的 window 对象（用于理解）\nmicroWindow = {};\n// 微应用失活后和主应用的 window 快照存在差异的属性集合\ndiffPropsMap = {};\n\nconstructor(options) {\n  this.options = options;\n  // 重新包装需要执行的微应用 JS 脚本\n  this.wrapScript = this.createWrapScript();\n}\n\ncreateWrapScript() {\n  // 微应用的代码运行在立即执行的匿名函数中，隔离作用域\n  return `;(function(window){\n    ${this.options.scriptText}\n  })(window)`;\n}\n```\n\n同样是闭包执行脚本，不同的是不再使用 window 的代理了，这里的 window 是主应用 window 的快照，下面会介绍实现。\n\n#### 激活\n\n沙箱创建完成后，就是激活和卸载功能了，先看激活：\n\n```js\nactive() {\n  // 记录微应用 JS 运行之前的主应用 window 快照\n  this.recordMainWindow();\n  // 恢复微应用需要的 window 对象\n  this.recoverMicroWindow();\n  if (this.exec) {\n    return;\n  }\n  this.exec = true;\n  // 执行微应用（注意微应用的 JS 代码只需要被执行一次）\n  this.execWrapScript();\n}\n```\n\n其中 recordMainWindow 用于记录挂载之前主应用的 window 状态：\n\n```js\nrecordMainWindow() {\n  for (const prop in window) {\n    if (window.hasOwnProperty(prop)) {\n      this.mainWindow[prop] = window[prop];\n    }\n  }\n}\n```\n\nrecoverMicroWindow 是恢复上一次挂载子应用时的 window 状态：\n\n```js\nrecoverMicroWindow() {\n  // 如果微应用和主应用的 window 对象存在属性差异\n  // 上一次微应用 window = 主应用 window + 差异属性（在微应用失活前会记录运行过程中涉及到更改的 window 属性值，再次运行之前需要恢复修改的属性值）\n  Object.keys(this.diffPropsMap).forEach((p) =\u003e {\n    // 更改 JS 运行之前的微应用 window 对象，注意微应用本质上共享了主应用的 window 对象，因此一个时刻只能运行一个微应用\n    window[p] = this.diffPropsMap[p];\n  });\n\n  this.microWindow = window;\n}\n```\n\n然后就是执行 脚本 了：\n\n```js\nexecWrapScript() {\n  // 在全局作用域内执行微应用代码\n  (0, eval)(this.wrapScript);\n}\n```\n\n(0, eval) 是一个逗号表达式，其返回最右边的值，等价于 eval，之所以这么写，是因为逗号表达式之后返回的是一个对 eval 的间接调用，而间接调用计算出来的是一个值，而不是引用，相当于把这个函数单独声明出来再执行。\n\n上面的代码 (0, eval)(this.wrapScript)，相当于改变了 eval 执行对象为 wrapScript，改变了内部执行的 this 指针。\n\n#### 失效\n\n我们再来看看解除激活状态的实现。\n\n```js\ninactive() {\n  // 清空上一次记录的属性差异\n  this.diffPropsMap = {};\n  // 记录微应用运行后和主应用 Window 快照存在的差异属性\n  this.recordDiffPropsMap();\n  console.log(\n    `${this.options.appId} diffPropsMap: `,\n    this.diffPropsMap\n  );\n}\n```\n\n其中 recordDiffPropsMap：\n\n```js\nrecordDiffPropsMap() {\n  // 这里的 microWindow 是微应用失活之前的 window（在微应用执行期间修改过 window 属性的 window）\n  for (const prop in this.microWindow) {\n    // 如果微应用运行期间存在和主应用快照不一样的属性值\n    if (\n      window.hasOwnProperty(prop) \u0026\u0026\n      this.microWindow[prop] !== this.mainWindow[prop]\n    ) {\n      // 记录微应用运行期间修改或者新增的差异属性（下一次运行微应用之前可用于恢复微应用这一次运行的 window 属性）\n      this.diffPropsMap[prop] = this.microWindow[prop];\n      // 恢复主应用的 window 属性值\n      window[prop] = this.mainWindow[prop];\n    }\n  }\n}\n```\n\n大致流程就是记录一下与原来 window 的差异，然后恢复原来记录的主应用的 window。\n\n我们将上面的设计思路总结如下：\n\n![image.png](/img/posts/2024-1-11/2024-1-11-2.png)\n\n其余类的实现与 iframe 隔离一致，可以参见：[iframe sandbox](/posts/monto-app-sandbox-webcomponents-iframe)\n\n## 5. 小结\n\n本隔离方式实际是动态 script 的变种，没有创建 script 标签，而是直接在 window 快照中执行微应用的 js，缺点很明显：\n\n- 不能同时加载多个子应用\n- 无法处理主子应用同时操作 window 产生冲突的问题"])</script><script>self.__next_f.push([1,"18:T386d,"])</script><script>self.__next_f.push([1,"本节开始，介绍微前端中 js 隔离的方案。\n\n## 1. iframe沙箱原理\n\niframe 之所以支持 js 隔离，是因为在 V8 引擎里，每一个 iframe 都相当于开了一个新的 Isolate 对象，所以就相当于间接使用了 V8 隔离，他们是不同的 V8 上下文。\n\n本文结合之前的 Web Components 加载方案和 iframe 天然沙箱，来实现一个隔离的方案。使用 iframe 的最主要的问题如下：\n\n- 主子路由不统一\n- 弹出层不会自动居中\n- 数据状态同步问题\n\n我们这里先解决第一个问题，将主应用的 history 对象代理一下传递给子应用：\n\n![image.png](/img/posts/2024-1-10/2024-1-10-1.png)\n\n[仓库地址：sandbox/web-components-proxy 分支](https://github.com/heiheihoho1213/monto-app/tree/sandbox/web-components-proxy)\n\n我们实现的步骤如下：\n\n1. 改造子应用入口，声明自己的定制元素信息\n2. 主应用启动时，获取子应用信息\n3. 创建 iframe 元素\n4. iframe中子应用挂载时，将主应用的 window 代理后传递给子应用\n5. 子应用开始渲染，执行自己的 js，并挂载自己的定制化元素\n6. 子应用卸载时，设置 display 为 none 即可，js 不用删除\n\n#### 改造子应用\n\n```js\n// 测试代码：全局变量的污染情况\nthis.a = 'a';\nconsole.log('微应用1 a: ', a);\n\nvar b = 'b';\nconsole.log('微应用1 b: ', window.b);\n\nwindow.c = 'c';\nconsole.log('微应用1 c: ', window.c);\n\nlet root = document.createElement(\"button\");\nroot.textContent = \"微应用 1 更改 history 为 micro1\";\ndocument.body.appendChild(root);\n\nroot.onclick = () =\u003e {\n  // 这里来说明 history 用的是主应用来的代理\n  history.pushState({}, '', '/micro1');\n}\n// end：测试代码\n\nclass MicroApp1Element extends HTMLElement {\n  constructor() {\n    super();\n  }\n\n  connectedCallback() {\n    console.log(`[micro-app-1]：执行 connectedCallback 生命周期回调函数`);\n    this.mount();\n  }\n\n  disconnectedCallback() {\n    console.log(`[micro-app-1]：执行 disconnectedCallback 生命周期回调函数`);\n    // 卸载处理\n    this.unmount();\n  }\n\n  // [生命周期回调函数] 当 custom element 增加. 删除. 修改自身属性时，被调用\n  attributeChangedCallback(attr, oldVal, newVal) {\n    console.log(\n      `[app:${this.name}]：执行 attributeChangedCallback 生命周期回调函数`\n    );\n    if (this[attr] !== newVal) {\n      this[attr] = newVal;\n      this.isConnected \u0026\u0026 this.mount();\n    }\n  }\n\n  mount() {\n    const $micro = document.createElement(\"h1\");\n    $micro.textContent = \"微应用1\";\n    // 将微应用的内容挂载到当前自定义元素下\n    this.appendChild($micro);\n  }\n\n  unmount() {}\n}\n\nwindow.customElements.define(\"micro-app-1\", MicroApp1Element);\n```\n\n在子应用里定义了 Web Components 的元素声明，其操作的 document 等对象，都是相对于自己的 iframe 内部而言的。\n\n#### 主应用配置子应用列表信息\n\n首先启动服务器：\n\n```html\n\u003c!-- 主应用导航 --\u003e\n\u003cdiv id=\"nav\"\u003e\u003c/div\u003e\n\n\u003c!-- 主应用内容区 --\u003e\n\u003cdiv id=\"container\"\u003e\u003c/div\u003e\n```\n\n```js\napp.use(express.static(path.join(\"public\", \"main\")));\n// ...\napp.listen(port.main, host);\n```\n\n配置请求接口（子应用各自的node服务需要配置跨域，这里略去）：\n\n```js\napp.post(\"/microapps\", function (req, res) {\n  res.json([\n    {\n      name: \"micro1\",\n      id: \"micro1\",\n      // 自定义元素名称\n      customElement: \"micro-app-1\",\n      // 这里暂时以一个入口文件为示例\n      script: `http://${host}:${port.micro}/micro1.js`,\n      style: `http://${host}:${port.micro}/micro1.css`,\n      prefetch: true,\n    },\n    {\n      name: \"micro2\",\n      id: \"micro2\",\n      customElement: \"micro-app-2\",\n      script: `http://${host}:${port.micro}/micro2.js`,\n      style: `http://${host}:${port.micro}/micro2.css`,\n      prefetch: true,\n    },\n  ]);\n});\n```\n\n#### 创建 iframe\n\n我们声明一个 IframeSandbox 类:\n\n```js\n// IframeSandbox\nconstructor(options) {\n  this.options = options;\n  // 创建 iframe 时浏览器会创建新的全局执行上下文，用于隔离主应用的全局执行上下文\n  this.iframe = this.createIframe();\n  this.iframeWindow = this.iframe.contentWindow;\n  // 执行 history 代理\n  this.proxyIframeWindow();\n}\n```\n\n在子应用激活时可以这么写：\n\n```js\nnew IframeSandbox({\n  rootElm: this.rootElm,  // 挂载应用的根节点，这里是 #container\n  scriptText: this.scriptText,\n  url: this.app.script,\n  id: this.app.id,\n  customElement: this.app.customElement\n});\n```\n\n在 IframeSandbox 类里，我们开始构造一个局部的 js sandbox。\n\n首先，使用 src = about:blank 的 iframe 可以保证其与主应用同源：\n\n```js\n// IframeSandbox\ncreateIframe() {\n  const { rootElm, id, url } = this.options;\n  const iframe = window.document.createElement(\"iframe\");\n  const attrs = {\n    src: \"about:blank\",\n    \"app-id\": id,\n    \"app-src\": url,\n    style: \"border:none;width:100%;height:100%;\",\n  };\n  Object.keys(attrs).forEach((name) =\u003e {\n    iframe.setAttribute(name, attrs[name]);\n  });\n  rootElm?.appendChild(iframe);\n  return iframe;\n}\n```\n\u003e app-src 是一种安全策略，指定了只有子应用自己的 url 的资源可以被加载\n\n#### 做 history 代理\n\n由于 history 是在 window 下的，document 也是在 window 下的，我们干脆直接代理主应用的 window 对象：\n\n```js\n// IframeSandbox，在主应用中执行的\nproxyIframeWindow() {\n  this.iframeWindow.proxy = new Proxy(this.iframeWindow, {\n    get: (target, prop) =\u003e {\n      // 只是简单的代理，主子应用路由冲突没有解决\n      // 思考：为了防止 URL 冲突问题，是否也可以形成设计规范，比如主应用采用 History 路由，子应用采用 Hash 路由，从而确保主子应用的路由不会产生冲突的问题\n      if (prop === \"history\" || prop === \"location\" || prop === \"document\") {\n        // 使用主应用 window\n        return window[prop];\n      }\n\n      if (prop === \"window\" || prop === \"self\") {\n        return this.iframeWindow.proxy;\n      }\n\n      // prop 是修正过的指向\n      return this.getTargetValue(target, prop);\n    },\n\n    set: (target, prop, value) =\u003e {\n      target[prop] = value;\n      return true;\n    },\n\n    has: (target, prop) =\u003e !!target[prop],\n  });\n}\n```\n此时，原生的一些 API 会有问题，比如 window.alert 内部的 this 不是指向 iframe 的 window，而是指向被代理后的 proxy，因此在调用 alert 等原生函数会报错 Illegal invocation。\n同类型的方法还有很多，比如 addEventListener. atob 等。\n\n这里的 getTargetValue，用于重新将这些原生 native api 的 this 修正为 iframe 的 window。\n\n我们来看一下实现：\n\n```js\ngetTargetValue(target, prop) {\n  const value = target[prop];\n\n  // 过滤出 window.alert. window.addEventListener 等 API\n  if (\n    typeof value === \"function\" \u0026\u0026\n    !this.isBoundedFunction(value) \u0026\u0026  // 是直接定义的 function，不是 bind 的函数，因为 如果函数已经进行了 bind，那么不应该进行再次的绑定操作\n    !this.isConstructable(value) // 过滤掉构造函数：例如原生的 Object. Array 以及用户自己创建的构造函数等。一些构造函数不需要进行 bind 操作，因为 bind 生成的函数会失去原有函数的属性和 prototype\n  ) {\n    console.log('修正 this: ', prop);\n\n    // 修正 value 的 this 指向为 target\n    const boundValue = Function.prototype.bind.call(value, target);\n    // 重新恢复 value 在 bound 之前的属性和原型（bind 之后会丢失）\n    for (const key in value) {\n      boundValue[key] = value[key];\n    }\n    // 如果原来的函数存在 prototype 属性，而 bound 之后丢失了，那么重新设置回来\n    if (\n      value.hasOwnProperty(\"prototype\") \u0026\u0026\n      !boundValue.hasOwnProperty(\"prototype\")\n    ) {\n      boundValue.prototype = value.prototye;\n    }\n    return boundValue;\n  }\n  return value;\n}\n```\n\n其中两个判断函数如下：\n\n```js\nisBoundedFunction(fn) {\n  return (\n    // 在ES6及之后的版本中，每个函数都有一个 name 属性, 如果函数是通过 function 关键字定义的，那么它的 name 属性值就是这个函数名。但如果函数是通过其他方式（例如使用 Function 构造函数或 Function.prototype.bind 方法）创建的，那么它的 name 属性值可能会被修改或添加前缀 (比如 bound)\n    // 例子：\n    /**\n      let obj = {  \n        x: 10,  \n        getX: function() {  \n          return this.x;  \n        }  \n      };\n        \n      let getXBoundToObj = obj.getX.bind(obj);  \n      console.log(getXBoundToObj.name); // 输出 bound getX\n    */\n    \n    // 被绑定的函数本身没有 prototype\n    fn.name.indexOf(\"bound \") === 0 \u0026\u0026 !fn.hasOwnProperty(\"prototype\")\n  );\n}\n\nisConstructable(fn) {\n  // 可以识别 Object. Array 等原生构造函数，也可以识别用户自己创建的构造函数\n  return (\n    fn.prototype \u0026\u0026\n    // 通常情况下构造函数和类的 prototype.constructor 指向本身\n    fn.prototype.constructor === fn \u0026\u0026\n    // 通常情况下构造函数和类都会存在 prototype.constructor，因此长度大于等於 1\n    // 需要注意普通函数中也会存在 prototype.constructor，\n    // 因此如果 prototype上 有自定义属性或者方法，那么可以判定为类或者构造函数，因此这里的判断是大于 1\n    // 自建函数，比如function Person {}; ，原型链上没有方法的 class 识别. function Person() {} 识别等，其长度 = 1\n    // 注意不要使用 Object.keys 进行判断，Object.keys 无法获取 Object.defineProperty 定义的属性\n    (Object.getOwnPropertyNames(fn.prototype).length \u003e 1\n      || (Object.getOwnPropertyNames(fn.prototype).length === 1 \u0026\u0026 Object.getOwnPropertyNames(fn.prototype)[0] === 'constructor'))\n  );\n  // TODO: 没有 constructor 的构造函数识别\n  // 例如 Person.prototype = {}; 此时没有 prototype.constructor 属性\n}\n```\n\n\n#### 激活与失活函数\n\n接下来在sandbox中定义一下激活子应用的函数：\n\n```js\n// IframeSandbox\nasync active() {\n  this.iframe.style.display = \"block\";\n  // 如果已经通过 Script 加载并执行过 JS，则无需重新加载处理\n  if (this.execScriptFlag) return;\n  this.execScript();\n  this.mount();\n  this.execScriptFlag = true;\n}\n```\n\n其中核心的执行代码和挂载函数如下：\n\n```js\nexecScript() {\n  const scriptElement =\n    this.iframeWindow.document.createElement(\"script\");\n  // 使用匿名执行是为了保证js作用域不会外泄，并且便于使用代理\n  scriptElement.textContent = `\n      (function(window) {\n        with(window) {\n          ${this.options.scriptText}\n        }\n      }).bind(window.proxy)(window.proxy);\n      `;\n  this.iframeWindow.document.head.appendChild(scriptElement);\n}\n\nmount() {\n  if (!this.$webcomponent) {\n    const $slot = this.iframeWindow.document.body;\n    // 创建组件元素\n    this.$webcomponent = this.iframeWindow.document.createElement(\n      this.options.customElement\n    );\n    this.$webcomponent.setAttribute(\"micro-id\", this.options.id);\n    $slot.appendChild(this.$webcomponent);\n  }\n}\n```\n上面的函数中，with 语句用于将形参window的所有属性和方法添加到自己的作用域中，其设计的本意用于缩短查找作用域链。\n\n失活比较简单：\n\n```js\ninactive() {\n  this.iframe.style.display = \"none\";\n}\n```\n\n此外还有沙箱本身的销毁函数，这里也提一下：\n\n```js\n// IframeSandbox 销毁沙箱\ndestroy() {\n  this.options = null;\n  this.exec = false;\n  if (this.iframe) {\n    this.iframe.parentNode?.removeChild(this.iframe);\n  }\n  this.iframe = null;\n}\n```\n\n到这里，沙箱的设计基本完成！\n\n接下来我们按照加载顺序，首先初始化主应用，获取微应用列表：\n\n```js\nasync init() {\n  this.microApps = await this.fetchMicroApps();\n  this.createNav();\n  this.navClickListener();\n  this.hashChangeListener();\n  // 创建微前端管理实例\n  this.microManager = new MicroManager(\n    document.getElementById(\"container\"),\n    this.microApps\n  );\n}\n\n// 从主应用服务器获请求微应用列表信息\nasync fetchMicroApps() {\n  try {\n    const res = await window.fetch(\"/microapps\", {\n      method: \"post\",\n    });\n    return await res.json();\n  } catch (err) {\n    console.error(err);\n  }\n}\n\n...\n// 创建 nav 导航的代码不是核心，略去\n// hash 路由变化的监听事件\nhashChangeListener() {\n  // 监听 Hash 路由的变化，切换微应用（这里设定一个时刻只能切换一个微应用）\n  window.addEventListener(\"hashchange\", () =\u003e {\n    this.microApps?.forEach(async ({ id }) =\u003e {\n      id === window.location.hash.replace(\"#\", \"\")\n        ? this.microManager.activeApp(id)\n        : this.microManager.inactiveApp(id);\n    });\n  });\n}\n```\n\n上面代码提到一个 MicroManager 类，用于管理微前端应用的激活和销毁：\n\n```js\nappsMap = new Map();\n\n// 放入全部的微应用到一个map\nsetAppMaps(apps) {\n  apps.forEach((app) =\u003e {\n    this.appsMap.set(app.id, new MicroAppManager(this.rootElm, app));\n  });\n}\n\n// 激活微应用\nactiveApp(id) {\n  const current = this.appsMap.get(id);\n  current \u0026\u0026 current.active();\n}\n\n// 失活微应用\ninactiveApp(id) {\n  const current = this.appsMap.get(id);\n  current \u0026\u0026 current.inactive();\n}\n```\n\n为了便于理解，上面又单独封装了一个 MicroAppManager 类，用于直接操作沙箱：\n\n```js\n// 获取 JS 文本（微应用服务需要支持跨域请求）\nasync fetchScript(src) {\n  try {\n    const res = await window.fetch(src);\n    return await res.text();\n  } catch (err) {\n    console.error(err);\n  }\n}\n\n// 激活\nasync active() {\n  // 缓存资源处理\n  if (!this.scriptText) {\n    this.scriptText = await this.fetchScript(this.app.script);\n  }\n\n  // 如果没有创建沙箱，则实时创建\n  // 需要注意只给激活的微应用创建 iframe 沙箱，因为创建 iframe 会产生内存损耗\n  if (!this.sandbox) {\n    this.sandbox = new IframeSandbox({\n      rootElm: this.rootElm,\n      scriptText: this.scriptText,\n      url: this.app.script,\n      id: this.app.id,\n      customElement: this.app.customElement\n    });\n  }\n\n  this.sandbox.active();\n}\n\n// 失活\ninactive() {\n  this.sandbox?.inactive();\n}\n```\n\n## 2. demo 测试\n\n![image.png](/img/posts/2024-1-10/2024-1-10-2.png)\n\n## 3. 实战测试\n\n#### 适配 Vue"])</script><script>self.__next_f.push([1,"19:T1dba,"])</script><script>self.__next_f.push([1,"本节继续介绍微前端的另一种方案：动态 script。顾名思义，就是将当前的微应用打包后，将入口的 js 文件通过 script 加载进主应用，从而达到微前端的效果。他可能是目前实现起来最简单的一种方案。\n\n![image.png](/img/posts/2024-1-8/2024-1-8-3.png)\n\n[仓库地址：tutorial/dynamic-script 分支](https://github.com/heiheihoho1213/monto-app/tree/tutorial/dynamic-script)\n\n## 1. 主应用\n\n我们用 node 启动一个主应用:\n\n```js\napp.listen(port.main, host);\n```\n\n并在主应用里写入接口请求：\n\n```js\napp.post(\"/microapps\", function (req, res) {\n  // 这里可以是管理后台新增菜单后存储到数据库的数据\n  // 从而可以通过管理后台动态配置微应用的菜单\n  res.json([\n    {\n      name: \"micro1\",\n      id: \"micro1\",\n      // 这里暂时以一个入口文件为示例\n      script: `http://${host}:${port.micro}/micro1.js`,\n      style: `http://${host}:${port.micro}/micro1.css`,\n      // 挂载到 window 上的启动函数 window.micro1_mount\n      mount: \"micro1_mount\",\n      // 挂载到 window 上的启动函数 window.micro1_unmount\n      unmount: \"micro1_unmount\",\n      prefetch: true,\n    },\n    {\n      name: \"micro2\",\n      id: \"micro2\",\n      script: `http://${host}:${port.micro}/micro2.js`,\n      style: `http://${host}:${port.micro}/micro2.css`,\n      mount: \"micro2_mount\",\n      unmount: \"micro2_unmount\",\n      prefetch: true,\n    },\n  ]);\n});\n```\n\n上面配置的这两个子应用，自己各自单独在自己端口启动即可。（这里公用了一个子应用端口，实际情况可能子应用端口不一样）\n\n\n然后配置主应用的 html，并配置加载功能：\n\n```html\n\u003cdiv class=\"container\"\u003e\n  \u003c!-- 微应用渲染的插槽 --\u003e\n  \u003cdiv id=\"micro-app-slot\"\u003e\u003c/div\u003e\n\u003c/div\u003e\n```\n\n```js\nloadScript({ script, id }) {\n  return new Promise((resolve, reject) =\u003e {\n    const $script = document.createElement(\"script\");\n    $script.src = script;\n    $script.setAttribute(\"micro-script\", id);\n    $script.onload = resolve;\n    $script.onerror = reject;\n    document.body.appendChild($script);\n  });\n}\n\nloadStyle({ style, id }) {\n  return new Promise((resolve, reject) =\u003e {\n    const $style = document.createElement(\"link\");\n    $style.href = style;\n    $style.setAttribute(\"micro-style\", id);\n    $style.rel = \"stylesheet\";\n    $style.onload = resolve;\n    $style.onerror = reject;\n    document.head.appendChild($style);\n  });\n}\n\nremoveStyle({ id }) {\n  const $style = document.querySelector(`[micro-style=${id}]`);\n  $style \u0026\u0026 $style?.parentNode?.removeChild($style);\n}\n\nhasLoadScript({ id }) {\n  const $script = document.querySelector(`[micro-script=${id}]`);\n  return !!$script;\n}\n\nhasLoadStyle({ id }) {\n  const $style = document.querySelector(`[micro-style=${id}]`);\n  return !!$style;\n}\n```\n\n主应用初始化：\n\n```js\ninit() {\n  this.processMicroApps();\n  this.navClickListener();\n  this.hashChangeListener();\n}\n\nprocessMicroApps() {\n  this.getMicroApps().then((res) =\u003e {\n    this.microApps = res;\n    this.prefetchMicroAppStatic();\n    this.createMicroAppNav();\n  });\n}\n\nprefetchMicroAppStatic() {\n  const prefetchMicroApps = this.microApps?.filter(\n    (microapp) =\u003e microapp.prefetch\n  );\n  prefetchMicroApps?.forEach((microApp) =\u003e {\n    microApp.script \u0026\u0026 this.prefetchStatic(microApp.script, \"script\");\n    microApp.style \u0026\u0026 this.prefetchStatic(microApp.style, \"style\");\n  });\n}\n\ncreateMicroAppNav(microApps) {\n  const fragment = new DocumentFragment();\n  this.microApps?.forEach((microApp) =\u003e {\n    // TODO: APP 数据规范检测 (例如是否有 script. mount. unmount 等）\n    const button = document.createElement(\"button\");\n    button.textContent = microApp.name;\n    button.id = microApp.id;\n    fragment.appendChild(button);\n  });\n  nav.appendChild(fragment);\n}\n```\n\n其中 getMicroApps 是服务获取微应用列表信息，主应用姑且使用 hashchange 配置路由检测：\n\n```js\nhashChangeListener() {\n  // 监听 Hash 路由的变化，切换微应用\n  // 这里设定一个时刻页面上只有一个微应用\n  window.addEventListener(\"hashchange\", () =\u003e {\n    this.microApps?.forEach(async (microApp) =\u003e {\n      // 匹配需要激活的微应用\n      if (microApp.id === window.location.hash.replace(\"#\", \"\")) {\n        console.time(`fetch microapp ${microApp.name} static`);\n        // 加载 CSS 样式\n        microApp?.style \u0026\u0026\n          !this.hasLoadStyle(microApp) \u0026\u0026\n          (await this.loadStyle(microApp));\n        // 加载 Script 标签\n        microApp?.script \u0026\u0026\n          !this.hasLoadScript(microApp) \u0026\u0026\n          (await this.loadScript(microApp));\n        console.timeEnd(`fetch microapp ${microApp.name} static`);\n        window?.[microApp.mount]?.(\"#micro-app-slot\");\n        // 如果存在卸载 API 则进行应用卸载处理\n      } else {\n        this.removeStyle(microApp);\n        window?.[microApp.unmount]?.();\n      }\n    });\n  });\n}\n```\n\n\u003e 这里在子应用卸载时没有移除 js，是因为重新加载时顶级作用域会被重新执行，比如 let a = 1; 这样反复声明会报错。\

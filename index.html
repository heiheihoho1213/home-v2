n\u003e 同时，不写 removeScript，js 在 `window` 上挂载了子应用的 `mount` 和 `unmount` 方法也不会造成污染，没必要删除。\n\n## 2. 子应用改造\n\n当然，各个子应用入口文件要改造，暴露钩子函数：\n\n```js\n// micro1.js\n// 立即执行的匿名函数可以防止变量 root 产生冲突\n(function () {\n  let root;\n\n  // 要保证各个子应用名称不一样\n  window.micro1_mount = function (slot) {\n    // 以下其实可以是 React 框架或者 Vue 框架生成的 Document 元素，这里只是做一个简单的示例\n    root = document.createElement(\"h1\");\n    root.textContent = \"微应用1\";\n    // 在微应用插槽上挂载 DOM 元素\n    const $slot = document.querySelector(slot);\n    $slot?.appendChild(root);\n  };\n\n  window.micro1_unmount = function () {\n    if (!root) return;\n    root.parentNode?.removeChild(root);\n  };\n})();\n\n\n// micro1.css\nh1 {\n  color: green;\n}\n```\n\n同时子应用也要启动起来：\n\n```js\napp.listen(port.micro, host);\n```\n这样，script 标签的 src 才能够去找到服务器上子应用的 js 入口文件。\n\n\u003e 本文用了hash路由配置切换，本身有设计缺陷，实战中需要自己设置更完善的路由方案。\n\n基于以上描述，其具有以下优点：\n\n- 主应用可以动态增减. 更新子应用的数量，实现动态部署。\n- 微应用可以如正常应用一样进行优化，如代码分割，静态资源分离，CDN加速等。\n- 不需要如NPM库一样，配置额外的配置文件使其打包成依赖库。\n- 主子应用天然同域（除了加载js时要跨域）\n\n其问题也是与npm方案一样：\n\n- 主应用与微应用的全局变量. CSS样式. 本地存储的数据无法做到很好的隔离。\n- 子应用需要改造适配，同 NPM 方案一样没办法完全解耦合。\n\n与 NPM 方案差异：\n\n- 本方案不用去除 script\n- 本方案的 script 可以做 chunk，而NPM方案只能做到 Tree Shaking。动态 script 分成了多段 chunk，体积更少了，而 NPM 则是全量构建到包里的 （使用 require 自动引入全部包），此时性能优化上应该是有差异的。\n\n\u003e 但是感觉NPM方案，只要放入入口文件，是不是也能做到分chunk？比如这个不使用 require('react-micro-app')，而是使用动态引入：\n\n```js\nimport(\"react-micro-app\").then(chunk =\u003e {})\n```\n\n\u003e 打 chunk 是将懒加载. 公共依赖分离，是 webpack 自动化处理的过程。亲测会报错，目前还不知道可不可行。"])</script><script>self.__next_f.push([1,"1a:T1a00,"])</script><script>self.__next_f.push([1,"本节继续介绍微前端的另一种方案：Web Components。它是根据浏览器原生支持的组件化方案来封装的微应用。其实现方式类似于动态 script 方案，\n\n![image.png](/img/posts/2024-1-8/2024-1-8-4.png)\n\n[仓库地址：tutorial/web-components-cookie 分支](https://github.com/heiheihoho1213/monto-app/tree/tutorial/web-components-cookie)\n\n## 1. 主应用\n\n还是老样子，启动一个node服务：\n\n```js\napp.listen(port.main, host);\n```\n\n然后配置请求微服务列表的接口：\n\n```js\napp.post(\"/microapps\", function (req, res) {\n\n  console.log(\"main cookies: \", req.cookies);\n\n  // 设置一个响应的 Cookie 数据\n  res.cookie(\"main-app\", true);\n\n  // 这里可以是管理后台新增菜单后存储到数据库的数据\n  // 从而可以通过管理后台动态配置微应用的菜单\n  res.json([\n    {\n      name: \"micro1\",\n      id: \"micro1\",\n      // 自定义元素名称\n      customElement: \"micro-app-1\",\n      // 这里暂时以一个入口文件为示例\n      script: `http://${host}:${port.micro}/micro1.js`,\n      style: `http://${host}:${port.micro}/micro1.css`,\n      prefetch: true,\n    },\n    {\n      name: \"micro2\",\n      id: \"micro2\",\n      customElement: \"micro-app-2\",\n      script: `http://${host}:${port.micro}/micro2.js`,\n      style: `http://${host}:${port.micro}/micro2.css`,\n      prefetch: true,\n    },\n  ]);\n});\n```\n\n主应用的 html 页面与 动态 script 基本页面一致，这里只展示不同之处：\n\n```js\nhashChangeListener() {\n  // Web Components 方案\n  // 微应用的插槽\n  const $slot = document.getElementById(\"micro-app-slot\");\n\n  window.addEventListener(\"hashchange\", () =\u003e {\n    this.microApps?.forEach(async (microApp) =\u003e {\n      // Web Components 方案\n      const $webcomponent = document.querySelector(\n        `[micro-id=${microApp.id}]`\n      );\n\n      if (microApp.id === window.location.hash.replace(\"#\", \"\")) {\n        console.time(`fetch microapp ${microApp.name} static`);\n        // 加载 CSS 样式\n        microApp?.style \u0026\u0026\n          !this.hasLoadStyle(microApp) \u0026\u0026\n          (await this.loadStyle(microApp));\n        // 加载 Script 标签\n        microApp?.script \u0026\u0026\n          !this.hasLoadScript(microApp) \u0026\u0026\n          (await this.loadScript(microApp));\n        console.timeEnd(`fetch microapp ${microApp.name} static`);\n\n        // 动态 Script 方案\n        // window?.[microApp.mount]?.(\"#micro-app-slot\");\n\n        // Web Components 方案\n        // 如果没有在 DOM 中添加自定义元素，则先添加处理\n        if (!$webcomponent) {\n          // Web Components 方案\n          // 自定义元素的标签是微应用先定义出来的，然后在服务端的接口里通过 customElement 属性进行约定\n          const $webcomponent = document.createElement(\n            microApp.customElement\n          );\n          $webcomponent.setAttribute(\"micro-id\", microApp.id);\n          $slot.appendChild($webcomponent);\n        // 如果已经存在自定义元素，则进行显示处理\n        } else {\n          $webcomponent.style.display = \"block\";\n        }\n      } else {\n        this.removeStyle(microApp);\n        // 动态 Script 方案\n        // window?.[microApp.unmount]?.();\n\n        // Web Components 方案\n        // 如果已经添加了自定义元素，则隐藏自定义元素\n        if ($webcomponent) {\n          $webcomponent.style.display = \"none\";\n        }\n      }\n    });\n  });\n}\n```\n\n## 2. 子应用改造\n\n子应用也启动一下：\n\n```js\n// 这里捎带手配置子应用 ajax 请求的跨域\napp.use((req, res, next) =\u003e {\n  // 跨域请求中涉及到 Cookie 信息传递，值不能为 *，必须是具体的地址信息\n  res.header(\"Access-Control-Allow-Origin\", `http://你的域名.com:${port.main}`);\n  res.header(\"Access-Control-Allow-Methods\", \"GET, POST, OPTIONS\");\n  res.header(\"Allow\", \"GET, POST, OPTIONS\");\n  // 允许跨域请求时携带 Cookie\n  res.header(\"Access-Control-Allow-Credentials\", true);\n  next();\n});\n\napp.use(\n  express.static(path.join(\"public\", \"micro\"), {\n    etag: true,\n    lastModified: true,\n  })\n);\n\napp.post(\"/cors\", function (req, res) {\n  console.log(\"micro cookies: \", req.cookies);\n\n  // 增加 SameSite 和 Secure 属性，从而使浏览器支持 iframe 子应用的跨站携带 Cookie\n  // 注意 Secure 需要 HTTPS 协议的支持\n  const cookieOptions = { sameSite: \"none\", secure: true };\n\n  // 设置一个响应的 Cookie 数据\n  res.cookie(\"micro-app\", true, cookieOptions);\n  res.json({\n    hello: \"true\",\n  });\n});\n\napp.listen(port.micro, host);\n```\n\n子应用的入口js要改造一下，暴露出来生命周期钩子：\n\n```js\nclass MicroApp2Element extends HTMLElement {\n  constructor() {\n    super();\n  }\n\n  // [生命周期回调函数] 当 custom element 自定义标签首次被插入文档 DOM 时，被调用\n  connectedCallback() {\n    console.log(`[micro-app-2]: 执行 connectedCallback 生命周期回调函数`);\n    // 挂载应用\n    // 相对比动态 Script，组件内部可以自动进行 mount 操作，不需要对外提供手动调用的 mount 函数，从而防止不必要的全局属性冲突\n    this.mount();\n  }\n\n  // [生命周期回调函数] 当 custom element 从文档 DOM 中删除时，被调用\n  disconnectedCallback() {\n    console.log(\n      `[micro-app-2]: 执行 disconnectedCallback 生命周期回调函数`\n    );\n    // 卸载处理\n    this.unmount();\n  }\n\n  mount() {\n    const $micro = document.createElement(\"h1\");\n    $micro.textContent = \"微应用2\";\n    // 将微应用的内容挂载到当前自定义元素下\n    this.appendChild($micro);\n\n    // 新增 Ajax 请求，用于请求 micro1.js 所在的服务\n    // 需要注意 micro1.js 动态加载在主应用 localhost:4000 下，因此请求是跨域的\n    window\n      .fetch(\"http://30.120.112.54:3000/cors\", {\n        method: \"post\",\n        credentials: \"include\"\n      })\n      .then((res) =\u003e res.json())\n      .catch((err) =\u003e {\n        console.error(err);\n      });\n  }\n}\n\nwindow.customElements.define(\"micro-app-2\", MicroApp2Element);\n```\n\n对比于动态Script方案，Web Components方案有以下特点：\n\n- 不需要对外抛出全局API（挂载与卸载），Web Components 天然支持，可复用性更强。\n- 更标准化，Web Components的能力后续会随着w3c标准逐步提升。\n- 也是动态 script 的优点：可以非常便捷的进行移植和组件替换\n\n当然，Web Components还是存在一些不足：\n\n- 兼容性问题。对旧版本浏览器兼容性不好。\n- 有一定上手难度，需要额外学习Web Components相关知识。\n- 子应用是侵入式的"])</script><script>self.__next_f.push([1,"1b:T2106,"])</script><script>self.__next_f.push([1,"本节继续介绍微前端的另一种方案：NPM\n\nNPM 包是微前端设计方案之一，在设计时需要将微应用打包成独立的 NPM 包，然后在主应用中引入和使用。\n\n## 1. 背景知识\n\n我们一般这样在项目中引入 js：\n\n```html\n\u003c!DOCTYPE html\u003e\n\u003chtml lang=\"en\"\u003e\n  \u003chead\u003e\n    \u003cmeta charset=\"UTF-8\"\u003e\n    \u003cmeta http-equiv=\"X-UA-Compatible\" content=\"IE=edge\"\u003e\n    \u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"\u003e\n    \u003ctitle\u003eDocument\u003c/title\u003e\n  \u003c/head\u003e\n  \u003cbody\u003e\n    \u003cscript src=\"a.js\"\u003e\u003c/script\u003e\n    \u003cscript src=\"b.js\"\u003e\u003c/script\u003e\n    \u003cscript src=\"c.js\"\u003e\u003c/script\u003e\n    \u003cscript src=\"d.js\"\u003e\u003c/script\u003e\n  \u003c/body\u003e\n\u003c/html\u003e\n```\n\n如果有第三方依赖，那么需要按照顺序来加载：\n\n```html\n\u003cbody\u003e\n  \u003cscript\u003e\n    // 未加载 lodash 时，无法获取 _ 变量\n    // Uncaught ReferenceError: _ is not defined\n    console.log(_); \n  \u003c/script\u003e\n\n  \u003cscript src=\"https://cdn.bootcdn.net/ajax/libs/lodash.js/4.17.21/lodash.min.js\"\u003e\u003c/script\u003e\n  \n  \u003cscript\u003e\n    // 加载 lodash 之后，可以获取 _ 变量\n    // ƒ Mc(n,t,r){var e=null==n?X:_e(n,t);return e===X?r:e}\n    console.log(_.get); \n  \u003c/script\u003e\n\u003c/body\u003e\n```\n\n但是这样加载有个问题，会造成变量污染：\n\n```html\n\u003cbody\u003e\n  \u003cscript\u003e\n    const _ = 111;\n  \u003c/script\u003e\n  \n  \u003cscript\u003e\n    console.log(_); // 111\n  \u003c/script\u003e\n  \n  \u003cscript src=\"https://cdn.bootcdn.net/ajax/libs/lodash.js/4.17.21/lodash.min.js\"\u003e\u003c/script\u003e\n  \n  \u003cscript\u003e\n    console.log(_); // 111\n    console.log(_.get); // undefined\n  \u003c/script\u003e\n\u003c/body\u003e\n```\n\n## 2. NPM 加载\n\n上面的例子，全局加载的 lodash 就失效了。如果项目很复杂，上述的情况就很不好处理了。为了解决上述问题，JavaScript 开始提供一种将程序拆分为可按需导入的单独模块，我们就使用目前通用的 ESModule 模块来进行拆分。\n\n[仓库地址：tutorial/npm-esmodule 分支](https://github.com/heiheihoho1213/monto-app/tree/tutorial/npm-esmodule)\n\n项目结构：\n\n```shell\n├── public                 # 托管的静态资源目录\n│   ├── custom_modules/    # 自定义模块\n│   │   ├── add.js                         \n│   │   └── conflict.js                                        \n│   ├── node_modules/      # 三方模块\n│   │   └── lodash-es/        \n│   └── index.html         # 应用页面\n└── app.js\n```\n\ncustom_modules 中我们写入几个自定义的依赖方法：\n\n```js\n// add.js\nexport function add(a, b) {\n  return a + b;\n}\n\n// conflict.js\nconst _ = 111;\nconsole.log('conflict.js --\u003e ', _)\n```\n\n我们启动一个本地的 node 服务来访问 js 文件。在 index.html 中写入：\n\n```html\n\u003cscript type=\"importmap\"\u003e\n  {\n    \"imports\": {\n      \"custom_modules/\": \"/custom_modules/\",\n      \"lodash/\": \"/node_modules/lodash-es/\",\n      \"lodash\": \"/node_modules/lodash-es/lodash.js\"\n    }\n  }\n\u003c/script\u003e\n```\n\n\u003e import-maps 存在浏览器兼容性问题，可以找相应的 polyfill 进行兼容性处理。\n\n先声明 npm 包的映射关系。\n\n然后按照模块你引入：\n\n```html\n\u003cscript type=\"module\"\u003e\n  // 自定义模块 - add 函数\n  import { add } from \"custom_modules/add.js\";\n  // 自定义模块 - 防冲撞测试 (_ 变量)\n  import \"custom_modules/conflict.js\";\n  // 三方模块 - 按需引入 lodash\n  import isNull from \"lodash/isNull.js\";\n\n  console.log(isNull);  // Function\n  console.log(add(1, 2)); // 3\n\n  // 在 confilict.js 中声明的 const _ = 111; 不会作用在当前脚本中\n  console.log(_);  // Uncaught ReferenceError: _ is not defined\n\u003c/script\u003e\n```\n\n此时就不会有全局污染了，自己的变量只在自己的npm作用范围内生效，第三方包使用按需加载即可。此时就不用考虑加载顺序了。\n\n![image.png](/img/posts/2024-1-8/2024-1-8-1.png)\n\nESM 加载方式有如下优点：\n\n- 不需要构建工具进行打包处理；\n- 天然按需引入，并且不需要考虑模块的加载顺序；\n- 模块化作用域，不需要考虑变量名冲突问题。\n\n## 3. NPM 微服务方案\n\n应用的构建需要生成 HTML 文件并打包 JS. CSS 以及图片等静态资源，业务组件的构建更多的是打包成应用需要通过模块化方式引入使用的 JavaScript 库。\n\n应用在构建时为了提升构建速度，同时也为了简化构建配置，通常在使用 babel-loader （转译工具）进行转译时 ， 会屏蔽 node_modules 目录下的 NPM 包，因此需要将发布的 NPM 组件转译成大多数浏览器能够兼容的 ES5 标准。\n\n![image.png](/img/posts/2024-1-8/2024-1-8-2.png)\n\nNPM 的微前端设计方案中，各个微应用可以采用不同的技术栈，但是构建时需要像发布业务组件一样输出 ES5 \u0026 模块化标准的 JavaScript 库（尽管开发的是应用，但是构建的不是应用程序，不需要额外生成 HTML），从而使主应用安装各自的依赖时，可以通过模块化的方式引入微应用。主应用不需要关心微应用的技术栈，不需要关心微应用的构建配置项。\n\n我们来看一个 [demo](https://github.com/heiheihoho1213/monto-app/tree/tutorial/npm-micro)\n\n主应用我们假设使用 vue，设置子应用的路由：\n\n```js\nimport ReactApp from \"./React\";\nimport VueApp from \"./Vue\";\nconst router = createBrowserRouter([\n  {\n    path: \"/\",\n    element: \u003cApp /\u003e,\n    children: [\n      {\n        path: \"react\",\n        element: \u003cReactApp /\u003e,\n      },\n      {\n        path: \"vue\",\n        element: \u003cVueApp /\u003e,\n      },\n    ],\n  },\n]);\n```\n\n各个子应用的入口需要改造，我们以 react 为例：\n\n```js\n// package.json 名称：react-micro-app\nlet root;\n\nexport function mount(containerId) {\n  console.log(\"react app mount\");\n  root = ReactDOM.createRoot(document.getElementById(containerId));\n  root.render(\n    \u003cReact.StrictMode\u003e\n      \u003cApp /\u003e\n    \u003c/React.StrictMode\u003e\n  );\n}\n\nexport function unmount() {\n  console.log(\"react app unmount: \", root);\n  root \u0026\u0026 root.unmount();\n}\n```\n\n子应用部署为 npm 并发布后，主应用直接引入（这里使用 lerna）管理：\n\n```js\n// 主应用引入\n// React.js\nconst { mount, unmount } = require(\"react-micro-app\");\nimport React, { useEffect } from \"react\";\n\nconst containerId = 'react-app';\n\nfunction ReactApp() {\n  useEffect(() =\u003e {\n    mount(containerId);\n    return () =\u003e {\n      unmount();\n    };\n  }, []);\n  return \u003cdiv id={containerId}\u003e\u003c/div\u003e;\n}\n\nexport default React.memo(ReactApp);\n```\n如果不想额外引入微应用的 CSS 样式，那么可以将样式内联到 JS 中，当然其它的一些静态资源也需要内联到 JS 中，通过 Webpack 可以进行很好的处理。\n由于需要构建成类似于库包的模块化规范，子应用需要更改 Webpack 的配置 (以 vue 为例)：\n\n```js\nmodule.exports = defineConfig({\n  transpileDependencies: true,\n  // 内联 CSS 样式处理\n  css: { extract: false }\n});\n```\n\n\u003e 思考：有没有方法可以做到主应用引入方式不变的情况下，在开发态引入的是微应用的源码（修改微应用的代码后不需要构建，直接在主应用中会热更新变更），而在生产态引入的是微应用构建后发布的 NPM 包，这种配置在单个业务组件的开发中尤为重要 ?\n\n\u003e 开发时将依赖的应用拉下来到本地，并做关联（比如 lerna）后启动开发应用。启动器中检测本地有就使用本地，没有就使用 npm 下载使用？\n\nNPM 方案优点：\n\n- 可以按照 UMD. CommonJS 或者 ESM 等不同规范进行引入，不同依赖库间也没有强依赖\n- 不需要单独的服务器进行部署以及资源托管，只需要发布到npm仓库即可。\n- 复用性好，可以任意组合成不同的微前端系统。\n- 可以共享同一个渲染进程，天然共享 window，上下文及内存数据。\n- 主子应用天然同域\n\n\n缺点：\n\n- 主应用需要一个带路由的框架，无法做到技术无关。\n- 无法处理主子应用样式冲突\n- 微应用的构建需要做额外的配置，因为构建的不是应用，而是依赖库。\n- 微应用发布新版本后，主应用都需要重新安装并构建部署，无法做到子应用独立启动和部署。\n- 依赖 webpack 等打包工具\n- 当微应用过多，还需要考虑体积过大的优化问题，比如公共框架抽离，代码分割等。\n- 子应用无法独立部署和开发\n\n遗留问题：\n\n- 主应用与子应用全局变量污染\n- CSS 样式冲突\n- 存储数据冲突"])</script><script>self.__next_f.push([1,"1c:T2645,"])</script><script>self.__next_f.push([1,"本节开始微前端项目的介绍。\n\n## 1. 背景知识\n\n一个好的微前端架构，应该具备如下特点：\n\n- SPA 体验：微前端可以使所有的应用保持原有的 SPA 体验，统一品牌认知；\n- 技术栈无关：可以使用不同的技术栈（例如 React. Vue. Svelte ）开发，支持独立部署；\n- 性能优化： 在 MPA 和 iframe 中如果想要做性能优化，往往需要依赖浏览器和 HTTP 的能力，而在微前端中可以处理应用资源的去重. 应用自身的预加载. 预渲染和缓存处理，也可以对已加载的页面进行保活处理，增加了性能优化的手段；\n- 解耦重构：部分低代码页面无法满足性能要求时，可以通过新的技术栈将页面进行重构，不影响其他低代码页面的运行，从而可以减少重构带来的影响面。\n- 独立性：独立开发. 独立部署和独立运行\n\n**为什么使用微前端**：微前端可以降低大型复杂应用的开发. 升级. 维护以及团队协作的成本。当然，解决历史遗留的难以开发. 升级和维护的大型应用，也是使用微前端的一个重要原因。\n\nweb 架构演进：\n\n![image.png](/img/posts/2024-1-3/2024-1-3-2.png)\n\n使用微前端：\n\n![image.png](/img/posts/2024-1-3/2024-1-3-3.png)\n\n其在企业中的业务场景：\n\n![image.png](/img/posts/2024-1-3/2024-1-3-4.png)\n\n然而微前端不是万能的，例如以下场景可能并不需要微前端：\n\n- 应用的业务单一，不存在多个团队并行开发的情况，不需要兼容不同的技术栈；\n- 应用的功能已经非常完善，不存在大量新需求开发的可能性；\n- 项目组不想花费大量的时间在应用的改造上，以现有应用的稳定性为主；\n- 应用进行微前端改造的成本还不如直接改造当前存量应用带来的收益大；\n- 团队内开发人员不熟悉微前端，无法应对微前端架构的复杂性。\n\n## 2. 浏览器隔离\n\n浏览器是多进程架构，在渲染页面时，理论上不同的站点会启用不同的渲染进程（Renderer），他们之间是相互隔离的。Chrome 浏览器在进行沙箱设计时，会尽可能的复用现有操作系统的沙箱技术，例如以 Windows 操作系统的沙箱架构为例，所有的沙箱都会在进程粒度进行控制，所有的进程都通过 IPC 进行通信。\n\n![image.png](/img/posts/2024-1-3/2024-1-3-5.png)\n\n在 Chrome 浏览器中沙箱隔离以 Renderer 进程为单位，而在旧版的浏览器中会存在多个 **Web 应用共享同一个 Renderer 进程**的情况，此时浏览器会依靠同源策略来限制两个不同源的文档进行交互，帮助隔离恶意文档来减少安全风险。\n\n但是老式浏览器未启用站点隔离，标签页应用和内部的 iframe 应用会处于同一个 Renderer 进程，Web 应用有可能发现安全漏洞并绕过同源策略的限制，访问同一个进程中的其他 Web 应用，因此可能产生如下安全风险：\n\n- 获取跨站点 Web 应用的 Cookie 和 HTML 5 存储数据；\n- 获取跨站点 Web 应用的 HTML. XML 和 JSON 数据；\n- 获取浏览器保存的密码数据；\n- 共享跨站点 Web 应用的授权权限，例如地理位置；\n- 绕过 X-Frame-Options 加载 iframe 应用（例如百度的页面被 iframe 嵌套）；\n- 获取跨站点 Web 应用的 DOM 元素。\n\n## 3. iframe 方案\n\n[仓库地址：demo/iframe-isolate 分支](https://github.com/heiheihoho1213/monto-app/tree/tutorial/iframe-isolate)\n\n在 Chrome 67 版本之后，为了防御多个跨站的 Web 应用处于同一个 Renderer 进程而可能产生的安全风险，**浏览器会给来自不同站点的 Web 应用分配不同的 Renderer 进程**。例如当前标签页应用中包含了多个不同站点的 iframe 应用，那么浏览器会为各自分配不同的 Renderer 进程，从而可以基于沙箱策略进行应用的进程隔离，确保攻击者难以绕过安全漏洞直接访问跨站 Web 应用。\n\n主应用里定义：\n\n```html\n\u003cbody\u003e\n  \u003ch1\u003emain 应用\u003c/h1\u003e\n  \u003cbutton onclick=\"javascript:window.open('\u003c%= iframeUrl %\u003e')\"\u003e在新的标签页打开 iframe 应用\u003c/button\u003e\n  \u003cbr\u003e\n  \u003c!-- 同站应用：iframe.html --\u003e\n  \u003ciframe src=\"\u003c%= iframeUrl %\u003e\"\u003e\u003c/iframe\u003e\n  \u003c!-- 跨站应用: --\u003e\n  \u003ciframe src=\"https://nextjs.org/\"\u003e\u003c/iframe\u003e\n\u003c/body\u003e\n```\n\n子应用里定义：\n\n```html\n\u003cbody\u003e\n  \u003ch1\u003e同站的 iframe 应用\u003c/h1\u003e\n  \u003cbutton onclick=\"javascript:alert('我是弹窗')\"\u003e点我有弹窗\u003c/button\u003e\n\u003c/body\u003e\n```\n\n然后在主服务里写入子应用的地址：\n\n```js\napp.get(\"/\", function (req, res) {\n  // 使用 ejs 模版引擎填充主应用 views/main.html 中的 iframeUrl 变量，并将其渲染到浏览器\n  res.render(\"main\", {\n    // 填充 iframe 应用的地址，只有端口不同，iframe 应用和 main 应用跨域但是同站，可以使用 同站应用通过修改 document.domain 进行通信\n    iframeUrl: `http://${host}:${port.micro}`\n  });\n});\n```\n\n子应用也使用单独的服务启动即可：\n\n![image.png](/img/posts/2024-1-3/2024-1-3-1.png)\n\n## 4. iframe 浏览上下文\n\n判断一个页面是不是在 iframe 中被打开，可以通过如下代码：\n\n```js\n// 通过访问 window.top 可以获取当前浏览上下文的顶级浏览上下文 window 对象，通过访问 window.parent 可以获取父浏览上下文的 window 对象。\nif(window.top !== window) {}\n```\n\n如果主应用是在空白的标签页打开，那么主应用是一个顶级浏览上下文，顶级浏览器上下文既不是嵌套的浏览上下文，自身也没有父浏览上下文。\n\n**iframe 有很多优点：**\n\n- 天然的 js. css 隔离，省的写 sandbox 了\n- 移植性和复用性好，技术栈独立，可以便捷地嵌在不同的主应用中\n- 可以在运行时做到动态化修改\n- 切换微应用不需要刷新主应用\n- 天然的应用间资源懒加载，没有加载子应用，其资源也不会被加载。\n\n\u003e 然而 iframe 方案有哪些问题呢？\n\n**不足：**\n\n- 首次加载 iframe 应用时，会因为服务端请求而导致内容区带来短暂的白屏效果\n- 主应用刷新时，iframe 无法保持 URL 状态（会重新加载 src 对应的初始 URL）；\n- 主应用和 iframe 处于不同的浏览上下文，无法使 iframe 中的模态框相对于主应用居中；\n- 主应用和 iframe 微应用的数据状态同步问题：持久化数据和通信。\n- 对于非后台管理系统而言，使用 iframe 还需要考虑 SEO. 移动端兼容性. 加载性能等问题。\n- 主/子应用 cookie 共享问题（比如免登）\n\n## 5. iframe 方案 cookie 共享\n\n\u003e 其他方案的 cookie 共享也类似\n\n#### 同域\n\n```js\napp.get(\"/\", function (req, res) {\n  // 设置主应用的 cookie 标识\n  res.cookie(\"cookie-test\", \"123\");\n  // 使用 ejs 模版引擎填充主应用 public/main.html 中的 micro 变量，并将其渲染到浏览器\n  res.render(\"main\", {\n    // micro 指向微应用的打开地址\n    micro: `http://${host}:${port.main}/micro`,\n  });\n});\n\n// 微应用和主应用同域，只是服务路由不同\napp.get(\"/micro\", function (req, res) {\n  // 设置 iframe 微应用的 cookie 标识，顺便观察能否覆盖主应用的 cookie 标识\n  // 同域时共享cookie，子应用会改动主应用的cookie\n  res.cookie(\"micro-app\", \"true\").cookie(\"cookie-test\", \"456\");\n  // 渲染 views/micro.html\n  res.render(\"micro\");\n});\n```\n\n结论：主子应用可以共享 Cookie 数据，但是存在同名属性值被覆盖的风险\n\n#### 同站不同域\n\n主应用：\n\n```js\n// 使用 iHosts 配置 example.com 指向本机的 ip 地址，模拟同站\n// 主应用访问地址：http://example.com:4000\napp.get(\"/\", function (req, res) {\n  res.cookie(\"cookie-test\", \"456\");\n  // 使子域的微应用可以共享 Cookie\n  // 在设置 Cookie 时，可以使用 Domain和 Path 来标记作用域\n  // 默认不指定的情况下，Domain 属性为当前应用的 host，由于 xiaodududududuo.example.com 和 example.com 不同\n  // 因此默认情况下两者不能共享 Cookie，可以通过设置 Domain 使其为子域设置 Cookie，例如 Domain=example.com，则 Cookie 也包含在子域 xiaodududududuo.example.com 中\n  res.cookie(\"main-cookie-test\", \"true\", { domain: \"example.com\" }); // 核心代码\n  res.render(\"main\", {\n    // 使用 iHosts 配置 xiaodududududuo.example.com 指向本机的 ip 地址\n    // 子应用访问地址： http://xiaodududududuo.example.com:3000\n    micro: `http://xiaodududududuo.example.com:${port.micro}`,\n  });\n});\n```\n\n子应用：\n\n```js\napp.get(\"/\", function (req, res) {\n  // 设置 iframe 微应用的 cookie 标识，顺便观察能否覆盖主应用的 cookie 标识\n  res.cookie(\"micro-app\", \"true\").cookie(\"cookie-test\", \"123\");\n  res.render(\"micro\");\n});\n```\n\n结论：默认情况无法共享，但是通过设置 Domain 使得两个应用可以共享彼此的 Cookie。\n\n#### 跨站\n\n代码就不用演示了，两个完全不同的地址作为主/子服务，直接说结论：子应用默认无法携带 Cookie（防止 CSRF 攻击），需要使用 HTTPS 协议并设置服务端 Cookie 的 SameSite 和 Secure 设置才行，并且子应用无法和主应用形成 Cookie 共享\n\n\u003e 本地可以使用 ngrok 模拟跨站\n\n## 6. 剩余缺点\n\n- 首次加载白屏效果（可以使用预加载. 预渲染等优化措施）\n- iframe 无法保持 URL 状态（主子应用需要做 history 的代理，全局使用一个单例）\n- 模态框相对于主应用居中问题（同上，主子应用需做 window 对象代理，弹窗相对于 body 置于顶层）\n- 数据状态同步问题（同上，主子应用需做 window 对象代理，主子应用设置通信机制传递事件对象等）\n- SEO. 移动端兼容性. 加载性能： ？\n\n----"])</script><script>self.__next_f.push([1,"1d:T17d8,"])</script><script>self.__next_f.push([1,"二叉树是一种计算机基础数据结构，最近在写树组件的时候有用到了这个基本知识，这里总结一下。\n\n## 1. 引\n\n它的实际使用场景非常广泛。以下是一些常见的二叉树应用场景：\n\n*   文件系统：文件系统的目录结构可以使用二叉树表示，每个节点代表一个文件或目录，通过左子节点和右子节点连接形成层级结构。\n*   数据库索引：数据库索引通常使用二叉树实现，比如二叉搜索树（BST）用于快速搜索和检索数据。\n*   表达式解析和计算：二叉树可以用于解析和计算表达式，如数学表达式. 布尔表达式等。\n*   图像处理：在图像处理中，二叉树常用于图像压缩算法（如哈夫曼编码）和图像渐进式加载。\n*   路由算法：在网络路由中，二叉树可以用于构建路由表，帮助确定数据包的传输路径。\n*   解析树：二叉树可以用于构建解析树，用于解析和理解自然语言. 编程语言等结构化数据。\n*   人工智能和决策树：决策树是一种特殊的二叉树，常用于人工智能中的分类和决策问题。\n*   堆和优先队列：二叉堆是一种特殊的二叉树结构，用于实现优先队列和堆排序算法。\n*   编译器和解释器：在编译器和解释器中，二叉树常用于语法分析和构建抽象语法树（AST）。\n*   数据压缩：二叉树常用于数据压缩算法，如霍夫曼编码（Huffman Coding），通过树的构建和路径编码来实现数据的高效压缩和解压缩。\n*   线段树：线段树是一种特殊的二叉树，用于处理区间查询问题，如区间最小值. 区间和等。\n*   索引结构：二叉树可用于构建各种索引结构，如B树和B+树，用于快速的数据库查询和索引操作。\n*   线索二叉树：线索二叉树是一种优化的二叉树结构，通过添加额外的线索信息，可以快速进行中序遍历. 前序遍历等操作。\n*   缓存实现：LRU Cache（最近最少使用缓存）常使用双向链表和二叉树（如红黑树）相结合的方式实现，以快速插入. 删除和查找最近使用的数据。\n\n二叉树一个重要的算法就是他的的遍历，在AST编译器开发. 路由导航. 文件系统等等业务场景中都在广泛的使用。\n\n## 2. 构建一个二叉树\n\n二叉树有一个根节点，所有的父节点最多只能有两个孩子。我们可以构造一个二叉树如下：\n\n![image.png](/img/posts/2023-12-6/2023-12-6-1.png)\n\n代码结构如下：\n\n```js\nconst tree = {\n  name: 1,\n  children: [\n    {\n      name: 2,\n      children: [\n        {\n          name: 4,\n          children: [{ name: 8 }],\n        },\n        { name: 5 },\n      ],\n    },\n    {\n      name: 3,\n      children: [{ name: 6 }, { name: 7 }],\n    },\n  ],\n};\n```\n\n接下来结合图形，用代码来实现一下他的遍历：\n\n## 3. 遍历\n\n### 层次遍历\n\n按照层级遍历\n\n算法思路：\n\n*   建立一个队列，从根节点开始，将其子节点的子节点从左至右入队\n*   遍历队列并出队，重复第二步后半部分\n*   队列为空则遍历结束\n\n\n![image.png](/img/posts/2023-12-6/2023-12-6-2.png)\n\n```js\nfunction traverse(node) {\n  if (!node) {\n    return;\n  }\n\n  const queue = [];\n  queue.unshift(node);\n\n  while (queue.length \u003e 0) {\n    const printNode = queue.pop();\n    console.log(printNode.name);\n    if (printNode.children \u0026\u0026 printNode.children.length \u003e 0) {\n      queue.unshift(...printNode.children.slice().reverse());\n    }\n  }\n}\n```\n\n### 先序遍历\n\n递归实现\n\n*   从根节点开始\n*   将左右节点当做子树，先遍历左节点，再遍历右节点\n*   直到当前节点没有子节点为止\n\n```js\nfunction preOrderTraverse(root) {\n  if (root != null) {\n    const children = root.children || [];\n    console.log(root.name);\n    preOrderTraverse(children[0]);\n    preOrderTraverse(children[1]);\n  }\n}\n```\n\n非递归实现\n\n*   建立一个栈，入栈根节点\n*   出栈当前节点，将当前节点子节点集合逆向入栈\n*   重复第二步，直到栈空\n\n\n![image.png](/img/posts/2023-12-6/2023-12-6-3.png)\n\n```js\nfunction preOrderTraverse(node) {\n  if (!node) return;\n\n  const track = [];\n  track.push(node);\n\n  while (track.length \u003e 0) {\n    const node = track.pop();\n    console.log(node.name);\n    const children = node.children;\n    if (children \u0026\u0026 children.length \u003e 0) {\n      track.push(...children.reverse());\n    }\n  }\n}\n```\n\n\u003e 思考：学会了先序遍历，相信你应该能够很容易的写出后序遍历的实现！\n\n### 中序遍历\n\n非递归实现\n\n*   建立一个栈，入栈根节点\n*   若有左子节点，则入栈，直到没有左子节点时出栈栈顶元素并打印，入栈栈顶元素的右子节点\n*   重复第二步，直到没有可用元素且栈空为止\n\n\n![image.png](/img/posts/2023-12-6/2023-12-6-4.png)\n\n```js\nfunction middleOrderTraverse(node) {\n  if (!node) return;\n\n  const stack = [];\n  let currentNode = node;\n  while (currentNode || stack.length \u003e 0) {\n    if (currentNode) {\n      stack.push(currentNode);\n      currentNode =\n        currentNode \u0026\u0026 currentNode.children ? currentNode.children[0] : null;\n    } else {\n      const poped = stack.pop();\n      console.log(poped.name);\n      currentNode = poped.children ? poped.children[1] : null;\n    }\n  }\n}\n```\n\n### 链表实现\n\n链表不适合做广度优先遍历，下面示意图中，深度优先会非常的方便。我们拿 react fiber 的结构来举例。\n\n\n![image.png](/img/posts/2023-12-6/2023-12-6-5.png)\n\n*   遍历思路：从根节点开始，以此遍历每一个经过的节点的 child 和 sibling\n\n伪代码实现：\n\n```js\nfunction linkedListTraverse(root) {\n  let wip = root;\n\n  while (wip) {\n    console.log(wip);\n\n    if (wip.child) {\n      temp = wip.child;\n      wip.child = null; // 遍历过就剔除\n      wip = temp;\n      continue;\n    }\n\n    if (wip.sibling) {\n      temp = wip.sibling;\n      wip.sibling = null; // 遍历过就剔除\n      wip = temp;\n      continue;\n    }\n\n    wip = wip.return;\n  }\n}\n```"])</script><script>self.__next_f.push([1,"1e:T68a2,"])</script><script>self.__next_f.push([1,"2023 年， CSS 领域有了新的变化，整体趋势是更加的易用，并贴合流行的框架做了扩展。Chrome 的开发者 blog 和 MDN 里更新了一些比较有意思的 CSS 2023 动向的内容，文章比较长，内容有点乱，这里总结分享一下给大家。\n\n## 1. 摘要\n\n本文是 “2023 年度技术盘点” 系列文章，主要介绍前端 CSS 领域在 2023 年的重要进展。本文从 CSS 基础功能、排版、颜色、自适应设计、交互和组件等方面进行盘点。\n\n\u003e 可以查看文章目录以选择查看自己感兴趣的更新\n\n## 2. 基础功能\n\ncss 新增了三角函数相关函数：`sin()`、`cos()`、`tan()`、`asin()`、`acos()`、`atan()` 和 `atan2()`。\n\n三角函数的使用要和 `calc` 结合才能出效果。\n\n#### 三角函数\n\n![image.png](/img/posts/2024-1-2/2024-1-2-1.png)\n\n-   `cos()`：返回角度的余弦值，该值介于 `-1` 和 `1` 之间。\n-   `sin()`：返回角度的正弦值，该值介于 `-1` 和 `1` 之间。\n-   `tan()`：返回角度的正切值，取值介于 `−∞` 和 `+∞` 之间。\n\n以正弦为例，你可以这么写：`width: calc(sin(var(--angle)) * 200px);` 来计算宽度值。\n\n我们实现一个计算角度垂线长度的问题来说明 sin 的用法。下面的例子里，绿色虚线的长度就是 `斜边（200px）* sin(角度)` 计算出来的：\n\n[实现 sin 计算三角形边长](https://code.juejin.cn/pen/7317184041529114662)\n\n\u003e 由于 chrome 的 css 不支持 rem() 和 mod() 等取模函数，所以用了两个 css 变量表示 180deg 前后的角度\n\n\u003e 码上掘金怎么不支持直接预览了，我放个截图吧...\n\n\n![image.png](/img/posts/2024-1-2/2024-1-2-2.png)\n\n\n同理，cos 和 tan 可以如下使用：\n\n```css\ntransform: scaleX(cos(var(--angle)))\ntransform: scaleX(tan(var(--angle)));\n```\n\n官方demo：https://codepen.io/web-dot-dev/pen/NWLxROo\n\n#### 反三角函数\n\n反三角函数是三角函数的逆运算，包含：`asin()`、`acos()`、`atan()` 和 `atan2()`。前三个接受一个数值，返回对应的角度值。\n\n第四个 `atan2()`，接受两个参数 `A` 和 `B`。返回 X 轴正轴与 `(B, A)` 点之间的角度。\n\n\u003e atan2对象限敏感，根据两个参数判断它是属于哪个象限并给出对应的角度值，值域范围[-pi, pi]；atan对象限不敏感，值域范围为[-pi/2, pi/2]\n\n下面还是举个例子来说明 `atan()` 和 `atan2()` 的区别。\n\n[反三角函数示例](https://code.juejin.cn/pen/7317462707643351092)\n\n下一个新功能是 `n-*` 的选择器。大家之前也都用过诸如 :nth-of-type 这样的伪类来实现元素选择，现在官方增强了这个功能，使用 S 语法来更好地控制 :nth-child() 选择： `:nth-child()` 和 `:nth-last-child()`。\n\n#### n-* 选择器 与 S 语法\n\n\n![image.png](/img/posts/2024-1-2/2024-1-2-3.png)\n\n使用例子：\n\n-   `:nth-child(2)`：选择第二个子级。\n-   `:nth-child(2n)`：选择所有偶数子项（例如 2nd、4th、6th、8th 等）。**\n-   `:nth-child(2n+1)`：选择所有奇数子项（第 1、3、5、7，依此类推）。**\n-   `:nth-child(5n+1)`：选择第 1 个  *(=(5×0)+1)* 、第 6 个  *(=(5×1)+1)* 、第 11 个  *(=(5×2)+1)* ...子级。\n-   `:nth-child(5n+2)`：选择第 2 个  *(=(5×0)+2)* 、第 7 个  *(=(5×1)+2)* 、第 12 个  *(=(5×2)+2)* ... 子项。\n\n里边的选择项可以是等差数列，等比数列，或者是自定义的任意数列，甚至可以组合使用：\n\n-   `:nth-child(n+3)`：选择从第 3 个开始的每个子级。\n-   `:nth-child(-n+5)`：选择不超过第 5 个子级（第 1 个、第 2 个、第 3 个、第 4 个、第 5 个。\n-   `:nth-child(n+3):nth-child(-n+5)`：选择第 3 个到第 5 个（第 3 个、第 4 个、第 5 个）的每个子级。\n\n同理，`:nth-last-child()` ，也可以进行类似的选择，但不是从头开始计数，而是从头开始计数。\n\n下面给一个创建斑马纹示例：\n\n```css\ntr:nth-child(even) {\n  background-color: #E9E9E9;\n}\n\n// 另一种写法\ntr:nth-of-type(even){ \n  background: #E9E9E9;\n}\n```\n\n\u003e “nth-of-type”和“nth-child”的区别：p:nth-of-type(7)选择的p元素所在的父元素下的第7个P元素即：第7个p；p:nth-child(6)选择的p元素所在的父元素下的第6个子元素，且该元素是P元素。\n\nnth-child 还可以结合 S 语法使用：\n\n```css\n:nth-child(An+B [of S]?)\n:nth-last-child(An+B [of S]?)\n```\n指定 `of S` 后，`An+B` 逻辑仅应用于与给定选择器列表 `S` 匹配的元素。这实际上意味着，您可以在 `An+B` 执行操作之前预先过滤子项：\n\n```css\n:nth-child(2 of .highlight) {\n  /* = Select the 2nd child element that has the class .highlight applied to it */\n  outline: 0.3rem dashed hotpink;\n  outline-offset: 0.7rem;\n}\n```\n上面的例子，选择了父元素盒子中，类名叫 highlight 中的第二个子元素（注意不是物理顺序的第二个）来赋值样式。\n\n再举个例子，上面的斑马纹还可以增强：\n\n```css\n// 筛选没有 hidden 属性的列，然后再计算斑马纹\ntr:nth-child(even of :not([hidden])) {\n  background-color: lightgrey;\n}\n```\n\n#### `@scope`\n\n![image.png](/img/posts/2024-1-2/2024-1-2-4.png)\n\nChrome 118+ 增加了对 `@scope` 的支持，这是一项 @ 规则，可将选择器的范围限定为文档的特定子树，从而控制 css 作用域，这对于将来需要做 css 隔离的业务场景有大用处：\n\n```css\n@scope (html) {\n  .warning {\n    display: none;\n  }\n}\n\n/* Only match elements in the card component, but don’t target those in nested components */\n@scope (.card) to ([data-component]) {\n  img {\n    border: 0.25em solid #6300ff;\n    border-radius: 0.5em;\n  }\n}\n```\n\n上面的第二个例子，只作用于 card 类，而不作用于其包含data-component属性的子元素，即 card类 和 \\[data-component] 之间的元素。\n\n\n官网demo：https://codepen.io/web-dot-dev/pen/YzdOydZ\n\n#### `@layer 嵌套`\n\n\n![image.png](/img/posts/2024-1-2/2024-1-2-5.png)\n\n\u003e 其实这个特性22年就有了\n\n官方 css 显然是吸取了各个前端框架和预处理器的经验，并进行了升级，现在 css 也要支持嵌套了。\n\n\n之前这样的写法：\n\n```css\nul li {}\nul li .child {\n  color: red;\n}\n```\n\n现在可以这样写了：\n\n```css\n@layer test {\n    ul {\n      li {\n        \u0026 .child {\n          color: red;\n        }\n      }\n    }\n    \n    .card {\n      \u0026--header {\n        /* is not equal to \".card--header\" */\n      }\n    }\n}\n```\n\n\u003e 当然直接嵌套，不使用 @layer 也是可以的\n\n使用具名 `@layer` 包裹的 css 片段可以支持嵌套优先级配置。\n\n```css\n@layer base, special;\n\n@layer special {\n  .item {\n    color: red;\n  }\n}\n\n@layer base {\n  .item {\n    color: green;\n    border: 5px solid green;\n    font-size: 1.5em;\n    padding: 0.5em;\n  }\n}\n```\n预先定义各个具名layer的优先级，从左到右依次降低，上面的 item 类元素，最后会被加上红色的颜色，而不是绿色。\n\n#### 子网格布局\n\n![image.png](/img/posts/2024-1-2/2024-1-2-6.png)\n\n我们都知道有 grid 布局，现在迎来了增强，加入了 subgrid 布局。\n\n我们这么定义一个网格布局：\n\n```css\n.container {\n  display: grid;\n  gap: 1rem;\n  grid-template-columns: [column-1] 20ch [column-2] 1fr;\n}\n```\n网格有两列，一列给20ch，一列占领剩余空间：\n\n\n![image.png](/img/posts/2024-1-2/2024-1-2-7.png)\n\n我们现在定义子网格：\n\n```css\n.container \u003e div {\n  grid-column: span 2;\n\n  display: grid;\n  grid-template-columns: subgrid; /* 20ch 1fr */\n}\n```\n\n![image.png](/img/posts/2024-1-2/2024-1-2-8.png)\n\n这样一来，子 div 虽然还是占了一行，但是他继承了父元素的网格布局，即父网格的列已经有效向下传递到子网格，在各个子 div 内部再实现布局时就可以直接使用。最新的浏览器中也标明了这种布局：\n\n\n![image.png](/img/posts/2024-1-2/2024-1-2-9.png)\n\ndemo 如下：[子网格布局 demo](https://code.juejin.cn/pen/7317532251985313830)\n\n看看你的浏览器支不支持，可以这样：\n\n```css\n@supports (grid-template-columns: subgrid) {\n  /* safe to enhance to */\n}\n```\n\n官方demo：https://codepen.io/web-dot-dev/pen/MWLENzm\n\n## 3. 排版\n\n2023 年，css 也开始针对排版更新了，可能是借鉴了 Tailwind 的经验...\n\n#### 首字母\n\n![image.png](/img/posts/2024-1-2/2024-1-2-10.png)\n\nChrome 110 中推出了 `initial-letter` 属性，可以将首字母抬起或降低。\n\n示例：`\u003cp\u003eLorem ipsum dolor ...\u003c/p\u003e`\n\n```css\np {\n  \u0026::first-letter {\n    initial-letter: 3 2;\n    color: green;\n  }\n}\n```\n\n核心点是 `first-letter` 伪元素，他在 DOM 结构树中不会体现出来（所以有些迷，调试有困难，幽灵元素？），其中可选项 initial-letter 可以设置其偏移量，上面的例子表示首字母高度占用 3 行，下沉 2 行：\n\n\n![image.png](/img/posts/2024-1-2/2024-1-2-11.png)\n\n\u003e 首字母属性同样支持中文\n\n#### 文字折行优化\n\n![image.png](/img/posts/2024-1-2/2024-1-2-12.png)\n\n新增两种写法 `text-wrap: balance` 和 `text-wrap: pretty`，官方解释请移步：https://www.w3.org/TR/css-text-4/#text-wrap。\n\n前者是浏览器为文本找出最佳的均衡换行解决方案：\n\n\n![image.png](/img/posts/2024-1-2/2024-1-2-13.png)\n\nemm，怎么感觉还不如原来。。。推荐使用 pretty，至少能左右对齐。\n\n## 4. 颜色\n\n颜色方面是已有颜色库的扩充，增加了更多的颜色和可选项。官方的说法是，原来的 CSS 不支持高清画质，而大多数人放在口袋里、放在身上或安装在墙上的显示屏具有广色域和高清色彩。显示屏的颜色处理速度比 CSS 快，现在 CSS 的更新可以与之一较高低了。\n\n#### 高清 CSS\n\nCSS [Color Level 4](https://www.w3.org/TR/css-color-4) 提出了高清 CSS 方案，从 Chrome 111 开始支持色彩空间和色域，他是在已有色域的基础上的颜色扩充，以适应现在更加高清显示的显示设备。\n\n官方推出 7 中色域：\n\n-   [sRGB](https://developer.chrome.com/docs/css-ui/high-definition-css-color-guide?hl=zh-cn#srgb)\n-   [RGB 98](https://developer.chrome.com/docs/css-ui/high-definition-css-color-guide?hl=zh-cn#a98-rgb)\n-   [Display p3](https://developer.chrome.com/docs/css-ui/high-definition-css-color-guide?hl=zh-cn#display-p3)\n-   [Rec2020](https://developer.chrome.com/docs/css-ui/high-definition-css-color-guide?hl=zh-cn#rec2020)\n-   [ProPhoto](https://developer.chrome.com/docs/css-ui/high-definition-css-color-guide?hl=zh-cn#prophoto-rgb)\n-   [美国商业行业信息署 (CIE)](https://en.wikipedia.org/wiki/CIE_1931_color_space)\n-   [HVS](https://www.cs.rochester.edu/courses/572/colorvis/gamutvis.html)（人像色域）\n\n颜色空间是色域的排列，它建立了形状以及获取颜色的方法。颜色级别 4 引入了 12中颜色空间用于从色域中查找颜色：\n\n-   [sRGB 线性](https://developer.chrome.com/docs/css-ui/high-definition-css-color-guide?hl=zh-cn#linear-srgb)\n-   [LCH](https://developer.chrome.com/docs/css-ui/high-definition-css-color-guide?hl=zh-cn#lch)\n-   [okLCH](https://developer.chrome.com/docs/css-ui/high-definition-css-color-guide?hl=zh-cn#oklch)\n-   [实验](https://developer.chrome.com/docs/css-ui/high-definition-css-color-guide?hl=zh-cn#lab)\n-   [okLAB](https://developer.chrome.com/docs/css-ui/high-definition-css-color-guide?hl=zh-cn#oklab)\n-   [Display p3](https://developer.chrome.com/docs/css-ui/high-definition-css-color-guide?hl=zh-cn#display-p3)\n-   [Rec2020](https://developer.chrome.com/docs/css-ui/high-definition-css-color-guide?hl=zh-cn#rec2020)\n-   [a98 RGB](https://developer.chrome.com/docs/css-ui/high-definition-css-color-guide?hl=zh-cn#a98-rgb)\n-   [ProPhoto RGB](https://developer.chrome.com/docs/css-ui/high-definition-css-color-guide?hl=zh-cn#prophoto-rgb)\n-   [XYZ](https://developer.chrome.com/docs/css-ui/high-definition-css-color-guide?hl=zh-cn#xyz-xyz-d50-xyz-d65)\n-   [XYZ d50](https://developer.chrome.com/docs/css-ui/high-definition-css-color-guide?hl=zh-cn#xyz-xyz-d50-xyz-d65)\n-   [XYZ d65](https://developer.chrome.com/docs/css-ui/high-definition-css-color-guide?hl=zh-cn#xyz-xyz-d50-xyz-d65)\n\n之前只有四种颜色空间：\n\n-   [Hex](https://developer.chrome.com/docs/css-ui/high-definition-css-color-guide?hl=zh-cn#hex), 即 16进制颜色\n-   [RGB](https://developer.chrome.com/docs/css-ui/high-definition-css-color-guide?hl=zh-cn#rgb)\n-   [HSL](https://developer.chrome.com/docs/css-ui/high-definition-css-color-guide?hl=zh-cn#hsl)\n-   [HWB](https://developer.chrome.com/docs/css-ui/high-definition-css-color-guide?hl=zh-cn#hwb)\n\n知道了概念，我们来看几种新的颜色定义。\n\n###### HWB\n\n\n![image.png](/img/posts/2024-1-2/2024-1-2-14.png)\n\nHWB（色相、白度、黑度）是面向人类描述颜色的 sRGB 色域颜色空间：\n\n```css\n--modern: hwb(200deg 25% 25%);\n```\n\n###### `color()` 函数\n\n\n![image.png](/img/posts/2024-1-2/2024-1-2-15.png)\n\ncolor() 是一个标准化空间，用于访问使用 RGB 通道的颜色空间。而且可扩容至基于 RGB 的任何广色域色彩空间。使用举例：\n\n```css\n--display-p3: color(display-p3 1 1 1);\n--srgb: color(srgb 1 1 1);\n```\n\n甚至之前的 rgb 也可以这么统一来写：\n\n```css\n--rgb: color(rgb 25 25 25)\n```\n\n###### 其他\n\n此外还有 lch / lab / oklch / OKLAB / dispaly-p3 等颜色空间，由于东西太多了，就不一样列出，上面有链接，可以自行点击查看。这类CIE 空间颜色都能够更好的表示整个人类可见的色谱。使用新的颜色空间还会影响颜色渐变和插值等功能。\n\n#### color-mix()\n\n![image.png](/img/posts/2024-1-2/2024-1-2-16.png)\n\n他是用于颜色混淆的函数，灵感可能也是来自css预处理器。\n\n官方demo：https://codepen.io/web-dot-dev/pen/JjBZLrm\n\n为了便于理解，我们这里实现一个简单的切换颜色的例子：\n\n[主题颜色切换](https://code.juejin.cn/pen/7317573307016806435)\n\n上面的例子中，各个主题的颜色，通过混淆得来。我们拿一个来说明使用方式。\n\n`color-mix(in oklab, #0af 25%, black)`：在 oklab 色域空间内，将天蓝色的25%与黑色混合。此时文字的颜色如下：\n\n\n![image.png](/img/posts/2024-1-2/2024-1-2-17.png)\n\n看着是黑色的，其实有点蓝韵。如果将 25% 调整到 75% 就会明显了：\n\n\n![image.png](/img/posts/2024-1-2/2024-1-2-18.png)\n\n#### from 关键字\n\n可以看做是 color-mix 的扩展增强：\n\n`color: rgb(from green r g b)`\n\n等价于 ` color: rgb(0 128 0)`，意思是从 green 开始，拿到 rgb 的值，并在之后的参数中使用，他计算的是转换后的相对颜色。于是会有如下写法：\n\n```css\n// r g b 是三个变量，可以换顺序使用\nrgb(from green g g g) /* rgb(128 128 128) */\nrgb(from green b r g) /* rgb(0 0 128) */\nrgb(from green 0 0 g) /* rgb(0 0 128) */\n```\n当然聪明的你也能猜到，透明度也能当做变量：\n\n```css\nrgb(from rgba(0, 128, 0, .5) r g b / alpha) /* alpha=50% */\n```\n上面就相当于将颜色打成各个通道分量来实现混淆。我们来看一个：`background: hsl(from blue calc(h + 180) s l)`.\n\n这个是 hsl 的转变，其中第一个通道分量加了 180 后返回，其实是求蓝色的互补色：\n\n\n![image.png](/img/posts/2024-1-2/2024-1-2-19.png)\n\n## 5. 响应式设计\n\n新的一年，响应式布局又有了新的写法。\n\n#### 查询容器大小\n\n\n![image.png](/img/posts/2024-1-2/2024-1-2-20.png)\n\n相比于传统的媒体查询，容器查询更加细粒度，他可以应用在局部容器或者指定容器内:\n\n```css\ncontainer: card / inline-size;\n```\n\n这样就创建了一个叫做 card 的适应内嵌大小的响应式容器，可以这样使用查询：\n\n```css\n/* 只有一个容器时，名字 card 可以省略 */\n@container card (max-width: 400px) {\n\n}\n```\n\n我们来看一个例子：[响应式容器](https://code.juejin.cn/pen/7317593902143012902)\n\n#### 容器样式\n\n此外，在 Chrome 111 中，样式查询已部分实现：可以使用 `@container style()` 查询父元素上的自定义属性的值。我们来看个例子（兼容性不好）：\n\n\n![image.png](/img/posts/2024-1-2/2024-1-2-21.png)\n\n```css\n@container style(--theme: pink) {\n  .demo-btn {\n    background: linear-gradient(45deg, pink, violet);\n    border: 4px double #f452dc;\n  }\n}\n```\n上面的例子，根据变量 theme 的值动态添加样式，完整 demo 如下：\n\nhttps://codepen.io/web-dot-dev/pen/GRXZLvW\n\n\n#### :has()\n\n\n![image.png](/img/posts/2024-1-2/2024-1-2-22.png)\n\n字面意思就是说选中拥有某个属性的元素：\n\n```css\n.card:has(.card__media) {\n  --color: #6300ff;\n}\n```\n上面的代码，是选中拥有一个类叫 card__media 的 card 元素。他可以让你在众多相同的类名叫 card 的元素中选中你想要的。\n\n其不但可以在 DOM 树中向上选择父级元素，也可以进行横向选择。\n\n比如有个列表：\n\n```html\n\u003cul class=\"dock\"\u003e\n  \u003cli\u003e\u003c/li\u003e\n  ...\n  \u003cli\u003e\u003c/li\u003e\n\u003c/ul\u003e\n```\n每一个 li 里是一个列表图片，我们想实现鼠标滑动变大，这么写：\n\n```css\n.dock li:hover {\n  width: 3em;\n}\n.dock li:hover img {\n  translate: 0% -15%;\n}\n```\n\n\n![image.png](/img/posts/2024-1-2/2024-1-2-23.png)\n\n如果想实现 mac 系统那种，左右图片也会变大的动画，可以这么写：\n\n```css\n.dock li:hover + li,\n.dock li:has(+ li:hover) {\n  width: 2.5em;\n}\n```\n不但选择其下一个兄弟节点，还使用 has 选择其上一个兄弟节点：\n\n\n![image.png](/img/posts/2024-1-2/2024-1-2-24.png)\n\n#### 媒体查询有了新功能\n\n原来已有的媒体查询功能得到了史诗级加强。\n\n###### 适应设备刷新率\n\n![image.png](/img/posts/2024-1-2/2024-1-2-25.png)\n\n新增如下写法：\n\n```css\n@media (update: none) {\n\n}\n```\n\n对于大多数新版设备，其更新一般是 fast，但是针对电子阅读器以及低能耗付款系统等设备，其刷新率可能较慢，可以使用 slow 适配，其余的像打印机一类的，可以设置为 none。[demo](https://codepen.io/web-dot-dev/pen/PoyPMBw)\n\n根据不同的设备刷新率采用不同的 CSS 表现形式，意味着您可以节省电池电量或减少错误的视图更新。由于体验者不可能凑齐刷新率不同的设备不太容易，这里使用js来模拟说明：\n\n[官方demo：小鸭子摇头](https://code.juejin.cn/pen/7319044288761823258)\n\n\u003e demo 是使用js模拟刷新率不同的设备，并不是对 update 的使用说明\n\n###### 媒体查询检查js脚本\n\n\n![image.png](/img/posts/2024-1-2/2024-1-2-26.png)\n\n脚本媒体查询可用于检查 JavaScript 是否可用。这对于渐进式增强非常有用。在此媒体查询推出之前，一个用于检测 JavaScript 是否可用的策略是在 HTML 中放置一个 `nojs` 类，然后使用 JavaScript 将其移除。现在可以使用 css 来检测了：\n\n```css\n@media (scripting: enabled) {\n  .steam {\n    opacity: 1;\n  }\n}\n```\n\n###### 用于减低透明度的媒体查询\n\n\n![image.png](/img/posts/2024-1-2/2024-1-2-27.png)\n\n非不透明界面可能会引起头痛，或者让各类视力缺陷人群造成视觉障碍。因此，Windows、macOS 和 iOS 设有系统偏好设置，可以降低或移除界面的透明度。这个针对 `prefers-reduced-transparency` 的媒体查询非常适合使用其他偏好设置媒体查询：\n\n```css\nsvg {\n    --transparency: 50%;\n    \n    @media (prefers-reduced-transparency: reduce) {\n      --transparency: 95%;\n    }\n}\n```\n\n## 6. 交互\n\n#### 视图转换 API\n\n\n![image.png](/img/posts/2024-1-2/2024-1-2-28.png)\n\n官方说明是增强css过渡，更好的减少卡顿和图形交叠。\n\n使用：`const viewTransition = document.startViewTransition(updateCallback)`\n\n使用方式很像 requestAnimationFrame，这个是在当前事件循环结束前执行回调，而我们今天的这个 API，会捕获网页的当前状态。这包括截取屏幕截图。完成后，系统会调用传递给 `.startViewTransition()` 的回调 updateCallback。这正是 DOM 发生变化的地方。然后，API 会捕获网页的新状态。\n\n官方说明如下：[startViewTransition](https://developer.chrome.com/docs/web-platform/view-transitions/?hl=zh-cn#why_do_we_need_this_feature)， 有兴趣的可以自行查看。\n\n#### linear()\n\n\n![image.png](/img/posts/2024-1-2/2024-1-2-29.png)\n\n该函数用于模拟线性插值来近似计算加/减速类型的动画。使用方式如下：\n\n```css\n:root {\n  --custom-easing: linear(\n    0,\n    0.06,\n    0.25 18%,\n    1 36%,\n    0.81,\n    0.75,\n    0.81,\n    1,\n    0.94,\n    1,\n    1\n  );\n}\n```\n可以查看在线 [demo](https://linear-easing-generator.netlify.app/) 来创建一个使用案例。\n\n#### Scroll End API\n\n\n![image.png](/img/posts/2024-1-2/2024-1-2-30.png)\n\n官方对滚动事件的增强，终于有了自己的滚动到底的检测了，这对于长列表渲染很有帮助：\n\n```js\ndocument.onscrollend = event =\u003e {\n  Toast('scroll end')\n}\n```\n\n#### 滚动条驱动动画\n\n这个是比较惊艳的更新了，大多数门户网站都有滚动懒加载或者淡入淡出的动画效果，这次改动补全了之前原生 css 没有滚动检测的空白。\n\n官方演示 demo：[Scroll-driven Animations (scroll-driven-animations.style)](https://scroll-driven-animations.style/)\n\n其主要是通过 `animation-timeline` 属性设置驱动，可选的驱动方式有 `scoll` 和 `view`。我们看下面的例子：[滚动动画](https://code.juejin.cn/pen/7319093484529877007)\n\n`animation: text steps(var(--chars)) forwards;` 来检测滚动的偏移量，并传给变量 --charsm，然后可以通过偏移量设置文字背景色的宽度：\n\n![image.png](/img/posts/2024-1-2/2024-1-2-31.png)\n\n另一种驱动方式 view 这么定义：`animation-timeline: view();`，可通过 animation-range 设置变化范围，用于监测当前元素是否在可视区域，官方 demo：[CSS Wrapped 2023: Scroll-Driven Animations: View Timeline #CSSWrapped2023 (codepen.io)](https://codepen.io/web-dot-dev/pen/XWOqovr)\n\n#### 给 display: none 添加动画\n\n\n![image.png](/img/posts/2024-1-2/2024-1-2-32.png)\n\nchrome 新增功能：`transition-behavior`，接受两个值：`normal` 和 `allow-discrete`，其中 `allow-discrete` 模式可实现离散转换。使用方式：\n\n```css\n.card {\n  transition: opacity 0.25s, display 0.25s;\n  transition-behavior: allow-discrete;\n}\n```\n\ndemo: [删除卡片](https://codepen.io/web-dot-dev/pen/poQMLrN)\n\n#### `@starting-style`\n\n\n![image.png](/img/posts/2024-1-2/2024-1-2-33.png)\n\n`@starting-style` CSS 规则以新的 Web 功能为基础，用于在 `display: none` 之间添加动画效果，但也可以用于其他的 transition。可以看这个 [demo](https://codepen.io/web-dot-dev/pen/OJdjjdX)\n\n弹窗默认是隐藏在屏幕之下的：\n\n```css\ndialog {\n  transition: translate 0.7s ease-out, overlay 0.7s ease-out, display 0.7s ease-out allow-discrete;\n  translate: 0 100vh;\n}\n```\n\n设置开关：\n\n```css\ndialog[open] {\n  translate: 0 0;\n}\n```\n\n但是这个是突然出现的，明明设置了 transition: translate，过渡却没出来，应该是 h5 的 dialog 的 open 看做 display 的修改了吧。我们设置过渡：\n\n```css\n@starting-style {\n  dialog[open] {\n    translate: 0 100vh;\n  }\n}\n```\n此时就有动画了。\n\n#### overlay 、:popover-open 与 ::backdrop\n\n![image.png](/img/posts/2024-1-2/2024-1-2-34.png)\n\ncss 原生也开始支持弹出层了，除了上面 h5 的 dialog，这里还有 popover 的 css 属性。\n\n官方 demo：[CSSWrapped2023 Overlay (codepen.io)](https://codepen.io/web-dot-dev/pen/zYeJbgw)\n\n## 7. 组件\n\n#### popover\n\n\n![image.png](/img/posts/2024-1-2/2024-1-2-35.png)\n\n该组件有如下特点：\n\n-   **晋升到顶层**。弹出式窗口会显示在网页其余部分之上的单独图层上，因此无需调整 z-index。\n-   **轻关闭功能**。点击弹出窗口区域以外的位置将关闭弹出窗口并返回焦点。\n-   **默认焦点管理**。打开弹出式窗口会使下一个标签页停止在弹出式窗口内显示。\n-   **无障碍键盘绑定。** 点按 `esc` 键或双重切换按钮会关闭弹出式窗口并返回焦点。\n-   **可访问的组件绑定**。从语义上将弹出式窗口元素连接到弹出式窗口触发器。\n\n只需要给一个普通的 div 加上 `popover` 属性，然后给按钮呢加上 `popovertarget` 对应这个 div 的 id 即可。详情可以查看 [demo](https://code.juejin.cn/pen/7319331878450757670):\n\n\n![image.png](/img/posts/2024-1-2/2024-1-2-36.png)\n\n#### hr 标签焕发新春\n\n之前对 hr 标签的理解就是很丑的横线，比较鸡肋，UI库都会去自己实现分割线，这与 H5 的初衷相违背，制定标准的人都希望自己的组件能被各个主流 UI 库使用来进行二次开发。\n\n\u003e 但现在路还很长，select 组件还是功能欠缺，各个UI库不得不自己实现\n\n现在 hr 可以和 select 结合使用了：\n\n```html\n\u003cselect name=\"majors\" id=\"major-select\"\u003e\n  \u003coption value=\"\"\u003eSelect a favorite feature\u003c/option\u003e\n  \u003chr\u003e\n  \u003coptgroup label=\"Foundations\"\u003e\n    \u003coption value=\"trig\"\u003eTrigonometric functions\u003c/option\u003e\n    \u003coption value=\"nth\"\u003eComplex nth-* selection\u003c/option\u003e\n    \u003coption value=\"nesting\"\u003eNesting\u003c/option\u003e\n    \u003coption value=\"subgrid\"\u003eSubgrid\u003c/option\u003e\n    \u003coption value=\"mq-ranges\"\u003eMedia query range syntax\u003c/option\u003e\n  \u003c/optgroup\u003e\n  ...\n```\n\n感觉还不错（但是原生 select 连搜索都不支持，可能企业级落地还有些困难）：\n\n\n![image.png](/img/posts/2024-1-2/2024-1-2-37.png)\n\n#### `:user-valid` 和 `:user-invalid`\n\n![image.png](/img/posts/2024-1-2/2024-1-2-38.png)\n\n这两个伪类是用于用户与输入内容校验的，在进行明显互动后校验表单是否无效。\n\n下面是个例子（校验原生 h5 表单的规则），可用于说明与 :valid 的区别：[表单校验](https://code.juejin.cn/pen/7319341325450412067)\n\n#### 手风琴组件\n\n\n![image.png](/img/posts/2024-1-2/2024-1-2-39.png)\n\n这个组件用的还是 h5 的 details 标签，不是个新东西了，但是其增加了`name` 属性的支持。使用此属性时，具有相同 `name` 值的多个 `\u003cdetails\u003e` 元素会形成语义组。\n\n我们来看 [demo](https://code.juejin.cn/pen/7319383154270142479)\n\n----\n\n## 8. 总结\n\n前端 CSS 的发展趋势是紧贴用户主流使用习惯，并借鉴各个 UI 库和框架的使用方式改造，与 H5 标签结合，力图完善自己的组件体系，跟上时代的变化潮流。整体方向如下：\n\n- 响应式和移动优先设计\n- CSS 变量与流程控制操作越来越多，打通与 js 的屏障\n- 动画与过渡优化\n- 颜色空间扩充\n- 易用性增强，函数扩充\n- 性能优化"])</script><script>self.__next_f.push([1,"1f:T6237,"])</script><script>self.__next_f.push([1,"Tailwind CSS是一个功能类优先的CSS框架，帮助开发者快速开发 CSS，灵活可定制。鉴于官网的描述比较晦涩，新手上手比较难，有各种坑需要踩，实操性不强，本期就带大家了解一下这个 CSS 快速开发框架的使用以及一些常用的配置。\n\n\u003e 本文写给没时间查阅文档，但又想快速上手的开发者。本文涉及到的知识，覆盖了平时业务开发的大多数场景，可供参考查阅\n\u003e  \n\u003e 开发环境：node16+ | VS Code\n\u003e \n\u003e [官网中文镜像](https://tailwind.nodejs.cn/)\n\n如果您已经掌握了 Tailwind 的基本原理，只想知道具体框架如何配置，可以直接跳转到下面对应章节查阅。\n\n\n----\n\n## 1. VS Code 插件\n\n\n![image.png](/img/posts/2023-11-11/2023-11-11-1.png)\n\n安装好后就可以有自动提示了：\n\n![image.png](/img/posts/2023-11-11/2023-11-11-2.png)\n\n插件还可以高亮错误. 预览内置css样式. 设置语言环境等，推荐 VS Code 用户使用。\n\n\n## 2. Tailwind CLI\n\n新建一个文件夹，在文件夹根目录下：\n\n```shell\nyarn add --dev tailwindcss\nnpx tailwindcss init\n```\n\n我们会看到一个配置文件 `tailwind.config.js` 在根目录下生成，我们添加要检索的文件：\n\n```js\n/** @type {import('tailwindcss').Config} */\nmodule.exports = {\n  content: ['./index.html'],\n  theme: {\n    extend: {},\n  },\n  plugins: [],\n}\n```\n\n这样，Tailwind 就只会检测 index.html 中是否使用了 tailwindcss，并声称最小 css 集合。我们写一下这个 index.html:\n\n```html\n\u003c!doctype html\u003e\n\u003chtml\u003e\n\u003chead\u003e\n  \u003ctitle\u003ehello\u003c/title\u003e\n  \u003cmeta charset=\"UTF-8\"\u003e\n  \u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"\u003e\n  \u003clink href=\"/dist/output.css\" rel=\"stylesheet\"\u003e\n\u003c/head\u003e\n\u003cbody\u003e\n  \u003ch1 class=\"text-3xl font-bold underline\"\u003e\n    Hello world!\n  \u003c/h1\u003e\n  \u003cbutton class=\"underline bg-violet-500 hover:bg-violet-600 active:bg-violet-700 focus:outline-none focus:ring focus:ring-violet-300 ...\"\u003e\n    Save changes\n  \u003c/button\u003e\n\u003c/body\u003e\n\u003c/html\u003e\n```\n然后在 src 目录下写一个 input.css 文件：\n\n```js\n@tailwind base;  // 引入基础样式，比如 body的margin. 样式继承规则等\n@tailwind components;  // 引入常用的组件样式，一般在其他前端框架中使用\n@tailwind utilities; // 工具样式，比如下划线. 字体颜色等\n```\n\n执行 cli：\n\n```shell\nnpx tailwindcss -i ./src/input.css -o ./dist/output.css --watch --config ./tailwind.config.js\n```\n\n这里的 `--config ./tailwind.config.js` 可以不写，默认会检索根目录下的同名文件。\n\n\n\u003e 这里有一个坑，如下图\n\n![image.png](/img/posts/2023-11-11/2023-11-11-3.png)\n\n如果你执行指令后出现 cli，有可能是输入输出的文件路径不对，也有可能是目标配置文件不存在，还有可能是你配置文件检测的 content 不存在或没有使用 tailwincss。我第一次出现这个错误，是误把 `--config` 写成了 `--content`...\n\n到此为止，就生成一个输出文件，工程目录如下：\n\n\n![image.png](/img/posts/2023-11-11/2023-11-11-4.png)\n \n由于 tailwindcss 只能运行在服务器环境，我们这里就搭建一个开发服务器来说明问题：\n\n```shell\nyarn add --dev http-server\n\nnpx http-server\n```\n服务跑起来：\n\n\n![image.png](/img/posts/2023-11-11/2023-11-11-5.png)\n\n我们打开 8080 端口查看：\n\n\n![image.png](/img/posts/2023-11-11/2023-11-11-6.png)\n\n样式已经上去了。\n\n## 3. 与 postcss 和 sass 结合使用\n\npostcss 用于格式化样式，使的样式更加规范统一，不会样式污染。我们使用一个依赖 postcss 的 autoprefixer 为样式自动增加前缀，执行如下指令：\n\n```shell\nyarn add --dev postcss autoprefixer postcss-nesting postcss-import\n```\n后两个依赖是实现级联 css 的解析 和 解析 @import 语句的。我们在根目录下新建文件 `postcss.config.js`，以插件的形式引入依赖:\n\n```js\nmodule.exports = {\n  plugins: {\n    'postcss-import': {},\n    'tailwindcss/nesting': 'postcss-nesting',\n    tailwindcss: {},\n    autoprefixer: {},\n  }\n}\n```\n\n将 input.css 改为 input.scss，并修改文件：\n\n```scss\n@tailwind base;\n@tailwind components;\n@tailwind utilities;\n\nbody {\n  h1 {\n    font-size: 64px !important;\n  }\n}\n\n@media (min-resolution: 2dppx) {\n  .image {\n    background-image: url(image@2x.png);\n  }\n}\n```\n\n然后执行 cli 指令，指明这个配置文件：\n\n```shell\nnpx tailwindcss -i ./src/input.scss -o ./dist/output.css --watch --postcss postcss.config.js\n```\n\n我们看看输出的 output.css：\n\n```css\nbody h1 {\n  font-size: 64px !important;\n}\n\n@media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 2dppx) {\n  .image {\n    background-image: url(image@2x.png);\n  }\n}\n```\n可以看到已经解析为普通的 css，并添加了兼容性前缀和自动计算兼容性单位。\n\n## 4. 内置样式类速查表\n\n\u003e 如果不想看速查，直接调到后边框架使用即可\n\n有一个初步认识后，我们这里来分类总结一下 tailwindcss 的常用样式类，如果想要看全部的样式，参见：[tailwind](https://tailwind.nodejs.cn/docs/preflight)。\n\n#### （1. 预检样式\n\n`@tailwind base;`\n\n他引入后，自动设置默认边距是0. 所有的标题标签的字体大小和权重继承他的包含块. 列表样式清除. 图片. iframe等多媒体标签自动为块级. 图片视频自动被限制为最大父级宽度. 重写默认边框样式等。\n\n当然你也可以扩展预检范围：\n\n```css\n@tailwind base;\n@layer base { h1 { @apply text-2xl; } }\n```\n\n预检样式表如下：https://unpkg.com/tailwindcss@3.3.5/src/css/preflight.css\n\n#### （2. 布局\n\n纵横比：\n\nClass         | Properties            |\n| ------------- | --------------------- |\n| aspect-auto   | aspect-ratio: auto;   |\n| aspect-square | aspect-ratio: 1 / 1;  |\n| aspect-video  | aspect-ratio: 16 / 9;|\n\n响应式容器：\n\nClass        | Breakpoint         | Properties   |\n| ------------ | ------------------ | ------------ |\n| container    | None               | width: 100%; |\n|| sm (640px)   | max-width: 640px;  |            \n|| md (768px)   | max-width: 768px;  |            \n|| lg (1024px)  | max-width: 1024px; |             \n|| xl (1280px)  | max-width: 1280px; |             \n|| 2xl (1536px) | max-width: 1536px;|\n\n使用举例：\n\n\n![image.png](/img/posts/2023-11-11/2023-11-11-7.png)\n\n#### （3. 列布局\n\nClass     | Properties  | note |\n| --------- | ----------- | -- |\n| columns-`{num}` | columns: 1; | num可取： `[1-12]` |\n| columns-auto | columns: auto; |  |\ncolumns-3xs | columns: 16rem; /* 256px */ ||\n| columns-2xs | columns: 18rem; /* 288px */||\ncolumns-xs | columns: 20rem; /* 320px */ ||\n| columns-sm | columns: 24rem; /* 384px */ ||\n| columns-md | columns: 28rem; /* 448px */ ||\n| columns-lg | columns: 32rem; /* 512px */ ||\n| columns-xl | columns: 36rem; /* 576px */||\n| columns-`{num}`xl | columns: 36rem 的 num 倍 |num可取： `[2-7]` |\n\n文章最后我们会有一个实战说明\n\n#### （4. 溢出处理\n\nClass              | Properties           |\n| ------------------ | -------------------- |\n| overflow-auto      | overflow: auto;      |\n| overflow-hidden    | overflow: hidden;    |\n| overflow-clip      | overflow: clip;      |\n| overflow-visible   | overflow: visible;   |\n| overflow-scroll    | overflow: scroll;    |\n| overflow-x-auto    | overflow-x: auto;    |\n| overflow-y-auto    | overflow-y: auto;    |\n| overflow-x-hidden  | overflow-x: hidden;  |\n| overflow-y-hidden  | overflow-y: hidden;  |\n| overflow-x-clip    | overflow-x: clip;    |\n| overflow-y-clip    | overflow-y: clip;    |\n| overflow-x-visible | overflow-x: visible; |\n| overflow-y-visible | overflow-y: visible; |\n| overflow-x-scroll  | overflow-x: scroll;  |\n| overflow-y-scroll  | overflow-y: scroll;|\n\n#### （5. 定位\n\n| Class    | Properties          |\n| -------- | ------------------- |\n| static   | position: static;   |\n| fixed    | position: fixed;    |\n| absolute | position: absolute; |\n| relative | position: relative; |\n| sticky   | position: sticky;|\n\n#### （6. display\n\nClass        | Properties             |\n| ------------ | ---------------------- |\n| block        | display: block;        |\n| inline-block | display: inline-block; |\n| inline       | display: inline;       |\n| flex         | display: flex;|\n|...||\n\nflex 对其方式：\n\njustify-center  | justify-content: center;        |\n| --------------- | ------------------------------- |\n| justify-between | justify-content: space-between; |\n| justify-around  | justify-content: space-around;|\n| items-start  | align-items: flex-start; |\n| items-end    | align-items: flex-end;   |\n| items-center | align-items: center;|\n\n\n#### （7. 边距\n\nClass | Properties                             |\n| ----- | -------------------------------------- |\n| p-0   | padding: 0px;                          |\n| px-0  | padding-left: 0px; padding-right: 0px; |\n| py-0  | padding-top: 0px; padding-bottom: 0px;|\n|...||\n\nClass | Properties                           |\n| ----- | ------------------------------------ |\n| m-0   | margin: 0px;                         |\n| mx-0  | margin-left: 0px; margin-right: 0px; |\n| my-0  | margin-top: 0px; margin-bottom: 0px;|\n|...||\n\n如果设置单个边距，可使用缩写：pl-1：padding-left: 1px，以此类推\n\n#### （8. 文本类\n\n| Class         | Properties                                                      |\n| ------------- | --------------------------------------------------------------- |\n| truncate      | overflow: hidden; text-overflow: ellipsis; white-space: nowrap; |\n| text-ellipsis | text-overflow: ellipsis;                                        |\n| text-clip     | text-overflow: clip;|\n|...||\n\n#### （9. 边框\n\nClass    | Properties         |\n| -------- | ------------------ |\n| border-0 | border-width: 0px; |\n| border-2 | border-width: 2px; |\n| border-4 | border-width: 4px; |\n| border-8 | border-width: 8px; |\n| border   | border-width: 1px;|\n| rounded-md| border-radius: 0.375rem |\n...\n\n#### （10. 动画\n\nClass          | Properties                                                                                                                                                                                                                                     |\n| -------------- | ---------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- |\n| animate-none   | animation: none;                                                                                                                                                                                                                               |\n| animate-spin   | animation: spin 1s linear infinite; `@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }`                                                                                                                    |\n| animate-ping   | animation: ping 1s cubic-bezier(0, 0, 0.2, 1) infinite; `@keyframes ping { 75%, 100% { transform: scale(2); opacity: 0; } }    `                                                                                                                 |\n| animate-pulse  | animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; `@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } } `                                                                                                                 |\n| animate-bounce | animation: bounce 1s infinite; `@keyframes bounce { 0%, 100% { transform: translateY(-25%); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); } 50% { transform: translateY(0); animation-timing-function: cubic-bezier(0, 0, 0.2, 1); } }`|\n\n\n#### （11. 颜色\n\n- bg 开头 (css 中 theme(textColor.) 或 theme(colors.) 开头) 表示背景色，通过插件可以自己选择：\n\n\n![image.png](/img/posts/2023-11-11/2023-11-11-8.png)\n\n- text (css 中 theme(textColor.) 或 theme(colors.)) 开头表示文字颜色：\n\n\n![image.png](/img/posts/2023-11-11/2023-11-11-9.png)\n\n#### （12. 事件\n\n- snap 或 scroll 开头：监听滚动事件，参考 [滚动](https://tailwind.nodejs.cn/docs/scroll-snap-align)\n- hover: 开头：监听鼠标悬浮事件\n- active: 和 focus: 开头：捕获激活的和聚焦的元素\n- first: 捕获第一个元素\n- odd: 和 even: 捕获奇偶元素\n- 还可以捕获伪元素：after: 等：[伪元素](https://tailwind.nodejs.cn/docs/hover-focus-and-other-states#pseudo-elements)\n\n#### （插件\n\n[排版插件](https://tailwind.nodejs.cn/docs/typography-plugin)：\n\n```\nyarn add --dev @tailwindcss/typography\n```\n\n添加配置文件：\n\n```js\nplugins: [ require('@tailwindcss/typography') ],\n```\n\n使用：\n\n```html\n\u003carticle class=\"prose lg:prose-xl\"\u003e\n```\n\n[表单插件](https://github.com/tailwindlabs/tailwindcss-forms):\n\n```shell\nyarn add --dev @tailwindcss/forms\n```\n\n配置：\n\n```js\nplugins: [\n  require('@tailwindcss/forms'),\n  // ...\n],\n```\n\n使用：\n\n```html\n\u003cinput type=\"email\" class=\"form-input px-4 py-3 rounded-full\"\u003e\n\n\u003cselect class=\"form-select px-4 py-3 rounded-full\"\u003e\n\u003c!-- ... --\u003e\n\u003c/select\u003e\n```\n\n可用样式：\n\n|元素|class|\n| ------------------- | ------------------ |\n|`input`     | `form-input`       |\n| `textarea`          | `form-textarea`    |\n| `select`            | `form-select`      |\n| `select[multiple]`  | `form-multiselect` |\n| `[type='checkbox']` | `form-checkbox`    |\n| `[type='radio']`    | `form-radio`|\n\n\n## 5. 自定义样式\n\n在配置文件中可以这样写：\n\n```js\ntheme: {\n    extend: {\n      spacing: {\n        '8xl': '96rem',\n        '9xl': '128rem',\n      },\n    },\n    screens: {\n        'sm': '640px', // =\u003e @media (min-width: 640px) \n        ...\n    },\n    colors: {\n      'text-blue': '#4848ff'\n    }\n  },\n```\n\n这样就可以使用了。\n\n在 css 中使用：\n\n```css\ncolor: theme('colors.text-blue');\nmax-width: theme('spacing.8xl');\n@media (min-width: theme('screens.sm')) {}\n```\n\n在 html 中使用：\n\n```html\n\u003cp class=\"text-text-blue\"\u003e\n\u003cdiv class=\"mb-8xl\"\u003e \u003c!-- mb 是 margin bottom --\u003e\n\u003cdiv class=\"sm:flex\"\u003e \u003c!-- 这个元素在屏幕宽度大于等于 'md' 时将使用 flex 布局 --\u003e\n```\n\n\u003e 类名中，颜色会自动加入 text 前缀。由于类名没有规则，不太好记，推荐新手使用 css 来引入自己的自定义主题\n\n## 6. Nextjs 中使用\n\n执行命令行：\n\n```sh\nnpx create-next-app@latest\n```\n\n可选择项选择如下：\n\n![image.png](/img/posts/2023-11-11/2023-11-11-10.png)\n\n\u003e App router 是另一种路由方式，每一个文件夹是一个页面，入口文件都是 page.tsx，可参考：https://nextjs.org/docs/app/building-your-application/routing/route-groups\n\n工程目录生成后，项目会自动在根目录下建立 postcss.config.js 和 tailwind.config.js。\n\n项目目录如下：\n\n![image.png](/img/posts/2023-11-11/2023-11-11-11.png)\n\n我们配置入口 page.tsx:\n\n```tsx\nexport default function Home() {\n  return (\n    \u003cmain className=\"flex min-h-screen flex-col items-center justify-between p-24\"\u003e\n      \u003ch1 className=\"text-3xl font-bold underline\"\u003e\n        Hello world!\n      \u003c/h1\u003e\n    \u003c/main\u003e\n  )\n}\n```\n页面上查看：\n\n\n![image.png](/img/posts/2023-11-11/2023-11-11-12.png)\n\n#### 在 css module 中使用\n\n我们在 dashboard/index.module.css 中写入：\n\n```css\n.container {\n  color: theme(textColor.purple.400);\n}\n```\n在 dashboard/page.tsx 中引入：\n\n```tsx\nimport styles from './index.module.css';\n\nexport default function Page() {\n  return \u003ch1 className={`${styles['container']}`}\u003eHello, Dashboard page!\u003c/h1\u003e\n}\n```\n\n我们访问页面查看：\n\n\n![image.png](/img/posts/2023-11-11/2023-11-11-13.png)\n\n#### 在 mdx 文件中使用\n\n若要在 mdx 文件中使用，App Router 需要如下配置：\n\n安装依赖：\n\n```sh\nyarn add  @next/mdx @mdx-js/loader @mdx-js/react @types/mdx\n```\n\n在 src 目录下配置 mdx-components.tsx：\n\n```tsx\nimport type { MDXComponents } from 'mdx/types'\n \nexport function useMDXComponents(components: MDXComponents): MDXComponents {\n  return {\n    ...components,\n  }\n}\n```\n然后新建一个包含 mdx 文件的目录：\n\n\n![image.png](/img/posts/2023-11-11/2023-11-11-14.png)\n\npage.mdx 写道：\n\n```mdx\n\u003cdiv className=\"bg-blue-500 p-4\"\u003e\n  This is a styled div.\n\u003c/div\u003e\n\nHello Mdx\n```\n\n页面查看：\n\n\n![image.png](/img/posts/2023-11-11/2023-11-11-15.png)\n\n样式生效了！\n\n\n## 7. vite 项目中使用\n\n我们先通过 vite 创建一个 vue 项目：\n\n```sh\nnpm create vite@latest my-project -- --template vue\n```\n\n然后进入工程根目录下，安装依赖和初始化配置：\n\n```sh\nyarn add --dev tailwindcss postcss autoprefixer\nnpx tailwindcss init -p\n```\n\n配置文件 tailwind.config.js 中写入你要拦截的使用了css资源的文件内容：\n\n```js\nexport default {\n  content: [\n    \"./index.html\",\n    \"./src/**/*.{vue,js,ts,jsx,tsx}\",\n  ],\n  theme: {\n    extend: {},\n  },\n  plugins: [],\n}\n```\n\n在 style.css 中引入：\n\n```css\n@tailwind base;\n@tailwind components;\n@tailwind utilities;\n```\n\n我们把 App.vue 中自带的所有样式清空，写下如下的测试代码：\n\n```vue\n// 文字粗体. 带下划线. 3xl大小\n\u003ch1 class=\"text-3xl font-bold underline\"\u003e Hello world! \u003c/h1\u003e\n```\n\n运行服务，可以看到效果已经出来：\n\n\n![image.png](/img/posts/2023-11-11/2023-11-11-16.png)\n\n\n## 8. Nuxtjs 项目中使用\n\nnuxtjs 推荐使用支持 vue3 的模块化方案 nuxi。我们先初始化项目：\n\n```sh\nnpx nuxi init my-project\n```\n\n然后进入根目录下安装依赖：\n\n```sh\nyarn\nnpx nuxi module add @nuxtjs/tailwindcss\nnpx tailwindcss init\n```\n这里不需要手动修改 tailwin.config.js，使用默认值就可以，看来 nuxt 的集成度还挺高的。直接启动项目，修改 app.vue:\n\n```vue\n\u003ctemplate\u003e\n\u003ch1 class=\"text-3xl font-bold underline\"\u003e\n  Hello world!\n\u003c/h1\u003e\n\u003c/template\u003e\n```\n\n查看效果：\n\n\n![image.png](/img/posts/2023-11-11/2023-11-11-17.png)\n\n## 9. 实战\n\n#### （1. 切换主题\n\ntailwindcss 内置了 dark 夜间模式，可以支持白天和黑夜的切换。比如使用官方的这个例子，使用浏览器 `prefers-color-scheme` 媒体功能进行变换：\n\n```html\n\u003cdiv class=\"bg-white dark:bg-slate-800 rounded-lg px-6 py-8 ring-1 ring-slate-900/5 shadow-xl\"\u003e\n  \u003cdiv\u003e\n    \u003cspan class=\"inline-flex items-center justify-center p-2 bg-indigo-500 rounded-md shadow-lg\"\u003e\n      \u003csvg class=\"h-6 w-6 text-white\" xmlns=\"http://www.w3.org/2000/svg\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" aria-hidden=\"true\"\u003e\u003c!-- ... --\u003e\u003c/svg\u003e\n    \u003c/span\u003e\n  \u003c/div\u003e\n  \u003ch3 class=\"text-slate-900 dark:text-white mt-5 text-base font-medium tracking-tight\"\u003eWrites Upside-Down\u003c/h3\u003e\n  \u003cp class=\"text-slate-500 dark:text-slate-400 mt-2 text-sm\"\u003e\n    The Zero Gravity Pen can be used to write in any orientation, including upside-down. It even works in outer space.\n  \u003c/p\u003e\n\u003c/div\u003e\n```\n\n他会自动识别操作系统是否是夜间模式，并应用 dark:后边的属性。\n\n如果想要手动切换夜间模式，可以在配置文件里这样配置：\n\n```js\nmodule.exports = {\n  darkMode: 'class', // media 是自动识别\n}\n```\n\n此时将 html 设置为夜间模式即可：\n\n```html\n\u003chtml class=\"dark\"\u003e\n```\n\n\u003e 注意：配置项中使用了 darkMode 后，不能再出现 theme 字段，否则下面的会覆盖上面的配置\n\n\n![image.png](/img/posts/2023-11-11/2023-11-11-18.png)\n\n你可以使用用户的系统偏好（页面上放置开关控制 localStorage 里 theme 变化）或使用 [`Window.matchMedia()` API](https://developer.mozilla.org/en-US/docs/Web/API/Window/matchMedia) 来获取当前操作系统是否为夜间模式：\n\n```js\nwindow.matchMedia('(prefers-color-scheme: dark)').matches\n```\n检测到当前为夜间模式时，修改 html 标签的 class，添加 `dark` 即可。\n\n这里有个问题，就是两种模式每一个文字. 背景都要指定颜色，这个可以提出到公共样式中使用：\n\n```scss\n.box {\n  @apply bg-white text-black;\n}\n\nhtml.dark {\n  .box {\n    @apply bg-slate-800 text-white;\n  }\n}\n```\n\n这样在定义类的时候，就会容易一些：\n\n```html\n// 白天\n\u003chtml\u003e\n  \u003cdiv class=\"box\"\u003e\u003c/box\u003e\n\u003c/html\u003e\n\n// 夜晚\n\u003chtml class=\"dark\"\u003e\n  \u003cdiv class=\"box\"\u003e\u003c/box\u003e\n\u003c/html\u003e\n```\n\n#### （2. 瀑布流布局\n\n\u003e 这是官网样例\n\n瀑布流的精髓在于各种不同尺寸的图片能够完美的计算高度并逐次排队。我们假设要显示三列图片，我们就设置一个响应式的列布局盒子容器：\n\n```html\n\u003cdiv class=\"columns-2 sm:columns-3 gap-8\"\u003e\n```\n此时，样式如下：\n\n![image.png](/img/posts/2023-11-11/2023-11-11-19.png)\n\n表示在 大于 sm 尺寸下，使用 3列布局，否则使用 2列布局。gap 表示每一列之间的间距，不设置的话默认 16px (继承属性，chrome 是 16px)。\n\n容器内放置一个一个的图片。我们分别使用 div 来包裹图片：\n\n```html\n\u003cdiv class=\"aspect-w-16 aspect-h-9\"\u003e\n  \u003cimg class=\"w-full object-cover rounded-lg\" src=\"\"\u003e\n\u003c/div\u003e\n```\n-   `aspect-w-16`: 这个类表示设置一个元素的宽度，使其宽度为高度的16倍。\n-   `aspect-h-9`: 这个类表示设置一个元素的高度，使其高度为宽度的9倍。\n\n当然这两个类是已知图片长宽比时可以这么写，不知道的话就不写。.w-full 表示宽度撑满该列，object-cover 元素被缩放以覆盖整个容器框，但可能会被裁剪。\n\n因为是列式布局，是从左开始，从上往下布局的，所以之后的元素都需要加上 margin：\n\n```html\n\u003cdiv class=\"aspect-w-1 aspect-h-1 mt-8\"\u003e\n```\n然后我们再加上外边框和居中样式美化，全部代码如下：\n\n```html\n\u003cbody class=\"p-12 m-auto\"\u003e\n  \u003cdiv class=\"container flex justify-center\"\u003e\n    \u003cdiv class=\"columns-2 sm:columns-3 gap-8\"\u003e\n      \u003cdiv\u003e\n        \u003cimg class=\"w-full object-cover rounded-lg\" src=\"https://images.unsplash.com/photo-1454496522488-7a8e488e8606?ixlib=rb-1.2.1\u0026amp;ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8\u0026amp;auto=format\u0026amp;fit=crop\u0026amp;w=2952\u0026amp;q=80\"\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\" aspect-w-1 aspect-h-1 mt-8\"\u003e\n        \u003cimg class=\"w-full object-cover rounded-lg\" src=\"https://images.unsplash.com/photo-1434394354979-a235cd36269d?ixlib=rb-1.2.1\u0026amp;ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8\u0026amp;auto=format\u0026amp;fit=crop\u0026amp;w=2902\u0026amp;q=80\"\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"aspect-w-1 aspect-h-1 mt-8\"\u003e\n        \u003cimg class=\"w-full object-cover rounded-lg\" src=\"https://images.unsplash.com/photo-1491904768633-2b7e3e7fede5?ixlib=rb-1.2.1\u0026amp;ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8\u0026amp;auto=format\u0026amp;fit=crop\u0026amp;w=3131\u0026amp;q=80\"\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"sm:block  aspect-w-1 aspect-h-1 mt-8\"\u003e\n        \u003cimg class=\"w-full object-cover rounded-lg\" src=\"https://images.unsplash.com/photo-1463288889890-a56b2853c40f?ixlib=rb-1.2.1\u0026amp;ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8\u0026amp;auto=format\u0026amp;fit=crop\u0026amp;w=3132\u0026amp;q=80\"\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"sm:block  aspect-w-16 aspect-h-9 mt-8\"\u003e\n        \u003cimg class=\"w-full object-cover rounded-lg\" src=\"https://images.unsplash.com/photo-1611605645802-c21be743c321?ixlib=rb-1.2.1\u0026amp;ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8\u0026amp;auto=format\u0026amp;fit=crop\u0026amp;w=2940\u0026amp;q=80\"\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"sm:block  aspect-w-1 aspect-h-1 mt-8\"\u003e\n        \u003cimg class=\"w-full object-cover rounded-lg\" src=\"https://images.unsplash.com/photo-1498603993951-8a027a8a8f84?ixlib=rb-1.2.1\u0026amp;ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8\u0026amp;auto=format\u0026amp;fit=crop\u0026amp;w=2936\u0026amp;q=80\"\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"sm:block  aspect-w-1 aspect-h-1 mt-8\"\u003e\n        \u003cimg class=\"w-full object-cover rounded-lg\" src=\"https://images.unsplash.com/photo-1526400473556-aac12354f3db?ixlib=rb-1.2.1\u0026amp;ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8\u0026amp;auto=format\u0026amp;fit=crop\u0026amp;w=2940\u0026amp;q=80\"\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"sm:block  aspect-w-1 aspect-h-1 mt-8\"\u003e\n        \u003cimg class=\"w-full object-cover rounded-lg\" src=\"https://images.unsplash.com/photo-1617369120004-4fc70312c5e6?ixlib=rb-1.2.1\u0026amp;ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8\u0026amp;auto=format\u0026amp;fit=crop\u0026amp;w=1587\u0026amp;q=80\"\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"sm:block  aspect-w-16 aspect-h-9 mt-8\"\u003e\n        \u003cimg class=\"w-full object-cover rounded-lg\" src=\"https://images.unsplash.com/photo-1518892096458-a169843d7f7f?ixlib=rb-1.2.1\u0026amp;ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8\u0026amp;auto=format\u0026amp;fit=crop\u0026amp;w=2940\u0026amp;q=80\"\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\n\u003c/body\u003e\n```\n\n效果图：\n\n大屏：\n\n\n![image.png](/img/posts/2023-11-11/2023-11-11-20.png)\n\n小屏：\n\n\n![image.png](/img/posts/2023-11-11/2023-11-11-21.png)\n\n#### （3. 写一个带动画的组件\n\ntailwindcss 内置了一个小型的动画库，可以使用类来控制。下面的代码是一个弹跳的按钮：\n\n```html\n\u003cbutton type=\"button\" class=\"animate-bounce bg-indigo-500 text-white p-2 rounded-md\"\u003e\n  Hello World\n\u003c/button\u003e\n```\n\n效果如下：\n\n![屏幕录制2023-11-16-下午2.37.29.gif](/img/posts/2023-11-11/2023-11-11-22.gif)\n\n\n-----\n\n大致讲解就这么多啦，债见！"])</script><script>self.__next_f.push([1,"20:T3797,"])</script><script>self.__next_f.push([1,"## 1. Hooks\n\n### use\n\n`use` 是一个可以在分支跟循环中使用的 React Hook，它可以让你读取类似于 [Promise](https://developer.mozilla.org/zh-CN/docs/Web/JavaScript/Reference/Global_Objects/Promise) 或 [context](https://zh-hans.react.dev/learn/passing-data-deeply-with-context) 的资源的值。\n\n\u003e `use` Hook 目前仅在 canary 与 experimental 渠道中可用\n\n- 使用 use 读取 context 的值\n\n```js\nconst theme = use(ThemeContext);\n```\n此时类似于 useContext，不过 use 更加灵活。React 会搜索组件树并找到 最接近的 context provider 以确定需要返回的 context 值。它向上搜索并忽略调用 `use(context)` 的组件本身中的 context provider。\n\n- 传递 promise 的值\n\n如果你使用了服务端渲染 API 来手动配置 SSR，你可能会在服务端推送一个流式（stream）数据，在客户端可以使用 use 接受。\n\n```js\n// 根组件通过 fetchMessage 获取流，包装为 promise 给到 Message组件\nexport default function App() {\n  const messagePromise = fetchMessage();\n  return (\n    \u003cSuspense fallback={\u003cp\u003ewaiting for message...\u003c/p\u003e}\u003e\n      \u003cMessage messagePromise={messagePromise} /\u003e\n    \u003c/Suspense\u003e\n  );\n}\n```\n\nMessage组件中：\n\n```js\n// message.js\n'use client';\n\nimport { use } from 'react';\n\nexport function Message({ messagePromise }) {\n  const messageContent = use(messagePromise);\n  return \u003cp\u003eHere is the message: {messageContent}\u003c/p\u003e;\n}\n```\n\nuse 可以和 Suspense 联动，当传递的 promise 没有 fullfill 时，loading 一直生效，当 promise 成功以后，显示 resolve 的值。\n\n\u003e 将来自服务器组件的 Promise 传递至客户端组件时，其解析值必须可序列化以在服务器和客户端之间传递。像函数这样的数据类型不可序列化，不能成为这种 Promise 的解析值。\n\n- 处理 promise 错误边界\n\n当 promise 报错时，use 需要手动设置捕获错误：\n\n```js\nimport { ErrorBoundary } from \"react-error-boundary\";\n\n\u003cErrorBoundary fallback={\u003cp\u003e⚠️Something went wrong\u003c/p\u003e}\u003e\n  \u003cSuspense fallback={\u003cp\u003e⌛Downloading message...\u003c/p\u003e}\u003e\n    \u003cMessage messagePromise={messagePromise} /\u003e\n  \u003c/Suspense\u003e\n\u003c/ErrorBoundary\u003e\n```\n\n上面的示例使用了第三方库，如果不使用 ErrorBoundary 包裹，还可以这样写：\n\n```js\n  const messagePromise = new Promise((resolve, reject) =\u003e {\n    reject();\n  }).catch(() =\u003e {\n    return \"no new message found.\";\n  });\n```\n使用 promise 自带的 catch 捕获错误。catch 中 return 的内容，会被视作正常的返回。\n\n\u003e 不能在 React 组件或 Hook 函数之外调用 `use`，或者在 try-catch 块中调用 `use`\n\n### useOptimistic\n\n\u003e `useOptimistic` Hook 目前仅在 canary 与 experimental 渠道中可用\n\n这个 hook 用于优化 UI 的更新。\n\n考虑下面的场景，界面上一个按钮，点击可以异步调用发送接口：\n\n```js\n\u003cform action={formAction} ref={formRef}\u003e\n  \u003cinput type=\"text\" name=\"message\" placeholder=\"Hello!\" /\u003e\n  \u003cbutton type=\"submit\"\u003eSend\u003c/button\u003e\n\u003c/form\u003e\n```\n\n表单响应，在发送完数据后显示发送的数据：\n\n```js\nasync function formAction(formData) {\n  // 这一条现在没有，下面引入乐观消息时加入\n  addOptimisticMessage(formData.get(\"message\"));\n  formRef.current.reset();\n  await sendMessage(formData);\n}\n\nasync function sendMessage(formData) {\n  // deliverMessage 是 API 的调用\n  const sentMessage = await deliverMessage(formData.get(\"message\"));\n  setMessages([...messages, { text: sentMessage }]);\n}\n```\n这里有个问题，sendMessage 是个异步任务，在发送完成后，调用 setMessages 改变 state 的值，这时在发送记录列表里就会有一条记录。但是在发送过程中，该记录是不会出现的。\n\n此时，我们声明一个乐观状态：\n\n```js\n const [optimisticMessages, addOptimisticMessage] = useOptimistic(\n    messages,\n    (state, newMessage) =\u003e [\n      ...state,\n      {\n        text: newMessage,\n        sending: true\n      }\n    ]\n  );\n```\n他第一个参数是刚刚的 state：messages，第二个参数是一个回调，实时接受最新的状态并返回自定义的结构。\n\n我们在列表渲染的地方就可以这样写了：\n\n```js\n{optimisticMessages.map((message, index) =\u003e (\n    \u003cdiv key={index}\u003e\n      {message.text}\n      {!!message.sending \u0026\u0026 \u003csmall\u003e (Sending...)\u003c/small\u003e}\n    \u003c/div\u003e\n))}\n```\n这样，在发送的过程中，addOptimisticMessage 被调用了，数组追加的那个元素处于 sending 中，就会显示 sending 的文本；在接口请求成功后，optimisticMessages 会检测到请求完毕，自动离场。我们实验两次，打印一下这个 optimisticMessages 状态的值：\n\n\n![image.png](/img/posts/2023-11-9/2023-11-9-1.png)\n\n当接口调用完毕后，因为调用了 sendMessage，所以 addOptimisticMessages 和 messages 两个状态就趋于一致了。\n\n\u003e **useOptimistic** 是一种乐观更新机制，主要应用于需要与服务器进行异步交互的场景，如消息发送。在这种机制下，通常希望优先显示新数据或新状态，而不是等待服务器返回响应后再进行更新；\n\u003e \n\u003e **useTransition** 主要解决的是在界面切换过程中可能出现的内容加载问题。它允许组件在切换到下一个界面之前等待内容加载，从而避免出现不必要的加载状态。\n\n### useFormState\n\n\u003e `useFormState` Hook 目前仅在 canary 与 experimental 渠道中可用\n\n`useFormState` 是 react-dom 库下的 hook，允许根据表单操作的结果更新状态。我们可以这样使用：\n\n```js\nfunction AddToCartForm({itemID, itemTitle}) {\n  const [message, formAction] = useFormState(addToCart, null);\n  return (\n    \u003cform action={formAction}\u003e\n      \u003ch2\u003e{itemTitle}\u003c/h2\u003e\n      \u003cinput type=\"hidden\" name=\"itemID\" value={itemID} /\u003e\n      \u003cbutton type=\"submit\"\u003eAdd to Cart\u003c/button\u003e\n      {message}\n    \u003c/form\u003e\n  );\n}\n```\n其中 action.js\n\n```js\n\"use server\";\n\n// 模拟服务端入库响应\nexport async function addToCart(prevState, queryData) {\n  const itemID = queryData.get('itemID');\n  if (itemID === \"1\") {\n    return \"Added to cart\";\n  } else {\n    return \"Couldn't add to cart: the item is sold out.\";\n  }\n}\n```\n\nuseFormState 第一个参数是action触发函数，第二个是 初始值。当触发 action 提交时，第一个参数会被调用，addToCart 接受两个参数，第一个是变化前 message 的值，第二个是 formData 对象，其返回的值会复制到 message 里，并显示在界面上。\n \nmessage 可以理解为验证表单后的返回值。\n\n上面代码执行流程：\n\n点击提交 ==\u003e 触发 addToCart ==\u003e 返回表单处理的结果，自动赋值给 message\n\n\u003e 这个 hook 可以用于表单校验后的错误/信息展示，只支持在客户端使用\n\n### useFormStatus\n\n\u003e `useFormStatus` Hook 目前仅在 canary 与 experimental 渠道中可用\n\n与 useFormState 都是 react-dom 库下的 hook，但是与前者统一收集表单校验状态不同，`useFormStatus` 是一个提供表单提交后状态信息的 Hook。\n\n其使用在表单内部：\n\n```js\n\u003cform action={submitForm}\u003e\n  \u003cUsernameForm /\u003e\n\u003c/form\u003e\n\n...\n\nexport async function submitForm(query) {\n  await new Promise((res) =\u003e setTimeout(res, 1000));\n}\n```\n我们在 UsernameForm 中定义一个：\n\n```js\nconst {pending, data} = useFormStatus();\n\n...\n\u003cbutton type=\"submit\" disabled={pending}\u003e\n  {pending ? '提交中……' : '提交'}\n\u003c/button\u003e\n{showSubmitted ? (\n  \u003cp\u003e提交请求用户名：{submittedUsername.current}\u003c/p\u003e\n) : null}\n```\n\n表单的提交 action 是一个异步请求，比如 Promise，当异步请求没有结束时，pending 就会是 true，该过程中 data 便是整个表单提交的数据信息。这个 hook 相当于在提交过程中将表单数据和提交进度暴露了出来，便于前端展示对应的响应式页面。\n\n## 2. APIs\n\n### cache\n\n`cache` 允许缓存数据获取或计算的结果。他可以在**任何组件之外**调用，是缓存 hook 的通用形式。\n\n\u003e `cache` 仅在 React 的 [Canary](https://zh-hans.react.dev/community/versioning-policy#canary-channel) 和 [experimental](https://zh-hans.react.dev/community/versioning-policy#experimental-channel) 渠道中可用\n\n- 缓存重复计算\n\n比如我们有一个很复杂的计算：\n\n```js\nimport calculateUserMetrics from 'lib/user';\n\nconst getUserMetrics = cache(calculateUserMetrics);\n```\n使用 cache 缓存以后，在函数里直接引用即可：\n\n```js\nfunction TeamReport({users}) {\n  for (let user in users) {\n    const metrics = getUserMetrics(user);\n    // ...\n  }\n  // ...\n}\n```\n\ncache 接受一个函数当做计算函数，cache 返回的值为一个单例函数，决定这个函数是否获取缓存的唯一指标就是传入的值是否一致，如果两次换入的参数（上面的例子是 user 对象）引用相同，则第二次使用缓存。\n\n- 缓存 API 数据\n\n```js\nconst getTemperature = cache(async (city) =\u003e {\n\treturn await fetchTemperature(city);\n});\n\n// 使用\nasync function AnimatedWeatherCard({city}) {\n\tconst temperature = await getTemperature(city);\n\t// ...\n}\n```\n\n类似地，他可以接受异步函数作为计算函数传入，传入的 city 为相同的值时，直接取缓存。\n\n- 预加载数据\n\n可以用 cache 手动配置预加载，在页面初始化时预先获取数据：\n\n```js\nconst getUser = cache(async (id) =\u003e {\n  return await db.user.query(id);\n})\n...\nfunction Home({id}) {\n  // ✅ 正确示例：开始获取用户数据。\n  getUser(id);\n  // ……一些计算工作\n  return (\n    \u003c\u003e\n      \u003cProfile id={id} /\u003e\n    \u003c/\u003e\n  );\n}\n```\n这样，在改登录用户的任意页面，都可以我延时获取用户信息：\n\n```js\nconst user = await getUser(id);\n```\n\n### experimental_taintObjectReference\n\n这个 API 还不稳定，还在开发中，用于阻止特定用户数据对象实例被传递给客户端组件，例如 `user` 对象。\n\n```js\nimport {experimental_taintObjectReference} from 'react';\n\nexport async function getUser(id) {\n  const user = await db`SELECT * FROM users WHERE id = ${id}`;\n  experimental_taintObjectReference(\n    'Do not pass the entire user object to the client. ' +\n      'Instead, pick off the specific properties you need for this use case.',\n    user,\n  );\n  return user;\n}\n```\n他的字面意思是污染对象引用，就是说将 user 劫持了，不给你客户端用了。目前落地实现还不明确，期待正式版本。\n\n### experimental_taintUniqueValue\n\n这个 API 还不稳定，还在开发中，用于防止将唯一值传递给客户端组件，例如密码、密钥或令牌。\n\n```js\nimport {experimental_taintUniqueValue} from 'react';\n\nexport async function getUser(id) {\n  const user = await db`SELECT * FROM users WHERE id = ${id}`;\n  experimental_taintUniqueValue(\n    'Do not pass a user session token to the client.',\n    user,\n    user.session.token\n  );\n  return user;\n}\n```\n\n官方只给了这么个例子，具体使用细节还有待考证。\n\n## 3. 指令\n\n指令这个概念在 react 中算是一个稀奇事，vue 中有 v-if，ng 中天然内置 Directive，react 中这也开始引入指令的概念了。\n\n### use client\n\n用于服务端渲染代码里。React 服务端组件默认是走 SSR 的，使用这个指令指定当前文件是属于客户端的。\n\n可以这样使用：\n\n```js\n'use client';\n\nimport { useState } from 'react';\nimport inspirations from './inspirations'; // 字库，这里可忽略\nimport FancyText from './FancyText';  // 展示文字的组件\n\nexport default function InspirationGenerator({children}) {\n  const [index, setIndex] = useState(0);\n  const quote = inspirations[index];\n  const next = () =\u003e setIndex((index + 1) % inspirations.length);\n\n  return (\n    \u003c\u003e\n      \u003cp\u003eYour inspirational quote is:\u003c/p\u003e\n      \u003cFancyText text={quote} /\u003e\n      \u003cbutton onClick={next}\u003eInspire me again\u003c/button\u003e\n      {children}\n    \u003c/\u003e\n  );\n}\n```\n上面的组件是一个封装的文字生成器组件，我们在入口文件中引入：\n\n```js\nimport FancyText from './FancyText';\nimport InspirationGenerator from './InspirationGenerator';\nimport Copyright from './Copyright';\n\nexport default function App() {\n  return (\n    \u003c\u003e\n      \u003cFancyText title text=\"Get Inspired App\" /\u003e\n      \u003cInspirationGenerator\u003e\n        \u003cCopyright year={2004} /\u003e\n      \u003c/InspirationGenerator\u003e\n    \u003c/\u003e\n  );\n}\n```\n这就做了隔离了，总的代码都是服务端直出的，但是 InspirationGenerator 标记了使用在客户端。我们借用官网的调用树说明现在的引用关系：\n\n\n\n![image.png](/img/posts/2023-11-9/2023-11-9-2.png)\n\nInspirationGenerator 标记了为客户端渲染，则其作为其实节点的所有叶子节点都会采用客户端渲染了。\n\n我们再来看一下渲染关系：\n\n\n![image.png](/img/posts/2023-11-9/2023-11-9-3.png)\n\n可以看到，Copyright 虽然是 InspirationGenerator 组件内部的 children，但是从引用关系来看，没有被 'use client' 标记，所以就走服务端渲染。\n\n### use server\n\n用于服务端渲染代码里。React 服务端组件默认是走 SSR 的，使用这个指令指定当前文件是属于服务端的。\n\n这就类似于 next.js 里边的 getServerSideProps，我们看一下示例代码：\n\n```js\n// App.js\n\nasync function requestUsername(formData) {\n  'use server';\n  const username = formData.get('username');\n  // ...\n}\n\nexport default App() {\n  \u003cform action={requestUsername}\u003e\n    \u003cinput type=\"text\" name=\"username\" /\u003e\n    \u003cbutton type=\"submit\"\u003eRequest\u003c/button\u003e\n  \u003c/form\u003e\n}\n```\n\n在服务端渲染时，我们人为标记 requestUsername 函数是属于服务端的，这样在项目代码打包为 bundle 时就会直接预先调用 requestUsername，相当于默认提交了一次表单。\n\n而且，标记为服务端的函数可以设置为异步：\n\n```js\n// actions.js\n'use server';\n\nlet likeCount = 0;\nexport default async incrementLike() {\n  likeCount++;\n  return likeCount;\n}\n```\n\n这样在客户端代码中就可以异步接收了：\n\n\n```js\nstartTransition(async () =\u003e {\n  const currentCount = await incrementLike();\n});\n```\n\n\u003e 关于 use client 和 use server，官方的使用案例较少，也没有另外的参考。如果后期这个 API 较为成熟后，我会补充使用案例\n-----"])</script><script>self.__next_f.push([1,"21:T4fa4,"])</script><script>self.__next_f.push([1,"## 1. 服务端渲染\n\n服务端渲染是服务端返回渲染出的 html 字符串（或数据流），浏览器来解析 html 以构建页面。在 React 开发中，要想使用 SSR，有两种方式：\n\n1. 使用 Nextjs\n2. 手动搭建服务端渲染\n\n官网提到的服务端 API 就是 React 提供的支持手动搭建服务端渲染的。其**本质是服务端直接将一个生成好的 HTML 给到前端，前端一次性渲染**，便于加速首屏加载和进行 SEO。这里有个问题，客户端工作并不仅仅是渲染服务器返回的 html，为了保证服务端返回的 html 在客户端能够处理事件和交互，客户端要重新进行 vdom 的构建和事件绑定，即，**在渲染出 html 后，把相应组件关联到其对应的组件上，并添加交互逻辑和管理之后的渲染（html 映射为 React 树）**。\n\n也就是说，前端组件逻辑在服务端渲染一次后，在客户端也要针对性的渲染一次，这个过程叫水合（hydrate），这两次渲染叫做同构渲染。\n\n\u003e 尽管服务端渲染（SSR）并 hydrate 的过程比纯粹的客户端渲染（CSR）看起来更繁琐，但是它实际上可以节省渲染时间，特别是在复杂的 React 应用中。\n\n### SSR vs CSR\n\n服务端用来存储和响应数据，客户端用于请求和展示数据，他们都有自己的渲染方式。尽管这两种方法都涉及到从服务器获取 HTML 并在浏览器中解析，但它们之间存在一些重要的区别。\n\n1.  初始渲染：SSR 系统中，服务端已经返回了完整的页面，客户端只需要做少量的水合操作即可；CSR 系统中，服务器返回的是入口的最小化的 html (index.html)，客户端需要通过下载好的 css、js 文件逐行解析并构建 DOM 和 CSSOM，最终生成完整的 html。\n2.  交互性：在 SSR 中，由于 HTML 是在服务器上预先渲染的，所以从一开始就具有交互性。这意味着用户可以在页面加载后立即看到所有的功能和内容，而不需要等待客户端 JavaScript 代码执行。而在 CSR 中，用户可能需要等待一段时间（js执行，DOM构建等耗时操作）才能看到交互功能。\n3.  SEO：由于搜索引擎通常更擅长解析 HTML，而不是 JavaScript，因此 SSR 可以提高搜索引擎优化（SEO）。搜索引擎可以更容易地读取和理解 SSR 生成的 HTML 中的内容。而 CSR 初始化的 html 仅仅是一个入口文件，没有爬取的意义。可以参见这篇优化 [SEO 优化](https://juejin.cn/post/7295651353854132239)\n4.  性能：SSR 在服务器上完成渲染，这意味着服务器需要更多的计算资源。而 CSR 将渲染工作转移到了客户端，这可以减轻服务器的负担。然而，随着硬件性能的提高和优化技术的进步，这种差异变得越来越小。\n5.  复杂性：SSR 需要更多的开发工作，因为它涉及到在服务器端处理渲染和在客户端处理 hydrate（将 HTML 转换为 React 组件）。而 CSR 更简单，因为它只需要在客户端处理渲染。\n\n总的来说，虽然 SSR 和 CSR 在技术上有一些区别，但它们都可以有效地渲染 React 应用。选择哪种方法取决于具体的应用需求和场景。\n\n下面图解说明一下：\n\nSSR:\n\n\n![无标题-2023-10-11-1617.png](/img/posts/2023-11-3/2023-11-3-1.png)\n\n----\n\nCSR:\n\n![无标题-2023-10-11-1617.png](/img/posts/2023-11-3/2023-11-3-2.png)\n\n### SSR 适用的场景\n\n- 需要 SEO 优化的场景\n- 需要更快的首屏时间\n- 静态页面或者blog类内容展示类网页\n- 需要增强用户可访问性的页面：能够快速获取页面内容并进行浏览\n\n### CSR 适用的场景\n\n- 高交互性、实时更新的场景：\n- 复杂前端逻辑场景：CSR 对于复杂的交互和动态效果的支持较好，开发也相对简单。\n- API驱动的应用程序：CSR 允许客户端获取数据来处理，可以减少服务器负载并提供响应式体验。\n\n## 2. React SSR 的几种 API\n\n官网提供了这么几个 API 用于在服务端渲染 React 组件：\n\n### renderToString\n\n它可以将 React 组件渲染成字符串，最常用的 SSR API。它返回一个字符串，其中包含 HTML 和 React 组件的标记。这个 API 可以在服务器端使用，将 React 组件渲染成 HTML，然后将 HTML 发送到客户端。\n\n服务端这样写（nodejs为例）\n\n\n```js\nimport { renderToString } from 'react-dom/server';\n\napp.use('/', (request, response) =\u003e {\n  const html = renderToString(\u003cApp /\u003e);\n  response.send(html);\n});\n```\n\n在客户端浏览器接收到它后，要使用 React 语言渲染出来：\n\n\n```js\nimport { hydrateRoot } from 'react-dom/client';\n\nhydrateRoot(document.getElementById('root'), \u003cApp/\u003e);\n```\n\nhydrate 会在渲染的过程中，不创建 html 标签，而是直接关联已有的。这样就避免了没必要的渲染。\n\n### renderToPipeableStream\n\n它可以将 React 组件渲染为可读的 Stream。使用方式有略微不同：\n\n```js\nimport { renderToPipeableStream } from 'react-dom/server';\n\nconst stream = renderToPipeableStream(\u003cApp /\u003e);  \nresponse.set('Content-Type', 'text/html');  \nstream.pipe(res);  \n```\n\n不同于 renderToString，他可以作为一个管道不断往服务器响应里输出内容。`renderToPipeableStream`提供了更高级的特性，例如路由控制、异步数据加载等。它返回一个可读的Stream对象，这个对象可以用于将React组件渲染为HTML文档的流式传输。使用`renderToPipeableStream`可以在服务器端实现更复杂的渲染逻辑，例如**根据路由路径动态加载组件、按需加载数据**等。\n\n### renderToReadableStream\n\n他是 renderToPipeableStream 的一种替代方案。\n\n使用方式：\n\n```js\nimport { renderToReadableStream } from 'react-dom/server';\n\nasync function handler(request) {\n  const stream = await renderToReadableStream(\u003cApp /\u003e, {\n    bootstrapScripts: ['/main.js']\n  });\n  return new Response(stream, {\n    headers: { 'content-type': 'text/html' },\n  });\n}\n```\n这个 API 返回的是一个 Promise，依赖 web 流，目前的兼容性存在问题。可以参考 web 流的概念：[Stream API](https://developer.mozilla.org/en-US/docs/Web/API/Streams_API)\n\n###
